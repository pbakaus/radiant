<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geodesic 2D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: 'SF Mono', monospace; color: #e8e0d8; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; touch-action: none; }
  .label {
    position: fixed; top: 14px; left: 16px;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5); z-index: 10; pointer-events: none;
  }
  .hint {
    position: fixed; bottom: 14px; left: 16px;
    font-size: 10px; letter-spacing: 0.1em;
    color: rgba(232, 224, 216, 0.4); z-index: 10; pointer-events: none;
  }
  .clear {
    position: fixed; top: 14px; right: 16px;
    background: transparent; border: 1px solid rgba(200,149,108,0.2);
    color: rgba(232,224,216,0.5); font-family: inherit; font-size: 10px;
    letter-spacing: 0.1em; padding: 4px 10px; border-radius: 3px; cursor: pointer;
    z-index: 10;
  }
  .clear:hover { color: #c8956c; border-color: rgba(200,149,108,0.45); }
</style>
</head>
<body>
<div class="label">Geodesic playground</div>
<button class="clear" id="clear">Clear rays</button>
<div class="hint">Click and drag to launch a ray</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 2D top-down view of light rays passing through Schwarzschild gravity.
// Click and drag anywhere to launch a ray. The drag direction sets the
// initial velocity. Rays are integrated using the same equations as the
// full shader — velocity-Verlet on d²x/dλ² = -1.5·RS·L²/r⁵·x.
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  // World coordinates — we render a square region [-W, W] in both dims
  var WORLD = 12;
  var RS = 1.0;          // Schwarzschild radius
  var showField = true;  // gravitational field grid
  var rayMax = 1200;     // max steps per ray

  // List of trajectories
  var rays = [];

  function resize() {
    var w = canvas.clientWidth, h = canvas.clientHeight;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }
  window.addEventListener('resize', resize);
  resize();

  function worldToScreen(x, y) {
    var s = Math.min(canvas.width, canvas.height) / (WORLD * 2);
    return [canvas.width / 2 + x * s, canvas.height / 2 + y * s];
  }
  function screenToWorld(sx, sy) {
    var s = Math.min(canvas.width, canvas.height) / (WORLD * 2);
    return [(sx * dpr - canvas.width / 2) / s, (sy * dpr - canvas.height / 2) / s];
  }

  // Integrate a single 2D geodesic
  function traceRay(x0, y0, vx, vy) {
    var pts = [[x0, y0]];
    var px = x0, py = y0;
    // Normalize velocity to unit speed
    var vlen = Math.hypot(vx, vy);
    if (vlen < 1e-6) return pts;
    vx /= vlen; vy /= vlen;
    // Conserved angular momentum: L = |x × v| (2D scalar)
    var L = px * vy - py * vx;
    var L2 = L * L;
    var gravCoeff = -1.5 * RS * L2;
    var absorbed = false, escaped = false;
    for (var i = 0; i < rayMax && !absorbed && !escaped; i++) {
      var r = Math.hypot(px, py);
      var h = 0.05 * Math.max(0.06, Math.min(0.6, r - 0.4 * RS));
      var invR5 = 1 / (r * r * r * r * r);
      var ax = gravCoeff * invR5 * px;
      var ay = gravCoeff * invR5 * py;
      var p1x = px + vx * h + 0.5 * ax * h * h;
      var p1y = py + vy * h + 0.5 * ay * h * h;
      var r1 = Math.hypot(p1x, p1y);
      var invR15 = 1 / (r1 * r1 * r1 * r1 * r1);
      var a1x = gravCoeff * invR15 * p1x;
      var a1y = gravCoeff * invR15 * p1y;
      vx = vx + 0.5 * (ax + a1x) * h;
      vy = vy + 0.5 * (ay + a1y) * h;
      px = p1x; py = p1y;
      pts.push([px, py]);
      if (r1 < RS * 0.45) absorbed = true;
      if (r1 > WORLD * 1.4) escaped = true;
    }
    return { points: pts, absorbed: absorbed };
  }

  function drawField() {
    // Faint radial glow only near the black hole (not a full-canvas wash)
    if (!showField) return;
    var s = Math.min(canvas.width, canvas.height) / (WORLD * 2);
    var cx = canvas.width / 2, cy = canvas.height / 2;
    var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, RS * s * 5);
    g.addColorStop(0,    'rgba(200, 149, 108, 0.08)');
    g.addColorStop(0.4,  'rgba(200, 149, 108, 0.025)');
    g.addColorStop(1,    'rgba(200, 149, 108, 0.0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function draw(previewRay) {
    // Black background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawField();

    var s = Math.min(canvas.width, canvas.height) / (WORLD * 2);
    var cx = canvas.width / 2, cy = canvas.height / 2;

    // Photon sphere reference circle (r = 1.5 RS)
    ctx.strokeStyle = 'rgba(200, 149, 108, 0.18)';
    ctx.lineWidth = 1 * dpr;
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.arc(cx, cy, 1.5 * RS * s, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Event horizon
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, RS * s * 1.3);
    grad.addColorStop(0, '#000');
    grad.addColorStop(0.7, '#000');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, RS * s * 1.3, 0, Math.PI * 2);
    ctx.fill();

    // Existing rays
    for (var i = 0; i < rays.length; i++) {
      var ray = rays[i];
      ctx.lineWidth = 1.4 * dpr;
      ctx.strokeStyle = ray.absorbed ? 'rgba(220, 100, 80, 0.85)' : 'rgba(220, 200, 160, 0.85)';
      ctx.beginPath();
      for (var j = 0; j < ray.points.length; j++) {
        var p = worldToScreen(ray.points[j][0], ray.points[j][1]);
        if (j === 0) ctx.moveTo(p[0], p[1]);
        else ctx.lineTo(p[0], p[1]);
      }
      ctx.stroke();
    }

    // Preview ray (currently being dragged)
    if (previewRay) {
      ctx.lineWidth = 1.5 * dpr;
      ctx.strokeStyle = previewRay.absorbed ? 'rgba(220, 100, 80, 0.95)' : 'rgba(255, 240, 200, 0.95)';
      ctx.beginPath();
      for (var k = 0; k < previewRay.points.length; k++) {
        var pp = worldToScreen(previewRay.points[k][0], previewRay.points[k][1]);
        if (k === 0) ctx.moveTo(pp[0], pp[1]);
        else ctx.lineTo(pp[0], pp[1]);
      }
      ctx.stroke();

      // Start dot
      var first = worldToScreen(previewRay.points[0][0], previewRay.points[0][1]);
      ctx.fillStyle = '#c8956c';
      ctx.beginPath();
      ctx.arc(first[0], first[1], 3.5 * dpr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Labels in the bottom-right — out of the way of the "Clear rays" button
    // and the BH itself at any mass
    ctx.fillStyle = 'rgba(200, 149, 108, 0.45)';
    ctx.font = (10 * dpr) + 'px "SF Mono", monospace';
    ctx.textAlign = 'right';
    var labelX = canvas.width - 16 * dpr;
    var labelY = canvas.height - 50 * dpr;
    ctx.fillText('RS = ' + RS.toFixed(2), labelX, labelY);
    ctx.fillText('photon sphere = 1.5·RS', labelX, labelY + 14 * dpr);
    ctx.fillText('capture cutoff ≈ 2.6·RS', labelX, labelY + 28 * dpr);
  }

  var startX = null, startY = null, dragging = false;
  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var p = e.touches ? e.touches[0] : e;
    return [p.clientX - rect.left, p.clientY - rect.top];
  }
  canvas.addEventListener('mousedown', function(e){ var p = getPos(e); startX = p[0]; startY = p[1]; dragging = true; draw(); });
  canvas.addEventListener('mousemove', function(e){
    if (!dragging) return;
    var p = getPos(e);
    var s0 = screenToWorld(startX, startY);
    var s1 = screenToWorld(p[0], p[1]);
    var vx = s1[0] - s0[0], vy = s1[1] - s0[1];
    var preview = traceRay(s0[0], s0[1], vx, vy);
    draw(preview);
  });
  function release(e) {
    if (!dragging) return;
    dragging = false;
    var p = getPos(e.changedTouches ? { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY } : e);
    var s0 = screenToWorld(startX, startY);
    var s1 = screenToWorld(p[0], p[1]);
    var vx = s1[0] - s0[0], vy = s1[1] - s0[1];
    if (Math.hypot(vx, vy) < 0.15) { draw(); return; }
    var ray = traceRay(s0[0], s0[1], vx, vy);
    rays.push(ray);
    if (rays.length > 60) rays.shift();
    draw();
  }
  canvas.addEventListener('mouseup', release);
  canvas.addEventListener('mouseleave', function(){ dragging = false; draw(); });
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var p = getPos(e); startX = p[0]; startY = p[1]; dragging = true; draw(); }, { passive: false });
  canvas.addEventListener('touchmove', function(e){
    e.preventDefault(); if (!dragging) return;
    var p = getPos(e);
    var s0 = screenToWorld(startX, startY);
    var s1 = screenToWorld(p[0], p[1]);
    var vx = s1[0] - s0[0], vy = s1[1] - s0[1];
    var preview = traceRay(s0[0], s0[1], vx, vy);
    draw(preview);
  }, { passive: false });
  canvas.addEventListener('touchend', release);

  document.getElementById('clear').addEventListener('click', function(){ rays = []; draw(); });
  window.addEventListener('resize', function(){ resize(); draw(); });

  // Demo rays so the canvas is never empty. Seed positions are spread so
  // both regimes (escape + capture) are visible across the full mass range.
  // Critical impact parameter for capture is ~2.6·RS, so we want some seeds
  // inside it and some outside no matter where MASS sits.
  function seedDemo() {
    rays = [];
    // Impact parameters chosen to stay clearly above/below the critical
    // cutoff (b_crit = 1.5·√3·RS ≈ 2.6·RS at MASS=1, scaling with RS) at
    // every reachable mass setting. Seeds at exactly the critical value
    // need many photon-sphere wraps to resolve and would falsely escape
    // due to our 200-step integration cap.
    var yPositions = [-6.5, -4.0, -2.2, -1.5, -0.8, -0.3, 0.3, 0.8, 1.5, 2.2, 4.0, 6.5];
    for (var i = 0; i < yPositions.length; i++) {
      rays.push(traceRay(-10, yPositions[i], 1, 0));
    }
  }
  seedDemo(); draw();

  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'MASS': RS = Math.max(0.1, e.data.value); rays = []; seedDemo(); draw(); break;
        case 'FIELD': showField = e.data.value > 0.5; draw(); break;
        case 'RESEED': rays = []; seedDemo(); draw(); break;
      }
    }
  });
})();
</script>
</body>
</html>
