<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 01 — Straight Rays</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 16px; left: 18px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="label">01 · Straight Rays</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Step 01 — Just rays + a starfield. No gravity, no disk.
// Each pixel shoots a ray from the camera into space and samples
// background stars. This is the "no black hole" baseline.
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var gl = canvas.getContext('webgl', { alpha: false, antialias: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }';
  var fragSrc = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;
uniform float u_rotateSpeed;
uniform float u_tilt;
uniform float u_dragX;
uniform float u_dragY;
uniform float u_nebula;

const float PI = 3.14159265359;
const float TAU = 6.28318530718;

float hash(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * 0.1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}
float gNoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
  return mix(
    mix(hash(i), hash(i + vec2(1, 0)), u.x),
    mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), u.x),
    u.y);
}
float fbmLite(vec2 p) {
  float v = 0.5 * gNoise(p);
  p = mat2(0.866, 0.5, -0.5, 0.866) * p * 2.03 + vec2(47.0, 13.0);
  v += 0.25 * gNoise(p);
  return v;
}

// ──── 3D noise — used for the nebula so it doesn't seam at the meridian ────
// Sampling a 2D UV (u = atan(rd.z, rd.x)) creates a hard discontinuity at
// u=0 ↔ u=1 because the FBM has no idea those coordinates are the same
// direction in 3D space. Driving the noise off the ray vector directly
// avoids the seam.
float hash3(vec3 p) {
  p = fract(p * 0.1031);
  p += dot(p, p.yzx + 33.33);
  return fract((p.x + p.y) * p.z);
}
float gNoise3(vec3 p) {
  vec3 i = floor(p), f = fract(p);
  vec3 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
  return mix(
    mix(
      mix(hash3(i + vec3(0,0,0)), hash3(i + vec3(1,0,0)), u.x),
      mix(hash3(i + vec3(0,1,0)), hash3(i + vec3(1,1,0)), u.x), u.y),
    mix(
      mix(hash3(i + vec3(0,0,1)), hash3(i + vec3(1,0,1)), u.x),
      mix(hash3(i + vec3(0,1,1)), hash3(i + vec3(1,1,1)), u.x), u.y),
    u.z);
}
float fbm3(vec3 p) {
  float v = 0.5 * gNoise3(p);
  p = p * 2.07 + vec3(11.0, 31.0, 17.0); v += 0.25 * gNoise3(p);
  p = p * 2.03 + vec3(47.0, 13.0, 29.0); v += 0.125 * gNoise3(p);
  return v;
}

vec3 starField(vec3 rd) {
  float u = atan(rd.z, rd.x) / TAU + 0.5;
  float v = asin(clamp(rd.y, -0.999, 0.999)) / PI + 0.5;
  vec3 col = vec3(0.0);

  // ──── Nebula first (sits behind stars) — sampled in 3D, no seam ────
  if (u_nebula > 0.01) {
    float nA = fbm3(rd * 2.5);
    float nB = fbm3(rd * 4.0 + vec3(17.0));
    // Soft cloud field with a low-level ambient base so there are no
    // hard dark gaps between bright regions.
    float clouds = 0.25 + 0.75 * smoothstep(0.1, 0.9, nA * nB * 3.5);
    clouds *= 0.4 + 0.6 * smoothstep(0.2, 0.7, nA); // gentle large-scale modulation
    // Hue varies with sky latitude (rd.y): warm dust below, cool above
    vec3 warm = vec3(0.28, 0.10, 0.20);
    vec3 cool = vec3(0.08, 0.12, 0.28);
    vec3 nebCol = mix(warm, cool, smoothstep(-0.5, 0.7, rd.y + 0.25 * nA));
    col += nebCol * clouds * u_nebula * 0.55;
  }

  // Bright sparse stars
  {
    vec2 cell = floor(vec2(u, v) * 55.0);
    vec2 f = fract(vec2(u, v) * 55.0);
    vec2 r = vec2(hash(cell), hash(cell + 127.1));
    float d = length(f - r);
    float b = pow(r.x, 10.0) * exp(-d * d * 500.0);
    col += mix(vec3(1.0, 0.65, 0.35), vec3(0.55, 0.75, 1.0), r.y) * b * 4.0;
  }
  // Medium density
  {
    vec2 cell = floor(vec2(u, v) * 170.0);
    vec2 f = fract(vec2(u, v) * 170.0);
    vec2 r = vec2(hash(cell + 43.0), hash(cell + 91.0));
    float d = length(f - r);
    float b = pow(r.x, 18.0) * exp(-d * d * 1000.0);
    col += vec3(0.85, 0.88, 1.0) * b * 2.0;
  }
  return col;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / u_res.x;

  // Orbital camera at fixed distance — same framing as the final shader
  float orbit = u_time * 0.055 * u_rotateSpeed + u_dragX;
  float tilt = 0.25 + u_tilt + u_dragY;
  vec3 eye = vec3(28.0 * cos(orbit) * cos(tilt), 28.0 * sin(tilt), 28.0 * sin(orbit) * cos(tilt));

  vec3 fwd = normalize(-eye);
  vec3 rt  = normalize(cross(fwd, vec3(0.0, 1.0, 0.0)));
  vec3 up  = cross(rt, fwd);

  // Ray direction for this pixel
  vec3 rd = normalize(fwd + uv.x * rt + uv.y * up);

  // STRAIGHT line: no bending, just sample the sky in that direction.
  vec3 col = starField(rd);

  // Filmic-ish output
  col = col / (col + 1.0);
  col = pow(col, vec3(0.85));
  gl_FragColor = vec4(col, 1.0);
}
`;

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog); gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRotateSpeed = gl.getUniformLocation(prog, 'u_rotateSpeed');
  var uTilt = gl.getUniformLocation(prog, 'u_tilt');
  var uDragX = gl.getUniformLocation(prog, 'u_dragX');
  var uDragY = gl.getUniformLocation(prog, 'u_dragY');
  var uNebula = gl.getUniformLocation(prog, 'u_nebula');

  var rotateSpeedVal = 0.5;
  var tiltVal = 0.0;
  var nebulaVal = 1.0;
  var dragX = 0.0, dragY = 0.0;

  var mouseDown = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', function(e){ mouseDown = true; lastX = e.clientX; lastY = e.clientY; });
  canvas.addEventListener('mousemove', function(e){
    if (mouseDown) {
      dragX += (e.clientX - lastX) * 0.005;
      dragY += (e.clientY - lastY) * 0.003;
      dragY = Math.max(-0.8, Math.min(0.8, dragY));
      lastX = e.clientX; lastY = e.clientY;
    }
  });
  canvas.addEventListener('mouseup', function(){ mouseDown = false; });
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); mouseDown = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }, { passive: false });
  canvas.addEventListener('touchmove', function(e){
    e.preventDefault();
    if (mouseDown) {
      dragX += (e.touches[0].clientX - lastX) * 0.005;
      dragY += (e.touches[0].clientY - lastY) * 0.003;
      dragY = Math.max(-0.8, Math.min(0.8, dragY));
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', function(){ mouseDown = false; });

  var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  var running = true, needsResize = true;
  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, w, h);
    }
    needsResize = false;
  }
  function render(now) {
    if (!running) return;
    if (needsResize) resize();
    var t = now * 0.001;
    gl.uniform1f(uTime, t);
    gl.uniform1f(uRotateSpeed, rotateSpeedVal);
    gl.uniform1f(uTilt, tiltVal);
    gl.uniform1f(uDragX, dragX);
    gl.uniform1f(uDragY, dragY);
    gl.uniform1f(uNebula, nebulaVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }
  window.addEventListener('resize', function(){ needsResize = true; });
  resize();
  requestAnimationFrame(render);
  document.addEventListener('visibilitychange', function(){
    if (document.hidden) running = false;
    else { running = true; requestAnimationFrame(render); }
  });

  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'ROTATE_SPEED': rotateSpeedVal = e.data.value; break;
        case 'TILT':         tiltVal = e.data.value; break;
        case 'NEBULA':       nebulaVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
