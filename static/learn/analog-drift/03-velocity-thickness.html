<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 03 — Velocity Thickness</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 16px; left: 18px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.55); z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
<div class="label">03 · Velocity thickness</div>
<canvas id="canvas"></canvas>
<script>
// Step 03 — Thickness modulated by velocity. In a real CRT the beam
// lingers in slow-moving regions, so they look brighter and fatter.
// We approximate by sampling segment speed every N points and scaling
// line width: thickness ∝ 1 / (1 + speed).
(function () {
  'use strict';
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  var MODULATE = 1.0;   // 0 = constant thickness, 1 = velocity-modulated
  var STRENGTH = 0.25;   // higher = more dramatic difference
  var W = 0, H = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  var paused = false;
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) lastTs = 0;
  });

  window.addEventListener('message', function (e) {
    if (!e.data) return;
    if (e.data.type === 'param') {
      if (e.data.name === 'MODULATE') MODULATE = parseFloat(e.data.value);
      if (e.data.name === 'STRENGTH') STRENGTH = parseFloat(e.data.value);
    }
    if (e.data.name === 'RESET') {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, W, H);
    }
  });

  var time = 0;
  var lastTs = 0;

  var ptX = new Float64Array(3001);
  var ptY = new Float64Array(3001);

  function draw(ts) {
    requestAnimationFrame(draw);
    if (paused) return;
    if (lastTs === 0) lastTs = ts;
    var dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    time += dt;

    // Slow phosphor fade so the figure persists.
    ctx.fillStyle = 'rgba(10, 10, 10, 0.04)';
    ctx.fillRect(0, 0, W, H);

    var cx = W / 2, cy = H / 2;
    var size = Math.min(W, H) * 0.38;

    // A figure with strong speed variation (3:2 ratio).
    var a = 3.0, b = 2.0;
    var delta = Math.PI / 4 + time * 0.25;
    var N = 3000;
    var coverage = Math.PI * 2 * Math.max(Math.ceil(a), Math.ceil(b));
    var step = coverage / N;

    for (var i = 0; i <= N; i++) {
      var t = i * step;
      ptX[i] = cx + Math.sin(a * t + delta) * size;
      ptY[i] = cy + Math.sin(b * t) * size;
    }

    ctx.strokeStyle = 'rgba(200, 149, 108, 1.0)';
    ctx.globalAlpha = 0.85;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    var BASE = 1.5;
    if (MODULATE < 0.5) {
      ctx.lineWidth = BASE;
      ctx.beginPath();
      ctx.moveTo(ptX[0], ptY[0]);
      for (var i = 1; i <= N; i++) ctx.lineTo(ptX[i], ptY[i]);
      ctx.stroke();
    } else {
      // Batch in groups; one thickness per batch from the midpoint speed.
      var batch = 20;
      for (var i = 0; i < N; i += batch) {
        var end = Math.min(i + batch, N);
        var mid = Math.min(i + (batch >> 1), N - 1);
        var dx = ptX[mid + 1] - ptX[mid];
        var dy = ptY[mid + 1] - ptY[mid];
        var speed = Math.sqrt(dx * dx + dy * dy);
        var mult = 1.0 / (1.0 + speed * STRENGTH);
        mult = 0.6 + mult * 1.2;
        ctx.lineWidth = BASE * mult;
        ctx.beginPath();
        ctx.moveTo(ptX[i], ptY[i]);
        for (var j = i + 1; j <= end; j++) ctx.lineTo(ptX[j], ptY[j]);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1.0;
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
