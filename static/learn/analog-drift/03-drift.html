<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 03 — Waypoint Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 16px; left: 18px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.55); z-index: 10; pointer-events: none;
  }
  .readout {
    position: fixed; top: 16px; right: 18px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px; line-height: 1.6;
    color: rgba(200, 149, 108, 0.7); z-index: 10; pointer-events: none;
    text-align: right;
  }
  .readout b { color: rgba(255, 245, 230, 0.9); font-weight: 500; }
</style>
</head>
<body>
<div class="label">03 · Waypoint drift</div>
<div class="readout" id="readout"></div>
<canvas id="canvas"></canvas>
<script>
// Step 03 — Drift through (a, b, δ) waypoints with ease-in-out cubic.
// Linear interpolation reads as mechanical; the easing gives "analog".
// EASING toggle compares the two.
(function () {
  'use strict';
  var canvas = document.getElementById('canvas');
  var readout = document.getElementById('readout');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  var SPEED = 1.0;
  var EASING = 1.0;  // 0 = linear, 1 = ease-in-out cubic
  var W = 0, H = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  var paused = false;
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) lastTs = 0;
  });

  window.addEventListener('message', function (e) {
    if (!e.data) return;
    if (e.data.type === 'param') {
      if (e.data.name === 'SPEED') SPEED = parseFloat(e.data.value);
      if (e.data.name === 'EASING') EASING = parseFloat(e.data.value);
    }
    if (e.data.name === 'RESET') {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, W, H);
    }
  });

  var waypoints = [
    { a: 1, b: 1, delta: Math.PI / 2 },
    { a: 1, b: 2, delta: 0 },
    { a: 2, b: 3, delta: Math.PI / 4 },
    { a: 3, b: 2, delta: Math.PI / 3 },
    { a: 3, b: 4, delta: Math.PI / 6 },
    { a: 2, b: 5, delta: Math.PI / 2 },
    { a: 1, b: 3, delta: Math.PI / 5 },
    { a: 4, b: 3, delta: Math.PI / 7 }
  ];

  function easeCubic(x) {
    return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
  }

  function getParams(t) {
    var n = waypoints.length;
    var pos = ((t % n) + n) % n;
    var idx = Math.floor(pos);
    var frac = pos - idx;
    if (EASING > 0.5) frac = easeCubic(frac);
    var from = waypoints[idx];
    var to = waypoints[(idx + 1) % n];
    return {
      a: from.a + (to.a - from.a) * frac,
      b: from.b + (to.b - from.b) * frac,
      delta: from.delta + (to.delta - from.delta) * frac
    };
  }

  var driftTime = 0;
  var lastTs = 0;
  var time = 0;
  var ptX = new Float64Array(3001);
  var ptY = new Float64Array(3001);

  function fmt(n) { return (Math.round(n * 100) / 100).toFixed(2); }

  function draw(ts) {
    requestAnimationFrame(draw);
    if (paused) return;
    if (lastTs === 0) lastTs = ts;
    var dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    time += dt;
    driftTime += dt * SPEED * 0.15;

    var wp = getParams(driftTime);

    // Phosphor fade
    ctx.fillStyle = 'rgba(10, 10, 10, 0.04)';
    ctx.fillRect(0, 0, W, H);

    var cx = W / 2, cy = H / 2;
    var size = Math.min(W, H) * 0.38;
    var N = 3000;
    var coverage = Math.PI * 2 * Math.max(Math.ceil(wp.a), Math.ceil(wp.b));
    var step = coverage / N;

    for (var i = 0; i <= N; i++) {
      var t = i * step;
      ptX[i] = cx + Math.sin(wp.a * t + wp.delta) * size;
      ptY[i] = cy + Math.sin(wp.b * t) * size;
    }

    ctx.strokeStyle = 'rgba(200, 149, 108, 1.0)';
    ctx.globalAlpha = 0.8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    var batch = 20;
    for (var i = 0; i < N; i += batch) {
      var end = Math.min(i + batch, N);
      var mid = Math.min(i + (batch >> 1), N - 1);
      var dx = ptX[mid + 1] - ptX[mid];
      var dy = ptY[mid + 1] - ptY[mid];
      var speed = Math.sqrt(dx * dx + dy * dy);
      var mult = 1.0 / (1.0 + speed * 0.25);
      mult = 0.6 + mult * 1.2;
      ctx.lineWidth = 1.5 * mult;
      ctx.beginPath();
      ctx.moveTo(ptX[i], ptY[i]);
      for (var j = i + 1; j <= end; j++) ctx.lineTo(ptX[j], ptY[j]);
      ctx.stroke();
    }
    ctx.globalAlpha = 1.0;

    readout.innerHTML =
      'a = <b>' + fmt(wp.a) + '</b>  ·  b = <b>' + fmt(wp.b) + '</b>  ·  δ = <b>' + fmt(wp.delta) + '</b>';
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
