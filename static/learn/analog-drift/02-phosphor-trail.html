<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 02 — Phosphor Trail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 16px; left: 18px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.55); z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
<div class="label">02 · Phosphor trail</div>
<canvas id="canvas"></canvas>
<script>
// Step 02 — Don't clear, fade. The "phosphor persistence" trick is
// drawing a low-alpha black rectangle over the previous frame instead
// of wiping it. Older pixels decay exponentially; newer ones glow.
// Toggle PHOSPHOR to compare against a hard clear.
(function () {
  'use strict';
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  var PHOSPHOR = 1.0;       // 0 = clear each frame, 1 = phosphor fade
  var FADE = 0.025;          // smaller = longer trails
  var SPEED = 1.0;
  var W = 0, H = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  var paused = false;
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) lastTs = 0;
  });

  window.addEventListener('message', function (e) {
    if (!e.data) return;
    if (e.data.type === 'param') {
      if (e.data.name === 'PHOSPHOR') PHOSPHOR = parseFloat(e.data.value);
      if (e.data.name === 'FADE') FADE = parseFloat(e.data.value);
      if (e.data.name === 'SPEED') SPEED = parseFloat(e.data.value);
    }
    if (e.data.name === 'RESET') {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, W, H);
    }
  });

  var time = 0;
  var lastTs = 0;

  function draw(ts) {
    requestAnimationFrame(draw);
    if (paused) return;
    if (lastTs === 0) lastTs = ts;
    var dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    time += dt * SPEED;

    if (PHOSPHOR > 0.5) {
      // Phosphor: low-alpha overdraw. Trails decay exponentially.
      ctx.fillStyle = 'rgba(10, 10, 10, ' + FADE + ')';
      ctx.fillRect(0, 0, W, H);
    } else {
      // Hard clear: no memory of previous frames.
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
    }

    var cx = W / 2, cy = H / 2;
    var size = Math.min(W, H) * 0.38;
    var a = 3.0;
    var b = 2.0;
    var delta = Math.PI / 4 + time * 0.8;  // sweep through phase to animate

    var N = 2000;
    var coverage = Math.PI * 2 * Math.max(Math.ceil(a), Math.ceil(b));
    var step = coverage / N;

    ctx.strokeStyle = 'rgba(200, 149, 108, 1.0)';
    ctx.globalAlpha = 0.7;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (var i = 0; i <= N; i++) {
      var t = i * step;
      var x = cx + Math.sin(a * t + delta) * size;
      var y = cy + Math.sin(b * t) * size;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1.0;
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
