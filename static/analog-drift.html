<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Analog Drift</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Analog Drift — Lissajous figures with phosphor
// persistence, drifting through parameter space
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var W, H;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Tunable parameters ──
  var DRIFT_SPEED = 0.5;
  var TRAIL_LENGTH = 1.0;
  // Normalized figure center + scale — exposed so the article hero can
  // push the scope off-center without affecting the standalone shader.
  var CENTER_X = 0.5;
  var CENTER_Y = 0.5;
  var SCALE = 1.0;

  // ── Mouse tracking ──
  var mouse = { x: -1, y: -1, active: false };
  var mouseTarget = { a: 1, delta: 0 };
  var mouseCurrent = { a: 1, delta: 0 };

  // Mouse nudge range — gentle influence, not full override
  var MOUSE_A_RANGE = 0.8;       // ±0.8 nudge on frequency ratio
  var MOUSE_DELTA_RANGE = 0.6;   // ±0.6 radians nudge on phase

  function updateMouseTarget(clientX, clientY) {
    mouse.x = clientX;
    mouse.y = clientY;
    mouse.active = true;
    // Map mouse position to a gentle bias (centered at 0)
    mouseTarget.a = (clientX / W - 0.5) * 2.0 * MOUSE_A_RANGE;
    mouseTarget.delta = (clientY / H - 0.5) * 2.0 * MOUSE_DELTA_RANGE;
  }

  canvas.addEventListener('mousemove', function(e) {
    updateMouseTarget(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseleave', function() {
    mouse.active = false;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    updateMouseTarget(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    updateMouseTarget(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    mouse.active = false;
  });

  // ── Lissajous drift state ──
  // We slowly interpolate between "waypoints" in parameter space
  var waypoints = [
    { a: 1.0, b: 1.0, delta: Math.PI / 2 },   // circle
    { a: 1.0, b: 2.0, delta: 0 },               // figure-8
    { a: 2.0, b: 3.0, delta: Math.PI / 4 },     // trefoil
    { a: 3.0, b: 2.0, delta: Math.PI / 3 },     // complex
    { a: 3.0, b: 4.0, delta: Math.PI / 6 },     // rose-like
    { a: 2.0, b: 5.0, delta: Math.PI / 2 },     // intricate
    { a: 1.0, b: 3.0, delta: Math.PI / 5 },     // asymmetric trefoil
    { a: 4.0, b: 3.0, delta: Math.PI / 7 },     // dense rose
    { a: 3.0, b: 5.0, delta: Math.PI / 3 },     // complex weave
    { a: 1.0, b: 1.0, delta: 0 },               // diagonal line (dissolve)
  ];

  var driftTime = 0;
  var currentA = 1.0;
  var currentB = 1.0;
  var currentDelta = Math.PI / 2;

  function getWaypointParams(t) {
    var totalWaypoints = waypoints.length;
    var cyclePos = (t % totalWaypoints + totalWaypoints) % totalWaypoints;
    var idx = Math.floor(cyclePos);
    var frac = cyclePos - idx;
    // Smooth easing (ease-in-out cubic)
    frac = frac < 0.5 ? 4 * frac * frac * frac : 1 - Math.pow(-2 * frac + 2, 3) / 2;
    var from = waypoints[idx % totalWaypoints];
    var to = waypoints[(idx + 1) % totalWaypoints];
    return {
      a: from.a + (to.a - from.a) * frac,
      b: from.b + (to.b - from.b) * frac,
      delta: from.delta + (to.delta - from.delta) * frac
    };
  }

  // ── Oscilloscope grid ──
  var gridOpacity = 0;
  var gridTarget = 0.06;

  function drawGrid() {
    // Subtle grid that breathes
    gridOpacity += (gridTarget - gridOpacity) * 0.02;
    var cx = W * CENTER_X;
    var cy = H * CENTER_Y;
    var size = Math.min(W, H) * 0.4 * SCALE;

    ctx.strokeStyle = 'rgba(200, 149, 108, ' + (gridOpacity * 0.5) + ')';
    ctx.lineWidth = 0.5;

    // Crosshairs
    ctx.beginPath();
    ctx.moveTo(cx - size, cy);
    ctx.lineTo(cx + size, cy);
    ctx.moveTo(cx, cy - size);
    ctx.lineTo(cx, cy + size);
    ctx.stroke();

    // Grid divisions
    ctx.strokeStyle = 'rgba(200, 149, 108, ' + (gridOpacity * 0.25) + ')';
    ctx.lineWidth = 0.3;
    var divisions = 8;
    var step = size * 2 / divisions;
    ctx.beginPath();
    for (var i = 1; i < divisions; i++) {
      if (i === divisions / 2) continue; // skip center (already drawn)
      var offset = -size + step * i;
      ctx.moveTo(cx + offset, cy - size);
      ctx.lineTo(cx + offset, cy + size);
      ctx.moveTo(cx - size, cy + offset);
      ctx.lineTo(cx + size, cy + offset);
    }
    ctx.stroke();

    // Outer border
    ctx.strokeStyle = 'rgba(200, 149, 108, ' + (gridOpacity * 0.4) + ')';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(cx - size, cy - size, size * 2, size * 2);

    // Tick marks on axes
    ctx.strokeStyle = 'rgba(200, 149, 108, ' + (gridOpacity * 0.6) + ')';
    ctx.lineWidth = 0.5;
    var tickSize = 3;
    ctx.beginPath();
    for (var i = 0; i <= divisions; i++) {
      var pos = -size + step * i;
      ctx.moveTo(cx + pos, cy - tickSize);
      ctx.lineTo(cx + pos, cy + tickSize);
      ctx.moveTo(cx - tickSize, cy + pos);
      ctx.lineTo(cx + tickSize, cy + pos);
    }
    ctx.stroke();
  }

  // ── Pre-allocated point buffers for perf ──
  var ptX = new Float64Array(4000);
  var ptY = new Float64Array(4000);

  // ── Draw a single Lissajous curve ──
  function drawLissajous(a, b, delta, scale, color, alpha, lineWidth, bloomSize, numPoints) {
    var cx = W * CENTER_X;
    var cy = H * CENTER_Y;
    var size = Math.min(W, H) * scale * SCALE;
    var coverage = Math.PI * 2 * Math.max(Math.ceil(a), Math.ceil(b));
    var step = coverage / numPoints;

    // Compute points into pre-allocated buffers
    for (var i = 0; i <= numPoints; i++) {
      var t = i * step;
      ptX[i] = cx + Math.sin(a * t + delta) * size;
      ptY[i] = cy + Math.sin(b * t) * size;
    }

    // CRT bloom layer (drawn first, underneath)
    if (bloomSize > 0) {
      ctx.save();
      ctx.globalAlpha = alpha * 0.15;
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth + bloomSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = color;
      ctx.shadowBlur = bloomSize * 2;
      ctx.beginPath();
      ctx.moveTo(ptX[0], ptY[0]);
      for (var i = 1; i <= numPoints; i++) {
        ctx.lineTo(ptX[i], ptY[i]);
      }
      ctx.stroke();
      ctx.restore();
    }

    // Main trace with thickness variation
    // Draw in batches of segments sharing similar thickness
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    var segBatch = 20; // points per thickness batch
    for (var i = 0; i < numPoints; i += segBatch) {
      var end = Math.min(i + segBatch, numPoints);

      // Sample speed at batch midpoint for thickness
      var mid = Math.min(i + (segBatch >> 1), numPoints - 1);
      var dx = ptX[mid + 1] - ptX[mid];
      var dy = ptY[mid + 1] - ptY[mid];
      var speed = Math.sqrt(dx * dx + dy * dy);
      var thicknessMult = 1.0 / (1.0 + speed * 0.25);
      thicknessMult = 0.6 + thicknessMult * 1.2;
      ctx.lineWidth = lineWidth * thicknessMult;

      ctx.beginPath();
      ctx.moveTo(ptX[i], ptY[i]);
      for (var j = i + 1; j <= end; j++) {
        ctx.lineTo(ptX[j], ptY[j]);
      }
      ctx.stroke();
    }

    ctx.restore();
  }

  // ── Animation state ──
  var time = 0;
  var paused = false;
  var lastTimestamp = 0;

  function draw(timestamp) {
    if (paused) {
      requestAnimationFrame(draw);
      return;
    }

    // Delta time for consistent speed
    if (lastTimestamp === 0) lastTimestamp = timestamp;
    var dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05); // cap at 50ms
    lastTimestamp = timestamp;

    if (prefersReduced) dt = 0;

    time += dt;

    // ── Update drift ──
    driftTime += dt * DRIFT_SPEED * 0.06;

    var wp = getWaypointParams(driftTime);

    // Always drift toward waypoint (mouse nudges on top, never overrides)
    currentA += (wp.a - currentA) * 0.03;
    currentB += (wp.b - currentB) * 0.03;
    currentDelta += (wp.delta - currentDelta) * 0.03;

    if (mouse.active) {
      // Smooth the mouse nudge values
      mouseCurrent.a += (mouseTarget.a - mouseCurrent.a) * 0.04;
      mouseCurrent.delta += (mouseTarget.delta - mouseCurrent.delta) * 0.04;
      // Add gentle nudge on top of the drift
      currentA += mouseCurrent.a * 0.02;
      currentDelta += mouseCurrent.delta * 0.02;
    } else {
      // Fade out mouse influence
      mouseCurrent.a *= 0.95;
      mouseCurrent.delta *= 0.95;
    }

    // ── Trail fade (phosphor persistence) ──
    // Lower alpha = longer trails
    var fadeAlpha = 0.025 * TRAIL_LENGTH;
    ctx.fillStyle = 'rgba(10, 10, 10, ' + fadeAlpha + ')';
    ctx.fillRect(0, 0, W, H);

    // ── Grid (subtle, breathing) ──
    gridTarget = 0.04 + Math.sin(time * 0.3) * 0.02;
    drawGrid();

    // ── Harmonic overtones (drawn first, behind main) ──
    // Second harmonic
    drawLissajous(
      currentA * 2, currentB * 2,
      currentDelta + time * 0.15,
      0.32,
      'rgba(200, 149, 108, 0.7)',
      0.12,
      0.8, 0, 2000
    );

    // Third harmonic
    drawLissajous(
      currentA * 3, currentB * 2,
      currentDelta * 1.5 + time * 0.08,
      0.28,
      'rgba(200, 149, 108, 0.5)',
      0.08,
      0.6, 0, 2000
    );

    // Sub-harmonic (slower, larger)
    drawLissajous(
      currentA * 0.5, currentB * 0.5,
      currentDelta * 0.7 - time * 0.05,
      0.38,
      'rgba(180, 130, 90, 0.4)',
      0.06,
      0.5, 0, 1500
    );

    // ── Main Lissajous trace ──
    // Gradient from cyan to amber across the curve
    // Draw two passes: amber base, then cyan highlight
    drawLissajous(
      currentA, currentB,
      currentDelta,
      0.35,
      'rgba(200, 149, 108, 1.0)',
      0.7,
      1.5, 8, 3000
    );

    // Bright cyan accent trace (slightly offset phase for shimmer)
    drawLissajous(
      currentA, currentB,
      currentDelta + 0.01,
      0.35,
      'rgba(0, 221, 255, 1.0)',
      0.35,
      1.0, 12, 3000
    );

    // ── Bright phosphor dots at key points ──
    var cx = W * CENTER_X;
    var cy = H * CENTER_Y;
    var size = Math.min(W, H) * 0.35 * SCALE;
    var dotCount = 40;
    var coverage = Math.PI * 2 * Math.max(Math.ceil(currentA), Math.ceil(currentB));

    // Draw warm glow layer (larger, softer)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.shadowColor = 'rgba(200, 149, 108, 0.6)';
    ctx.shadowBlur = 6;
    ctx.fillStyle = 'rgba(200, 149, 108, 0.12)';
    ctx.beginPath();
    for (var i = 0; i < dotCount; i++) {
      var t = (i / dotCount) * coverage;
      var x = cx + Math.sin(currentA * t + currentDelta) * size;
      var y = cy + Math.sin(currentB * t) * size;
      ctx.moveTo(x + 2, y);
      ctx.arc(x, y, 2, 0, Math.PI * 2);
    }
    ctx.fill();

    // Draw bright core dots (white-hot center)
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 245, 230, 0.35)';
    ctx.beginPath();
    for (var i = 0; i < dotCount; i++) {
      var t = (i / dotCount) * coverage;
      var x = cx + Math.sin(currentA * t + currentDelta) * size;
      var y = cy + Math.sin(currentB * t) * size;
      var pulse = 0.5 + 0.5 * Math.abs(Math.sin(t * 3 + time * 2));
      ctx.moveTo(x + 1.2 * pulse, y);
      ctx.arc(x, y, 1.2 * pulse, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    requestAnimationFrame(draw);
  }

  // ── Initial fill ──
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);

  // ── Visibility pause ──
  document.addEventListener('visibilitychange', function() {
    paused = document.hidden;
    if (!paused) lastTimestamp = 0;
  });

  // ── PostMessage param control ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRIFT_SPEED': DRIFT_SPEED = e.data.value; break;
        case 'TRAIL_LENGTH': TRAIL_LENGTH = e.data.value; break;
        case 'CENTER_X': CENTER_X = e.data.value; break;
        case 'CENTER_Y': CENTER_Y = e.data.value; break;
        case 'SCALE': SCALE = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
