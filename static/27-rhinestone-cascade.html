<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhinestone Cascade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">27 — Rhinestone Cascade</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 27 · Rhinestone Cascade — Luxurious faceted crystals cascading like a jeweled curtain
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_density;',
    'uniform float u_fallSpeed;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '',
    'mat2 rot(float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'vec2 hash2(vec2 p) {',
    '  return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453);',
    '}',
    '',
    'vec3 hash3(vec2 p) {',
    '  vec3 q = vec3(dot(p, vec2(127.1, 311.7)),',
    '               dot(p, vec2(269.5, 183.3)),',
    '               dot(p, vec2(419.2, 371.9)));',
    '  return fract(sin(q) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  return mix(mix(hash(i), hash(i + vec2(1, 0)), f.x),',
    '             mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x), f.y);',
    '}',
    '',
    '// Spectral rainbow via cosine palette',
    'vec3 spectral(float t) {',
    '  return 0.5 + 0.5 * cos(TAU * (t + vec3(0.0, 0.1, 0.2)));',
    '}',
    '',
    '// Hexagonal SDF',
    'float sdHex(vec2 p, float r) {',
    '  p = abs(p);',
    '  return max(p.x * 0.866 + p.y * 0.5, p.y) - r;',
    '}',
    '',
    '// Single rhinestone layer',
    'vec3 rhinestoneLayer(vec2 uv, float t, float gridScale, float depth,',
    '                     float fallSpeed, float layerSeed) {',
    '  vec3 result = vec3(0.0);',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 cellCount = vec2(gridScale, gridScale / aspect * 1.8);',
    '  vec2 scaledUv = uv * cellCount;',
    '',
    '  // Continuous falling',
    '  scaledUv.y += t * fallSpeed;',
    '',
    '  vec2 cellId = floor(scaledUv);',
    '  vec2 cellUv = fract(scaledUv) - 0.5;',
    '',
    '  for (int dx = -1; dx <= 1; dx++) {',
    '    for (int dy = -1; dy <= 1; dy++) {',
    '      vec2 neighbor = cellId + vec2(float(dx), float(dy));',
    '      vec2 offset = vec2(float(dx), float(dy));',
    '',
    '      vec2 rid = neighbor + layerSeed;',
    '      vec3 rnd = hash3(rid);',
    '      vec2 rnd2 = hash2(rid + 73.1);',
    '      float rnd3 = hash(rid + 41.7);',
    '',
    '      // Sparsity: skip most cells',
    '      if (rnd.x > 0.55) continue;',
    '',
    '      // Jittered position',
    '      vec2 pos = offset + (rnd.yz - 0.5) * 0.65;',
    '',
    '      // Horizontal sway',
    '      float swayPhase = rnd2.x * TAU + t * (0.3 + rnd2.y * 0.25);',
    '      pos.x += sin(swayPhase) * 0.08;',
    '',
    '      vec2 lp = cellUv - pos;',
    '',
    '      // Size: varies per rhinestone, foreground bigger',
    '      float baseSize = 0.12 + rnd.y * 0.12;',
    '      float sizeScale = mix(0.5, 1.2, 1.0 - depth);',
    '      float size = baseSize * sizeScale;',
    '',
    '      vec2 rp = lp / size;',
    '',
    '      // Slow graceful rotation',
    '      float rotDir = step(0.5, rnd2.x) * 2.0 - 1.0;',
    '      float rotSpeed = (0.2 + rnd.z * 0.5) * rotDir;',
    '      rp = rot(t * rotSpeed) * rp;',
    '',
    '      // 3D tilt foreshortening',
    '      float tiltPhase = t * (0.4 + rnd3 * 0.5) + rnd.x * TAU;',
    '      float tilt = 0.6 + 0.4 * abs(cos(tiltPhase));',
    '      rp.y /= tilt;',
    '',
    '      // Shape selection — more hex and diamond, fewer round',
    '      float dist;',
    '      if (rnd.x < 0.22) {',
    '        dist = sdHex(rp, 1.0);',
    '      } else if (rnd.x < 0.42) {',
    '        vec2 ap = abs(rp);',
    '        dist = (ap.x + ap.y * 1.3) / 1.3 - 0.82;',
    '      } else {',
    '        dist = length(rp) - 0.88;',
    '      }',
    '',
    '      // DOF blur: distant = softer edges',
    '      float blur = 0.05 + depth * 0.15;',
    '      float mask = smoothstep(blur, -blur * 0.3, dist);',
    '      if (mask < 0.001) continue;',
    '',
    '      float r = length(rp);',
    '',
    '      // ── Crystal body: translucent gem tones ──',
    '      // Interior gradient: dark at edges, warm glow at center',
    '      float interior = smoothstep(1.3, 0.0, r);',
    '      float warmth = rnd2.y;',
    '',
    '      // Rich amber/champagne crystal palette',
    '      vec3 darkEdge = vec3(0.18, 0.12, 0.06);',
    '      vec3 midTone = mix(',
    '        vec3(0.55, 0.38, 0.20),',
    '        vec3(0.65, 0.50, 0.32),',
    '        warmth',
    '      );',
    '      vec3 hotCenter = mix(',
    '        vec3(0.85, 0.72, 0.50),',
    '        vec3(0.95, 0.85, 0.65),',
    '        warmth',
    '      );',
    '',
    '      vec3 bodyColor = mix(darkEdge, midTone, smoothstep(0.0, 0.5, interior));',
    '      bodyColor = mix(bodyColor, hotCenter, smoothstep(0.5, 1.0, interior));',
    '',
    '      // ── Facet lines: internal gem structure ──',
    '      float angle = atan(rp.y, rp.x);',
    '      float numFacets = 6.0 + floor(rnd3 * 5.0);',
    '      float facetEdge = abs(sin(angle * numFacets + t * rotSpeed * 1.5));',
    '      facetEdge = pow(facetEdge, 60.0);',
    '      // Concentric ring at ~50% radius (table edge)',
    '      float ringFacet = smoothstep(0.04, 0.0, abs(r - 0.52));',
    '      float facets = max(facetEdge * 0.25, ringFacet * 0.2) * interior;',
    '      bodyColor += vec3(1.0, 0.95, 0.85) * facets;',
    '',
    '      // ── Edge / girdle catch-light ──',
    '      float edgeGlow = smoothstep(0.1, 0.0, abs(dist)) * 0.45;',
    '      bodyColor += vec3(0.95, 0.88, 0.72) * edgeGlow;',
    '',
    '      // ── Specular: rare, sharp, dazzling flashes ──',
    '      // The key to looking luxurious: most rhinestones show',
    '      // their warm amber body, only occasionally a facet',
    '      // catches the light for a brilliant flash.',
    '      float specTotal = 0.0;',
    '',
    '      vec2 ld1 = normalize(vec2(0.5, -0.8));',
    '      vec2 ld2 = normalize(vec2(-0.6, -0.7));',
    '',
    '      for (int f = 0; f < 6; f++) {',
    '        float fi = float(f);',
    '        float fa = fi * TAU / 6.0 + t * rotSpeed;',
    '        vec2 fn = vec2(cos(fa), sin(fa));',
    '',
    '        // Facet tilt modulates the specular alignment',
    '        float ft = sin(tiltPhase + fi * 1.2);',
    '        // Only flash when tilt is nearly perfect (narrow window)',
    '        float tiltGate = pow(max(0.0, ft), 4.0);',
    '',
    '        float s1 = max(0.0, dot(fn, ld1));',
    '        float s2 = max(0.0, dot(fn, ld2));',
    '',
    '        // Very sharp specular, gated by tilt alignment',
    '        specTotal += pow(s1, 48.0) * tiltGate;',
    '        specTotal += pow(s2, 48.0) * tiltGate * 0.5;',
    '      }',
    '      specTotal = min(specTotal, 1.2);',
    '',
    '      // ── Table flash: brief bright when crystal faces camera ──',
    '      float tableFacing = pow(max(0.0, cos(tiltPhase)) * max(0.0, cos(tiltPhase * 0.7 + rnd.z)), 14.0);',
    '      float tableFlash = tableFacing * interior * 0.4;',
    '',
    '      // ── Prismatic fire: vivid rainbow on specular highlights ──',
    '      float specIntensity = specTotal + tableFlash;',
    '      float prismPhase = fract(rnd.x * 7.13 + t * 0.12 + angle * 0.3 / TAU);',
    '      vec3 prism = spectral(prismPhase) * specIntensity * 0.35;',
    '      float prismPhase2 = fract(rnd.y * 3.71 + t * 0.18 + r);',
    '      vec3 prism2 = spectral(prismPhase2 + 0.33) * specIntensity * 0.18;',
    '',
    '      // Warm white specular + prismatic fire',
    '      vec3 specContrib = vec3(1.0, 0.97, 0.90) * specTotal * 0.55;',
    '      specContrib += vec3(1.0, 0.98, 0.93) * tableFlash;',
    '      specContrib += prism + prism2;',
    '',
    '      // ── Compose ──',
    '      vec3 crystalColor = bodyColor + specContrib;',
    '',
    '      // ── Depth effects ──',
    '      float depthFade = 1.0 - depth * 0.7;',
    '      crystalColor *= depthFade;',
    '      float lum = dot(crystalColor, vec3(0.299, 0.587, 0.114));',
    '      crystalColor = mix(crystalColor, vec3(lum) * vec3(0.9, 0.85, 0.75), depth * 0.5);',
    '',
    '      // ── Warm glow halo (only for specular-bright rhinestones) ──',
    '      float haloStr = max(specIntensity - 0.5, 0.0);',
    '      float haloR = size * (1.5 + haloStr * 1.0);',
    '      float haloDist = length(lp);',
    '      float halo = exp(-haloDist * haloDist / (haloR * haloR * 0.08)) * haloStr * 0.06;',
    '      vec3 haloCol = vec3(1.0, 0.88, 0.62) * halo * depthFade;',
    '',
    '      float alpha = mask * (0.3 + 0.7 * depthFade);',
    '      result += crystalColor * alpha + haloCol;',
    '    }',
    '  }',
    '  return result;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  vec2 cuv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time * u_fallSpeed;',
    '',
    '  // ── Background: deep dark with subtle warm gradient ──',
    '  vec3 col = vec3(0.022, 0.016, 0.012);',
    '  col += vec3(0.012, 0.008, 0.004) * (1.0 - uv.y);',
    '',
    '  // ── Volumetric light shafts from above ──',
    '  for (int i = 0; i < 4; i++) {',
    '    float fi = float(i);',
    '    float sx = (fi + 0.5) / 4.0;',
    '    float sway = sin(t * 0.12 + fi * 2.3) * 0.025;',
    '    float d = abs(uv.x - sx - sway);',
    '    float shaft = exp(-d * d * 80.0) * 0.018;',
    '    shaft *= smoothstep(1.05, 0.15, uv.y);',
    '    shaft *= 0.85 + 0.15 * noise(vec2(uv.x * 4.0, uv.y * 2.0 - t * 0.3));',
    '    col += vec3(0.85, 0.68, 0.42) * shaft;',
    '  }',
    '',
    '  // Top warm glow',
    '  col += vec3(0.9, 0.75, 0.48) * smoothstep(0.3, 0.0, uv.y) * 0.035;',
    '',
    '  // ── Rhinestone layers: back to front ──',
    '  // Far: many small dim blurred crystals',
    '  col += rhinestoneLayer(uv, t, 18.0 * u_density, 0.9, 1.2, 0.0);',
    '  // Mid: medium',
    '  col += rhinestoneLayer(uv, t, 11.0 * u_density, 0.5, 2.0, 100.0);',
    '  // Near: fewer large bright sharp crystals',
    '  col += rhinestoneLayer(uv, t, 6.5 * u_density, 0.0, 2.8, 200.0);',
    '',
    '  // ── Crystal dust: tiny twinkling pinpoints ──',
    '  for (int i = 0; i < 20; i++) {',
    '    float fi = float(i);',
    '    vec2 sp = hash2(vec2(fi * 1.31 + 7.0, fi * 2.17 + 13.0));',
    '    sp.y = fract(sp.y - t * (0.04 + hash(vec2(fi, 0.0)) * 0.03));',
    '    sp.x += sin(t * 0.35 + fi * 1.9) * 0.012;',
    '',
    '    vec2 d = uv - sp;',
    '    float sd = length(d);',
    '',
    '    float tw = sin(t * (2.0 + fi * 0.4) + fi * 3.7);',
    '    tw = pow(max(0.0, tw), 16.0);',
    '',
    '    // Star flare',
    '    float star = 1.0 / (1.0 + 800.0 * abs(d.x * d.y)) * smoothstep(0.025, 0.0, sd);',
    '    float dot2 = smoothstep(0.003, 0.0, sd);',
    '    float sparkle = (star * 0.3 + dot2) * tw;',
    '',
    '    float hue = fract(fi * 0.618 + t * 0.06);',
    '    vec3 sc = mix(vec3(1.0, 0.94, 0.82), spectral(hue), 0.2);',
    '    col += sc * sparkle * 0.25;',
    '  }',
    '',
    '  // ── Glittering pile at the bottom ──',
    '  float pileH = 0.055',
    '    + 0.012 * sin(uv.x * 28.0 + 0.5)',
    '    + 0.006 * sin(uv.x * 53.0 + 2.1)',
    '    + 0.004 * sin(uv.x * 97.0 + 4.3);',
    '  float pe = (1.0 - uv.y) - pileH;',
    '',
    '  if (pe < 0.0) {',
    '    float pd = -pe;',
    '    vec3 pc = vec3(0.14, 0.09, 0.05);',
    '',
    '    float n1 = noise(uv * vec2(110.0, 90.0) + t * 0.25);',
    '    float n2 = noise(uv * vec2(160.0, 130.0) - t * 0.15 + 50.0);',
    '    float ps = pow(n1, 18.0) * 2.5 + pow(n2, 22.0) * 2.0;',
    '',
    '    float hue = fract(n1 * 3.0 + t * 0.05);',
    '    vec3 psc = mix(vec3(0.95, 0.85, 0.65), spectral(hue), 0.25);',
    '    pc += psc * ps;',
    '',
    '    float rim = smoothstep(0.006, 0.0, abs(pe));',
    '    pc += vec3(0.9, 0.80, 0.60) * rim * 0.4;',
    '    pc *= smoothstep(0.07, 0.0, pd);',
    '',
    '    col = mix(col, pc, smoothstep(0.002, 0.0, -pe + 0.002));',
    '  }',
    '',
    '  // Pile reflection glow upward',
    '  col += vec3(0.8, 0.6, 0.35) * smoothstep(0.18, 0.0, 1.0 - uv.y) * 0.02;',
    '',
    '  // ── Vignette ──',
    '  float vig = 1.0 - dot(cuv * 0.85, cuv * 0.85);',
    '  vig = smoothstep(-0.1, 0.85, vig);',
    '  col *= 0.4 + 0.6 * vig;',
    '',
    '  // Warm color grade',
    '  col = mix(col, col * vec3(1.1, 1.0, 0.85), 0.3);',
    '',
    '  // ACES tone mapping',
    '  col = col * (2.51 * col + 0.03) / (col * (2.43 * col + 0.59) + 0.14);',
    '',
    '  // Final warmth',
    '  col = pow(max(col, 0.0), vec3(0.93, 0.96, 1.04));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uDensity = gl.getUniformLocation(prog, 'u_density');
  var uFallSpeed = gl.getUniformLocation(prog, 'u_fallSpeed');

  var densityVal = 1.0;
  var fallSpeedVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uDensity, densityVal);
    gl.uniform1f(uFallSpeed, fallSpeedVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DENSITY': densityVal = e.data.value; break;
        case 'FALL_SPEED': fallSpeedVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
