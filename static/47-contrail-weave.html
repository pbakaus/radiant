<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrail Weave</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">47 — Contrail Weave</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 47 · Contrail Weave — Aircraft contrails painting patterns across a twilight sky
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_trailSpeed;',
    'uniform float u_trailIntensity;',
    '',
    '#define PI 3.14159265359',
    '#define NUM_TRAILS 7',
    '',
    '// ── Hash functions ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── FBM for cloud and turbulence detail ──',
    'float fbm(vec2 p, int octaves) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  for (int i = 0; i < 6; i++) {',
    '    if (i >= octaves) break;',
    '    val += amp * noise(p * freq);',
    '    freq *= 2.05;',
    '    amp *= 0.5;',
    '    p += vec2(1.7, 9.2);',
    '  }',
    '  return val;',
    '}',
    '',
    '// ── Sunset sky gradient ──',
    '// Beautiful twilight: deep blue at top, through purple, to warm orange/pink at horizon',
    'vec3 skyGradient(vec2 uv) {',
    '  // uv.y ranges from about -0.5 (bottom) to +0.5 (top)',
    '  float y = uv.y + 0.5;  // normalize to 0..1 (bottom to top)',
    '',
    '  // Deep blue-black at zenith',
    '  vec3 zenith = vec3(0.02, 0.03, 0.08);',
    '  // Deep twilight blue',
    '  vec3 upperSky = vec3(0.04, 0.06, 0.16);',
    '  // Dusky purple-blue transition',
    '  vec3 midSky = vec3(0.10, 0.07, 0.18);',
    '  // Warm mauve-pink',
    '  vec3 lowerSky = vec3(0.25, 0.10, 0.15);',
    '  // Hot orange glow near horizon',
    '  vec3 horizonGlow = vec3(0.50, 0.20, 0.08);',
    '  // Bright amber at the very horizon',
    '  vec3 horizon = vec3(0.65, 0.30, 0.08);',
    '',
    '  vec3 col = zenith;',
    '  col = mix(col, upperSky, smoothstep(0.85, 0.65, y));',
    '  col = mix(col, midSky, smoothstep(0.65, 0.45, y));',
    '  col = mix(col, lowerSky, smoothstep(0.45, 0.25, y));',
    '  col = mix(col, horizonGlow, smoothstep(0.25, 0.10, y));',
    '  col = mix(col, horizon, smoothstep(0.10, 0.0, y));',
    '',
    '  return col;',
    '}',
    '',
    '// ── Trail endpoint generation ──',
    '// Generates start/end/control points for each trail',
    '// Trails sweep from one edge of the sky to another, creating long arcs',
    'void trailPoints(float idx, out vec2 p0, out vec2 p1, out vec2 p2) {',
    '  float seed = idx * 7.31;',
    '',
    '  // Use golden-ratio-based angle distribution for well-spread crossings',
    '  float baseAngle = idx * 2.39996 + hash1(seed + 1.0) * 0.5;',
    '',
    '  // Start position: on or beyond the edge of visible area',
    '  float startR = 0.85 + hash1(seed + 2.0) * 0.25;',
    '  float startAngle = baseAngle;',
    '  p0 = vec2(',
    '    cos(startAngle) * startR,',
    '    sin(startAngle) * startR * 0.55 + (hash1(seed + 4.0) - 0.5) * 0.2',
    '  );',
    '',
    '  // End position: roughly opposite but with randomness for variety',
    '  float endR = 0.85 + hash1(seed + 5.0) * 0.25;',
    '  float endAngle = startAngle + PI + (hash1(seed + 6.0) - 0.5) * 1.2;',
    '  p2 = vec2(',
    '    cos(endAngle) * endR,',
    '    sin(endAngle) * endR * 0.55 + (hash1(seed + 7.0) - 0.5) * 0.2',
    '  );',
    '',
    '  // Control point: offset from midpoint for gentle arc',
    '  p1 = (p0 + p2) * 0.5;',
    '  // Perpendicular offset creates a nice bow in the trail',
    '  vec2 perp = vec2(-(p2.y - p0.y), p2.x - p0.x);',
    '  float perpLen = length(perp);',
    '  if (perpLen > 0.001) perp /= perpLen;',
    '  float bow = (hash1(seed + 8.0) - 0.5) * 0.35;',
    '  p1 += perp * bow;',
    '  p1.y += (hash1(seed + 9.0) - 0.5) * 0.15;',
    '  // Keep control point in the visible sky area',
    '  p1.y = clamp(p1.y, -0.3, 0.42);',
    '}',
    '',
    '// ── Contrail curve definition ──',
    '// Quadratic Bezier: long sweeping arc across the sky',
    'vec2 trailCurve(float s, float idx) {',
    '  vec2 p0, p1, p2;',
    '  trailPoints(idx, p0, p1, p2);',
    '',
    '  float omsq = (1.0 - s) * (1.0 - s);',
    '  float mid = 2.0 * (1.0 - s) * s;',
    '  float ssq = s * s;',
    '',
    '  return vec2(',
    '    omsq * p0.x + mid * p1.x + ssq * p2.x,',
    '    omsq * p0.y + mid * p1.y + ssq * p2.y',
    '  );',
    '}',
    '',
    '// ── Compute distance to the trail curve ──',
    '// Uses Newton-style projection for smooth, artifact-free distance',
    '// Returns: vec3(distance, closestParam, headParam)',
    'vec3 trailDistance(vec2 uv, float idx, float headParam) {',
    '  float minDist = 100.0;',
    '  float closestS = 0.0;',
    '',
    '  // Coarse pass: 32 uniform samples along the active trail',
    '  for (int i = 0; i < 32; i++) {',
    '    float s = headParam * float(i) / 31.0;',
    '    vec2 p = trailCurve(s, idx);',
    '    float d = length(uv - p);',
    '    if (d < minDist) {',
    '      minDist = d;',
    '      closestS = s;',
    '    }',
    '  }',
    '',
    '  // Fine pass: 20 samples in the neighborhood of the closest',
    '  float halfStep = headParam / 31.0;',
    '  float lo = max(0.0, closestS - halfStep);',
    '  float hi = min(headParam, closestS + halfStep);',
    '  for (int i = 0; i < 20; i++) {',
    '    float s = lo + (hi - lo) * float(i) / 19.0;',
    '    vec2 p = trailCurve(s, idx);',
    '    float d = length(uv - p);',
    '    if (d < minDist) {',
    '      minDist = d;',
    '      closestS = s;',
    '    }',
    '  }',
    '',
    '  // Ultra-fine pass: 8 more samples for sub-pixel smoothness',
    '  float microStep = (hi - lo) / 19.0;',
    '  float lo2 = max(0.0, closestS - microStep);',
    '  float hi2 = min(headParam, closestS + microStep);',
    '  for (int i = 0; i < 8; i++) {',
    '    float s = lo2 + (hi2 - lo2) * float(i) / 7.0;',
    '    vec2 p = trailCurve(s, idx);',
    '    float d = length(uv - p);',
    '    if (d < minDist) {',
    '      minDist = d;',
    '      closestS = s;',
    '    }',
    '  }',
    '',
    '  return vec3(minDist, closestS, headParam);',
    '}',
    '',
    '// ── Single contrail contribution ──',
    '// Computes the visual intensity of one trail at a given UV',
    'float contrailShape(vec2 uv, float idx, float t) {',
    '  // Trail timing: each trail starts at a different time and has its own speed',
    '  float seed = idx * 7.31;',
    '  float trailSpeed = 0.055 + hash1(seed + 10.0) * 0.04;',
    '  float startDelay = hash1(seed + 11.0) * 18.0;',
    '  float cycleDuration = 32.0 + hash1(seed + 12.0) * 15.0;',
    '',
    '  // Where the aircraft head is along the curve (0..1)',
    '  float rawPhase = mod(t * trailSpeed + startDelay, cycleDuration) / cycleDuration;',
    '  // Ease: accelerate then cruise',
    '  float headParam = smoothstep(0.0, 0.12, rawPhase) * min(rawPhase * 1.25, 1.0);',
    '  headParam = clamp(headParam, 0.001, 1.0);',
    '',
    '  // Find distance to curve',
    '  vec3 info = trailDistance(uv, idx, headParam);',
    '  float dist = info.x;',
    '  float closestS = info.y;',
    '',
    '  // How far behind the head this point is (0 = at head, 1 = at start)',
    '  float behindHead = headParam - closestS;',
    '  float behindNorm = behindHead / max(headParam, 0.001);',
    '',
    '  // ── Trail width: narrow at head, widening behind ──',
    '  // Fresh trail: very narrow, crisp like a pencil line',
    '  // Aging trail: spreads out gradually like real vapor diffusion',
    '  float freshWidth = 0.002;',
    '  float midWidth = 0.008 + hash1(seed + 13.0) * 0.004;',
    '  float agedWidth = 0.022 + hash1(seed + 14.0) * 0.012;',
    '',
    '  // Two-stage spreading: fast initial condensation, then slow diffusion',
    '  float spread = smoothstep(0.0, 0.08, behindNorm);  // quick initial condensation',
    '  float diffuse = smoothstep(0.08, 0.8, behindNorm);  // slow atmospheric spreading',
    '  float trailWidth = mix(freshWidth, midWidth, spread);',
    '  trailWidth = mix(trailWidth, agedWidth, diffuse);',
    '',
    '  // Add subtle turbulence to the width (wind dispersion)',
    '  float turbNoise = noise(vec2(closestS * 20.0 + idx * 3.0, t * 0.2));',
    '  float turbulence = turbNoise * 0.35;',
    '  trailWidth *= 1.0 + turbulence * behindNorm;',
    '',
    '  // ── Gaussian cross-section (smooth, soft-edged) ──',
    '  float sigma = trailWidth;',
    '  float core = exp(-dist * dist / (2.0 * sigma * sigma));',
    '',
    '  // ── Opacity: bright just behind head, gently fading ──',
    '  // Peak brightness is slightly behind the aircraft (condensation delay)',
    '  float condensation = smoothstep(0.0, 0.03, behindNorm);',
    '  float fadeout = 1.0 - smoothstep(0.15, 0.95, behindNorm);',
    '  float trailAlpha = condensation * fadeout;',
    '',
    '  // As trail ages and widens, the peak opacity decreases',
    '  // (same mass of vapor spread over wider area)',
    '  float densityDilution = 1.0 / (1.0 + behindNorm * 2.5);',
    '  trailAlpha *= densityDilution;',
    '',
    '  // Cycle fade-out: trail fades as the cycle ends',
    '  float cycleFade = 1.0 - smoothstep(0.78, 1.0, rawPhase);',
    '',
    '  // Overall contribution',
    '  float intensity = core * trailAlpha * cycleFade;',
    '',
    '  // ── Softer outer halo (light scattering in the atmosphere) ──',
    '  float haloSigma = trailWidth * 2.5;',
    '  float halo = exp(-dist * dist / (2.0 * haloSigma * haloSigma));',
    '  float haloIntensity = halo * trailAlpha * cycleFade * 0.12;',
    '',
    '  // ── Very subtle wide atmospheric bloom on older sections ──',
    '  float bloomSigma = trailWidth * 6.0;',
    '  float bloom = exp(-dist * dist / (2.0 * bloomSigma * bloomSigma));',
    '  float bloomIntensity = bloom * trailAlpha * cycleFade * 0.04 * smoothstep(0.1, 0.5, behindNorm);',
    '',
    '  return intensity + haloIntensity + bloomIntensity;',
    '}',
    '',
    '// ── Aircraft bright point at the head of each trail ──',
    'float aircraftDot(vec2 uv, float idx, float t) {',
    '  float seed = idx * 7.31;',
    '  float trailSpeed = 0.055 + hash1(seed + 10.0) * 0.04;',
    '  float startDelay = hash1(seed + 11.0) * 18.0;',
    '  float cycleDuration = 32.0 + hash1(seed + 12.0) * 15.0;',
    '  float rawPhase = mod(t * trailSpeed + startDelay, cycleDuration) / cycleDuration;',
    '  float headParam = smoothstep(0.0, 0.12, rawPhase) * min(rawPhase * 1.25, 1.0);',
    '  headParam = clamp(headParam, 0.001, 1.0);',
    '',
    '  vec2 headPos = trailCurve(headParam, idx);',
    '  float d = length(uv - headPos);',
    '',
    '  // Visibility: only when actively flying',
    '  float visible = smoothstep(0.0, 0.02, rawPhase) * (1.0 - smoothstep(0.8, 0.95, rawPhase));',
    '',
    '  // Bright core dot — tiny, like a distant aircraft catching sunlight',
    '  float coreDot = smoothstep(0.004, 0.0, d);',
    '  // Warm glow around the aircraft — sunlit glint',
    '  float glow = exp(-d * d / 0.00015) * 0.6;',
    '  // Wider subtle halo',
    '  float outerGlow = exp(-d * d / 0.001) * 0.1;',
    '',
    '  // Navigation blink (subtle amber strobe)',
    '  float blink = 0.5 + 0.5 * sin(t * 4.0 + idx * 2.7);',
    '  float blinkDot = smoothstep(0.002, 0.0, d) * blink * 0.3;',
    '',
    '  return (coreDot + glow + outerGlow + blinkDot) * visible;',
    '}',
    '',
    '// ── Wispy high-altitude cirrus clouds ──',
    'float cirrusClouds(vec2 uv, float t) {',
    '  // Thin, stretched horizontally like real cirrus',
    '  vec2 p = vec2(uv.x * 2.0, uv.y * 6.0);',
    '  p.x += t * 0.015;',
    '',
    '  float n1 = fbm(p * 1.5, 5);',
    '  float n2 = fbm(p * 2.5 + vec2(5.3, 2.1), 4);',
    '',
    '  // Only sparse wisps, not solid cloud cover',
    '  float wisps = smoothstep(0.45, 0.65, n1) * 0.5;',
    '  wisps += smoothstep(0.50, 0.70, n2) * 0.3;',
    '',
    '  // Fade out near bottom of sky',
    '  float heightFade = smoothstep(-0.2, 0.1, uv.y);',
    '',
    '  return wisps * heightFade * 0.4;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time * u_trailSpeed;',
    '',
    '  // ── Sunset sky ──',
    '  vec3 col = skyGradient(uv);',
    '',
    '  // ── Subtle sky noise to break up banding ──',
    '  float skyNoise = (noise(uv * 80.0) - 0.5) * 0.008;',
    '  col += skyNoise;',
    '',
    '  // ── Cirrus clouds ──',
    '  float cirrus = cirrusClouds(uv, u_time);',
    '  // Lit from below by sunset: warm tint',
    '  vec3 cirrusColor = mix(',
    '    vec3(0.25, 0.15, 0.20),',
    '    vec3(0.45, 0.25, 0.18),',
    '    smoothstep(0.2, -0.1, uv.y)',
    '  );',
    '  col = mix(col, col + cirrusColor, cirrus);',
    '',
    '  // ── Contrails ──',
    '  float totalTrail = 0.0;',
    '  vec3 trailLight = vec3(0.0);',
    '  vec3 aircraftLight = vec3(0.0);',
    '',
    '  for (int i = 0; i < NUM_TRAILS; i++) {',
    '    float idx = float(i);',
    '',
    '    // Compute contrail shape',
    '    float trail = contrailShape(uv, idx, t);',
    '    trail *= u_trailIntensity;',
    '',
    '    // Contrail color: white/cream with subtle warm tinting from the sunset',
    '    // Lower trails catch more sunset color',
    '    float sunsetTint = smoothstep(0.2, -0.3, uv.y) * 0.3;',
    '    vec3 trailColor = mix(',
    '      vec3(0.92, 0.90, 0.85),',   // white-cream
    '      vec3(0.95, 0.75, 0.55),',   // warm sunset-lit
    '      sunsetTint',
    '    );',
    '',
    '    // Slight color variation per trail',
    '    float warmth = hash1(idx * 13.7 + 20.0) * 0.15;',
    '    trailColor += vec3(warmth, warmth * 0.5, -warmth * 0.3);',
    '',
    '    trailLight += trailColor * trail;',
    '    totalTrail += trail;',
    '',
    '    // Aircraft dot',
    '    float dot = aircraftDot(uv, idx, t);',
    '    vec3 dotColor = vec3(1.0, 0.97, 0.90);',
    '    aircraftLight += dotColor * dot;',
    '  }',
    '',
    '  // ── Blend contrails into sky ──',
    '  // Screen blend: prevents blowout at crossings while keeping bright trails',
    '  vec3 trailContrib = trailLight * 0.65;',
    '  col = col + trailContrib - col * trailContrib;',
    '',
    '  // ── Aircraft points (bright, on top) ──',
    '  col += aircraftLight;',
    '',
    '  // ── Subtle intersection glow ──',
    '  // Where trails cross, a faint warm brightening',
    '  float overlapBoost = smoothstep(0.4, 1.2, totalTrail) * 0.08;',
    '  col += vec3(0.95, 0.88, 0.75) * overlapBoost;',
    '',
    '  // ── Sun glow near horizon (off-screen sun creating the sunset) ──',
    '  // Positioned below and to the right',
    '  vec2 sunPos = vec2(0.3, -0.55);',
    '  float sunDist = length(uv - sunPos);',
    '  float sunGlow = exp(-sunDist * sunDist / 0.12) * 0.35;',
    '  float sunGlow2 = exp(-sunDist * sunDist / 0.04) * 0.25;',
    '  col += vec3(0.55, 0.25, 0.08) * sunGlow;',
    '  col += vec3(0.70, 0.35, 0.10) * sunGlow2;',
    '',
    '  // ── Vignette ──',
    '  float dist = length(uv * vec2(0.8, 1.0));',
    '  float vignette = 1.0 - smoothstep(0.5, 1.4, dist);',
    '  col *= 0.7 + vignette * 0.3;',
    '',
    '  // ── Ensure no negatives ──',
    '  col = max(col, vec3(0.0));',
    '',
    '  // ── Subtle tone curve for richness ──',
    '  col = pow(col, vec3(0.95, 0.97, 1.02));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uTrailSpeed = gl.getUniformLocation(prog, 'u_trailSpeed');
  var uTrailIntensity = gl.getUniformLocation(prog, 'u_trailIntensity');

  var trailSpeedVal = 1.0;
  var trailIntensityVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTrailSpeed, trailSpeedVal);
    gl.uniform1f(uTrailIntensity, trailIntensityVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'TRAIL_SPEED': trailSpeedVal = e.data.value; break;
        case 'TRAIL_INTENSITY': trailIntensityVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
