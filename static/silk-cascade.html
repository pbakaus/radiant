<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silk Cascade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 20px; left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5); z-index: 10; pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div class="label">Silk Cascade</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Silk Cascade — Multi-layered translucent silk
// fabric with anisotropic specular highlights,
// domain-warped folds, and parallax depth.
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_flowSpeed;',
    'uniform float u_sheenIntensity;',
    'uniform vec2 u_mouse;',
    '',
    '#define PI 3.14159265359',
    '',
    'float hash12(vec2 p){',
    '  vec3 p3=fract(vec3(p.xyx)*0.1031);',
    '  p3+=dot(p3,p3.yzx+33.33);',
    '  return fract((p3.x+p3.y)*p3.z);',
    '}',
    '',
    'float vnoise(vec2 p){',
    '  vec2 i=floor(p);',
    '  vec2 f=fract(p);',
    '  f=f*f*(3.0-2.0*f);',
    '  float a=hash12(i);',
    '  float b=hash12(i+vec2(1.0,0.0));',
    '  float c=hash12(i+vec2(0.0,1.0));',
    '  float d=hash12(i+vec2(1.0,1.0));',
    '  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);',
    '}',
    '',
    'float fbm3(vec2 p){',
    '  float v=0.0, a=0.5;',
    '  mat2 rot=mat2(0.8,-0.6,0.6,0.8);',
    '  for(int i=0;i<3;i++){',
    '    v+=a*vnoise(p);',
    '    p=rot*p*2.0;',
    '    a*=0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// 2-octave fbm for back layers (cheaper)',
    'float fbm2(vec2 p){',
    '  float v=0.5*vnoise(p);',
    '  p=mat2(0.8,-0.6,0.6,0.8)*p*2.0;',
    '  v+=0.25*vnoise(p);',
    '  return v;',
    '}',
    '',
    'vec2 domainWarp(vec2 p, float t, float scale, float seed){',
    '  return vec2(',
    '    fbm3(p*scale+vec2(1.7+seed,9.2)+t*0.15),',
    '    fbm3(p*scale+vec2(8.3,2.8+seed)-t*0.12)',
    '  );',
    '}',
    '',
    '// Cheaper warp for back layers',
    'vec2 domainWarpLite(vec2 p, float t, float scale, float seed){',
    '  return vec2(',
    '    fbm2(p*scale+vec2(1.7+seed,9.2)+t*0.15),',
    '    fbm2(p*scale+vec2(8.3,2.8+seed)-t*0.12)',
    '  );',
    '}',
    '',
    '// Per-layer fold: returns vec3(height, gradient.xy)',
    'vec3 fabricFold(vec2 p, float t, float seed, float freq, float flow){',
    '  float ts=t*flow;',
    '  vec2 warp=domainWarp(p+seed*3.7, ts, 1.2, seed);',
    '  vec2 wp=p+warp*0.55;',
    '  float h=0.0; vec2 g=vec2(0.0);',
    '',
    '  float f1x=freq*0.7, f1y=freq*0.4;',
    '  float ph1=wp.x*f1x+wp.y*f1y+ts*0.3+seed*2.1;',
    '  h+=sin(ph1)*0.35; g+=cos(ph1)*0.35*vec2(f1x,f1y);',
    '',
    '  float f2x=-freq*0.3, f2y=freq*0.9;',
    '  float ph2=wp.x*f2x+wp.y*f2y+ts*0.25+seed*1.3;',
    '  h+=sin(ph2)*0.25; g+=cos(ph2)*0.25*vec2(f2x,f2y);',
    '',
    '  float f3=freq*0.6;',
    '  float ph3=(wp.x+wp.y)*f3+ts*0.2+seed*4.5;',
    '  h+=sin(ph3)*0.18; g+=cos(ph3)*0.18*vec2(f3,f3);',
    '',
    '  float f4x=freq*1.8, f4y=freq*1.2;',
    '  float ph4=wp.x*f4x+wp.y*f4y-ts*0.35+seed*0.7;',
    '  h+=sin(ph4)*0.08; g+=cos(ph4)*0.08*vec2(f4x,f4y);',
    '',
    '  h+=vnoise(wp*freq*0.9+seed*10.0+ts*0.04)*0.12-0.06;',
    '  return vec3(h, g);',
    '}',
    '',
    '// Lighter fold for back layers (no 5th wave, no vnoise detail, cheaper warp)',
    'vec3 fabricFoldLite(vec2 p, float t, float seed, float freq, float flow){',
    '  float ts=t*flow;',
    '  vec2 warp=domainWarpLite(p+seed*3.7, ts, 1.2, seed);',
    '  vec2 wp=p+warp*0.55;',
    '  float h=0.0; vec2 g=vec2(0.0);',
    '  float f1x=freq*0.7, f1y=freq*0.4;',
    '  float ph1=wp.x*f1x+wp.y*f1y+ts*0.3+seed*2.1;',
    '  h+=sin(ph1)*0.35; g+=cos(ph1)*0.35*vec2(f1x,f1y);',
    '  float f2x=-freq*0.3, f2y=freq*0.9;',
    '  float ph2=wp.x*f2x+wp.y*f2y+ts*0.25+seed*1.3;',
    '  h+=sin(ph2)*0.25; g+=cos(ph2)*0.25*vec2(f2x,f2y);',
    '  float f3=freq*0.6;',
    '  float ph3=(wp.x+wp.y)*f3+ts*0.2+seed*4.5;',
    '  h+=sin(ph3)*0.18; g+=cos(ph3)*0.18*vec2(f3,f3);',
    '  float f4x=freq*1.8, f4y=freq*1.2;',
    '  float ph4=wp.x*f4x+wp.y*f4y-ts*0.35+seed*0.7;',
    '  h+=sin(ph4)*0.08; g+=cos(ph4)*0.08*vec2(f4x,f4y);',
    '  return vec3(h, g);',
    '}',
    '',
    '// Kajiya-Kay anisotropic specular',
    'float kajiyaSpec(vec2 grad, vec3 L, vec3 V, float shine){',
    '  float gl2=dot(grad,grad);',
    '  if(gl2<0.0001) return 0.0;',
    '  vec2 tg=vec2(-grad.y, grad.x)/sqrt(gl2);',
    '  vec3 T=normalize(vec3(tg, 0.0));',
    '  vec3 H=normalize(L+V);',
    '  float TdH=dot(T,H);',
    '  return pow(sqrt(max(1.0-TdH*TdH, 0.0)), shine);',
    '}',
    '',
    '// Shade one fabric layer',
    'vec4 shadeLayer(',
    '  vec2 p, float t,',
    '  float seed, float freq, float flow,',
    '  vec3 darkCol, vec3 midCol, vec3 brightCol, vec3 specCol,',
    '  float opacity, float shine,',
    '  vec3 L1, vec3 L2, vec3 V,',
    '  float sheenMul',
    '){',
    '  vec3 fold=opacity<0.35 ? fabricFoldLite(p, t, seed, freq, flow) : fabricFold(p, t, seed, freq, flow);',
    '  float h=fold.x;',
    '  vec2 grad=fold.yz;',
    '  vec3 N=normalize(vec3(-grad*1.8, 1.0));',
    '',
    '  // Lighting — strong directional contrast',
    '  float NdL1=max(dot(N, L1), 0.0);',
    '  float NdL2=max(dot(N, L2), 0.0);',
    '  float lit=NdL1*0.75+NdL2*0.12;',
    '',
    '  // Fold depth',
    '  float depth=smoothstep(-0.8, 0.4, h);',
    '',
    '  // Three-tone fabric shading: dark valleys -> mid -> bright lit peaks',
    '  float shade=lit*depth;',
    '  float midBlend=smoothstep(0.0, 0.35, shade);',
    '  float brightBlend=smoothstep(0.25, 0.7, shade);',
    '  vec3 fabric=mix(darkCol, midCol, midBlend);',
    '  fabric=mix(fabric, brightCol, brightBlend*0.5);',
    '',
    '  // Anisotropic specular streaks — sharp silk sheen',
    '  float sp=kajiyaSpec(grad, L1, V, shine)*0.9;',
    '  sp+=kajiyaSpec(grad, L2, V, shine*0.6)*0.15;',
    '  sp*=sheenMul;',
    '  float specPow=sp*sp*sp;',
    '  fabric+=specCol*specPow*0.9;',
    '',
    '  // Translucent backlight at peaks',
    '  float trans=smoothstep(0.3, 0.9, depth)*lit*0.08;',
    '  fabric+=vec3(0.45, 0.28, 0.15)*trans;',
    '',
    '  // Sparkle — extremely rare, only where specular is strong',
    '  float sparkle=hash12(floor(p*500.0+t*0.7));',
    '  sparkle=step(0.9992, sparkle)*specPow*20.0*sheenMul;',
    '  fabric+=specCol*min(sparkle, 2.0);',
    '',
    '  // Alpha: opaque in valleys, can thin at bright peaks',
    '  float alpha=opacity*(0.65+depth*0.35);',
    '  return vec4(fabric, alpha);',
    '}',
    '',
    'void main(){',
    '  vec2 uv=gl_FragCoord.xy/u_res;',
    '  float aspect=u_res.x/u_res.y;',
    '  vec2 p=(uv-0.5)*vec2(aspect, 1.0);',
    '',
    '',
    '  float t=u_time*u_flowSpeed;',
    '',
    '  // Primary light — follows cursor for shimmering highlights',
    '  vec3 L1=normalize(vec3(',
    '    0.4+sin(t*0.07)*0.3,',
    '    0.9+cos(t*0.09)*0.15,',
    '    0.8',
    '  ));',
    '  if (u_mouse.x > 0.0) {',
    '    vec2 mUV = u_mouse / u_res - 0.5;',
    '    L1 = normalize(vec3(mUV.x * 2.0, mUV.y * 2.0 + 0.5, 0.8));',
    '  }',
    '  vec3 L2=normalize(vec3(',
    '    -0.7+cos(t*0.06)*0.2,',
    '    -0.3+sin(t*0.08)*0.15,',
    '    0.6',
    '  ));',
    '  vec3 V=vec3(0.0, 0.0, 1.0);',
    '',
    '  // Background — deep dark with purple tint',
    '  float bgD=length(p);',
    '  vec3 bg=mix(',
    '    vec3(0.055, 0.03, 0.075),',
    '    vec3(0.012, 0.006, 0.02),',
    '    smoothstep(0.0, 1.0, bgD)',
    '  );',
    '  bg+=vec3(0.025, 0.012, 0.035)*exp(-bgD*bgD*2.0);',
    '',
    '  // Layer 1: Deep — warm gold/champagne (slowest, most transparent)',
    '  vec4 ly1=shadeLayer(',
    '    p*0.8+vec2(0.15, t*0.015), t,',
    '    0.0, 2.0, 0.5,',
    '    vec3(0.10, 0.06, 0.02),',
    '    vec3(0.50, 0.38, 0.15),',
    '    vec3(0.80, 0.65, 0.32),',
    '    vec3(1.0, 0.92, 0.65),',
    '    0.30, 26.0,',
    '    L1, L2, V,',
    '    u_sheenIntensity*0.7',
    '  );',
    '',
    '  // Layer 2: Middle — rose pink',
    '  vec4 ly2=shadeLayer(',
    '    p*1.0+vec2(t*0.012, -0.1), t,',
    '    1.0, 3.2, 0.75,',
    '    vec3(0.08, 0.03, 0.04),',
    '    vec3(0.42, 0.18, 0.22),',
    '    vec3(0.72, 0.38, 0.42),',
    '    vec3(1.0, 0.82, 0.86),',
    '    0.38, 40.0,',
    '    L1, L2, V,',
    '    u_sheenIntensity*0.9',
    '  );',
    '',
    '  // Layer 3: Front — soft lavender (fastest, most opaque)',
    '  vec4 ly3=shadeLayer(',
    '    p*1.2+vec2(-t*0.008, t*0.02), t,',
    '    2.0, 4.5, 1.0,',
    '    vec3(0.06, 0.04, 0.10),',
    '    vec3(0.30, 0.22, 0.45),',
    '    vec3(0.58, 0.48, 0.72),',
    '    vec3(1.0, 0.90, 0.97),',
    '    0.50, 55.0,',
    '    L1, L2, V,',
    '    u_sheenIntensity',
    '  );',
    '',
    '  // Composite back-to-front',
    '  vec3 col=bg;',
    '  col=mix(col, ly1.rgb, ly1.a);',
    '  col+=vec3(0.35, 0.18, 0.08)*ly1.a*ly2.a*0.08;',
    '  col=mix(col, ly2.rgb, ly2.a);',
    '  col+=vec3(0.30, 0.15, 0.25)*ly2.a*ly3.a*0.06;',
    '  col+=vec3(0.40, 0.25, 0.12)*ly1.a*ly2.a*ly3.a*0.04;',
    '  col=mix(col, ly3.rgb, ly3.a);',
    '',
    '  // Subtle backlight glow',
    '  float cov=(ly1.a+ly2.a+ly3.a)*0.333;',
    '  col+=vec3(0.35, 0.20, 0.12)*cov*0.04;',
    '',
    '  // Vignette',
    '  float vig=1.0-smoothstep(0.25, 1.15, length(p*vec2(0.85,1.0)));',
    '  col*=0.6+0.4*vig;',
    '',
    '  // Saturation boost',
    '  float lum=dot(col, vec3(0.299, 0.587, 0.114));',
    '  col=mix(vec3(lum), col, 1.35);',
    '',
    '  // Tone mapping (ACES)',
    '  col=col*(2.51*col+0.03)/(col*(2.43*col+0.59)+0.14);',
    '',
    '  // Gamma',
    '  col=pow(max(col,0.0), vec3(0.4545));',
    '',
    '  // Film grain',
    '  float grain=hash12(gl_FragCoord.xy+fract(u_time*7.13)*100.0);',
    '  col+=(grain-0.5)*0.015;',
    '',
    '  gl_FragColor=vec4(clamp(col,0.0,1.0), 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFlowSpeed = gl.getUniformLocation(prog, 'u_flowSpeed');
  var uSheenIntensity = gl.getUniformLocation(prog, 'u_sheenIntensity');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');
  var flowSpeedVal = 0.4;
  var sheenIntensityVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  var mouseX = -1.0, mouseY = -1.0;
  canvas.addEventListener('mousemove', function (e) {
    mouseX = e.clientX * dpr;
    mouseY = (canvas.clientHeight - e.clientY) * dpr;
  });
  canvas.addEventListener('mouseleave', function () {
    mouseX = -1.0; mouseY = -1.0;
  });
  var needsResize = true;
  var running = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) return;
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uFlowSpeed, flowSpeedVal);
    gl.uniform1f(uSheenIntensity, sheenIntensityVal);
    gl.uniform2f(uMouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        if (!running) {
          running = true;
          requestAnimationFrame(render);
        }
      } else {
        running = false;
      }
    });
  });
  observer.observe(canvas);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FLOW_SPEED': flowSpeedVal = e.data.value; break;
        case 'SHEEN_INTENSITY': sheenIntensityVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
