<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope Runway</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">36 — Kaleidoscope Runway</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 36 · Kaleidoscope Runway — Fashion-inspired kaleidoscopic tessellations
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // URL param for embed scaling
  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_symmetry;',
    'uniform float u_patternSpeed;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '',
    '// ── Rotation matrix ──',
    'mat2 rot(float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    '// ── Hash for pseudo-random values ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    '// ── Smooth noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── Kaleidoscope UV folding ──',
    '// Folds the UV space into N symmetric mirror segments',
    'vec2 kaleidoscope(vec2 uv, float segments) {',
    '  float angle = atan(uv.y, uv.x);',
    '  float r = length(uv);',
    '  // Fold into segment',
    '  float segAngle = TAU / segments;',
    '  angle = mod(angle, segAngle);',
    '  // Mirror alternate segments for true kaleidoscope',
    '  angle = abs(angle - segAngle * 0.5);',
    '  return vec2(cos(angle), sin(angle)) * r;',
    '}',
    '',
    '// ── Sharp geometric stripe pattern ──',
    'float stripePattern(vec2 p, float t) {',
    '  float s1 = step(0.5, fract(p.x * 3.0 + t * 0.3));',
    '  float s2 = step(0.5, fract(p.y * 4.0 - t * 0.2));',
    '  return s1 * 0.5 + s2 * 0.5;',
    '}',
    '',
    '// ── Chevron / herringbone pattern ──',
    'float chevronPattern(vec2 p, float t) {',
    '  float y = p.y + t * 0.15;',
    '  float chevron = abs(fract(p.x * 2.0) - 0.5) * 2.0;',
    '  chevron = abs(fract(chevron + y * 3.0) - 0.5) * 2.0;',
    '  return smoothstep(0.3, 0.35, chevron);',
    '}',
    '',
    '// ── Diamond / rhombus pattern ──',
    'float diamondPattern(vec2 p, float t) {',
    '  vec2 q = rot(PI * 0.25) * p;',
    '  float d = abs(fract(q.x * 2.5 + t * 0.1) - 0.5) + abs(fract(q.y * 2.5 - t * 0.08) - 0.5);',
    '  return smoothstep(0.4, 0.42, d);',
    '}',
    '',
    '// ── Triangle grid pattern ──',
    'float trianglePattern(vec2 p, float t) {',
    '  vec2 q = p * 3.0;',
    '  q.x += floor(q.y) * 0.5;',
    '  vec2 f = fract(q) - 0.5;',
    '  float tri = abs(f.x) + abs(f.y);',
    '  float anim = sin(t * 0.4 + floor(q.x) * 1.3 + floor(q.y) * 0.7) * 0.15;',
    '  return smoothstep(0.45 + anim, 0.47 + anim, tri);',
    '}',
    '',
    '// ── Palette: warm gold, deep amber, bright copper, hot pink ──',
    'vec3 palette(float t, float patIdx) {',
    '  // Five key colors that cycle',
    '  vec3 c0 = vec3(0.85, 0.65, 0.15);  // warm gold',
    '  vec3 c1 = vec3(0.60, 0.30, 0.08);  // deep amber',
    '  vec3 c2 = vec3(0.90, 0.50, 0.18);  // bright copper',
    '  vec3 c3 = vec3(0.92, 0.25, 0.45);  // hot pink',
    '  vec3 c4 = vec3(1.00, 0.78, 0.30);  // bright gold',
    '  ',
    '  float phase = fract(t + patIdx * 0.2);',
    '  vec3 col;',
    '  if (phase < 0.2) {',
    '    col = mix(c0, c1, phase / 0.2);',
    '  } else if (phase < 0.4) {',
    '    col = mix(c1, c2, (phase - 0.2) / 0.2);',
    '  } else if (phase < 0.6) {',
    '    col = mix(c2, c3, (phase - 0.4) / 0.2);',
    '  } else if (phase < 0.8) {',
    '    col = mix(c3, c4, (phase - 0.6) / 0.2);',
    '  } else {',
    '    col = mix(c4, c0, (phase - 0.8) / 0.2);',
    '  }',
    '  return col;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time * u_patternSpeed;',
    '  float segments = u_symmetry;',
    '  ',
    '  // ── Slow overall rotation of the kaleidoscope ──',
    '  float globalRot = t * 0.12;',
    '  uv = rot(globalRot) * uv;',
    '  ',
    '  float r = length(uv);',
    '  ',
    '  // ── Apply kaleidoscope folding ──',
    '  vec2 kuv = kaleidoscope(uv, segments);',
    '  ',
    '  // ── Animate the pattern space ──',
    '  // Radial zoom that breathes in and out',
    '  float zoomPulse = 1.0 + sin(t * 0.35) * 0.15;',
    '  kuv *= zoomPulse;',
    '  ',
    '  // Slowly drift the pattern origin for evolution',
    '  kuv += vec2(t * 0.05, t * 0.03);',
    '  ',
    '  // ── Layer 1: Chevron textile pattern ──',
    '  float chev = chevronPattern(kuv * 1.2, t);',
    '  ',
    '  // ── Layer 2: Diamond facets ──',
    '  float diam = diamondPattern(kuv * 0.8 + vec2(t * 0.02), t * 1.2);',
    '  ',
    '  // ── Layer 3: Stripes (fashion runway stripes) ──',
    '  vec2 stripeUV = rot(t * 0.08) * kuv;',
    '  float stripe = stripePattern(stripeUV * 1.5, t);',
    '  ',
    '  // ── Layer 4: Triangle tessellation ──',
    '  float tri = trianglePattern(kuv * 0.9 + vec2(sin(t * 0.2) * 0.3), t);',
    '  ',
    '  // ── Morph between patterns over time ──',
    '  // Smoothly crossfade between the four pattern layers',
    '  float morphPhase = fract(t * 0.06);',
    '  float m0 = smoothstep(0.0, 0.1, morphPhase) * smoothstep(0.35, 0.25, morphPhase);',
    '  float m1 = smoothstep(0.2, 0.3, morphPhase) * smoothstep(0.55, 0.45, morphPhase);',
    '  float m2 = smoothstep(0.4, 0.5, morphPhase) * smoothstep(0.75, 0.65, morphPhase);',
    '  float m3 = smoothstep(0.6, 0.7, morphPhase) * smoothstep(0.95, 0.85, morphPhase);',
    '  // Ensure there is always something visible',
    '  float mSum = m0 + m1 + m2 + m3;',
    '  if (mSum < 0.3) {',
    '    m0 = max(m0, 0.3);',
    '    m1 = max(m1, 0.2);',
    '  }',
    '  ',
    '  float pattern = chev * m0 + diam * m1 + stripe * m2 + tri * m3;',
    '  // Add a persistent base layer so patterns never fully vanish',
    '  float basePat = diamondPattern(kuv * 1.1, t * 0.7) * 0.35;',
    '  pattern = max(pattern, basePat);',
    '  ',
    '  // ── Second kaleidoscope fold at different scale for depth ──',
    '  vec2 kuv2 = kaleidoscope(uv * 1.3, segments + 2.0);',
    '  kuv2 *= 1.0 + sin(t * 0.25) * 0.1;',
    '  kuv2 += vec2(t * 0.03, -t * 0.04);',
    '  float innerPattern = chevronPattern(kuv2, t * 0.8) * 0.4;',
    '  innerPattern += trianglePattern(kuv2 * 1.2, t * 0.6) * 0.3;',
    '  ',
    '  // ── Color assignment ──',
    '  // Primary pattern color shifts over time',
    '  float colorPhase = t * 0.04 + r * 0.5;',
    '  vec3 col1 = palette(colorPhase, 0.0);',
    '  vec3 col2 = palette(colorPhase + 0.3, 1.0);',
    '  vec3 col3 = palette(colorPhase + 0.6, 2.0);',
    '  ',
    '  // Build the color from pattern layers',
    '  vec3 col = vec3(0.02, 0.015, 0.01); // Dark base',
    '  ',
    '  // Primary kaleidoscope pattern',
    '  col = mix(col, col1 * 1.1, pattern * 0.7);',
    '  ',
    '  // Inner detail pattern with second color',
    '  col = mix(col, col2, innerPattern * 0.5);',
    '  ',
    '  // ── Geometric edge highlights ──',
    '  // Emphasize the fold lines of the kaleidoscope',
    '  float foldAngle = atan(uv.y, uv.x);',
    '  float segAngle = TAU / segments;',
    '  float foldDist = abs(sin(foldAngle * segments * 0.5));',
    '  float foldLine = smoothstep(0.02, 0.0, 1.0 - foldDist) * 0.6;',
    '  // Animate the fold brightness',
    '  foldLine *= 0.5 + 0.5 * sin(t * 0.5 + r * 4.0);',
    '  col += col3 * foldLine;',
    '  ',
    '  // ── Radial gradient layers for depth ──',
    '  // Concentric rings that pulse',
    '  float rings = sin(r * 12.0 - t * 1.5) * 0.5 + 0.5;',
    '  rings = smoothstep(0.4, 0.6, rings) * 0.15;',
    '  col += palette(colorPhase + 0.5, 3.0) * rings * (1.0 - r);',
    '  ',
    '  // ── Bright center focal point ──',
    '  float centerGlow = exp(-r * r * 8.0);',
    '  vec3 centerColor = mix(',
    '    vec3(1.0, 0.85, 0.45),  // bright gold',
    '    vec3(1.0, 0.55, 0.65),  // warm pink-gold',
    '    sin(t * 0.3) * 0.5 + 0.5',
    '  );',
    '  col += centerColor * centerGlow * 0.7;',
    '  ',
    '  // ── Secondary center detail — mandala star ──',
    '  float starAngle = atan(uv.y, uv.x);',
    '  float star = abs(sin(starAngle * segments * 0.5 + t * 0.4));',
    '  star = pow(star, 8.0) * exp(-r * 3.0);',
    '  col += vec3(1.0, 0.9, 0.6) * star * 0.4;',
    '  ',
    '  // ── Hot pink accent flashes ──',
    '  // Fashion-bold color pops that appear and disappear',
    '  float pinkFlash = sin(t * 0.7 + r * 6.0) * cos(foldAngle * 3.0 + t * 0.4);',
    '  pinkFlash = pow(max(pinkFlash, 0.0), 6.0) * 0.8;',
    '  col += vec3(0.95, 0.2, 0.5) * pinkFlash * (1.0 - r * 0.5);',
    '  ',
    '  // ── Outer fade — mandala dissolves at edges ──',
    '  float edgeFade = smoothstep(0.9, 0.5, r);',
    '  col *= edgeFade;',
    '  ',
    '  // ── Subtle noise texture for fabric feel ──',
    '  float tex = noise(gl_FragCoord.xy * 0.5) * 0.04 - 0.02;',
    '  col += tex;',
    '  ',
    '  // ── Tone mapping ──',
    '  col = col / (1.0 + col * 0.3);',
    '  ',
    '  // ── Warmth push ──',
    '  col = pow(max(col, vec3(0.0)), vec3(0.92, 0.96, 1.06));',
    '  ',
    '  // ── Vignette ──',
    '  float vig = 1.0 - dot(uv, uv) * 0.4;',
    '  col *= max(vig, 0.0);',
    '  ',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uSymmetry = gl.getUniformLocation(prog, 'u_symmetry');
  var uPatternSpeed = gl.getUniformLocation(prog, 'u_patternSpeed');

  var symmetryVal = 8.0;
  var patternSpeedVal = 0.5;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uSymmetry, symmetryVal);
    gl.uniform1f(uPatternSpeed, patternSpeedVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── PostMessage listener for parameter updates ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'SYMMETRY': symmetryVal = e.data.value; break;
        case 'PATTERN_SPEED': patternSpeedVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
