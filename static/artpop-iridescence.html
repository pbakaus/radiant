<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artpop Iridescence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Artpop Iridescence</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_filmThickness;',
    'uniform float u_flowSpeed;',
    'uniform vec2 u_center;',
    'uniform vec2 u_mouse;',
    'uniform float u_scale;',
    '',
    '#define PI 3.141592653589793',
    '#define TAU 6.283185307179586',
    '',
    '// ---- Simplex noise (Ashima Arts) ----',
    'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec2 mod289v2(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
    '',
    'float snoise(vec2 v){',
    '  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
    '  vec2 i=floor(v+dot(v,C.yy));',
    '  vec2 x0=v-i+dot(i,C.xx);',
    '  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',
    '  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;',
    '  i=mod289v2(i);',
    '  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',
    '  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);',
    '  m=m*m; m=m*m;',
    '  vec3 x=2.0*fract(p*C.www)-1.0;',
    '  vec3 h=abs(x)-0.5;',
    '  vec3 ox=floor(x+0.5);',
    '  vec3 a0=x-ox;',
    '  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
    '  vec3 g;',
    '  g.x=a0.x*x0.x+h.x*x0.y;',
    '  g.yz=a0.yz*x12.xz+h.yz*x12.yw;',
    '  return 130.0*dot(m,g);',
    '}',
    '',
    '// FBM for organic variation',
    'float fbm(vec2 p){',
    '  float f=0.0;',
    '  f+=0.5000*snoise(p); p*=2.02;',
    '  f+=0.2500*snoise(p); p*=2.03;',
    '  f+=0.1250*snoise(p); p*=2.01;',
    '  f+=0.0625*snoise(p);',
    '  return f;',
    '}',
    '',
    '// Domain-warped noise for flowing organic surface',
    'float warpedNoise(vec2 p, float t){',
    '  vec2 q=vec2(',
    '    fbm(p+vec2(0.0,0.0)+t*0.12),',
    '    fbm(p+vec2(5.2,1.3)+t*0.09)',
    '  );',
    '  vec2 r=vec2(',
    '    fbm(p+4.0*q+vec2(1.7,9.2)+t*0.07),',
    '    fbm(p+4.0*q+vec2(8.3,2.8)+t*0.1)',
    '  );',
    '  return fbm(p+3.5*r);',
    '}',
    '',
    '// ---- Thin-film interference color ----',
    '// Simplified oil-slick / soap-bubble model:',
    '// Each RGB channel peaks at different film thicknesses (120 deg offsets)',
    '// This gives vivid, saturated rainbow bands across the surface',
    'vec3 thinFilm(float thickness, float cosTheta){',
    '  // Map thickness to a phase angle; cosTheta modulates viewing angle',
    '  float phase = thickness * cosTheta;',
    '  // RGB channels offset by 2pi/3 (120 degrees) for full spectrum separation',
    '  vec3 film = 0.5 + 0.5 * cos(phase + vec3(0.0, 2.094, 4.189));',
    '  // Square for more saturated, punchy colors',
    '  return film * film;',
    '}',
    '',
    '// Compute bubble surface height',
    'float bubbleSurface(vec2 p, float t){',
    '  float s = 0.0;',
    '  // Large-scale undulations',
    '  s += sin(p.x*2.0 + t*0.5) * cos(p.y*1.7 + t*0.35) * 0.35;',
    '  s += sin(p.x*1.3 - t*0.3 + p.y*2.2) * 0.25;',
    '  s += cos(p.y*2.8 + t*0.4 - p.x*0.9) * 0.2;',
    '  // Domain warped noise for organic flow',
    '  s += warpedNoise(p*1.2, t) * 0.4;',
    '  // Fine ripples',
    '  s += snoise(p*3.5 + t*0.2) * 0.08;',
    '  return s;',
    '}',
    '',
    '// Surface normal via forward differences (3 samples instead of 5)',
    'vec3 getNormal(vec2 p, float t, float h0){',
    '  float e = 0.004;',
    '  float hx = bubbleSurface(p + vec2(e, 0.0), t);',
    '  float hy = bubbleSurface(p + vec2(0.0, e), t);',
    '  return normalize(vec3(h0 - hx, h0 - hy, e));',
    '}',
    '',
    'void main(){',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 origin = u_scale > 0.0 ? u_center : vec2(0.5);',
    '  float sc = u_scale > 0.0 ? u_scale : 1.0;',
    '  vec2 p = (uv - origin) * vec2(aspect, 1.0) / sc;',
    '  // Mouse tilts viewing angle — shifts interference colors',
    '  if (u_mouse.x >= 0.0) {',
    '    vec2 tilt = (u_mouse - 0.5) * 0.4;',
    '    p += tilt;',
    '  }',
    '  float t = u_time * u_flowSpeed;',
    '',
    '  // ---- Multiple overlapping bubble film surfaces ----',
    '  vec3 totalColor = vec3(0.0);',
    '  float totalWeight = 0.0;',
    '',
    '  // Surface 1: Large primary bubble filling most of the screen',
    '  {',
    '    float dist1 = length(p * vec2(1.0, 1.1));',
    '    float edgeNoise = snoise(vec2(atan(p.y, p.x)*3.0 + t*0.15, t*0.2)) * 0.06;',
    '    float mask1 = smoothstep(0.82 + edgeNoise, 0.45 + edgeNoise, dist1);',
    '',
    '    vec2 sp1 = p * 1.6;',
    '    float surface1 = bubbleSurface(sp1, t);',
    '    vec3 norm1 = getNormal(sp1, t, surface1);',
    '',
    '    // Film thickness as phase angle (radians); range ~0-25 for 3-4 color bands',
    '    float thick1 = 8.0 + surface1 * 12.0 * u_filmThickness;',
    '    // Gravity: thinner at top, thicker at bottom',
    '    thick1 += p.y * 4.0;',
    '    // Slow breathing',
    '    thick1 += sin(t * 0.25) * 2.0;',
    '',
    '    // Viewing angle from surface normal',
    '    vec3 viewDir = vec3(0.0, 0.0, 1.0);',
    '    float cosTheta1 = max(abs(dot(norm1, viewDir)), 0.15);',
    '',
    '    vec3 film1 = thinFilm(thick1, cosTheta1);',
    '',
    '    // Fresnel: brighter at glancing angles (edge glow)',
    '    float fresnel1 = pow(1.0 - cosTheta1, 4.0);',
    '    film1 = mix(film1, film1 * 2.0 + vec3(0.15, 0.1, 0.2), fresnel1 * 0.5);',
    '',
    '    // Specular highlights (chrome bubble reflections)',
    '    vec3 light1 = normalize(vec3(0.4, 0.6, 1.0));',
    '    vec3 half1 = normalize(light1 + viewDir);',
    '    float spec1 = pow(max(dot(norm1, half1), 0.0), 80.0);',
    '    vec3 light2 = normalize(vec3(-0.5, -0.3, 0.9));',
    '    vec3 half2 = normalize(light2 + viewDir);',
    '    float spec2 = pow(max(dot(norm1, half2), 0.0), 60.0);',
    '    film1 += vec3(1.0, 0.97, 0.92) * spec1 * 0.5;',
    '    film1 += vec3(0.9, 0.93, 1.0) * spec2 * 0.3;',
    '',
    '    totalColor += film1 * mask1;',
    '    totalWeight += mask1;',
    '  }',
    '',
    '  // Surface 2: Secondary smaller bubble, offset',
    '  {',
    '    vec2 center2 = vec2(0.25, -0.15);',
    '    float dist2 = length((p - center2) * vec2(1.2, 1.0));',
    '    float edgeNoise2 = snoise(vec2(atan(p.y - center2.y, p.x - center2.x)*4.0, t*0.18)) * 0.04;',
    '    float mask2 = smoothstep(0.38 + edgeNoise2, 0.18 + edgeNoise2, dist2);',
    '',
    '    vec2 sp2 = (p - center2) * 2.5;',
    '    vec2 sp2off = sp2 + vec2(3.7, 1.2);',
    '    float surface2 = bubbleSurface(sp2off, t * 1.1);',
    '    vec3 norm2 = getNormal(sp2off, t * 1.1, surface2);',
    '',
    '    float thick2 = 6.0 + surface2 * 10.0 * u_filmThickness;',
    '    thick2 += (p.y - center2.y) * 3.5;',
    '    thick2 += sin(t * 0.3 + 1.5) * 1.8;',
    '',
    '    vec3 viewDir = vec3(0.0, 0.0, 1.0);',
    '    float cosTheta2 = max(abs(dot(norm2, viewDir)), 0.15);',
    '    vec3 film2 = thinFilm(thick2, cosTheta2);',
    '',
    '    float fresnel2 = pow(1.0 - cosTheta2, 4.0);',
    '    film2 = mix(film2, film2 * 2.0 + vec3(0.12, 0.15, 0.18), fresnel2 * 0.5);',
    '',
    '    vec3 light1 = normalize(vec3(0.3, 0.5, 1.0));',
    '    vec3 half1 = normalize(light1 + viewDir);',
    '    float spec1 = pow(max(dot(norm2, half1), 0.0), 90.0);',
    '    film2 += vec3(1.0, 0.97, 0.92) * spec1 * 0.45;',
    '',
    '    // Blend with existing: additive where overlapping for holographic effect',
    '    totalColor = mix(totalColor, totalColor * 0.5 + film2, mask2);',
    '    totalWeight = max(totalWeight, mask2);',
    '  }',
    '',
    '  // Surface 3: Another smaller bubble, opposite side',
    '  {',
    '    vec2 center3 = vec2(-0.3, 0.2);',
    '    float dist3 = length((p - center3) * vec2(1.0, 1.3));',
    '    float edgeNoise3 = snoise(vec2(atan(p.y - center3.y, p.x - center3.x)*5.0, t*0.2)) * 0.035;',
    '    float mask3 = smoothstep(0.32 + edgeNoise3, 0.14 + edgeNoise3, dist3);',
    '',
    '    vec2 sp3 = (p - center3) * 2.8;',
    '    vec2 sp3off = sp3 + vec2(7.1, 4.3);',
    '    float surface3 = bubbleSurface(sp3off, t * 0.9);',
    '    vec3 norm3 = getNormal(sp3off, t * 0.9, surface3);',
    '',
    '    float thick3 = 5.0 + surface3 * 11.0 * u_filmThickness;',
    '    thick3 += (p.y - center3.y) * 3.0;',
    '    thick3 += cos(t * 0.35 + 3.0) * 2.0;',
    '',
    '    vec3 viewDir = vec3(0.0, 0.0, 1.0);',
    '    float cosTheta3 = max(abs(dot(norm3, viewDir)), 0.15);',
    '    vec3 film3 = thinFilm(thick3, cosTheta3);',
    '',
    '    float fresnel3 = pow(1.0 - cosTheta3, 4.0);',
    '    film3 = mix(film3, film3 * 2.0 + vec3(0.18, 0.1, 0.14), fresnel3 * 0.5);',
    '',
    '    vec3 light1 = normalize(vec3(-0.3, 0.4, 1.0));',
    '    vec3 half1 = normalize(light1 + viewDir);',
    '    float spec1 = pow(max(dot(norm3, half1), 0.0), 70.0);',
    '    film3 += vec3(0.95, 1.0, 0.97) * spec1 * 0.4;',
    '',
    '    totalColor = mix(totalColor, totalColor * 0.5 + film3, mask3);',
    '    totalWeight = max(totalWeight, mask3);',
    '  }',
    '',
    '  // ---- Background: dark with subtle ambient glow ----',
    '  float distCenter = length(p * vec2(0.9, 1.0));',
    '  vec3 bgColor = vec3(0.015, 0.015, 0.03);',
    '  float bgGlow = exp(-distCenter * distCenter * 4.0) * 0.06;',
    '  bgColor += vec3(0.04, 0.02, 0.06) * bgGlow;',
    '',
    '  // ---- Compose: film surfaces over dark background ----',
    '  vec3 col = mix(bgColor, totalColor, clamp(totalWeight, 0.0, 1.0));',
    '',
    '  // ---- Vignette ----',
    '  float vig = 1.0 - smoothstep(0.35, 1.3, length(p * vec2(0.85, 1.0)));',
    '  col *= 0.6 + 0.4 * vig;',
    '',
    '',
    '  // ---- Tone mapping: slight S-curve for richness ----',
    '  col = clamp(col, 0.0, 1.0);',
    '  col = pow(col, vec3(0.95));',
    '  col = col * col * (3.0 - 2.0 * col);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFilmThickness = gl.getUniformLocation(prog, 'u_filmThickness');
  var uFlowSpeed = gl.getUniformLocation(prog, 'u_flowSpeed');
  var uCenter = gl.getUniformLocation(prog, 'u_center');
  var uScale = gl.getUniformLocation(prog, 'u_scale');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');
  var filmThicknessVal = 1.0;
  var flowSpeedVal = 0.5;
  var centerX = 0.0;
  var centerY = 0.0;
  var scaleVal = 0.0;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;
  var dpr = 1;
  var needsResize = true;
  var running = true;
  var mouseXVal = -1, mouseYVal = -1;

  canvas.addEventListener('mousemove', function(e) {
    mouseXVal = e.clientX / canvas.clientWidth;
    mouseYVal = 1.0 - e.clientY / canvas.clientHeight;
  });
  canvas.addEventListener('mouseleave', function() {
    mouseXVal = -1; mouseYVal = -1;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    mouseXVal = t.clientX / canvas.clientWidth;
    mouseYVal = 1.0 - t.clientY / canvas.clientHeight;
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    mouseXVal = t.clientX / canvas.clientWidth;
    mouseYVal = 1.0 - t.clientY / canvas.clientHeight;
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    mouseXVal = -1; mouseYVal = -1;
  });

  function resize() {
    needsResize = false;
    var scale = 1.0 / pixelScale;
    var w = Math.round(canvas.clientWidth * dpr * scale);
    var h = Math.round(canvas.clientHeight * dpr * scale);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) return;
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uFilmThickness, filmThicknessVal);
    gl.uniform1f(uFlowSpeed, flowSpeedVal);
    // Mouse tilts the view angle (changes iridescence colors) — don't shift center
    gl.uniform2f(uCenter, centerX, centerY);
    gl.uniform1f(uScale, scaleVal);
    gl.uniform2f(uMouse, mouseXVal, mouseYVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FILM_THICKNESS': filmThicknessVal = e.data.value; break;
        case 'FLOW_SPEED': flowSpeedVal = e.data.value; break;
        case 'CENTER_X': centerX = e.data.value; break;
        case 'CENTER_Y': centerY = e.data.value; break;
        case 'SCALE': scaleVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
