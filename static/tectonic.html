<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tectonic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Tectonic</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 53 · Tectonic — Shifting plates with glowing magma fault lines
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_driftSpeed;',
    'uniform float u_magmaHeat;',
    '',
    '#define PI 3.14159265359',
    '#define NUM_PLATES 12',
    '',
    '// ── Hash & noise primitives ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'vec2 hash2(vec2 p) {',
    '  return vec2(',
    '    fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453),',
    '    fract(sin(dot(p, vec2(269.5, 183.3))) * 43758.5453)',
    '  );',
    '}',
    '',
    'vec3 hash3(vec2 p) {',
    '  return vec3(',
    '    fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453),',
    '    fract(sin(dot(p, vec2(269.5, 183.3))) * 43758.5453),',
    '    fract(sin(dot(p, vec2(419.2, 371.9))) * 43758.5453)',
    '  );',
    '}',
    '',
    '// Smooth value noise',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// FBM',
    'float fbm(vec2 p, int octaves) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  for (int i = 0; i < 8; i++) {',
    '    if (i >= octaves) break;',
    '    val += amp * noise(p * freq);',
    '    freq *= 2.03;',
    '    amp *= 0.49;',
    '    p += vec2(1.7, 9.2);',
    '  }',
    '  return val;',
    '}',
    '',
    '// Ridged noise for cracks and fissures',
    'float ridgedNoise(vec2 p) {',
    '  return 1.0 - abs(noise(p) * 2.0 - 1.0);',
    '}',
    '',
    'float ridgedFBM(vec2 p, int octaves) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  float prev = 1.0;',
    '  for (int i = 0; i < 6; i++) {',
    '    if (i >= octaves) break;',
    '    float n = ridgedNoise(p * freq);',
    '    n = n * n;',
    '    val += n * amp * prev;',
    '    prev = n;',
    '    freq *= 2.2;',
    '    amp *= 0.5;',
    '    p += vec2(1.3, 7.1);',
    '  }',
    '  return val;',
    '}',
    '',
    '// ── Animated Voronoi with drifting plate centers ──',
    '// Returns: x = min distance, y = edge distance (second - first),',
    '//          z = cell ID hash',
    'vec3 tectonicVoronoi(vec2 p, float t) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  float minDist = 10.0;',
    '  float secondDist = 10.0;',
    '  vec2 nearestCell = vec2(0.0);',
    '  vec2 nearestPoint = vec2(0.0);',
    '',
    '  // Search 3x3 neighborhood',
    '  for (int y = -1; y <= 1; y++) {',
    '    for (int x = -1; x <= 1; x++) {',
    '      vec2 neighbor = vec2(float(x), float(y));',
    '      vec2 cellId = i + neighbor;',
    '      vec3 h = hash3(cellId);',
    '      // Base position with jitter',
    '      vec2 point = h.xy * 0.75 + 0.125;',
    '',
    '      // Slow tectonic drift — each plate moves differently',
    '      float driftAngle = h.z * PI * 2.0;',
    '      float driftSpeed = 0.015 + h.x * 0.02;',
    '      // Main drift: slow continuous movement in one direction',
    '      point.x += sin(driftAngle) * t * driftSpeed;',
    '      point.y += cos(driftAngle) * t * driftSpeed;',
    '      // Secondary oscillation — very slow wobble',
    '      point.x += sin(t * 0.08 + h.y * 20.0) * 0.04;',
    '      point.y += cos(t * 0.06 + h.z * 20.0) * 0.04;',
    '',
    '      vec2 diff = neighbor + point - f;',
    '      float d = dot(diff, diff);',
    '      if (d < minDist) {',
    '        secondDist = minDist;',
    '        minDist = d;',
    '        nearestCell = cellId;',
    '        nearestPoint = diff;',
    '      } else if (d < secondDist) {',
    '        secondDist = d;',
    '      }',
    '    }',
    '  }',
    '',
    '  float edge = sqrt(secondDist) - sqrt(minDist);',
    '  float cellHash = hash(nearestCell);',
    '  return vec3(sqrt(minDist), edge, cellHash);',
    '}',
    '',
    '// Second voronoi layer — larger plates for macro structure',
    'vec3 macroVoronoi(vec2 p, float t) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  float minDist = 10.0;',
    '  float secondDist = 10.0;',
    '  vec2 nearestCell = vec2(0.0);',
    '',
    '  for (int y = -1; y <= 1; y++) {',
    '    for (int x = -1; x <= 1; x++) {',
    '      vec2 neighbor = vec2(float(x), float(y));',
    '      vec2 cellId = i + neighbor;',
    '      vec3 h = hash3(cellId + vec2(100.0));',
    '      vec2 point = h.xy * 0.7 + 0.15;',
    '',
    '      // Even slower drift for macro plates',
    '      float angle = h.z * PI * 2.0;',
    '      point.x += sin(angle) * t * 0.008;',
    '      point.y += cos(angle) * t * 0.008;',
    '      point.x += sin(t * 0.05 + h.y * 15.0) * 0.03;',
    '      point.y += cos(t * 0.04 + h.z * 15.0) * 0.03;',
    '',
    '      vec2 diff = neighbor + point - f;',
    '      float d = dot(diff, diff);',
    '      if (d < minDist) {',
    '        secondDist = minDist;',
    '        minDist = d;',
    '        nearestCell = cellId;',
    '      } else if (d < secondDist) {',
    '        secondDist = d;',
    '      }',
    '    }',
    '  }',
    '',
    '  float edge = sqrt(secondDist) - sqrt(minDist);',
    '  return vec3(sqrt(minDist), edge, hash(nearestCell + vec2(100.0)));',
    '}',
    '',
    '// ── Seismic event function ──',
    '// Creates periodic widening/intensifying of cracks',
    'float seismicPulse(float t) {',
    '  // Multiple overlapping slow seismic cycles',
    '  float s1 = sin(t * 0.15) * 0.5 + 0.5;',
    '  s1 = pow(s1, 3.0); // sharp peak',
    '  float s2 = sin(t * 0.23 + 2.0) * 0.5 + 0.5;',
    '  s2 = pow(s2, 4.0);',
    '  float s3 = sin(t * 0.07 + 5.0) * 0.5 + 0.5;',
    '  s3 = pow(s3, 2.0);',
    '  return s1 * 0.4 + s2 * 0.35 + s3 * 0.25;',
    '}',
    '',
    '// ── Localized seismic events ──',
    '// Creates fissures that open at specific locations and times',
    'float localSeismic(vec2 p, float t) {',
    '  float event = 0.0;',
    '  // Several independent seismic sources',
    '  for (int i = 0; i < 4; i++) {',
    '    float fi = float(i);',
    '    // Each event has its own center and timing',
    '    vec2 center = vec2(',
    '      sin(fi * 3.7 + t * 0.03) * 1.5,',
    '      cos(fi * 2.3 + t * 0.04) * 1.5',
    '    );',
    '    float dist = length(p - center);',
    '    // Periodic activation',
    '    float activation = sin(t * (0.1 + fi * 0.04) + fi * 5.0) * 0.5 + 0.5;',
    '    activation = pow(activation, 6.0); // Very peaked — brief events',
    '    // Radial falloff from epicenter',
    '    float radial = exp(-dist * dist * 0.8);',
    '    event += activation * radial;',
    '  }',
    '  return clamp(event, 0.0, 1.0);',
    '}',
    '',
    '// ── Stone/rock texture ──',
    'vec3 stoneColor(float cellHash, vec2 p, float t) {',
    '  // Multi-layered rock texture',
    '  float grain = fbm(p * 12.0 + cellHash * 50.0, 5);',
    '  float coarse = fbm(p * 4.0 + cellHash * 30.0 + vec2(50.0), 4);',
    '  float fine = noise(p * 25.0 + cellHash * 80.0) * 0.3;',
    '',
    '  // Rock color — dark grey-brown with variation per plate',
    '  float brightness = 0.08 + grain * 0.06 + coarse * 0.04 + fine * 0.02;',
    '',
    '  // Each plate has a slightly different hue',
    '  vec3 plateHue = vec3(',
    '    0.85 + cellHash * 0.15,',
    '    0.78 + fract(cellHash * 7.3) * 0.22,',
    '    0.70 + fract(cellHash * 13.7) * 0.20',
    '  );',
    '',
    '  vec3 stone = vec3(brightness) * plateHue;',
    '',
    '  // Add subtle stratification lines (geological layers)',
    '  float strata = sin(p.y * 30.0 + p.x * 5.0 + grain * 8.0 + cellHash * 100.0);',
    '  strata = smoothstep(0.7, 0.9, abs(strata));',
    '  stone += strata * 0.015 * plateHue;',
    '',
    '  return stone;',
    '}',
    '',
    '// ── Magma color mapping ──',
    'vec3 magmaColor(float temp) {',
    '  vec3 c;',
    '  if (temp < 0.15) {',
    '    float t2 = temp / 0.15;',
    '    c = mix(vec3(0.03, 0.005, 0.0), vec3(0.18, 0.02, 0.005), t2);',
    '  } else if (temp < 0.35) {',
    '    float t2 = (temp - 0.15) / 0.2;',
    '    c = mix(vec3(0.18, 0.02, 0.005), vec3(0.6, 0.1, 0.01), t2 * t2);',
    '  } else if (temp < 0.55) {',
    '    float t2 = (temp - 0.35) / 0.2;',
    '    c = mix(vec3(0.6, 0.1, 0.01), vec3(0.95, 0.35, 0.02), t2);',
    '  } else if (temp < 0.72) {',
    '    float t2 = (temp - 0.55) / 0.17;',
    '    c = mix(vec3(0.95, 0.35, 0.02), vec3(1.0, 0.65, 0.08), t2);',
    '  } else if (temp < 0.88) {',
    '    float t2 = (temp - 0.72) / 0.16;',
    '    c = mix(vec3(1.0, 0.65, 0.08), vec3(1.0, 0.88, 0.4), t2);',
    '  } else {',
    '    float t2 = (temp - 0.88) / 0.12;',
    '    c = mix(vec3(1.0, 0.88, 0.4), vec3(1.0, 0.98, 0.85), t2);',
    '  }',
    '  return c;',
    '}',
    '',
    'void main() {',
    '  vec2 fragCoord = gl_FragCoord.xy;',
    '  float aspect = u_res.x / u_res.y;',
    '  // Centered, aspect-corrected coordinates',
    '  vec2 p = (fragCoord - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time * u_driftSpeed;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 1. TECTONIC PLATE STRUCTURE',
    '  // Two scales of Voronoi for major + minor plates',
    '  // ────────────────────────────────────────────',
    '',
    '  // Major plate boundaries — large scale',
    '  vec2 macroUV = p * 1.8;',
    '  vec3 macro = macroVoronoi(macroUV, t);',
    '  float macroEdge = macro.y;',
    '',
    '  // Minor plate boundaries — detail scale',
    '  vec2 detailUV = p * 4.5;',
    '  vec3 detail = tectonicVoronoi(detailUV, t);',
    '  float detailEdge = detail.y;',
    '  float cellHash = detail.z;',
    '',
    '  // Micro-cracks within plates',
    '  vec2 microUV = p * 12.0;',
    '  vec3 micro = tectonicVoronoi(microUV, t * 0.5);',
    '  float microEdge = micro.y;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 2. SEISMIC ACTIVITY',
    '  // ────────────────────────────────────────────',
    '',
    '  float seismic = seismicPulse(u_time);',
    '  float localQuake = localSeismic(p, u_time);',
    '',
    '  // Seismic events widen cracks and intensify magma',
    '  float crackWidenMacro = 0.06 + seismic * 0.04 + localQuake * 0.06;',
    '  float crackWidenDetail = 0.10 + seismic * 0.06 + localQuake * 0.08;',
    '  float crackWidenMicro = 0.04 + seismic * 0.02;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 3. FAULT LINE DETECTION',
    '  // Smooth falloff from plate boundaries',
    '  // ────────────────────────────────────────────',
    '',
    '  // Major fault lines — widest, brightest',
    '  float majorFault = smoothstep(crackWidenMacro, 0.0, macroEdge);',
    '  float majorGlow = smoothstep(crackWidenMacro * 3.0, 0.0, macroEdge);',
    '',
    '  // Detail fault lines',
    '  float detailFault = smoothstep(crackWidenDetail, 0.0, detailEdge);',
    '  float detailGlow = smoothstep(crackWidenDetail * 2.5, 0.0, detailEdge);',
    '',
    '  // Micro-cracks — thinnest, most subtle',
    '  float microFault = smoothstep(crackWidenMicro, 0.0, microEdge);',
    '  float microGlow = smoothstep(crackWidenMicro * 2.0, 0.0, microEdge);',
    '',
    '  // Combine fault lines — major faults dominate',
    '  float combinedFault = max(majorFault * 1.0, max(detailFault * 0.75, microFault * 0.25));',
    '  float combinedGlow = max(majorGlow * 1.0, max(detailGlow * 0.6, microGlow * 0.15));',
    '',
    '  // ────────────────────────────────────────────',
    '  // 4. NEW FISSURES — dynamic cracks that appear',
    '  // ────────────────────────────────────────────',
    '',
    '  // Ridged noise creates crack-like patterns',
    '  float fissureNoise = ridgedFBM(p * 3.0 + u_time * vec2(0.01, -0.008), 5);',
    '  // Fissures appear more during seismic events',
    '  float fissureThreshold = 0.6 - localQuake * 0.2 - seismic * 0.1;',
    '  float fissures = smoothstep(fissureThreshold, fissureThreshold + 0.1, fissureNoise);',
    '  fissures *= (localQuake * 0.6 + seismic * 0.4);',
    '',
    '  combinedFault = max(combinedFault, fissures * 0.6);',
    '  combinedGlow = max(combinedGlow, fissures * 0.4);',
    '',
    '  // ────────────────────────────────────────────',
    '  // 5. MAGMA TEMPERATURE IN CRACKS',
    '  // ────────────────────────────────────────────',
    '',
    '  // Flowing magma texture within the cracks',
    '  vec2 magmaFlowUV = p * 5.0 + u_time * vec2(0.05, -0.03);',
    '  float magmaFlow = fbm(magmaFlowUV, 5);',
    '  float magmaFlow2 = fbm(magmaFlowUV * 1.7 + vec2(30.0) + u_time * vec2(-0.04, 0.06), 4);',
    '  float magmaTurbulence = magmaFlow * 0.6 + magmaFlow2 * 0.4;',
    '',
    '  // Temperature varies along the cracks',
    '  float magmaTemp = combinedFault * (0.5 + magmaTurbulence * 0.5);',
    '',
    '  // Major faults are hotter than minor ones',
    '  magmaTemp += majorFault * 0.3;',
    '',
    '  // Seismic events heat up the magma',
    '  magmaTemp += combinedFault * seismic * 0.2;',
    '  magmaTemp += combinedFault * localQuake * 0.3;',
    '',
    '  // Slow global pulsation — the earth breathes',
    '  float breathe = sin(u_time * 0.12) * 0.5 + 0.5;',
    '  breathe = breathe * 0.15 + 0.85;',
    '  magmaTemp *= breathe * u_magmaHeat;',
    '',
    '  magmaTemp = clamp(magmaTemp, 0.0, 1.0);',
    '',
    '  // ────────────────────────────────────────────',
    '  // 6. STONE PLATE SURFACE',
    '  // ────────────────────────────────────────────',
    '',
    '  vec3 stone = stoneColor(cellHash, p, u_time);',
    '',
    '  // Plates further from center of their cell are slightly darker (depth cue)',
    '  float cellDepth = detail.x;',
    '  stone *= 0.9 + cellDepth * 0.15;',
    '',
    '  // Subtle surface displacement — plates at different heights',
    '  float plateHeight = hash(vec2(cellHash * 100.0, 0.0));',
    '  stone *= 0.85 + plateHeight * 0.15;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 7. HEAT GLOW ON PLATE EDGES',
    '  // Warm light cast onto stone near cracks',
    '  // ────────────────────────────────────────────',
    '',
    '  vec3 heatGlowColor = vec3(0.4, 0.08, 0.01);',
    '  float heatGlowStrength = combinedGlow * (0.6 + magmaTurbulence * 0.4);',
    '  heatGlowStrength *= breathe * u_magmaHeat;',
    '',
    '  // The stone near cracks gets an orange-red cast',
    '  stone += heatGlowColor * heatGlowStrength * 1.5;',
    '  // Also slightly brighten the stone near cracks (reflected light)',
    '  stone *= 1.0 + heatGlowStrength * 0.8;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 8. COMPOSITE: STONE + MAGMA',
    '  // ────────────────────────────────────────────',
    '',
    '  vec3 magma = magmaColor(magmaTemp);',
    '',
    '  // Emissive boost for magma',
    '  float emissive = smoothstep(0.5, 1.0, magmaTemp);',
    '  magma += vec3(0.25, 0.06, 0.01) * emissive * emissive;',
    '',
    '  // Blend: where cracks exist, show magma; otherwise stone',
    '  float blendFactor = smoothstep(0.0, 0.15, combinedFault);',
    '  vec3 col = mix(stone, magma, blendFactor);',
    '',
    '  // ────────────────────────────────────────────',
    '  // 9. SUBSURFACE GLOW',
    '  // Even solid stone has a faint warm underglow near faults',
    '  // ────────────────────────────────────────────',
    '',
    '  float subsurface = combinedGlow * 0.3 * u_magmaHeat;',
    '  col += vec3(0.12, 0.03, 0.005) * subsurface;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 10. ATMOSPHERIC HAZE — heat shimmer',
    '  // ────────────────────────────────────────────',
    '',
    '  float hazeNoise = fbm(p * 2.5 + u_time * vec2(0.02, 0.05), 3);',
    '  float hazeStrength = combinedGlow * 0.06;',
    '  col += vec3(0.1, 0.03, 0.005) * hazeNoise * hazeStrength;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 11. VIGNETTE',
    '  // ────────────────────────────────────────────',
    '',
    '  float edgeDist = length(p * vec2(1.0, 1.2));',
    '  float vignette = 1.0 - smoothstep(0.5, 1.5, edgeDist);',
    '  col *= 0.6 + vignette * 0.4;',
    '',
    '  // Darker edges — less magma activity at boundaries',
    '  float edgeCool = smoothstep(0.7, 1.4, edgeDist);',
    '  col = mix(col, col * vec3(0.3, 0.15, 0.1), edgeCool * 0.4);',
    '',
    '  // ────────────────────────────────────────────',
    '  // 12. TONE MAPPING + COLOR GRADING',
    '  // ────────────────────────────────────────────',
    '',
    '  // Prevent harsh clipping',
    '  col = col / (1.0 + col * 0.12);',
    '',
    '  // Push toward warm amber tones',
    '  col = pow(col, vec3(0.95, 1.0, 1.08));',
    '',
    '  // Slight contrast boost',
    '  col = clamp(col, 0.0, 1.0);',
    '  col = col * col * (3.0 - 2.0 * col) * 0.8 + col * 0.2;',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uDriftSpeed = gl.getUniformLocation(prog, 'u_driftSpeed');
  var uMagmaHeat = gl.getUniformLocation(prog, 'u_magmaHeat');

  var driftSpeedVal = 1.0;
  var magmaHeatVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uDriftSpeed, driftSpeedVal);
    gl.uniform1f(uMagmaHeat, magmaHeatVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRIFT_SPEED': driftSpeedVal = e.data.value; break;
        case 'MAGMA_HEAT': magmaHeatVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
