<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silk Threads</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Silk Threads</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Silk Threads — Flowing luminous wave lines
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_waveSpeed;',
    'uniform float u_lineCount;',
    '',
    '// ── Hash for noise ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  float t = u_time * u_waveSpeed;',
    '  int lineCount = int(u_lineCount);',
    '',
    '  // Centered UV for vignette',
    '  vec2 centeredUV = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '',
    '  // ── Background ──',
    '  vec3 col = vec3(0.039, 0.039, 0.039);',
    '',
    '  // ── Edge fade at horizontal sides ──',
    '  float edgeFade = smoothstep(0.0, 0.15, uv.x) * smoothstep(1.0, 0.85, uv.x);',
    '',
    '  // ── Accumulate line glow ──',
    '  for (int i = 0; i < 12; i++) {',
    '    if (i >= lineCount) break;',
    '',
    '    float fi = float(i);',
    '    float lineId = fi + 0.5;',
    '',
    '    // Per-line parameters derived from index',
    '    float speed = 0.4 + fi * 0.07;',
    '    float freq = 2.0 + fi * 0.35;',
    '    float amp = 0.06 + fi * 0.008;',
    '    float phase = fi * 1.73;',
    '    float vertOffset = (fi / (u_lineCount - 1.0)) * 0.6 + 0.2;',
    '',
    '    // Scaled x for wave calculation (account for aspect)',
    '    float sx = uv.x * aspect;',
    '',
    '    // Primary sine wave',
    '    float wave = sin(t * speed + sx * freq + phase) * amp;',
    '',
    '    // Secondary harmonic for complexity',
    '    float wave2 = sin(t * speed * 0.7 + sx * freq * 2.3 + phase * 1.4) * amp * 0.3;',
    '',
    '    // Noise perturbation for organic feel',
    '    float noiseSample = noise(vec2(sx * 1.5 + t * speed * 0.2, fi * 7.3 + t * 0.05));',
    '    float noiseOffset = (noiseSample - 0.5) * 0.025;',
    '',
    '    // Final y position of the line at this x',
    '    float lineY = vertOffset + wave + wave2 + noiseOffset;',
    '',
    '    // Distance from current fragment to the line',
    '    float d = abs(uv.y - lineY);',
    '',
    '    // Thin bright core',
    '    float core = smoothstep(0.004, 0.0, d);',
    '',
    '    // Wider soft bloom',
    '    float bloom = smoothstep(0.04, 0.0, d) * 0.35;',
    '',
    '    // Even wider atmospheric glow',
    '    float glow = smoothstep(0.12, 0.0, d) * 0.08;',
    '',
    '    float lineBrightness = core + bloom + glow;',
    '',
    '    // Per-line color: warm amber to soft lavender',
    '    // Lines 0-5 are warmer, lines 6-11 are cooler',
    '    float colorMix = fi / 11.0;',
    '    vec3 warmColor = vec3(',
    '      0.92 - fi * 0.02,',
    '      0.58 + fi * 0.01,',
    '      0.28 + fi * 0.02',
    '    );',
    '    vec3 coolColor = vec3(',
    '      0.45 + fi * 0.02,',
    '      0.40 + fi * 0.015,',
    '      0.60 + fi * 0.02',
    '    );',
    '    vec3 lineColor = mix(warmColor, coolColor, colorMix * colorMix);',
    '',
    '    // Subtle time-varying color shift per line',
    '    lineColor += 0.05 * sin(t * 0.3 + fi * 2.1);',
    '',
    '    // Apply edge fade and add to accumulator',
    '    col += lineColor * lineBrightness * edgeFade;',
    '  }',
    '',
    '  // ── Vignette ──',
    '  float dist = length(centeredUV * vec2(0.8, 1.0));',
    '  float vignette = 1.0 - smoothstep(0.4, 1.3, dist);',
    '  col *= 0.75 + vignette * 0.25;',
    '',
    '  // ── Clamp and output ──',
    '  col = clamp(col, 0.0, 1.0);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uWaveSpeed = gl.getUniformLocation(prog, 'u_waveSpeed');
  var uLineCount = gl.getUniformLocation(prog, 'u_lineCount');

  var waveSpeedVal = 1.0;
  var lineCountVal = 10.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uWaveSpeed, waveSpeedVal);
    gl.uniform1f(uLineCount, lineCountVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'WAVE_SPEED': waveSpeedVal = e.data.value; break;
        case 'LINE_COUNT': lineCountVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
