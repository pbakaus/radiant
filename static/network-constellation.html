<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    color: rgba(200, 149, 108, 0.6);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="label">08 / Network Constellation</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // ?p=N compacts the graph for embedded contexts
  const _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  let width, height, cx, cy, dpr;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = width / 2;
    cy = height / 2;
  }

  window.addEventListener('resize', resize);
  resize();

  // Category colors
  const CATEGORIES = {
    code:    { r: 200, g: 149, b: 108 }, // amber
    design:  { r: 224, g: 120, b: 80 },  // coral
    product: { r: 212, g: 165, b: 116 }, // gold
    career:  { r: 180, g: 170, b: 155 }, // warm light
  };

  // Node definitions
  const nodeDefs = [
    { label: 'Code',            cat: 'code',    importance: 1.0 },
    { label: 'Design',          cat: 'design',  importance: 1.0 },
    { label: 'Product',         cat: 'product', importance: 1.0 },
    { label: 'jQuery UI',       cat: 'code',    importance: 1.3 },
    { label: 'Chrome DevTools', cat: 'code',    importance: 1.1 },
    { label: 'AMP',             cat: 'code',    importance: 1.15 },
    { label: 'Web Stories',     cat: 'product', importance: 1.05 },
    { label: 'AI Tools',        cat: 'product', importance: 1.3 },
    { label: 'Impeccable',      cat: 'product', importance: 1.1 },
    { label: 'Open Source',     cat: 'code',    importance: 0.9 },
    { label: 'Creator Economy', cat: 'product', importance: 1.0 },
    { label: 'Game Engines',    cat: 'code',    importance: 0.9 },
    { label: 'Zynga',           cat: 'career',  importance: 1.1 },
    { label: 'Google',          cat: 'career',  importance: 1.4 },
    { label: 'Spotter',         cat: 'career',  importance: 1.1 },
    { label: 'Leadership',      cat: 'product', importance: 1.05 },
    { label: 'Strategy',        cat: 'product', importance: 0.95 },
    { label: 'UX',              cat: 'design',  importance: 1.0 },
    { label: 'Performance',     cat: 'code',    importance: 0.9 },
    { label: 'Animation',       cat: 'design',  importance: 0.95 },
  ];

  // Connection definitions (pairs of label indices)
  const connectionDefs = [
    ['Code', 'jQuery UI'],
    ['Code', 'Chrome DevTools'],
    ['Code', 'AMP'],
    ['Code', 'Open Source'],
    ['Code', 'Game Engines'],
    ['Code', 'Performance'],
    ['Design', 'UX'],
    ['Design', 'Animation'],
    ['Design', 'jQuery UI'],
    ['Product', 'Strategy'],
    ['Product', 'Leadership'],
    ['Product', 'Web Stories'],
    ['Product', 'AI Tools'],
    ['Product', 'Creator Economy'],
    ['AI Tools', 'Impeccable'],
    ['AI Tools', 'Code'],
    ['Impeccable', 'Design'],
    ['jQuery UI', 'Animation'],
    ['jQuery UI', 'Open Source'],
    ['Chrome DevTools', 'Performance'],
    ['Chrome DevTools', 'Google'],
    ['AMP', 'Google'],
    ['AMP', 'Web Stories'],
    ['AMP', 'Performance'],
    ['Web Stories', 'Google'],
    ['Web Stories', 'Creator Economy'],
    ['Game Engines', 'Zynga'],
    ['Game Engines', 'Animation'],
    ['Google', 'Leadership'],
    ['Google', 'Chrome DevTools'],
    ['Zynga', 'Game Engines'],
    ['Zynga', 'Leadership'],
    ['Spotter', 'Creator Economy'],
    ['Spotter', 'AI Tools'],
    ['Spotter', 'Leadership'],
    ['Leadership', 'Strategy'],
    ['UX', 'Animation'],
    ['UX', 'Product'],
    ['Performance', 'AMP'],
    ['Open Source', 'jQuery UI'],
    ['Creator Economy', 'Spotter'],
    ['Strategy', 'Leadership'],
  ];

  // Build node objects
  const labelToIndex = {};
  const nodes = nodeDefs.map((def, i) => {
    labelToIndex[def.label] = i;
    const angle = (i / nodeDefs.length) * Math.PI * 2 + Math.random() * 0.5;
    const dist = (120 + Math.random() * 180) / _pad;
    return {
      label: def.label,
      cat: def.cat,
      color: CATEGORIES[def.cat],
      importance: def.importance,
      radius: 6 + def.importance * 12,
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      highlighted: false,
    };
  });

  // Build connection objects
  const connections = [];
  const nodeConnections = new Array(nodes.length).fill(null).map(() => []);

  connectionDefs.forEach(([a, b]) => {
    const ia = labelToIndex[a];
    const ib = labelToIndex[b];
    if (ia !== undefined && ib !== undefined) {
      // Avoid duplicates
      const exists = connections.some(c => (c.a === ia && c.b === ib) || (c.a === ib && c.b === ia));
      if (!exists) {
        connections.push({ a: ia, b: ib, flowOffset: Math.random() * 100 });
        nodeConnections[ia].push(ib);
        nodeConnections[ib].push(ia);
      }
    }
  });

  // Mouse tracking
  let mouse = { x: -9999, y: -9999 };
  let hoveredNode = -1;

  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  canvas.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  // Physics constants
  let REPULSION = 8000;
  const SPRING_K = 0.003;
  let SPRING_REST = 160 / _pad;
  const GRAVITY = 0.015 * _pad;
  const DAMPING = 0.92;
  const MAX_SPEED = 3;

  function updatePhysics() {
    const n = nodes.length;

    for (let i = 0; i < n; i++) {
      let fx = 0, fy = 0;

      // Repulsion from all other nodes
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq) || 1;
        const force = REPULSION / distSq;
        fx += (dx / dist) * force;
        fy += (dy / dist) * force;
      }

      // Spring forces from connections
      const conns = nodeConnections[i];
      for (let c = 0; c < conns.length; c++) {
        const j = conns[c];
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const displacement = dist - SPRING_REST;
        const force = SPRING_K * displacement;
        fx += (dx / dist) * force;
        fy += (dy / dist) * force;
      }

      // Gravity toward center
      const gx = cx - nodes[i].x;
      const gy = cy - nodes[i].y;
      fx += gx * GRAVITY;
      fy += gy * GRAVITY;

      // Apply forces
      nodes[i].vx = (nodes[i].vx + fx) * DAMPING;
      nodes[i].vy = (nodes[i].vy + fy) * DAMPING;

      // Clamp speed
      const speed = Math.sqrt(nodes[i].vx * nodes[i].vx + nodes[i].vy * nodes[i].vy);
      if (speed > MAX_SPEED) {
        nodes[i].vx = (nodes[i].vx / speed) * MAX_SPEED;
        nodes[i].vy = (nodes[i].vy / speed) * MAX_SPEED;
      }

      nodes[i].x += nodes[i].vx;
      nodes[i].y += nodes[i].vy;

      // Soft boundary
      const margin = 80 * _pad;
      if (nodes[i].x < margin) nodes[i].vx += 0.5;
      if (nodes[i].x > width - margin) nodes[i].vx -= 0.5;
      if (nodes[i].y < margin) nodes[i].vy += 0.5;
      if (nodes[i].y > height - margin) nodes[i].vy -= 0.5;
    }
  }

  function findHoveredNode() {
    hoveredNode = -1;
    let minDist = 60; // hover radius
    for (let i = 0; i < nodes.length; i++) {
      const dx = mouse.x - nodes[i].x;
      const dy = mouse.y - nodes[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < minDist) {
        minDist = dist;
        hoveredNode = i;
      }
    }

    // Mark highlighted state
    for (let i = 0; i < nodes.length; i++) {
      nodes[i].highlighted = false;
    }

    if (hoveredNode >= 0) {
      nodes[hoveredNode].highlighted = true;
      const conns = nodeConnections[hoveredNode];
      for (let c = 0; c < conns.length; c++) {
        nodes[conns[c]].highlighted = true;
      }
    }
  }

  function drawConnections(time) {
    for (let i = 0; i < connections.length; i++) {
      const conn = connections[i];
      const na = nodes[conn.a];
      const nb = nodes[conn.b];

      const dx = nb.x - na.x;
      const dy = nb.y - na.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Base opacity depends on distance
      const distFactor = Math.max(0, 1 - dist / 400);
      let alpha = 0.08 + distFactor * 0.12;

      // Highlight connected edges
      const isHighlighted = hoveredNode >= 0 &&
        (conn.a === hoveredNode || conn.b === hoveredNode);

      if (hoveredNode >= 0) {
        if (isHighlighted) {
          alpha = 0.3 + distFactor * 0.3;
        } else {
          alpha *= 0.25;
        }
      }

      // Subtle pulse
      alpha *= 0.8 + 0.2 * Math.sin(time * 1.5 + conn.flowOffset);

      // Line color - blend between the two node colors
      const colA = na.color;
      const colB = nb.color;
      const mr = (colA.r + colB.r) / 2;
      const mg = (colA.g + colB.g) / 2;
      const mb = (colA.b + colB.b) / 2;

      ctx.strokeStyle = `rgba(${mr|0}, ${mg|0}, ${mb|0}, ${alpha})`;
      ctx.lineWidth = isHighlighted ? 1.5 : 0.8;
      ctx.beginPath();
      ctx.moveTo(na.x, na.y);
      ctx.lineTo(nb.x, nb.y);
      ctx.stroke();

      // Traveling dots along connections
      const dotCount = isHighlighted ? 3 : 1;
      for (let d = 0; d < dotCount; d++) {
        const speed = 0.15 + d * 0.07;
        const t = ((time * speed + conn.flowOffset + d * 3.3) % 4) / 4;

        // Smooth ease
        const easeT = t;
        const dotX = na.x + dx * easeT;
        const dotY = na.y + dy * easeT;

        // Dot fades at endpoints
        const edgeFade = Math.sin(easeT * Math.PI);
        const dotAlpha = alpha * edgeFade * (isHighlighted ? 1.5 : 0.8);

        if (dotAlpha > 0.01) {
          const dotRadius = isHighlighted ? 2.2 : 1.4;
          ctx.fillStyle = `rgba(${mr|0}, ${mg|0}, ${mb|0}, ${dotAlpha})`;
          ctx.beginPath();
          ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  function drawNodes(time) {
    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const col = node.color;

      // Pulse
      const pulse = 1 + 0.08 * Math.sin(time * 2 + i * 0.7);
      const r = node.radius * pulse;

      // Determine if dimmed
      const isDimmed = hoveredNode >= 0 && !node.highlighted;
      const alphaMultiplier = isDimmed ? 0.15 : 1;
      const isHovered = i === hoveredNode;

      // Outer glow
      const glowRadius = r * (isHovered ? 5 : 3.5);
      const glowAlpha = (isHovered ? 0.25 : 0.12) * alphaMultiplier;
      const glow = ctx.createRadialGradient(node.x, node.y, r * 0.5, node.x, node.y, glowRadius);
      glow.addColorStop(0, `rgba(${col.r}, ${col.g}, ${col.b}, ${glowAlpha})`);
      glow.addColorStop(1, `rgba(${col.r}, ${col.g}, ${col.b}, 0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(node.x, node.y, glowRadius, 0, Math.PI * 2);
      ctx.fill();

      // Main circle fill
      const mainAlpha = (isHovered ? 0.9 : 0.55) * alphaMultiplier;
      const grad = ctx.createRadialGradient(
        node.x - r * 0.2, node.y - r * 0.2, r * 0.1,
        node.x, node.y, r
      );
      grad.addColorStop(0, `rgba(255, 240, 220, ${mainAlpha * 0.8})`);
      grad.addColorStop(0.5, `rgba(${col.r}, ${col.g}, ${col.b}, ${mainAlpha})`);
      grad.addColorStop(1, `rgba(${col.r * 0.6 |0}, ${col.g * 0.6 |0}, ${col.b * 0.6 |0}, ${mainAlpha * 0.7})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
      ctx.fill();

      // Bright core
      const coreAlpha = (isHovered ? 0.7 : 0.35) * alphaMultiplier;
      ctx.fillStyle = `rgba(255, 248, 235, ${coreAlpha})`;
      ctx.beginPath();
      ctx.arc(node.x, node.y, r * 0.35, 0, Math.PI * 2);
      ctx.fill();

      // Ring on hover
      if (isHovered) {
        ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, 0.5)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 4, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Label
      const labelAlpha = isDimmed ? 0.08 : (isHovered ? 0.95 : 0.55);
      const fontSize = isHovered ? 13 : 11;
      ctx.font = `${isHovered ? '600' : '400'} ${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Text shadow for readability
      if (labelAlpha > 0.1) {
        ctx.fillStyle = `rgba(10, 10, 10, ${labelAlpha * 0.9})`;
        ctx.fillText(node.label, node.x + 0.5, node.y + r + 16 + 0.5);
      }

      ctx.fillStyle = `rgba(240, 235, 228, ${labelAlpha})`;
      ctx.fillText(node.label, node.x, node.y + r + 16);
    }
  }

  function drawBackground(time) {
    // Subtle ambient particles
    ctx.fillStyle = 'rgba(200, 149, 108, 0.015)';
    for (let i = 0; i < 60; i++) {
      const px = (Math.sin(i * 127.1 + time * 0.1) * 0.5 + 0.5) * width;
      const py = (Math.cos(i * 311.7 + time * 0.08) * 0.5 + 0.5) * height;
      ctx.beginPath();
      ctx.arc(px, py, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function draw(timestamp) {
    const time = timestamp / 1000;

    ctx.clearRect(0, 0, width, height);

    // Update
    updatePhysics();
    findHoveredNode();

    // Draw layers
    drawBackground(time);
    drawConnections(time);
    drawNodes(time);

    // Subtle vignette
    const vignette = ctx.createRadialGradient(cx, cy, Math.min(width, height) * 0.3, cx, cy, Math.max(width, height) * 0.75);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.5)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);

    requestAnimationFrame(draw);
  }

  // Set cursor style
  canvas.addEventListener('mousemove', () => {
    canvas.style.cursor = hoveredNode >= 0 ? 'pointer' : 'default';
  });

  requestAnimationFrame(draw);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'REPULSION': REPULSION = e.data.value; break;
        case 'SPRING_REST': SPRING_REST = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
