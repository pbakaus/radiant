<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gilt Thread</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Gilt Thread</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Gilt Thread — Golden threads weave intricate Lissajous patterns
// Trail-buffer approach: no fade rectangles, no residue
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  if (!ctx) return;
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Tunable parameters (controllable via postMessage)
  var DRAW_SPEED = 1.0;
  var THREAD_COUNT = 5;
  var SHAPE = 1; // 1=Lissajous, 2=Rose, 3=Spirograph, 4=Harmonograph
  var TRAIL_MAX = 600;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var needsResize = true;
  var W = 0, H = 0;

  function resize() {
    needsResize = false;
    var nw = Math.round(canvas.clientWidth * dpr);
    var nh = Math.round(canvas.clientHeight * dpr);
    if (nw !== W || nh !== H) {
      W = nw; H = nh;
      canvas.width = W;
      canvas.height = H;
    }
  }

  // ── Thread curve definitions ──
  var PHI = 1.618033988749895;

  function makeThread(idx) {
    var freqs = [
      [3, 2 * PHI],
      [2, 3 * PHI],
      [5, 3 * PHI],
      [3 * PHI, 5],
      [4, 3 * PHI + 1],
      [2 * PHI, 5],
      [5, 4 * PHI],
      [3, 5 * PHI]
    ];
    var f = freqs[idx % freqs.length];
    return {
      fx: f[0],
      fy: f[1],
      px: idx * 0.93 + 0.5,
      py: idx * 1.17 + 2.3,
      mfx: 0.11 + idx * 0.037,
      mfy: 0.13 + idx * 0.029,
      ax: 0.52 + (idx % 3) * 0.06,
      ay: 0.48 + ((idx + 1) % 3) * 0.06,
      speed: 0.55 + idx * 0.04,
      width: 2.2 + (idx % 3) * 0.6,
      hue: idx * 0.15,
      sparkles: [],
      trail: []   // ring buffer of {x, y, tx, ty}
    };
  }

  // Evaluate position on thread curve at parameter t
  function pos(th, t) {
    var s = t * th.speed;
    var ax = th.ax * (1 + 0.18 * Math.sin(s * th.mfx));
    var ay = th.ay * (1 + 0.18 * Math.sin(s * th.mfy));
    var shape = Math.round(SHAPE);

    if (shape === 2) {
      // Rose / rhodonea curves — petal patterns
      var k = th.fx / th.fy; // ratio determines petal count
      var r = ax * Math.cos(k * s + th.px);
      return { x: r * Math.cos(s), y: r * Math.sin(s) };
    }
    if (shape === 3) {
      // Spirograph / epitrochoid
      var R = ax * 0.6, rr = ax * 0.23, d = ax * 0.45;
      var idx = (th.fx + th.fy) * 0.5;
      rr *= (0.7 + (idx % 3) * 0.15);
      var ratio = (R + rr) / rr;
      return {
        x: ((R + rr) * Math.cos(s + th.px) - d * Math.cos(ratio * s + th.px)) * 0.9,
        y: ((R + rr) * Math.sin(s + th.py) - d * Math.sin(ratio * s + th.py)) * 0.9
      };
    }
    if (shape === 4) {
      // Butterfly curve — intricate symmetric wings
      var bt = s * 0.4 + th.px;
      var expTerm = Math.exp(Math.cos(bt)) - 2 * Math.cos(4 * bt) - Math.pow(Math.sin(bt / 12), 5);
      return {
        x: Math.sin(bt) * expTerm * ax * 0.28,
        y: Math.cos(bt) * expTerm * ay * 0.28
      };
    }
    // Default: shape 1 — Lissajous (original)
    return {
      x: Math.sin(s * th.fx + th.px) * ax,
      y: Math.sin(s * th.fy + th.py) * ay
    };
  }

  // Tangent direction (normalised) via finite difference
  function tangent(th, t) {
    var dt = 0.0005;
    var a = pos(th, t - dt);
    var b = pos(th, t + dt);
    var dx = b.x - a.x;
    var dy = b.y - a.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    return { x: dx / len, y: dy / len };
  }

  // ── Metallic colour from tangent (directional lighting) ──
  var LX = 0.58, LY = -0.82;

  function metallicRGBA(tang, hueShift, alpha) {
    var dot = tang.x * LX + tang.y * LY;
    var spec = dot * dot;
    var cross = Math.abs(-tang.y * LX + tang.x * LY);

    var r = 160 + spec * 85 + cross * 20 + hueShift * 8;
    var g = 120 + spec * 75 + cross * 25 - hueShift * 4;
    var b = 40  + spec * 70 + cross * 20;

    r = Math.min(255, Math.max(130, r)) | 0;
    g = Math.min(235, Math.max(90,  g)) | 0;
    b = Math.min(145, Math.max(25,  b)) | 0;

    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(3) + ')';
  }

  // ── Sparkle particles ──
  function addSparkle(th, x, y) {
    if (th.sparkles.length > 30) return;
    th.sparkles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      life: 1,
      decay: 0.018 + Math.random() * 0.022,
      size: (1 + Math.random() * 1.8) * dpr
    });
  }

  function tickAndDrawSparkles(th) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var i = th.sparkles.length - 1; i >= 0; i--) {
      var s = th.sparkles[i];
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.95; s.vy *= 0.95;
      s.life -= s.decay;
      if (s.life <= 0) { th.sparkles.splice(i, 1); continue; }
      var a = s.life * s.life;
      var r = s.size * s.life;
      // Glow halo
      ctx.fillStyle = 'rgba(220,180,80,' + (a * 0.25).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(s.x, s.y, r * 3, 0, 6.2832); ctx.fill();
      // Bright core
      ctx.fillStyle = 'rgba(255,240,200,' + (a * 0.85).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, 6.2832); ctx.fill();
    }
    ctx.restore();
  }

  // ── Update trail: push current position, cap at TRAIL_MAX ──
  function updateTrail(th, tNow) {
    // Blend center gently toward mouse when active — subtle parallax, not full follow
    var centerX = W * 0.5;
    var centerY = H * 0.5;
    var targetCX = mouseActive ? centerX + (mouseX - centerX) * 0.15 : centerX;
    var targetCY = mouseActive ? centerY + (mouseY - centerY) * 0.15 : centerY;
    smoothCX += (targetCX - smoothCX) * 0.02;
    smoothCY += (targetCY - smoothCY) * 0.02;

    var scale = Math.min(W, H) * 0.55;
    var p = pos(th, tNow);
    var tg = tangent(th, tNow);
    th.trail.push({
      x: smoothCX + p.x * scale,
      y: smoothCY + p.y * scale,
      tx: tg.x,
      ty: tg.y
    });
    if (th.trail.length > TRAIL_MAX) {
      th.trail.shift();
    }
  }

  // ── Draw a thread from its trail buffer ──
  function drawThread(th, threadIdx) {
    var trail = th.trail;
    var len = trail.length;
    if (len < 2) return;

    var w = th.width * dpr;

    // ── PASS 1: Outer glow (batched path) ──
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = w * 5;
    ctx.strokeStyle = 'rgba(200,149,108,0.04)';
    ctx.beginPath();
    ctx.moveTo(trail[0].x, trail[0].y);
    for (var i = 1; i < len; i++) ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
    ctx.restore();

    // ── PASS 2: Inner glow (batched path) ──
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = w * 2.6;
    ctx.strokeStyle = 'rgba(200,149,108,0.08)';
    ctx.beginPath();
    ctx.moveTo(trail[0].x, trail[0].y);
    for (var i = 1; i < len; i++) ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
    ctx.restore();

    // ── PASS 3: Per-segment metallic body with fading alpha ──
    // Batch every 4 segments that share similar tangent to reduce draw calls
    var BATCH = 4;
    for (var i = 1; i < len; i++) {
      var frac = i / len;              // 0 at tail, 1 at head
      var alpha = frac * frac;         // quadratic ease: tail fades faster

      // Skip nearly invisible segments for performance
      if (alpha < 0.003) continue;

      var a = trail[i - 1];
      var b = trail[i];

      // Width undulation
      var wm = 0.88 + 0.12 * Math.sin(frac * 20 + time * 3 + threadIdx);
      var lw = w * wm;

      // Shadow (offset slightly down-right)
      var shadowA = 0.3 * alpha;
      if (shadowA > 0.01) {
        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineWidth = lw * 1.3;
        ctx.strokeStyle = 'rgba(140,100,30,' + shadowA.toFixed(3) + ')';
        ctx.beginPath();
        ctx.moveTo(a.x + dpr, a.y + 1.5 * dpr);
        ctx.lineTo(b.x + dpr, b.y + 1.5 * dpr);
        ctx.stroke();
        ctx.restore();
      }

      // Main metallic body
      var tang = { x: (a.tx + b.tx) * 0.5, y: (a.ty + b.ty) * 0.5 };
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineWidth = lw;
      ctx.strokeStyle = metallicRGBA(tang, th.hue, 0.82 * alpha);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.restore();

      // Specular highlight (thin bright line offset toward light)
      var dot = tang.x * LX + tang.y * LY;
      var spec = dot * dot * dot * dot; // pow 4
      if (spec > 0.08 && alpha > 0.05) {
        var nx = -tang.y, ny = tang.x;
        var off = lw * 0.22;
        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineWidth = lw * 0.28;
        ctx.strokeStyle = 'rgba(255,240,200,' + (spec * 0.65 * alpha).toFixed(3) + ')';
        ctx.beginPath();
        ctx.moveTo(a.x + nx * off, a.y + ny * off);
        ctx.lineTo(b.x + nx * off, b.y + ny * off);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── Tip sparkle ──
    var tip = trail[len - 1];
    if (Math.random() < 0.55) {
      addSparkle(th, tip.x, tip.y);
    }

    // Draw sparkles
    tickAndDrawSparkles(th);
  }

  // ── Mouse tracking ──
  var mouseX = -1, mouseY = -1;
  var mouseActive = false;
  var smoothCX = 0, smoothCY = 0;

  function onMouseMove(e) {
    mouseX = e.clientX * dpr;
    mouseY = e.clientY * dpr;
    mouseActive = true;
  }
  function onMouseLeave() {
    mouseActive = false;
  }
  function onTouchMove(e) {
    e.preventDefault();
    var t = e.touches[0];
    mouseX = t.clientX * dpr;
    mouseY = t.clientY * dpr;
    mouseActive = true;
  }
  function onTouchStart(e) {
    var t = e.touches[0];
    mouseX = t.clientX * dpr;
    mouseY = t.clientY * dpr;
    mouseActive = true;
  }
  function onTouchEnd() {
    mouseActive = false;
  }

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseleave', onMouseLeave);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);

  // ── State ──
  var threads = [];
  var time = 0;
  var running = true;
  var prevTs = 0;

  function initThreads() {
    threads = [];
    var n = Math.max(2, Math.min(8, Math.round(THREAD_COUNT)));
    for (var i = 0; i < n; i++) threads.push(makeThread(i));
  }
  initThreads();

  // Pre-run to fill trail buffers with initial pattern (~400 entries)
  resize();
  smoothCX = W * 0.5;
  smoothCY = H * 0.5;
  for (var preFrame = 0; preFrame < 400; preFrame++) {
    time += 0.016 * DRAW_SPEED;
    for (var i = 0; i < threads.length; i++) {
      var threadTime = time + i * 0.4;
      updateTrail(threads[i], threadTime);
    }
  }

  // ── Main loop ──
  function frame(ts) {
    if (!running) return;

    if (prevTs === 0) prevTs = ts;
    var dt = Math.min((ts - prevTs) / 1000, 0.05);
    prevTs = ts;
    if (prefersReduced) dt = 0;

    time += dt * DRAW_SPEED;

    if (needsResize) resize();

    // Rebuild threads array if count changed
    if (threads.length !== Math.max(2, Math.min(8, Math.round(THREAD_COUNT)))) {
      initThreads();
    }

    // Update trails with current positions
    for (var i = 0; i < threads.length; i++) {
      var threadTime = time + i * 0.4;
      updateTrail(threads[i], threadTime);
    }

    // Clear completely — no residue possible
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Draw each thread from its trail buffer
    for (var i = 0; i < threads.length; i++) {
      drawThread(threads[i], i);
    }

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  requestAnimationFrame(frame);

  // ── Pause when hidden ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
    if (running) {
      prevTs = 0;
      requestAnimationFrame(frame);
    }
  });

  // ── PostMessage API ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRAW_SPEED': DRAW_SPEED = e.data.value; break;
        case 'THREAD_COUNT': THREAD_COUNT = e.data.value; break;
        case 'SHAPE': SHAPE = e.data.value; initThreads(); time = 0; break;
      }
    }
  });
})();
</script>
</body>
</html>
