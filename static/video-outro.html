<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Outro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Video outro — branded Radiant animation
// Accepts query params: ?name=Shader+Name&url=radiant-shaders.com/shader/id
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  // Parse query params
  var params = new URLSearchParams(window.location.search);
  var shaderName = params.get('name') || 'Radiant';
  var shaderUrl = params.get('url') || 'radiant-shaders.com';

  var W, H;
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Particle system — ambient floating sparkles ──
  var particles = [];
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.2 - Math.random() * 0.4,
      size: 1 + Math.random() * 2,
      alpha: Math.random() * 0.5,
      phase: Math.random() * Math.PI * 2,
      hue: Math.random()
    });
  }

  // ── Animation state ──
  var time = 0;
  var running = true;

  function draw() {
    if (!running) { requestAnimationFrame(draw); return; }
    time += 0.016;

    // ── Background — deep dark with subtle radial warmth ──
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Warm radial glow in center
    var cx = W * 0.5;
    var cy = H * 0.45;
    var glowRadius = Math.min(W, H) * 0.6;
    var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
    glow.addColorStop(0, 'rgba(200, 149, 108, 0.08)');
    glow.addColorStop(0.4, 'rgba(200, 149, 108, 0.03)');
    glow.addColorStop(1, 'rgba(200, 149, 108, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // ── Animated accent lines — subtle radiating from center ──
    ctx.save();
    ctx.translate(cx, cy);
    var lineCount = 12;
    for (var i = 0; i < lineCount; i++) {
      var angle = (i / lineCount) * Math.PI * 2 + time * 0.05;
      var len = 80 + Math.sin(time * 0.8 + i * 1.7) * 30;
      var innerR = 40 + Math.sin(time * 0.5 + i * 0.9) * 10;
      var lineAlpha = 0.04 + Math.sin(time * 1.2 + i * 2.1) * 0.02;

      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      ctx.lineTo(Math.cos(angle) * (innerR + len), Math.sin(angle) * (innerR + len));
      ctx.strokeStyle = 'rgba(200, 149, 108, ' + lineAlpha + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();

    // ── Floating particles ──
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.phase += 0.02;

      // Wrap
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;

      var twinkle = Math.sin(p.phase) * 0.3 + 0.7;
      var alpha = p.alpha * twinkle;

      // Warm amber to white color based on hue
      var r = Math.round(200 + p.hue * 55);
      var g = Math.round(149 + p.hue * 80);
      var b = Math.round(108 + p.hue * 60);

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      ctx.fill();
    }

    // ── Fade-in timing ──
    var fadeIn = Math.min(1, time / 1.0); // 1 second fade in
    var contentAlpha = fadeIn * fadeIn; // ease-in

    // ── "RADIANT" wordmark ──
    ctx.save();
    ctx.globalAlpha = contentAlpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Wordmark
    ctx.font = '500 ' + Math.round(W * 0.06) + 'px "SF Mono", "Fira Code", "Cascadia Code", monospace';
    ctx.letterSpacing = '0.25em';
    ctx.fillStyle = 'rgba(200, 149, 108, 0.9)';
    ctx.fillText('RADIANT', cx, cy - H * 0.06);

    // Subtle line separator
    var lineW = W * 0.15;
    ctx.beginPath();
    ctx.moveTo(cx - lineW, cy);
    ctx.lineTo(cx + lineW, cy);
    ctx.strokeStyle = 'rgba(200, 149, 108, 0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Shader name
    ctx.font = '300 ' + Math.round(W * 0.025) + 'px "SF Mono", "Fira Code", "Cascadia Code", monospace';
    ctx.fillStyle = 'rgba(232, 224, 216, 0.7)';
    ctx.fillText(shaderName, cx, cy + H * 0.04);

    // URL
    var urlFadeIn = Math.min(1, Math.max(0, (time - 0.5) / 0.8));
    ctx.globalAlpha = contentAlpha * urlFadeIn;
    ctx.font = '400 ' + Math.round(W * 0.016) + 'px "SF Mono", "Fira Code", "Cascadia Code", monospace';
    ctx.fillStyle = 'rgba(200, 149, 108, 0.5)';
    ctx.fillText(shaderUrl, cx, cy + H * 0.10);

    ctx.restore();

    // ── Subtle vignette ──
    var vigGrad = ctx.createRadialGradient(cx, H * 0.5, Math.min(W, H) * 0.3, cx, H * 0.5, Math.max(W, H) * 0.8);
    vigGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
    vigGrad.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  document.addEventListener('visibilitychange', function() {
    running = !document.hidden;
  });
})();
</script>
</body>
</html>
