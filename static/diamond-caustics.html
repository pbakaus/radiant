<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Caustics</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Diamond Caustics</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 19 · Diamond Caustics — Prismatic fire through a brilliant-cut diamond
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // URL param for embed scaling
  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_rotationSpeed;',
    'uniform float u_brilliance;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '',
    '// ── Rotation matrix ──',
    'mat2 rot(float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    '// ── Hash for randomness ──',
    'float hash(vec2 p) {',
    '  p = fract(p * vec2(443.897, 441.423));',
    '  p += dot(p, p.yx + 19.19);',
    '  return fract((p.x + p.y) * p.x);',
    '}',
    '',
    '// ── Smooth noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── Hexagonal distance field ──',
    '// Returns (cell center distance, cell ID) for Voronoi-like facets',
    'vec4 hexGrid(vec2 p) {',
    '  // Hexagonal grid constants',
    '  vec2 s = vec2(1.0, 1.7320508); // 1, sqrt(3)',
    '  vec2 h = s * 0.5;',
    '  ',
    '  // Two offset grids',
    '  vec2 a = mod(p, s) - h;',
    '  vec2 b = mod(p - h, s) - h;',
    '  ',
    '  // Pick closest center',
    '  vec2 ga = dot(a, a) < dot(b, b) ? a : b;',
    '  vec2 cellId = p - ga;',
    '  ',
    '  // Hex distance',
    '  vec2 ab = abs(ga);',
    '  float hexDist = max(dot(ab, normalize(vec2(1.0, 1.7320508))), ab.x);',
    '  ',
    '  return vec4(ga, hexDist, hash(cellId));',
    '}',
    '',
    '// ── Triangular grid for facet patterns ──',
    'float triGrid(vec2 p) {',
    '  vec2 q = vec2(p.x + p.y * 0.57735, p.y * 1.1547);',
    '  vec2 i = floor(q);',
    '  vec2 f = fract(q);',
    '  float triId = step(f.x + f.y, 1.0);',
    '  float edge = min(min(f.x, f.y), abs(1.0 - f.x - f.y));',
    '  return edge;',
    '}',
    '',
    '// ── Diamond facet SDF — brilliant cut top-down view ──',
    '// Concentric facet rings like a real brilliant-cut diamond',
    'float brilliantFacets(vec2 uv, float time) {',
    '  float r = length(uv);',
    '  float a = atan(uv.y, uv.x);',
    '  ',
    '  // Table facet (center octagon)',
    '  float table = smoothstep(0.12, 0.11, r);',
    '  ',
    '  // Star facets (8-fold, inner ring)',
    '  float starAngle = mod(a + PI / 8.0, PI / 4.0) - PI / 8.0;',
    '  float starR = r - 0.18;',
    '  float star = abs(starAngle) * 8.0 / PI;',
    '  float starEdge = smoothstep(0.01, 0.0, abs(starR) - star * 0.08);',
    '  ',
    '  // Kite facets (8-fold, main crown)',
    '  float kiteAngle = mod(a, PI / 4.0) - PI / 8.0;',
    '  float kiteEdge = smoothstep(0.01, 0.0, abs(kiteAngle) * r * 6.0 - 0.02);',
    '  float kiteRing = smoothstep(0.01, 0.0, abs(r - 0.28) - 0.005);',
    '  ',
    '  // Upper girdle facets (16-fold)',
    '  float ugAngle = mod(a, PI / 8.0) - PI / 16.0;',
    '  float ugEdge = smoothstep(0.01, 0.0, abs(ugAngle) * r * 10.0 - 0.02);',
    '  float ugRing = smoothstep(0.01, 0.0, abs(r - 0.38) - 0.005);',
    '  ',
    '  // Girdle outline',
    '  float girdle = smoothstep(0.01, 0.0, abs(r - 0.45) - 0.008);',
    '  ',
    '  // Combine facet edges',
    '  float edges = max(max(starEdge, kiteEdge), max(ugEdge, girdle));',
    '  edges = max(edges, kiteRing);',
    '  edges = max(edges, ugRing);',
    '  ',
    '  // Radial lines every 22.5 degrees (16-fold symmetry)',
    '  float radial16 = mod(a, PI / 8.0) - PI / 16.0;',
    '  float radLine16 = smoothstep(0.008, 0.0, abs(radial16) * r * 4.0 - 0.004);',
    '  radLine16 *= step(0.12, r) * step(r, 0.46);',
    '  ',
    '  // Radial lines every 45 degrees (8-fold)',
    '  float radial8 = mod(a + PI / 8.0, PI / 4.0) - PI / 8.0;',
    '  float radLine8 = smoothstep(0.006, 0.0, abs(radial8) * r * 5.0 - 0.003);',
    '  radLine8 *= step(0.12, r) * step(r, 0.46);',
    '  ',
    '  edges = max(edges, max(radLine16 * 0.5, radLine8));',
    '  ',
    '  return edges;',
    '}',
    '',
    '// ── Prismatic spectral color from wavelength ──',
    '// More physically-based spectral mapping for diamond fire',
    'vec3 spectral(float t) {',
    '  t = fract(t);',
    '  vec3 c = vec3(0.0);',
    '  // Red',
    '  c.r = smoothstep(0.0, 0.15, t) - smoothstep(0.35, 0.5, t);',
    '  c.r += smoothstep(0.8, 0.95, t);',
    '  // Green',
    '  c.g = smoothstep(0.15, 0.35, t) - smoothstep(0.55, 0.75, t);',
    '  // Blue',
    '  c.b = smoothstep(0.4, 0.6, t) - smoothstep(0.75, 0.95, t);',
    '  // Boost intensity',
    '  c = pow(c, vec3(0.8));',
    '  return c * 1.5;',
    '}',
    '',
    '// ── Diamond caustic: light concentration through faceted refraction ──',
    'float diamondCaustic(vec2 uv, float time, float scale, float rotation) {',
    '  vec2 p = rot(rotation) * uv * scale;',
    '  ',
    '  // Hexagonal Voronoi for facet structure',
    '  vec4 hex = hexGrid(p);',
    '  float cellRand = hex.w;',
    '  ',
    '  // Each facet refracts light at its own angle',
    '  // The refraction angle changes slowly as the diamond "rotates"',
    '  float facetAngle = cellRand * TAU + time * 0.3;',
    '  vec2 refract = vec2(cos(facetAngle), sin(facetAngle)) * 0.3;',
    '  ',
    '  // Displaced coordinates — where light ends up after refraction',
    '  vec2 displaced = p + refract * (1.0 + 0.5 * sin(time * 0.7 + cellRand * 10.0));',
    '  ',
    '  // Second layer of facet structure on displaced coords',
    '  vec4 hex2 = hexGrid(displaced * 1.5);',
    '  ',
    '  // Caustic brightness = how much the mapping compresses space',
    '  // Bright where multiple input rays converge to same output point',
    '  float edgeDist = hex.z;',
    '  float caustic = 1.0 - smoothstep(0.0, 0.4, edgeDist);',
    '  ',
    '  // Sharp bright folds from displaced field',
    '  float fold = 1.0 - smoothstep(0.0, 0.25, hex2.z);',
    '  fold = pow(fold, 2.0);',
    '  ',
    '  // Interference between original and refracted patterns',
    '  float interference = sin(displaced.x * 8.0 + time * 0.5) * sin(displaced.y * 8.0 - time * 0.4);',
    '  interference = pow(abs(interference), 1.5) * 0.5;',
    '  ',
    '  return caustic * 0.3 + fold * 0.5 + interference * 0.2;',
    '}',
    '',
    '// ── Scintillation: the sparkle flashes of a diamond ──',
    'float scintillation(vec2 uv, float time) {',
    '  float sparkle = 0.0;',
    '  ',
    '  // Multiple scales of sparkle points',
    '  for (float i = 0.0; i < 3.0; i++) {',
    '    float sc = 5.0 + i * 4.0;',
    '    vec2 grid = floor(uv * sc);',
    '    vec2 f = fract(uv * sc) - 0.5;',
    '    ',
    '    float h = hash(grid + i * 100.0);',
    '    float phase = h * TAU + time * (1.5 + h * 2.0);',
    '    ',
    '    // Sharp, brief flashes — like catching light on a facet edge',
    '    float flash = pow(max(sin(phase), 0.0), 32.0);',
    '    ',
    '    // Only at the cell center',
    '    float dist = length(f);',
    '    float point = smoothstep(0.15, 0.0, dist);',
    '    ',
    '    sparkle += flash * point * (1.0 - i * 0.25);',
    '  }',
    '  ',
    '  return sparkle;',
    '}',
    '',
    '// ── Star burst for bright sparkle highlights ──',
    'float starBurst(vec2 uv, float time) {',
    '  float r = length(uv);',
    '  float a = atan(uv.y, uv.x);',
    '  ',
    '  // 4-point star',
    '  float star4 = pow(abs(cos(a * 2.0)), 64.0) / (r * 20.0 + 1.0);',
    '  // 6-point star',
    '  float star6 = pow(abs(cos(a * 3.0)), 64.0) / (r * 25.0 + 1.0);',
    '  ',
    '  return (star4 + star6 * 0.5) * smoothstep(0.5, 0.0, r);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '  float rotSpeed = u_rotationSpeed;',
    '  float brilliance = u_brilliance;',
    '  ',
    '  // ── Gentle overall rotation to simulate diamond turning in light ──',
    '  float globalRot = t * rotSpeed * 0.1;',
    '  vec2 uvRot = rot(globalRot) * uv;',
    '  ',
    '  // ════════════════════════════════════════════',
    '  // LAYER 1: Faceted crystalline geometry',
    '  // The underlying diamond structure',
    '  // ════════════════════════════════════════════',
    '  ',
    '  // Brilliant-cut facet pattern (subtle structural overlay)',
    '  float facetPattern = brilliantFacets(uvRot * 2.2, t);',
    '  ',
    '  // Triangular facet grid at multiple scales',
    '  float tri1 = triGrid(rot(t * 0.05) * uv * 8.0);',
    '  float tri2 = triGrid(rot(-t * 0.07 + 1.0) * uv * 12.0);',
    '  float triEdges = smoothstep(0.04, 0.0, tri1) * 0.3 + smoothstep(0.03, 0.0, tri2) * 0.15;',
    '  ',
    '  // Hexagonal facet structure — very subtle, just edge hints',
    '  vec4 mainHex = hexGrid(rot(t * 0.06) * uv * 6.0);',
    '  float hexEdges = smoothstep(0.44, 0.40, mainHex.z) - smoothstep(0.40, 0.36, mainHex.z);',
    '  float hexOutline = smoothstep(0.45, 0.43, mainHex.z) - smoothstep(0.43, 0.41, mainHex.z);',
    '  ',
    '  // ════════════════════════════════════════════',
    '  // LAYER 2: Caustic light patterns — the "fire"',
    '  // Light concentrating through faceted refraction',
    '  // ════════════════════════════════════════════',
    '  ',
    '  // Multiple caustic layers at different scales and rotations',
    '  // Simulates light from crown facets, pavilion facets, and girdle',
    '  float c1 = diamondCaustic(uv, t, 3.0, t * rotSpeed * 0.15);',
    '  float c2 = diamondCaustic(uv, t * 1.1 + 10.0, 5.0, -t * rotSpeed * 0.12 + PI * 0.3);',
    '  float c3 = diamondCaustic(uv, t * 0.9 + 20.0, 8.0, t * rotSpeed * 0.08 + PI * 0.7);',
    '  ',
    '  float caustics = c1 * 0.5 + c2 * 0.3 + c3 * 0.2;',
    '  caustics = pow(caustics, 1.5) * 2.0;',
    '  ',
    '  // ════════════════════════════════════════════',
    '  // LAYER 3: Chromatic dispersion — prismatic rainbow',
    '  // Each wavelength refracts at a different angle',
    '  // ════════════════════════════════════════════',
    '  ',
    '  // Sample caustics with wavelength-dependent offsets',
    '  // This creates the rainbow fringing that diamonds are famous for',
    '  float dispersion = 0.018 * (1.0 + caustics * 0.3);',
    '  float dispAngle = t * rotSpeed * 0.3 + atan(uv.y, uv.x) * 0.5;',
    '  ',
    '  // Red channel — longest wavelength, least refraction',
    '  vec2 rOff = vec2(cos(dispAngle), sin(dispAngle)) * dispersion;',
    '  float cR = diamondCaustic(uv + rOff, t, 3.0, t * rotSpeed * 0.15);',
    '  cR += diamondCaustic(uv + rOff, t * 1.1 + 10.0, 5.0, -t * rotSpeed * 0.12 + PI * 0.3) * 0.6;',
    '  ',
    '  // Green channel — middle wavelength',
    '  vec2 gOff = vec2(cos(dispAngle + TAU / 3.0), sin(dispAngle + TAU / 3.0)) * dispersion;',
    '  float cG = diamondCaustic(uv + gOff, t, 3.0, t * rotSpeed * 0.15);',
    '  cG += diamondCaustic(uv + gOff, t * 1.1 + 10.0, 5.0, -t * rotSpeed * 0.12 + PI * 0.3) * 0.6;',
    '  ',
    '  // Blue channel — shortest wavelength, most refraction',
    '  vec2 bOff = vec2(cos(dispAngle + TAU * 2.0 / 3.0), sin(dispAngle + TAU * 2.0 / 3.0)) * dispersion;',
    '  float cB = diamondCaustic(uv + bOff, t, 3.0, t * rotSpeed * 0.15);',
    '  cB += diamondCaustic(uv + bOff, t * 1.1 + 10.0, 5.0, -t * rotSpeed * 0.12 + PI * 0.3) * 0.6;',
    '  ',
    '  // Chromatic difference — where colors separate, we see rainbow',
    '  vec3 chromatic = vec3(cR, cG, cB);',
    '  float chrDiff = abs(cR - cG) + abs(cG - cB) + abs(cB - cR);',
    '  ',
    '  // ════════════════════════════════════════════',
    '  // LAYER 4: Spectral fire — the colored flashes',
    '  // ════════════════════════════════════════════',
    '  ',
    '  // Phase-based spectral color at each point',
    '  float specPhase = atan(cR - cG, cG - cB) / TAU + 0.5;',
    '  specPhase += t * 0.03 + length(uv) * 0.5;',
    '  vec3 fireColor = spectral(specPhase);',
    '  ',
    '  // Second spectral layer — broader patches of color',
    '  float specPhase2 = noise(uvRot * 3.0 + t * 0.2) + t * 0.05;',
    '  vec3 fireColor2 = spectral(specPhase2);',
    '  ',
    '  // ════════════════════════════════════════════',
    '  // LAYER 5: Scintillation — point sparkles',
    '  // ════════════════════════════════════════════',
    '  ',
    '  float sparkle = scintillation(uvRot, t * rotSpeed);',
    '  ',
    '  // Star bursts at bright caustic nodes',
    '  float starTotal = 0.0;',
    '  for (float i = 0.0; i < 4.0; i++) {',
    '    float sc = 4.0 + i * 3.0;',
    '    vec2 grid = floor(rot(i * 0.7 + t * 0.03) * uv * sc);',
    '    vec2 center = (grid + 0.5) / sc;',
    '    center = rot(-i * 0.7 - t * 0.03) * center;',
    '    float h = hash(grid + i * 77.0);',
    '    float phase = h * TAU + t * (1.0 + h);',
    '    float flash = pow(max(sin(phase), 0.0), 24.0);',
    '    float star = starBurst((uv - center) * sc * 0.8, t) * flash;',
    '    starTotal += star * 0.15;',
    '  }',
    '  ',
    '  // ════════════════════════════════════════════',
    '  // COMPOSITING — build the final diamond look',
    '  // ════════════════════════════════════════════',
    '  ',
    '  vec3 col = vec3(0.0);',
    '  ',
    '  // Base: cool white caustic light (diamond brilliance)',
    '  vec3 whiteLight = vec3(0.92, 0.95, 1.0);',
    '  col += whiteLight * caustics * 0.6;',
    '  ',
    '  // Chromatic caustics — subtle separation gives depth',
    '  col += chromatic * 0.2 * brilliance;',
    '  ',
    '  // Prismatic fire — rainbow colors at edges of caustic folds',
    '  float fireMask = smoothstep(0.03, 0.25, chrDiff) * caustics;',
    '  col += fireColor * fireMask * 1.0 * brilliance;',
    '  col += fireColor2 * caustics * 0.2 * brilliance;',
    '  ',
    '  // Facet geometry overlay — ghost-like structural hints visible only in bright areas',
    '  vec3 facetColor = vec3(0.7, 0.75, 0.85);',
    '  float structureMask = smoothstep(0.1, 0.5, caustics);',
    '  col += facetColor * facetPattern * 0.04 * structureMask;',
    '  col += facetColor * triEdges * hexEdges * 0.03 * (0.3 + structureMask * 0.7);',
    '  col += vec3(0.8, 0.85, 0.95) * hexOutline * 0.025 * (0.2 + structureMask * 0.8);',
    '  ',
    '  // Scintillation sparkles — bright white flashes',
    '  vec3 sparkleColor = vec3(1.0, 0.98, 0.95);',
    '  col += sparkleColor * sparkle * 1.5 * brilliance;',
    '  ',
    '  // Star bursts with spectral color',
    '  float starSpec = fract(t * 0.15 + starTotal * 2.0);',
    '  col += mix(vec3(1.0, 0.97, 0.92), spectral(starSpec), 0.3) * starTotal * 1.2 * brilliance;',
    '  ',
    '  // ── Warm amber base tone — consistent with gallery palette ──',
    '  vec3 amber = vec3(0.78, 0.58, 0.42);',
    '  col += amber * caustics * 0.08;',
    '  ',
    '  // ── Center diamond brilliance — brighter toward center ──',
    '  float centerGlow = smoothstep(0.6, 0.0, length(uv));',
    '  col *= 0.7 + centerGlow * 0.6;',
    '  ',
    '  // ── Occasional intense fire flash — "hearts and arrows" ──',
    '  float flashPhase = sin(t * rotSpeed * 1.7 + uvRot.x * 4.0) *',
    '                     cos(t * rotSpeed * 2.3 + uvRot.y * 3.0);',
    '  float intenseFlash = pow(max(flashPhase, 0.0), 12.0) * 2.0;',
    '  float flashSpec = fract(t * 0.2 + atan(uvRot.y, uvRot.x) / TAU);',
    '  col += spectral(flashSpec) * intenseFlash * centerGlow * brilliance;',
    '  ',
    '  // ── Subtle animated prismatic sweep — light moving across diamond ──',
    '  float sweep = sin(uv.x * 3.0 + uv.y * 2.0 + t * rotSpeed * 0.5);',
    '  sweep = pow(max(sweep, 0.0), 4.0) * 0.15;',
    '  col += spectral(t * 0.1 + uv.x * 0.3) * sweep * brilliance;',
    '  ',
    '  // ── Vignette — darker at edges ──',
    '  float vig = 1.0 - dot(uv, uv) * 0.5;',
    '  vig = max(vig, 0.0);',
    '  col *= vig;',
    '  ',
    '  // ── Tone mapping — preserve sparkle peaks ──',
    '  col = 1.0 - exp(-col * 1.5);',
    '  ',
    '  // ── Slight cool-warm contrast ──',
    '  col = pow(col, vec3(0.97, 0.98, 1.03));',
    '  ',
    '  // ── Minimum ambient so dark areas read as very dark, not pure black ──',
    '  col += vec3(0.008, 0.008, 0.012);',
    '  ',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRotationSpeed = gl.getUniformLocation(prog, 'u_rotationSpeed');
  var uBrilliance = gl.getUniformLocation(prog, 'u_brilliance');

  var rotationSpeedVal = 0.5;
  var brillianceVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uRotationSpeed, rotationSpeedVal);
    gl.uniform1f(uBrilliance, brillianceVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'ROTATION_SPEED': rotationSpeedVal = e.data.value; break;
        case 'BRILLIANCE': brillianceVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
