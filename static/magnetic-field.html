<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Magnetic Field</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Magnetic Field — Dipole field lines with silk glow
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_waveSpeed;',
    'uniform float u_lineCount;',
    'uniform vec2 u_mouse;',
    '',
    '#define S smoothstep',
    '#define PI 3.14159265',
    '',
    '// ── Hash for noise ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// Rotate 2D',
    'vec2 rot(vec2 p, float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return vec2(p.x * c - p.y * s, p.x * s + p.y * c);',
    '}',
    '',
    '// Analytical dipole field line distance.',
    '// Field lines satisfy: r = R_k * sin^2(theta) in polar coords.',
    '// For a pixel at (r, theta), the field line passing through it has R = r / sin^2(theta).',
    '// We quantize R into discrete lines and measure how far this pixel is from the nearest one.',
    'float fieldLineGlow(vec2 lp, float numLines, float t) {',
    '  float r = length(lp);',
    '  if (r < 0.01) return 0.0;',
    '  float theta = atan(abs(lp.y), lp.x);',
    '',
    '  // Avoid singularity at theta=0 and theta=PI',
    '  float sinT = sin(theta);',
    '  if (sinT < 0.05) return 0.0;',
    '',
    '  // The field line constant for this pixel',
    '  float R = r / (sinT * sinT);',
    '',
    '  // Quantize into discrete field lines',
    '  float spacing = 0.8 / numLines;',
    '  float lineIdx = R / spacing;',
    '  float nearest = floor(lineIdx + 0.5) * spacing;',
    '',
    '  // Distance in R-space, convert to approximate screen distance',
    '  float dR = abs(R - nearest);',
    '  // dr/dR at this theta: dr = sin^2(theta) * dR',
    '  float screenDist = dR * sinT * sinT;',
    '',
    '  // Silk-style glow: thin bright core with edge fade',
    '  float lw = 0.06 * S(0.05, 0.5, r);',
    '  float l = S(lw, 0.0, screenDist - 0.004);',
    '',
    '  // Fade at extremities',
    '  float fade = S(0.9, 0.2, r) * S(0.0, 0.05, sinT);',
    '',
    '  // Energy pulse flowing along the field lines (theta = path parameter)',
    '  float pulse = pow(sin(theta * 3.0 - t * 1.5) * 0.5 + 0.5, 3.0);',
    '  float brightness = 0.4 + pulse * 0.6;',
    '',
    '  return l * fade * brightness;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;',
    '  float t = u_time * u_waveSpeed;',
    '',
    '  // Poles — mouse rotates the dipole axis',
    '  float poleAngle = 0.0;',
    '  if (u_mouse.x > 0.0) {',
    '    vec2 mUV = (u_mouse - 0.5 * u_res.xy) / u_res.y;',
    '    poleAngle = atan(mUV.y, mUV.x);',
    '  }',
    '  vec2 pole1 = vec2(cos(poleAngle), sin(poleAngle)) * -0.3;',
    '  vec2 pole2 = vec2(cos(poleAngle), sin(poleAngle)) * 0.3;',
    '  vec2 center = vec2(0.0);',
    '  vec2 axis = normalize(pole2 - pole1);',
    '',
    '  // Transform uv into dipole-local coords (axis-aligned)',
    '  vec2 lp = uv - center;',
    '  lp = vec2(dot(lp, axis), dot(lp, vec2(-axis.y, axis.x)));',
    '',
    '  // Noise perturbation',
    '  float n = noise(vec2(lp.x * 3.0, t * 0.1)) * 0.01;',
    '  lp += vec2(n, n * 0.5);',
    '',
    '  float numLines = u_lineCount;',
    '',
    '  // Compute glow for both halves of the dipole (y>0 and y<0)',
    '  // Upper half',
    '  float glow1 = fieldLineGlow(lp, numLines, t);',
    '  // Lower half (mirror)',
    '  float glow2 = fieldLineGlow(vec2(lp.x, -lp.y), numLines, t);',
    '  float glow = max(glow1, glow2);',
    '',
    '',
    '  // Color: warm amber gradient based on position',
    '  float r = length(uv);',
    '  float angle = atan(lp.y, lp.x) / PI;',
    '  vec3 lineCol = vec3(',
    '    0.35 + abs(angle) * 0.55,',
    '    0.25 + abs(angle) * 0.3,',
    '    0.3 + (1.0 - abs(angle)) * 0.1',
    '  );',
    '',
    '  vec3 col = glow * lineCol;',
    '',
    '  // Subtle glow at poles',
    '  float g1 = 0.006 / (length(uv - pole1) + 0.01);',
    '  float g2 = 0.006 / (length(uv - pole2) + 0.01);',
    '  col += vec3(0.9, 0.6, 0.3) * (g1 + g2) * 0.12;',
    '',
    '  // ── Vignette ──',
    '  float vig = 1.0 - dot(uv, uv) * 0.4;',
    '  col *= max(vig, 0.0);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uWaveSpeed = gl.getUniformLocation(prog, 'u_waveSpeed');
  var uLineCount = gl.getUniformLocation(prog, 'u_lineCount');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var mouseXVal = -1.0, mouseYVal = -1.0;

  canvas.addEventListener('mousemove', function(e) {
    mouseXVal = e.clientX * dpr;
    mouseYVal = (canvas.clientHeight - e.clientY) * dpr;
  });
  canvas.addEventListener('mouseleave', function() {
    mouseXVal = -1.0; mouseYVal = -1.0;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    mouseXVal = -1.0; mouseYVal = -1.0;
  });

  var waveSpeedVal = 1.0;
  var lineCountVal = 8.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;
  var needsResize = true;
  var running = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uWaveSpeed, waveSpeedVal);
    gl.uniform1f(uLineCount, lineCountVal);
    gl.uniform2f(uMouse, mouseXVal, mouseYVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'WAVE_SPEED': waveSpeedVal = e.data.value; break;
        case 'LINE_COUNT': lineCountVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
