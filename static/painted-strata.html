<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painted Strata</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Painted Strata</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Golden Sediment — Layered sedimentary strata with tectonic deformation
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_foldSpeed;',
    'uniform float u_layerCount;',
    'uniform vec2 u_mouse;',
    '',
    '// ── Hash functions ──',
    'float hash11(float p) {',
    '  p = fract(p * 0.1031);',
    '  p *= p + 33.33;',
    '  p *= p + p;',
    '  return fract(p);',
    '}',
    '',
    'float hash21(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    'vec2 hash22(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.xx + p3.yz) * p3.zy);',
    '}',
    '',
    '// ── Simplex-like value noise ──',
    'float vnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash21(i);',
    '  float b = hash21(i + vec2(1.0, 0.0));',
    '  float c = hash21(i + vec2(0.0, 1.0));',
    '  float d = hash21(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── FBM ──',
    'float fbm(vec2 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  vec2 shift = vec2(100.0);',
    '  mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * vnoise(p);',
    '    p = rot * p * 2.0 + shift;',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Domain warp for tectonic deformation ──',
    'vec2 tectonicWarp(vec2 uv, float t) {',
    '  float slow = t * 0.15;',
    '  // Large-scale folding',
    '  float warpX = fbm(uv * 1.5 + vec2(slow * 0.7, slow * 0.3)) - 0.5;',
    '  float warpY = fbm(uv * 1.5 + vec2(slow * 0.5 + 50.0, slow * 0.8 + 30.0)) - 0.5;',
    '  // Compression waves',
    '  float compress = sin(uv.x * 2.0 + slow * 0.4) * 0.08;',
    '  // Shearing',
    '  float shear = sin(uv.y * 3.0 + slow * 0.6) * 0.06;',
    '  return vec2(',
    '    uv.x + warpX * 0.25 + shear,',
    '    uv.y + warpY * 0.18 + compress',
    '  );',
    '}',
    '',
    '// ── Layer boundary function ──',
    'float layerBoundary(float x, float baseY, float idx, float t) {',
    '  float h1 = hash11(idx * 7.13);',
    '  float h2 = hash11(idx * 13.37);',
    '  float h3 = hash11(idx * 23.71);',
    '  float freq1 = 1.5 + h1 * 2.5;',
    '  float freq2 = 3.0 + h2 * 3.0;',
    '  float amp1 = 0.04 + h1 * 0.06;',
    '  float amp2 = 0.015 + h2 * 0.025;',
    '  float phase1 = t * (0.1 + h3 * 0.15);',
    '  float phase2 = t * (0.08 + h1 * 0.12);',
    '  // Main fold',
    '  float fold = amp1 * sin(x * freq1 + phase1 + h2 * 6.28);',
    '  // Secondary ripple',
    '  fold += amp2 * sin(x * freq2 + phase2 + h3 * 6.28);',
    '  // Noise-based deformation for organic feel',
    '  fold += 0.02 * vnoise(vec2(x * 4.0 + h1 * 100.0, t * 0.2 + idx));',
    '  return baseY + fold;',
    '}',
    '',
    '// ── Earth tone palette ──',
    'vec3 stratumColor(float idx, float maxLayers) {',
    '  // 7 earth tone colors',
    '  vec3 colors[7];',
    '  colors[0] = vec3(145.0, 105.0, 60.0) / 255.0;   // Warm umber',
    '  colors[1] = vec3(190.0, 155.0, 105.0) / 255.0;  // Muted amber',
    '  colors[2] = vec3(215.0, 195.0, 155.0) / 255.0;  // Parchment',
    '  colors[3] = vec3(225.0, 205.0, 165.0) / 255.0;  // Pale straw',
    '  colors[4] = vec3(115.0, 85.0, 55.0) / 255.0;    // Dark walnut',
    '  colors[5] = vec3(165.0, 120.0, 75.0) / 255.0;   // Soft sienna',
    '  colors[6] = vec3(230.0, 218.0, 190.0) / 255.0;  // Warm cream',
    '  // Pick from palette using hashed index',
    '  float h = hash11(idx * 17.31 + 3.7);',
    '  int ci = int(mod(floor(h * 7.0), 7.0));',
    '  vec3 base;',
    '  if (ci == 0) base = colors[0];',
    '  else if (ci == 1) base = colors[1];',
    '  else if (ci == 2) base = colors[2];',
    '  else if (ci == 3) base = colors[3];',
    '  else if (ci == 4) base = colors[4];',
    '  else if (ci == 5) base = colors[5];',
    '  else base = colors[6];',
    '  // Slight per-layer variation',
    '  float h2 = hash11(idx * 31.17);',
    '  base += (h2 - 0.5) * 0.06;',
    '  return base;',
    '}',
    '',
    '// ── Grain texture per layer — washi paper fibers ──',
    'float grainTexture(vec2 uv, float layerIdx) {',
    '  float h = hash11(layerIdx * 41.93);',
    '  float h2 = hash11(layerIdx * 67.19);',
    '  float intensity = 0.0;',
    '  // Primary fiber direction per layer (varies by layer)',
    '  float fiberAngle = h * 3.14 * 0.3;',
    '  float ca = cos(fiberAngle), sa = sin(fiberAngle);',
    '  vec2 rotUV = vec2(uv.x * ca - uv.y * sa, uv.x * sa + uv.y * ca);',
    '  // Long directional fibers (stretched noise)',
    '  float fiber1 = vnoise(vec2(rotUV.x * 120.0, rotUV.y * 18.0) + layerIdx * 30.0);',
    '  float fiber2 = vnoise(vec2(rotUV.x * 80.0, rotUV.y * 12.0) + layerIdx * 50.0 + 100.0);',
    '  intensity = fiber1 * 0.08 + fiber2 * 0.05;',
    '  // Softer cross-fibers',
    '  float cross = vnoise(vec2(rotUV.x * 15.0, rotUV.y * 70.0) + layerIdx * 40.0);',
    '  intensity += cross * 0.03;',
    '  // Subtle overall paper texture',
    '  intensity += vnoise(uv * 50.0 + layerIdx * 25.0) * 0.025;',
    '  return intensity - 0.04;',
    '}',
    '',
    '// ── Crystalline sparkles ──',
    'float sparkle(vec2 uv, float t, float layerIdx) {',
    '  float h = hash11(layerIdx * 53.71);',
    '  // Only some layers have crystals',
    '  if (h < 0.4) return 0.0;',
    '  float density = 60.0 + h * 80.0;',
    '  vec2 cell = floor(uv * density);',
    '  vec2 cellHash = hash22(cell + layerIdx * 7.0);',
    '  // Position within cell',
    '  vec2 cellUV = fract(uv * density);',
    '  vec2 sparklePos = cellHash;',
    '  float dist = length(cellUV - sparklePos);',
    '  // Time-varying twinkle',
    '  float phase = cellHash.x * 6.28 + cellHash.y * 3.14;',
    '  float twinkle = sin(t * (2.0 + cellHash.x * 4.0) + phase);',
    '  float threshold = 0.7 + twinkle * 0.25;',
    '  float sparkleVal = smoothstep(threshold, threshold + 0.05, cellHash.x * cellHash.y + 0.3);',
    '  // Sharp point of light',
    '  sparkleVal *= smoothstep(0.06, 0.01, dist);',
    '  return sparkleVal * 0.8;',
    '}',
    '',
    '// ── Cross-cutting faults ──',
    'float faultDisplacement(vec2 uv, float t) {',
    '  float totalDisp = 0.0;',
    '  // 3 fault lines',
    '  for (int i = 0; i < 3; i++) {',
    '    float fi = float(i);',
    '    float h1 = hash11(fi * 71.13 + 5.0);',
    '    float h2 = hash11(fi * 97.31 + 11.0);',
    '    float h3 = hash11(fi * 37.71 + 17.0);',
    '    // Fault line: diagonal line across the view',
    '    float angle = 0.5 + h1 * 1.2;  // 30-90 degrees',
    '    float offset = h2 * 2.0 - 1.0;',
    '    float ca = cos(angle), sa = sin(angle);',
    '    float lineVal = (uv.x - 0.5) * ca + (uv.y - 0.5) * sa + offset * 0.3;',
    '    // Add noise to make fault line irregular',
    '    lineVal += vnoise(vec2(uv.x * 8.0 + fi * 50.0, uv.y * 8.0 + t * 0.05)) * 0.02;',
    '    // Sharp step with thin transition',
    '    float faultWidth = 0.003 + h3 * 0.004;',
    '    float side = smoothstep(-faultWidth, faultWidth, lineVal);',
    '    // Displacement amount varies slowly with time',
    '    float dispAmount = (0.01 + h3 * 0.02) * sin(t * 0.08 + fi * 2.0);',
    '    totalDisp += side * dispAmount;',
    '  }',
    '  return totalDisp;',
    '}',
    '',
    '// ── Fault line visibility (thin dark lines) ──',
    'float faultLine(vec2 uv, float t) {',
    '  float line = 0.0;',
    '  for (int i = 0; i < 3; i++) {',
    '    float fi = float(i);',
    '    float h1 = hash11(fi * 71.13 + 5.0);',
    '    float h2 = hash11(fi * 97.31 + 11.0);',
    '    float angle = 0.5 + h1 * 1.2;',
    '    float offset = h2 * 2.0 - 1.0;',
    '    float ca = cos(angle), sa = sin(angle);',
    '    float lineVal = (uv.x - 0.5) * ca + (uv.y - 0.5) * sa + offset * 0.3;',
    '    lineVal += vnoise(vec2(uv.x * 8.0 + fi * 50.0, uv.y * 8.0 + t * 0.05)) * 0.02;',
    '    // Thin dark line at fault',
    '    float faultVis = 1.0 - smoothstep(0.0, 0.004, abs(lineVal));',
    '    line = max(line, faultVis * 0.4);',
    '  }',
    '  return line;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 uvAspect = vec2(uv.x * aspect, uv.y);',
    '',
    '  float t = u_time * u_foldSpeed;',
    '  float layerCount = floor(u_layerCount);',
    '',
    '  // Apply tectonic domain warp',
    '  vec2 warped = tectonicWarp(uvAspect, t);',
    '',
    '  // Mouse parallax offset (each layer shifts differently)',
    '  vec2 mOff = vec2(0.0);',
    '  if (u_mouse.x >= 0.0) {',
    '    mOff = (u_mouse - 0.5) * vec2(-0.12, -0.06);',
    '  }',
    '',
    '  // Determine which layer this pixel is in',
    '  float layerSpacing = 1.0 / (layerCount + 1.0);',
    '  float currentLayer = -1.0;',
    '  float layerPos = 0.0;  // 0-1 position within current layer',
    '',
    '  // Compute boundaries and find current layer',
    '  float prevBound = -0.2;  // below screen',
    '  for (int i = 0; i < 24; i++) {',
    '    if (float(i) >= layerCount) break;',
    '    float fi = float(i);',
    '    float baseY = (fi + 1.0) * layerSpacing;',
    '    // Per-layer parallax: deeper layers shift more',
    '    float layerDepth = fi / layerCount;',
    '    float px = warped.x + mOff.x * (0.3 + layerDepth * 1.5);',
    '    float bound = layerBoundary(px, baseY, fi, t);',
    '    bound += mOff.y * (0.1 + layerDepth * 0.4);',
    '    if (warped.y >= prevBound && warped.y < bound) {',
    '      currentLayer = fi;',
    '      float thickness = bound - prevBound;',
    '      layerPos = (warped.y - prevBound) / max(thickness, 0.001);',
    '      break;',
    '    }',
    '    prevBound = bound;',
    '  }',
    '  // Top layer catches everything above last boundary',
    '  if (currentLayer < 0.0) {',
    '    currentLayer = layerCount;',
    '    layerPos = 0.5;',
    '  }',
    '',
    '  // Get stratum color',
    '  vec3 col = stratumColor(currentLayer, layerCount);',
    '',
    '  // Add grain texture',
    '  float grain = grainTexture(warped, currentLayer);',
    '  col += grain;',
    '',
    '  // Subtle shading at layer boundaries (darker at edges, lighter in middle)',
    '  float edgeShade = smoothstep(0.0, 0.15, layerPos) * smoothstep(1.0, 0.85, layerPos);',
    '  col *= 0.85 + 0.15 * edgeShade;',
    '',
    '  // Paper edge shadow — soft shadow at bottom of each layer',
    '  float edgeShadow = smoothstep(0.0, 0.08, layerPos);',
    '  col *= 0.82 + 0.18 * edgeShadow;',
    '  // Slight highlight at top edge (paper catching light)',
    '  float topHighlight = smoothstep(1.0, 0.92, layerPos);',
    '  col += vec3(0.04, 0.035, 0.025) * (1.0 - topHighlight);',
    '',
    '  // Subtle vignette',
    '  float vig = 1.0 - 0.3 * length((uv - 0.5) * 1.5);',
    '  col *= vig;',
    '',
    '  // Overall paper texture overlay (uniform across all layers)',
    '  float paperTex = vnoise(gl_FragCoord.xy * 0.15) * 0.03;',
    '  paperTex += (hash21(gl_FragCoord.xy + fract(u_time * 0.1) * 1000.0) - 0.5) * 0.015;',
    '  col += paperTex;',
    '',
    '  // Slightly desaturate for natural dyed paper feel',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  col = mix(vec3(lum), col, 0.82);',
    '',
    '  // Warm tone adjustment',
    '  col = pow(col, vec3(0.95, 1.0, 1.08));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFoldSpeed = gl.getUniformLocation(prog, 'u_foldSpeed');
  var uLayerCount = gl.getUniformLocation(prog, 'u_layerCount');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var foldSpeedVal = 0.5;
  var layerCountVal = 16.0;
  var mouseX = -1.0, mouseY = -1.0;
  var smoothMX = -1.0, smoothMY = -1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var needsResize = true;
  var running = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uFoldSpeed, foldSpeedVal);
    gl.uniform1f(uLayerCount, layerCountVal);
    if (mouseX >= 0.0) {
      smoothMX += (mouseX - smoothMX) * 0.06;
      smoothMY += (mouseY - smoothMY) * 0.06;
    } else {
      smoothMX = -1.0; smoothMY = -1.0;
    }
    gl.uniform2f(uMouse, smoothMX, smoothMY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  canvas.addEventListener('mousemove', function (e) {
    mouseX = e.clientX / canvas.clientWidth;
    mouseY = 1.0 - e.clientY / canvas.clientHeight;
  });
  canvas.addEventListener('mouseleave', function () {
    mouseX = -1.0; mouseY = -1.0;
  });
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseX = touch.clientX / canvas.clientWidth;
    mouseY = 1.0 - touch.clientY / canvas.clientHeight;
  }, { passive: false });
  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseX = touch.clientX / canvas.clientWidth;
    mouseY = 1.0 - touch.clientY / canvas.clientHeight;
  }, { passive: false });
  canvas.addEventListener('touchend', function () {
    mouseX = -1.0; mouseY = -1.0;
  });

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FOLD_SPEED': foldSpeedVal = e.data.value; break;
        case 'LAYER_COUNT': layerCountVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
