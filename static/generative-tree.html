<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Branching Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">04 / Generative Tree</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Branch data structure ----
  // Each branch: { x0, y0, angle, length, thickness, depth, growthProgress (0-1),
  //                growthSpeed, children: [], spawned: false, swayOffset, swayAmp }

  let MAX_DEPTH = 9;
  let GROWTH_SPEED_BASE = 0.008;
  const TRUNK_THICKNESS = 0;  // will be set relative to canvas
  const BRANCH_LENGTH_BASE = 0;  // set on init

  let branches = [];
  let allBranches = []; // flat list for rendering order
  let treeAlpha = 1;
  let treeState = 'growing'; // 'growing', 'holding', 'fading', 'waiting'
  let holdTimer = 0;
  const HOLD_DURATION = 320; // frames to hold fully grown tree
  const FADE_DURATION = 120; // frames for fade out
  let fadeTimer = 0;
  let waitTimer = 0;
  const WAIT_DURATION = 60;

  // Persistent canvas for the tree (drawn incrementally with transparency)
  let treeCanvas, treeCtx;

  function initTreeCanvas() {
    treeCanvas = document.createElement('canvas');
    treeCanvas.width = W;
    treeCanvas.height = H;
    treeCtx = treeCanvas.getContext('2d');
    treeCtx.clearRect(0, 0, W, H);
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function rand(min, max) { return Math.random() * (max - min) + min; }

  function colorForDepth(depth, progress) {
    // Trunk: warm brown #8B6914 → amber #c8956c → gold #d4a574 → bright gold tips
    const t = depth / MAX_DEPTH;

    const r0 = 90, g0 = 62, b0 = 20;    // deep warm brown (trunk)
    const r1 = 170, g1 = 110, b1 = 50;   // mid brown-amber
    const r2 = 200, g2 = 149, b2 = 108;  // amber
    const r3 = 224, g3 = 185, b3 = 120;  // gold

    let r, g, b;
    if (t < 0.33) {
      const lt = t / 0.33;
      r = lerp(r0, r1, lt);
      g = lerp(g0, g1, lt);
      b = lerp(b0, b1, lt);
    } else if (t < 0.66) {
      const lt = (t - 0.33) / 0.33;
      r = lerp(r1, r2, lt);
      g = lerp(g1, g2, lt);
      b = lerp(b1, b2, lt);
    } else {
      const lt = (t - 0.66) / 0.34;
      r = lerp(r2, r3, lt);
      g = lerp(g2, g3, lt);
      b = lerp(b2, b3, lt);
    }

    return { r: Math.round(r), g: Math.round(g), b: Math.round(b) };
  }

  // ?p=N shrinks tree to avoid clipping in embedded contexts
  const _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  function createTree() {
    branches = [];
    allBranches = [];
    initTreeCanvas();

    const trunkLen = H * rand(0.18, 0.23) / _pad;
    const trunkThick = Math.max(6, W * 0.012) / _pad;

    // Slight random lean
    const trunkAngle = -Math.PI / 2 + rand(-0.08, 0.08);

    // When padded, center the tree vertically instead of anchoring to bottom
    const approxTreeH = trunkLen * 3.2;
    const baseY = _pad > 1 ? (H + approxTreeH) / 2 : H;

    const trunk = {
      x0: W / 2 + rand(-W * 0.05, W * 0.05),
      y0: baseY,
      angle: trunkAngle,
      length: trunkLen,
      thickness: trunkThick,
      depth: 0,
      growthProgress: 0,
      growthSpeed: GROWTH_SPEED_BASE * rand(0.8, 1.2),
      children: [],
      spawned: false,
      swayOffset: rand(0, Math.PI * 2),
      swayAmp: 0,
    };

    branches.push(trunk);
    allBranches.push(trunk);

    treeState = 'growing';
    holdTimer = 0;
    fadeTimer = 0;
    treeAlpha = 1;
  }

  function spawnChildren(parent) {
    if (parent.depth >= MAX_DEPTH) return;

    const numChildren = parent.depth < 2 ? 3 : (Math.random() < 0.5 ? 2 : 3);
    const spreadBase = parent.depth < 3 ? 0.4 : 0.5;

    for (let i = 0; i < numChildren; i++) {
      // Spread angles evenly-ish then add randomness
      let angleOffset;
      if (numChildren === 2) {
        angleOffset = (i === 0 ? -1 : 1) * rand(0.25, spreadBase + 0.15);
      } else {
        angleOffset = (i - 1) * rand(0.25, spreadBase) + rand(-0.1, 0.1);
      }

      const childAngle = parent.angle + angleOffset;

      // Length decreases with depth, with randomness
      const lengthFactor = rand(0.62, 0.78);
      const childLength = parent.length * lengthFactor;

      // Thickness decreases
      const thickFactor = rand(0.55, 0.72);
      const childThick = Math.max(0.8, parent.thickness * thickFactor);

      // Calculate start point (end of parent)
      const endX = parent.x0 + Math.cos(parent.angle) * parent.length;
      const endY = parent.y0 + Math.sin(parent.angle) * parent.length;

      const child = {
        x0: endX,
        y0: endY,
        angle: childAngle,
        length: childLength,
        thickness: childThick,
        depth: parent.depth + 1,
        growthProgress: 0,
        growthSpeed: GROWTH_SPEED_BASE * rand(1.0, 1.8) * (1 + parent.depth * 0.15),
        children: [],
        spawned: false,
        swayOffset: rand(0, Math.PI * 2),
        swayAmp: 0.003 * (parent.depth + 1),
        parent: parent,
      };

      parent.children.push(child);
      allBranches.push(child);
    }
  }

  function updateBranches(time) {
    let allDone = true;
    for (let i = 0; i < allBranches.length; i++) {
      const b = allBranches[i];
      if (b.growthProgress < 1) {
        b.growthProgress = Math.min(1, b.growthProgress + b.growthSpeed);
        allDone = false;
      }
      if (b.growthProgress >= 1 && !b.spawned) {
        b.spawned = true;
        spawnChildren(b);
      }
    }
    return allDone;
  }

  function getSwayAngle(branch, time) {
    // Cumulative sway: branches higher up sway more
    let totalSway = 0;
    let b = branch;
    while (b) {
      const amp = b.swayAmp * 1.2;
      totalSway += Math.sin(time * 0.0008 + b.swayOffset) * amp;
      totalSway += Math.sin(time * 0.0005 + b.swayOffset * 1.7) * amp * 0.5;
      b = b.parent;
    }
    return totalSway;
  }

  function getBranchEndpoint(branch, progress, time) {
    const sway = getSwayAngle(branch, time);
    const angle = branch.angle + sway;
    const len = branch.length * progress;
    return {
      x: branch.x0 + Math.cos(angle) * len,
      y: branch.y0 + Math.sin(angle) * len,
    };
  }

  // Recalculate start positions based on parent endpoints (for sway)
  function recalcPositions(time) {
    for (let i = 0; i < allBranches.length; i++) {
      const b = allBranches[i];
      if (b.parent) {
        const parentEnd = getBranchEndpoint(b.parent, 1, time);
        b.x0 = parentEnd.x;
        b.y0 = parentEnd.y;
      }
    }
  }

  function drawBranch(drawCtx, branch, time) {
    if (branch.growthProgress <= 0) return;

    const sway = getSwayAngle(branch, time);
    const angle = branch.angle + sway;
    const len = branch.length * easeOutQuad(branch.growthProgress);

    const x1 = branch.x0;
    const y1 = branch.y0;
    const x2 = x1 + Math.cos(angle) * len;
    const y2 = y1 + Math.sin(angle) * len;

    const col = colorForDepth(branch.depth, branch.growthProgress);
    const alpha = branch.depth <= 1 ? 0.9 : lerp(0.8, 0.45, branch.depth / MAX_DEPTH);

    // Draw the branch segment
    drawCtx.beginPath();
    drawCtx.moveTo(x1, y1);

    // Add slight curvature for organic feel
    const midX = (x1 + x2) / 2 + Math.sin(angle) * branch.length * 0.03 * Math.sin(branch.swayOffset);
    const midY = (y1 + y2) / 2 - Math.cos(angle) * branch.length * 0.03 * Math.sin(branch.swayOffset);
    drawCtx.quadraticCurveTo(midX, midY, x2, y2);

    // Thickness tapers along the branch
    const thickStart = branch.thickness;
    const thickEnd = branch.thickness * 0.5;

    drawCtx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha})`;
    drawCtx.lineWidth = lerp(thickStart, thickEnd, branch.growthProgress);
    drawCtx.lineCap = 'round';
    drawCtx.stroke();

    // Glow on branch tips (especially for deeper branches)
    if (branch.depth >= 4 && branch.growthProgress > 0.5) {
      const glowAlpha = (branch.growthProgress - 0.5) * 2 * 0.3 * (branch.depth / MAX_DEPTH);
      const glowRadius = Math.max(2, branch.thickness * 1.5);
      const gradient = drawCtx.createRadialGradient(x2, y2, 0, x2, y2, glowRadius * 3);
      gradient.addColorStop(0, `rgba(224, 185, 120, ${glowAlpha})`);
      gradient.addColorStop(0.5, `rgba(212, 165, 116, ${glowAlpha * 0.4})`);
      gradient.addColorStop(1, 'rgba(212, 165, 116, 0)');
      drawCtx.fillStyle = gradient;
      drawCtx.beginPath();
      drawCtx.arc(x2, y2, glowRadius * 3, 0, Math.PI * 2);
      drawCtx.fill();
    }

    // Leaf-tip dots for terminal branches at max depth
    if (branch.depth >= MAX_DEPTH - 1 && branch.growthProgress >= 0.95) {
      const dotAlpha = Math.min(1, (branch.growthProgress - 0.95) * 20) * 0.7;
      const dotSize = rand(1.5, 3);

      // Bright gold/white dot
      const gradient2 = drawCtx.createRadialGradient(x2, y2, 0, x2, y2, dotSize * 2.5);
      gradient2.addColorStop(0, `rgba(255, 245, 220, ${dotAlpha})`);
      gradient2.addColorStop(0.4, `rgba(224, 185, 120, ${dotAlpha * 0.6})`);
      gradient2.addColorStop(1, 'rgba(200, 149, 108, 0)');
      drawCtx.fillStyle = gradient2;
      drawCtx.beginPath();
      drawCtx.arc(x2, y2, dotSize * 2.5, 0, Math.PI * 2);
      drawCtx.fill();
    }
  }

  function easeOutQuad(t) { return t * (2 - t); }

  function drawScene(time) {
    // Clear main canvas
    ctx.clearRect(0, 0, W, H);

    // Fill background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Subtle ground glow
    const groundGrad = ctx.createRadialGradient(W / 2, H, 0, W / 2, H, H * 0.4);
    groundGrad.addColorStop(0, 'rgba(100, 65, 20, 0.08)');
    groundGrad.addColorStop(1, 'rgba(10, 10, 10, 0)');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H * 0.5, W, H * 0.5);

    // Recalculate positions for sway
    recalcPositions(time);

    // Draw all branches
    ctx.save();
    ctx.globalAlpha = treeAlpha;
    for (let i = 0; i < allBranches.length; i++) {
      drawBranch(ctx, allBranches[i], time);
    }
    ctx.restore();
  }

  function frame(time) {
    switch (treeState) {
      case 'growing': {
        const done = updateBranches(time);
        drawScene(time);
        if (done) {
          treeState = 'holding';
          holdTimer = 0;
        }
        break;
      }

      case 'holding': {
        drawScene(time);
        holdTimer++;
        if (holdTimer >= HOLD_DURATION) {
          treeState = 'fading';
          fadeTimer = 0;
        }
        break;
      }

      case 'fading': {
        fadeTimer++;
        treeAlpha = 1 - (fadeTimer / FADE_DURATION);
        if (treeAlpha < 0) treeAlpha = 0;
        drawScene(time);
        if (fadeTimer >= FADE_DURATION) {
          treeState = 'waiting';
          waitTimer = 0;
        }
        break;
      }

      case 'waiting': {
        // Black screen brief pause
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, W, H);
        waitTimer++;
        if (waitTimer >= WAIT_DURATION) {
          createTree();
        }
        break;
      }
    }

    requestAnimationFrame(frame);
  }

  createTree();
  requestAnimationFrame(frame);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'GROWTH_SPEED_BASE': GROWTH_SPEED_BASE = e.data.value; break;
        case 'MAX_DEPTH': MAX_DEPTH = Math.round(e.data.value); break;
      }
    }
  });
})();
</script>
</body>
</html>
