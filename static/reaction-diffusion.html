<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction-Diffusion Patterns</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; image-rendering: auto; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">03 / Reaction-Diffusion</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Simulation grid size — we run at reduced resolution and scale up
  const SIM_SCALE = 2; // canvas pixels per sim cell
  let simW, simH;
  let gridA0, gridB0, gridA1, gridB1; // ping-pong buffers

  // Gray-Scott parameters (standard stable values)
  let Da = 0.2097;
  const Db = 0.105;
  const dt = 1.0;

  // We'll create a spatial variation in feed/kill for visual interest
  let feedGrid, killGrid;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const oldSimW = simW;
    const oldSimH = simH;
    simW = Math.ceil(canvas.width / SIM_SCALE);
    simH = Math.ceil(canvas.height / SIM_SCALE);

    // Re-init grids
    const size = simW * simH;
    gridA0 = new Float32Array(size);
    gridB0 = new Float32Array(size);
    gridA1 = new Float32Array(size);
    gridB1 = new Float32Array(size);
    feedGrid = new Float32Array(size);
    killGrid = new Float32Array(size);

    // Fill with chemical A = 1, B = 0
    gridA0.fill(1.0);
    gridB0.fill(0.0);

    // Build spatially-varying feed/kill rates
    for (let y = 0; y < simH; y++) {
      for (let x = 0; x < simW; x++) {
        const i = y * simW + x;
        const nx = x / simW;
        const ny = y / simH;
        // Smooth variation across canvas for organic diversity
        // Base: f=0.055, k=0.062 — coral/spots regime
        const angle = Math.atan2(ny - 0.5, nx - 0.5);
        const dist = Math.sqrt((nx - 0.5) ** 2 + (ny - 0.5) ** 2);
        feedGrid[i] = 0.055 + 0.003 * Math.sin(angle * 2 + dist * 4);
        killGrid[i] = 0.062 + 0.002 * Math.cos(angle * 3 - dist * 3);
      }
    }

    // Seed several random spots with chemical B
    seedRandom(20);
  }

  function seedRandom(count) {
    for (let s = 0; s < count; s++) {
      const cx = Math.floor(Math.random() * (simW - 20) + 10);
      const cy = Math.floor(Math.random() * (simH - 20) + 10);
      const radius = 4 + Math.floor(Math.random() * 6);
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy <= radius * radius) {
            const x = cx + dx;
            const y = cy + dy;
            if (x >= 0 && x < simW && y >= 0 && y < simH) {
              const i = y * simW + x;
              gridA0[i] = 0.0;
              gridB0[i] = 1.0;
            }
          }
        }
      }
    }
  }

  function simulate() {
    // One step of Gray-Scott
    for (let y = 1; y < simH - 1; y++) {
      for (let x = 1; x < simW - 1; x++) {
        const i = y * simW + x;
        const iU = (y - 1) * simW + x;
        const iD = (y + 1) * simW + x;
        const iL = y * simW + (x - 1);
        const iR = y * simW + (x + 1);

        const a = gridA0[i];
        const b = gridB0[i];

        // Laplacian (5-point stencil)
        const lapA = gridA0[iU] + gridA0[iD] + gridA0[iL] + gridA0[iR] - 4 * a;
        const lapB = gridB0[iU] + gridB0[iD] + gridB0[iL] + gridB0[iR] - 4 * b;

        const f = feedGrid[i];
        const k = killGrid[i];
        const abb = a * b * b;

        gridA1[i] = a + (Da * lapA - abb + f * (1.0 - a)) * dt;
        gridB1[i] = b + (Db * lapB + abb - (k + f) * b) * dt;

        // Clamp
        if (gridA1[i] < 0) gridA1[i] = 0;
        if (gridA1[i] > 1) gridA1[i] = 1;
        if (gridB1[i] < 0) gridB1[i] = 0;
        if (gridB1[i] > 1) gridB1[i] = 1;
      }
    }

    // Swap buffers
    const tmpA = gridA0;
    const tmpB = gridB0;
    gridA0 = gridA1;
    gridB0 = gridB1;
    gridA1 = tmpA;
    gridB1 = tmpB;
  }

  // Color LUT — pre-compute 256-entry color table mapping B concentration to warm palette
  const colorLUT = new Uint8Array(256 * 4);
  (function buildLUT() {
    // Gradient stops:
    // 0.00 → #0a0a0a  (10, 10, 10)     — background
    // 0.15 → #2a1a0e  (42, 26, 14)     — deep shadow
    // 0.30 → #6b3a1a  (107, 58, 26)    — dark amber
    // 0.50 → #c8956c  (200, 149, 108)  — warm amber
    // 0.70 → #d4a574  (212, 165, 116)  — gold
    // 0.85 → #e8c89a  (232, 200, 154)  — light gold
    // 1.00 → #fff5e6  (255, 245, 230)  — near white warm

    const stops = [
      { t: 0.00, r: 10,  g: 10,  b: 10  },
      { t: 0.10, r: 28,  g: 16,  b: 10  },
      { t: 0.20, r: 70,  g: 35,  b: 15  },
      { t: 0.35, r: 140, g: 70,  b: 30  },
      { t: 0.50, r: 200, g: 149, b: 108 },
      { t: 0.65, r: 212, g: 165, b: 116 },
      { t: 0.80, r: 232, g: 200, b: 154 },
      { t: 1.00, r: 255, g: 248, b: 235 },
    ];

    for (let i = 0; i < 256; i++) {
      const t = i / 255;
      // Find surrounding stops
      let s0 = stops[0], s1 = stops[stops.length - 1];
      for (let j = 0; j < stops.length - 1; j++) {
        if (t >= stops[j].t && t <= stops[j + 1].t) {
          s0 = stops[j];
          s1 = stops[j + 1];
          break;
        }
      }
      const range = s1.t - s0.t;
      const local = range > 0 ? (t - s0.t) / range : 0;
      // Smoothstep interpolation for richer transitions
      const sm = local * local * (3 - 2 * local);
      const off = i * 4;
      colorLUT[off + 0] = Math.round(s0.r + (s1.r - s0.r) * sm);
      colorLUT[off + 1] = Math.round(s0.g + (s1.g - s0.g) * sm);
      colorLUT[off + 2] = Math.round(s0.b + (s1.b - s0.b) * sm);
      colorLUT[off + 3] = 255;
    }
  })();

  function render() {
    const imgData = ctx.createImageData(simW, simH);
    const pixels = imgData.data;
    for (let i = 0; i < simW * simH; i++) {
      // Map B concentration to color. Boost contrast with a curve.
      let v = gridB0[i];
      // Apply a subtle contrast curve
      v = v * v * (3 - 2 * v); // smoothstep-ish
      v = Math.min(1, Math.max(0, v));
      const ci = Math.floor(v * 255);
      const pi = i * 4;
      const li = ci * 4;
      pixels[pi + 0] = colorLUT[li + 0];
      pixels[pi + 1] = colorLUT[li + 1];
      pixels[pi + 2] = colorLUT[li + 2];
      pixels[pi + 3] = 255;
    }

    // Draw at sim resolution to an offscreen canvas, then scale up
    if (!render.offscreen || render.offscreen.width !== simW || render.offscreen.height !== simH) {
      render.offscreen = document.createElement('canvas');
      render.offscreen.width = simW;
      render.offscreen.height = simH;
      render.offCtx = render.offscreen.getContext('2d');
    }
    render.offCtx.putImageData(imgData, 0, 0);

    // Scale up to full canvas with smooth interpolation
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(render.offscreen, 0, 0, canvas.width, canvas.height);
  }

  // Periodically add new seed points to keep evolution interesting
  let frameCount = 0;
  const SEED_INTERVAL = 800; // frames
  let stepsPerFrame = 12;

  function frame() {
    // Multiple simulation steps per render frame for faster evolution
    for (let s = 0; s < stepsPerFrame; s++) {
      simulate();
    }

    frameCount++;
    if (frameCount % SEED_INTERVAL === 0) {
      seedRandom(3);
    }

    render();
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => {
    resize();
  });

  resize();
  requestAnimationFrame(frame);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'stepsPerFrame': stepsPerFrame = Math.round(e.data.value); break;
        case 'Da': Da = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
