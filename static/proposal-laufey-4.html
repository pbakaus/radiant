<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressed Petals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Pressed Petals</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_bloomSpeed;',
    'uniform float u_petalLayers;',
    '',
    'float hash(vec2 p){',
    '  vec3 p3=fract(vec3(p.xyx)*vec3(.1031,.1030,.0973));',
    '  p3+=dot(p3,p3.yzx+33.33);',
    '  return fract((p3.x+p3.y)*p3.z);',
    '}',
    '',
    '// Simplex noise',
    'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec2 mod289v(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
    'float snoise(vec2 v){',
    '  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
    '  vec2 i=floor(v+dot(v,C.yy));',
    '  vec2 x0=v-i+dot(i,C.xx);',
    '  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);',
    '  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;',
    '  i=mod289v(i);',
    '  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));',
    '  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);',
    '  m=m*m; m=m*m;',
    '  vec3 x=2.0*fract(p*C.www)-1.0;',
    '  vec3 h=abs(x)-0.5;',
    '  vec3 ox=floor(x+0.5);',
    '  vec3 a0=x-ox;',
    '  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
    '  vec3 g;',
    '  g.x=a0.x*x0.x+h.x*x0.y;',
    '  g.yz=a0.yz*x12.xz+h.yz*x12.yw;',
    '  return 130.0*dot(m,g);',
    '}',
    '',
    '// Rose curve petal shape',
    'float petalShape(vec2 uv, vec2 center, float angle, float size, float k, float growth, float seed){',
    '  vec2 d=uv-center;',
    '  float cs=cos(angle), sn=sin(angle);',
    '  d=vec2(d.x*cs+d.y*sn, -d.x*sn+d.y*cs);',
    '  float r=length(d);',
    '  float a=atan(d.y,d.x);',
    '',
    '  // Rose curve: r = cos(k*theta)',
    '  float petalR=abs(cos(k*a))*size*growth;',
    '',
    '  // Add organic irregularity',
    '  petalR*=1.0+snoise(vec2(a*3.0+seed*10.0,r*8.0))*0.15;',
    '',
    '  float shape=smoothstep(petalR,petalR*0.7,r);',
    '',
    '  // Vein structure',
    '  float mainVein=exp(-abs(d.y)*40.0/max(size,0.01))*0.3;',
    '  float radialVeins=abs(sin(a*k*2.0+seed))*exp(-r/(petalR+0.01)*2.0)*0.15;',
    '  float fineVeins=abs(snoise(vec2(a*8.0+seed*5.0,r*20.0)))*0.08;',
    '',
    '  float veins=(mainVein+radialVeins+fineVeins)*shape;',
    '',
    '  return shape*0.6+veins;',
    '}',
    '',
    '// Single flower with multiple petal layers',
    'vec4 flower(vec2 uv, vec2 center, float t, float seed, float layerCount){',
    '  float cyclePeriod=35.0+hash(vec2(seed,1.0))*15.0;',
    '  float localT=mod(t*u_bloomSpeed-seed*3.0, cyclePeriod);',
    '',
    '  // Growth for SIZE (blooms to full, stays full)',
    '  float grow=smoothstep(0.0,4.0,localT);',
    '  // Opacity fades gently at end of cycle',
    '  float fade=1.0-smoothstep(cyclePeriod-8.0,cyclePeriod-0.5,localT);',
    '  float opacity=grow*fade;',
    '',
    '  if(opacity<0.01) return vec4(0.0);',
    '',
    '  float totalAlpha=0.0;',
    '  vec3 totalColor=vec3(0.0);',
    '',
    '  // Color palette for this flower',
    '  float colorSeed=hash(vec2(seed,2.0));',
    '  vec3 baseColor;',
    '  if(colorSeed<0.3){',
    '    baseColor=vec3(0.72,0.52,0.48); // dusty rose',
    '  } else if(colorSeed<0.5){',
    '    baseColor=vec3(0.82,0.72,0.55); // warm cream',
    '  } else if(colorSeed<0.7){',
    '    baseColor=vec3(0.75,0.60,0.35); // faded gold',
    '  } else if(colorSeed<0.85){',
    '    baseColor=vec3(0.55,0.58,0.45); // soft sage',
    '  } else {',
    '    baseColor=vec3(0.65,0.50,0.58); // dried lavender',
    '  }',
    '',
    '  float petalK=2.0+floor(hash(vec2(seed,3.0))*3.0); // 2, 3, or 4 petals',
    '',
    '  // Multiple petal layers',
    '  int layers=int(layerCount);',
    '  for(int i=0;i<8;i++){',
    '    if(i>=layers) break;',
    '    float fi=float(i);',
    '    float layerAngle=fi*0.4+hash(vec2(seed,fi+4.0))*0.3;',
    '    float layerSize=(0.08+fi*0.015)*grow;',
    '    float layerGrowth=smoothstep(fi*0.5,fi*0.5+3.0,localT);',
    '',
    '    float petal=petalShape(uv,center,layerAngle,layerSize,petalK,layerGrowth,seed+fi);',
    '',
    '    // Color variation per layer',
    '    vec3 layerColor=baseColor;',
    '    layerColor+=vec3(0.05,-0.02,-0.03)*fi*0.3;',
    '    layerColor=clamp(layerColor,0.0,1.0);',
    '',
    '    // Pressed-flower translucency: additive blending',
    '    float alpha=petal*0.15*opacity;',
    '    totalColor+=layerColor*alpha;',
    '    totalAlpha+=alpha;',
    '  }',
    '',
    '  // Center pistil',
    '  float centerDist=length(uv-center);',
    '  float pistil=smoothstep(0.012*grow,0.005*grow,centerDist);',
    '  totalColor+=vec3(0.7,0.55,0.3)*pistil*0.3*opacity;',
    '  totalAlpha+=pistil*0.2*opacity;',
    '',
    '  return vec4(totalColor,totalAlpha);',
    '}',
    '',
    '// Simple stem',
    'float stem(vec2 uv, vec2 flowerCenter, float t, float seed){',
    '  float cyclePeriod=35.0+hash(vec2(seed,1.0))*15.0;',
    '  float localT=mod(t*u_bloomSpeed-seed*3.0,cyclePeriod);',
    '  float life=smoothstep(0.0,3.0,localT)*(1.0-smoothstep(cyclePeriod-8.0,cyclePeriod-0.5,localT));',
    '  vec2 stemBase=flowerCenter+vec2(0.0,-0.25);',
    '  vec2 d=uv-stemBase;',
    '  float stemLen=length(flowerCenter-stemBase);',
    '  float along=dot(uv-stemBase,normalize(flowerCenter-stemBase))/stemLen;',
    '  along=clamp(along,0.0,1.0);',
    '  float curve=sin(along*3.14159+seed)*0.01;',
    '  vec2 stemPoint=stemBase+along*(flowerCenter-stemBase)+vec2(curve,0.0);',
    '  float dist=length(uv-stemPoint);',
    '  float width=mix(0.003,0.001,along);',
    '  return smoothstep(width,width*0.3,dist)*life*0.15;',
    '}',
    '',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy-u_res*0.5)/min(u_res.x,u_res.y);',
    '  float t=u_time;',
    '',
    '  // Parchment background',
    '  vec3 col=vec3(0.035,0.03,0.025);',
    '',
    '  // Paper texture',
    '  float paper=snoise(uv*15.0)*0.5+0.5;',
    '  paper=paper*0.02+0.01;',
    '  col+=vec3(paper*0.8,paper*0.7,paper*0.5);',
    '',
    '  // Flower positions',
    '  vec4 totalFlower=vec4(0.0);',
    '',
    '  // Main flowers — packed tighter',
    '  for(int i=0;i<14;i++){',
    '    float fi=float(i);',
    '    float seed=fi*7.31+1.0;',
    '    vec2 pos=vec2(',
    '      (hash(vec2(seed,1.0))-0.5)*0.75,',
    '      (hash(vec2(seed,2.0))-0.5)*0.55',
    '    );',
    '    vec4 f=flower(uv,pos,t,seed,u_petalLayers);',
    '    totalFlower+=f;',
    '',
    '    // Stem',
    '    float s=stem(uv,pos,t,seed);',
    '    col+=vec3(0.3,0.35,0.2)*s;',
    '  }',
    '',
    '  // Floating loose petals (drifting fragments)',
    '  for(int i=0;i<8;i++){',
    '    float fi=float(i);',
    '    float seed=fi*13.7+50.0;',
    '    float drift=t*0.02*(0.5+hash(vec2(seed,1.0)));',
    '    vec2 pos=vec2(',
    '      sin(drift+seed)*0.6+cos(drift*0.7+seed*2.0)*0.2,',
    '      cos(drift*0.8+seed*1.5)*0.5+sin(drift*0.3)*0.1',
    '    );',
    '    float angle=drift*2.0+seed;',
    '    float size=0.02+hash(vec2(seed,3.0))*0.02;',
    '    float petal=petalShape(uv,pos,angle,size,2.0,1.0,seed);',
    '    vec3 petalCol=mix(vec3(0.7,0.5,0.45),vec3(0.8,0.65,0.4),hash(vec2(seed,4.0)));',
    '    totalFlower+=vec4(petalCol*petal*0.08,petal*0.08);',
    '  }',
    '',
    '  // Compose flowers onto background',
    '  col+=totalFlower.rgb;',
    '',
    '  // Botanical illustration border line (very subtle)',
    '  float border=smoothstep(0.005,0.0,abs(abs(uv.x)-0.58))*step(abs(uv.y),0.44);',
    '  border+=smoothstep(0.005,0.0,abs(abs(uv.y)-0.44))*step(abs(uv.x),0.58);',
    '  col+=vec3(0.3,0.22,0.12)*border*0.06;',
    '',
    '  // Vignette',
    '  float vig=1.0-smoothstep(0.3,1.2,length(uv*vec2(0.85,1.0)));',
    '  col*=0.55+0.45*vig;',
    '',
    '  // Warm tone adjustment',
    '  col=pow(max(col,0.0),vec3(0.95,1.0,1.08));',
    '',
    '  // Film grain',
    '  float grain=(hash(gl_FragCoord.xy+fract(t*0.1)*100.0)-0.5)*0.025;',
    '  col+=grain;',
    '',
    '  gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uBloomSpeed = gl.getUniformLocation(prog, 'u_bloomSpeed');
  var uPetalLayers = gl.getUniformLocation(prog, 'u_petalLayers');
  var bloomSpeedVal = 0.7;
  var petalLayersVal = 5.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uBloomSpeed, bloomSpeedVal);
    gl.uniform1f(uPetalLayers, petalLayersVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'BLOOM_SPEED': bloomSpeedVal = e.data.value; break;
        case 'PETAL_LAYERS': petalLayersVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
