<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>After Hours</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">22 — After Hours</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 22 · After Hours — Neon rain on glass, cinematic bokeh
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_pad;',
    'uniform float u_rainIntensity;',
    'uniform float u_neonBrightness;',
    '',
    '// ── Hash / noise ──',
    'vec2 hash22(vec2 p) {',
    '  vec3 a = fract(p.xyx * vec3(443.897, 441.423, 437.195));',
    '  a += dot(a, a.yzx + 19.19);',
    '  return fract((a.xx + a.yz) * a.zy);',
    '}',
    '',
    'float hash21(vec2 p) {',
    '  p = fract(p * vec2(443.897, 441.423));',
    '  p += dot(p, p + 19.19);',
    '  return fract(p.x * p.y);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash21(i);',
    '  float b = hash21(i + vec2(1.0, 0.0));',
    '  float c = hash21(i + vec2(0.0, 1.0));',
    '  float d = hash21(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── Rain drop on glass ──',
    '// Returns vec3(offsetX, offsetY, dropMask)',
    '// Simulates a raindrop lens that refracts the background',
    'vec3 rainLayer(vec2 uv, float t, float scale, float speed) {',
    '  vec2 aspect = vec2(u_res.x / u_res.y, 1.0);',
    '  vec2 st = uv * scale * aspect;',
    '',
    '  // Grid cells for drops',
    '  vec2 id = floor(st);',
    '  st = fract(st) - 0.5;',
    '',
    '  float n = hash21(id);',
    '',
    '  // Time offset per cell',
    '  float tOff = n * 6.28;',
    '  float dropT = t * speed + tOff;',
    '',
    '  // Main drop: wobbles down the cell',
    '  float ySpeed = 0.35 + n * 0.25;',
    '  float wiggle = sin(dropT * 1.5 + n * 20.0) * (0.3 + 0.1 * sin(n * 50.0));',
    '',
    '  // Drop position within cell',
    '  vec2 dropPos = vec2(',
    '    wiggle * 0.15,',
    '    -fract(dropT * ySpeed) + 0.5',
    '  );',
    '',
    '  // Drop shape — elongated slightly vertically',
    '  vec2 delta = st - dropPos;',
    '  delta.y *= aspect.x * 0.6;',
    '  float dropDist = length(delta);',
    '',
    '  // Drop radius varies per cell',
    '  float dropRadius = 0.04 + n * 0.035;',
    '  float drop = smoothstep(dropRadius, dropRadius * 0.3, dropDist);',
    '',
    '  // Trail behind the drop — thin streak',
    '  float trailMask = smoothstep(0.015, 0.005, abs(st.x - dropPos.x));',
    '  trailMask *= smoothstep(dropPos.y, dropPos.y + 0.35 + n * 0.2, st.y);',
    '  trailMask *= smoothstep(0.5, dropPos.y + 0.35, st.y);',
    '  // Trail has irregular width (mini droplets in trail)',
    '  float trailNoise = noise(vec2(id.x * 40.0, st.y * 80.0 + t * 4.0));',
    '  trailMask *= 0.3 + 0.7 * smoothstep(0.3, 0.6, trailNoise);',
    '',
    '  // Combine drop + trail',
    '  float mask = max(drop, trailMask * 0.6);',
    '',
    '  // Refraction offset — the drop acts as a lens',
    '  vec2 offset = delta * smoothstep(dropRadius * 1.2, 0.0, dropDist) * 2.5;',
    '  // Trail also slightly refracts',
    '  offset += vec2(0.0, -0.02) * trailMask;',
    '',
    '  return vec3(offset, mask);',
    '}',
    '',
    '// ── Neon bokeh background ──',
    'vec3 neonBokeh(vec2 uv, float t) {',
    '  vec3 col = vec3(0.0);',
    '',
    '  // Multiple layers of bokeh at different scales',
    '  for (float layer = 0.0; layer < 3.0; layer++) {',
    '    float scale = 3.0 + layer * 2.5;',
    '    float size = 0.12 - layer * 0.025;',
    '    float brightness = (0.7 - layer * 0.15) * u_neonBrightness;',
    '',
    '    vec2 st = uv * scale;',
    '    // Slow drift per layer',
    '    st += vec2(t * (0.03 + layer * 0.01), t * (0.015 - layer * 0.008));',
    '',
    '    vec2 id = floor(st);',
    '    vec2 gv = fract(st) - 0.5;',
    '',
    '    // Check neighboring cells too for smooth bokeh',
    '    for (float y = -1.0; y <= 1.0; y++) {',
    '      for (float x = -1.0; x <= 1.0; x++) {',
    '        vec2 offs = vec2(x, y);',
    '        vec2 cellId = id + offs;',
    '        vec2 n = hash22(cellId);',
    '',
    '        // Not all cells have a bokeh light',
    '        if (n.x > 0.55) continue;',
    '',
    '        // Position jitter within cell',
    '        vec2 pos = offs + n - 0.5 - gv;',
    '',
    '        // Pulsation',
    '        float pulse = 0.7 + 0.3 * sin(t * (0.5 + n.y * 1.5) + n.x * 30.0);',
    '',
    '        float d = length(pos);',
    '        float bokehSize = size * (0.7 + n.y * 0.6) * u_pad;',
    '',
    '        // Soft circle with bright ring edge (lens bokeh characteristic)',
    '        float bokeh = smoothstep(bokehSize, bokehSize * 0.8, d);',
    '        // Ring enhancement',
    '        float ring = smoothstep(bokehSize * 0.85, bokehSize * 0.7, d)',
    '                    - smoothstep(bokehSize * 0.7, bokehSize * 0.4, d);',
    '        bokeh += ring * 0.6;',
    '        bokeh *= pulse * brightness;',
    '',
    '        // Color selection — neon reds, blues, purples, with occasional warm',
    '        float colorSel = fract(n.x * 7.77 + n.y * 3.33 + layer * 0.5);',
    '        vec3 neonCol;',
    '        if (colorSel < 0.25) {',
    '          // Crimson red / hot pink',
    '          neonCol = vec3(1.0, 0.08, 0.2);',
    '        } else if (colorSel < 0.45) {',
    '          // Electric blue',
    '          neonCol = vec3(0.1, 0.3, 1.0);',
    '        } else if (colorSel < 0.6) {',
    '          // Deep purple / magenta',
    '          neonCol = vec3(0.7, 0.1, 0.9);',
    '        } else if (colorSel < 0.72) {',
    '          // Hot pink',
    '          neonCol = vec3(1.0, 0.15, 0.55);',
    '        } else if (colorSel < 0.82) {',
    '          // Cyan accent',
    '          neonCol = vec3(0.1, 0.8, 0.9);',
    '        } else if (colorSel < 0.9) {',
    '          // Warm amber (city sodium lights)',
    '          neonCol = vec3(1.0, 0.6, 0.15);',
    '        } else {',
    '          // Cool white',
    '          neonCol = vec3(0.85, 0.88, 1.0);',
    '        }',
    '',
    '        col += neonCol * bokeh;',
    '      }',
    '    }',
    '  }',
    '',
    '  return col;',
    '}',
    '',
    '// ── Vertical neon sign streaks (reflected in wet glass) ──',
    'vec3 neonStreaks(vec2 uv, float t) {',
    '  vec3 col = vec3(0.0);',
    '',
    '  // Several vertical neon streaks at fixed x positions',
    '  for (float i = 0.0; i < 8.0; i++) {',
    '    float n = hash21(vec2(i, i * 3.7));',
    '    float xPos = n;',
    '    float streakWidth = 0.01 + n * 0.025;',
    '',
    '    // Slight horizontal drift',
    '    xPos += sin(t * 0.1 + i * 2.0) * 0.01;',
    '',
    '    float d = abs(uv.x - xPos);',
    '    float streak = exp(-d * d / (streakWidth * streakWidth));',
    '',
    '    // Vertical fade — bright in middle, fades at edges',
    '    float vFade = smoothstep(0.0, 0.3, uv.y) * smoothstep(1.0, 0.6, uv.y);',
    '    streak *= vFade;',
    '',
    '    // Pulsation',
    '    float pulse = 0.6 + 0.4 * sin(t * (0.3 + n * 0.7) + i * 4.0);',
    '    streak *= pulse * 0.15 * u_neonBrightness;',
    '',
    '    // Color',
    '    float cs = fract(i * 0.37);',
    '    vec3 sc;',
    '    if (cs < 0.35) sc = vec3(1.0, 0.05, 0.2);',
    '    else if (cs < 0.6) sc = vec3(0.6, 0.1, 0.9);',
    '    else if (cs < 0.8) sc = vec3(0.1, 0.3, 1.0);',
    '    else sc = vec3(1.0, 0.15, 0.5);',
    '',
    '    col += sc * streak;',
    '  }',
    '',
    '  return col;',
    '}',
    '',
    '// ── Falling rain streaks (foreground, visible on glass) ──',
    'float fallingRain(vec2 uv, float t) {',
    '  float rain = 0.0;',
    '  for (float i = 0.0; i < 3.0; i++) {',
    '    float layer = i + 1.0;',
    '    vec2 st = uv * vec2(70.0 * layer, 4.0);',
    '    st.y += t * (8.0 + i * 3.0);',
    '    // Slight x drift per layer',
    '    st.x += t * 0.5 * (i - 1.0);',
    '',
    '    vec2 id = floor(st);',
    '    vec2 gv = fract(st) - 0.5;',
    '',
    '    float n = hash21(id);',
    '    if (n > 0.7 - i * 0.1) continue;',
    '',
    '    // Thin vertical streak',
    '    float xFade = exp(-gv.x * gv.x * 600.0);',
    '    float yFade = smoothstep(0.5, -0.1, gv.y) * smoothstep(-0.5, -0.3, gv.y);',
    '    rain += xFade * yFade * (0.08 - i * 0.02);',
    '  }',
    '  return rain;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  float t = u_time;',
    '',
    '  // ── Rain drops on glass (multiple layers for density) ──',
    '  vec3 totalOffset = vec3(0.0);',
    '  float totalMask = 0.0;',
    '',
    '  // Large drops — slow, prominent',
    '  vec3 rain1 = rainLayer(uv, t, 12.0 * u_pad, 0.4) * u_rainIntensity;',
    '  // Medium drops',
    '  vec3 rain2 = rainLayer(uv + 0.37, t * 1.1, 20.0 * u_pad, 0.55) * u_rainIntensity;',
    '  // Small drops — faster, more numerous',
    '  vec3 rain3 = rainLayer(uv + 0.71, t * 1.3, 35.0 * u_pad, 0.7) * u_rainIntensity * 0.6;',
    '',
    '  totalOffset = rain1 + rain2 * 0.7 + rain3 * 0.4;',
    '  totalMask = max(max(rain1.z, rain2.z * 0.7), rain3.z * 0.5);',
    '',
    '  // ── Sample background with distortion ──',
    '  vec2 distortedUV = uv + totalOffset.xy * 0.15;',
    '',
    '  // Background: blurred neon city lights',
    '  vec3 bg = vec3(0.012, 0.01, 0.018); // Very dark base',
    '',
    '  // Add ambient city glow (warm at bottom, cool at top)',
    '  vec3 ambientLow = vec3(0.12, 0.04, 0.03);',
    '  vec3 ambientHigh = vec3(0.02, 0.02, 0.06);',
    '  bg += mix(ambientLow, ambientHigh, distortedUV.y) * 0.5;',
    '',
    '  // Neon bokeh lights',
    '  vec3 bokeh = neonBokeh(distortedUV, t);',
    '',
    '  // Neon vertical streaks',
    '  vec3 streaks = neonStreaks(distortedUV, t);',
    '',
    '  // Combine background elements',
    '  bg += bokeh + streaks;',
    '',
    '  // ── Where drops are, show a brighter/refracted version ──',
    '  // Sample the "sharp" version at the refracted position',
    '  vec3 sharpBg = neonBokeh(distortedUV + totalOffset.xy * 0.08, t);',
    '  sharpBg += neonStreaks(distortedUV + totalOffset.xy * 0.08, t);',
    '',
    '  // Drops brighten the background (lens effect focuses light)',
    '  vec3 dropColor = bg + sharpBg * 1.2;',
    '  // Slight specular highlight on drops',
    '  dropColor += vec3(0.15, 0.12, 0.18) * totalMask * totalMask;',
    '',
    '  // Blend drop areas with background',
    '  vec3 col = mix(bg, dropColor, smoothstep(0.0, 0.3, totalMask));',
    '',
    '  // ── Falling rain streaks ──',
    '  float fRain = fallingRain(uv, t);',
    '  col += vec3(0.5, 0.55, 0.7) * fRain;',
    '',
    '  // ── Glass tint — slight blue-purple cast ──',
    '  col = mix(col, col * vec3(0.85, 0.8, 1.0), 0.2);',
    '',
    '  // ── Condensation / fog on glass ──',
    '  float fog = noise(uv * 3.0 + t * 0.02);',
    '  fog = fog * 0.08 * smoothstep(0.3, 0.7, noise(uv * 1.5 - t * 0.01));',
    '  col += vec3(0.06, 0.05, 0.08) * fog;',
    '',
    '  // ── Vignette — heavy cinematic darkening ──',
    '  vec2 vc = uv - 0.5;',
    '  float vig = 1.0 - dot(vc, vc) * 1.8;',
    '  vig = clamp(vig, 0.0, 1.0);',
    '  vig = pow(vig, 0.7);',
    '  col *= vig;',
    '',
    '  // ── Subtle film grain ──',
    '  float grain = hash21(uv * u_res + fract(t * 100.0)) * 0.04 - 0.02;',
    '  col += grain;',
    '',
    '  // ── Color grading — push towards moody red/purple shadows ──',
    '  col.r += 0.01;',
    '  col.b += 0.008;',
    '',
    '  // Tone mapping (subtle, keep neons punchy)',
    '  col = col / (1.0 + col * 0.3);',
    '',
    '  // Gamma',
    '  col = pow(max(col, 0.0), vec3(0.95));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uPad = gl.getUniformLocation(prog, 'u_pad');
  var uRainIntensity = gl.getUniformLocation(prog, 'u_rainIntensity');
  var uNeonBrightness = gl.getUniformLocation(prog, 'u_neonBrightness');

  var rainIntensityVal = 1.0;
  var neonBrightnessVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    var t = prefersReduced ? 0.0 : now * 0.001;
    gl.uniform1f(uTime, t);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uPad, _pad);
    gl.uniform1f(uRainIntensity, rainIntensityVal);
    gl.uniform1f(uNeonBrightness, neonBrightnessVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'rainIntensity': rainIntensityVal = e.data.value; break;
        case 'neonBrightness': neonBrightnessVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
