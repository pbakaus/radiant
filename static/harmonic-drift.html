<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonic Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Harmonic Drift</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Harmonic Drift — Atmospheric flowing energy currents
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_driftSpeed;',
    'uniform float u_turbulence;',
    '',
    '#define NUM_LINES 7',
    '',
    '// ── Hash function ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── FBM (3 octaves) ──',
    'float fbm(vec2 p) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  for (int i = 0; i < 3; i++) {',
    '    val += amp * noise(p * freq);',
    '    freq *= 2.1;',
    '    amp *= 0.5;',
    '    p += vec2(1.7, 9.2);',
    '  }',
    '  return val;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  float t = u_time * u_driftSpeed;',
    '',
    '  // Centered UV for vignette',
    '  vec2 centeredUV = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '',
    '  // ── Background: dark with subtle warm gradient ──',
    '  vec3 col = vec3(0.035, 0.030, 0.038);',
    '  // Warm glow from bottom center',
    '  col += vec3(0.015, 0.008, 0.005) * smoothstep(0.6, 0.0, length(centeredUV - vec2(0.0, -0.3)));',
    '',
    '  // ── Edge fade at horizontal sides ──',
    '  float edgeFade = smoothstep(0.0, 0.18, uv.x) * smoothstep(1.0, 0.82, uv.x);',
    '',
    '  // ── Accumulate line glow ──',
    '  for (int i = 0; i < NUM_LINES; i++) {',
    '    float fi = float(i);',
    '',
    '    // Per-line parameters',
    '    float speed1 = 0.35 + fi * 0.06;',
    '    float speed2 = speed1 * 0.7;',
    '    float freq1 = 1.8 + fi * 0.4;',
    '    float freq2 = freq1 * 1.7 + fi * 0.3;',
    '    float amp1 = 0.09 + fi * 0.012;',
    '    float amp2 = amp1 * 0.45;',
    '    float phase = fi * 2.17;',
    '    float noiseAmp = 0.06 + fi * 0.008;',
    '',
    '    // Vertical base position: spread lines across the canvas',
    '    float vertBase = (fi / float(NUM_LINES - 1)) * 0.55 + 0.225;',
    '',
    '    // Slow vertical drift over time so lines wander up and down',
    '    float vertDrift = sin(t * 0.12 + fi * 1.9) * 0.04',
    '                    + sin(t * 0.07 + fi * 3.1) * 0.025;',
    '',
    '    // Scaled x for wave calculation (account for aspect)',
    '    float sx = uv.x * aspect;',
    '',
    '    // Base sine wave',
    '    float wave1 = sin(t * speed1 + sx * freq1 + phase) * amp1;',
    '',
    '    // Second harmonic layer',
    '    float wave2 = sin(t * speed2 + sx * freq2 + phase * 1.4) * amp2;',
    '',
    '    // Third slow undulation',
    '    float wave3 = sin(t * 0.2 + sx * 0.8 + fi * 4.5) * 0.03;',
    '',
    '    // FBM noise displacement for turbulent organic paths',
    '    float n = fbm(vec2(sx * 3.0 + fi * 5.3, t * 0.2 + fi * 2.7));',
    '    float noiseDisplace = (n - 0.5) * noiseAmp * u_turbulence;',
    '',
    '    // Final y position of the line at this x',
    '    float lineY = vertBase + vertDrift + wave1 + wave2 + wave3 + noiseDisplace;',
    '',
    '    // Distance from current fragment to the line',
    '    float d = abs(uv.y - lineY);',
    '',
    '    // Core width varies per line (thicker than Silk Threads)',
    '    float coreWidth = 0.008 + fi * 0.001;',
    '    float core = smoothstep(coreWidth, 0.0, d);',
    '',
    '    // Wide soft bloom',
    '    float bloomWidth = 0.05 + fi * 0.005;',
    '    float bloom = smoothstep(bloomWidth, 0.0, d) * 0.45;',
    '',
    '    // Even wider atmospheric halo',
    '    float haloWidth = 0.10 + fi * 0.008;',
    '    float halo = smoothstep(haloWidth, 0.0, d) * 0.12;',
    '',
    '    // Ultra-wide faint glow for atmosphere',
    '    float atmoWidth = 0.18 + fi * 0.01;',
    '    float atmo = smoothstep(atmoWidth, 0.0, d) * 0.04;',
    '',
    '    float lineBrightness = core + bloom + halo + atmo;',
    '',
    '    // Per-line color palette: warm amber, deep rose, teal accents',
    '    vec3 lineColor;',
    '    if (i == 0) {',
    '      // Warm amber, the dominant line',
    '      lineColor = vec3(0.95, 0.60, 0.22);',
    '    } else if (i == 1) {',
    '      // Deep amber / gold',
    '      lineColor = vec3(0.88, 0.52, 0.18);',
    '    } else if (i == 2) {',
    '      // Rose / salmon',
    '      lineColor = vec3(0.85, 0.38, 0.35);',
    '    } else if (i == 3) {',
    '      // Teal accent',
    '      lineColor = vec3(0.30, 0.65, 0.68);',
    '    } else if (i == 4) {',
    '      // Deep rose',
    '      lineColor = vec3(0.75, 0.30, 0.42);',
    '    } else if (i == 5) {',
    '      // Warm peach',
    '      lineColor = vec3(0.90, 0.55, 0.30);',
    '    } else {',
    '      // Cyan / teal accent',
    '      lineColor = vec3(0.35, 0.58, 0.62);',
    '    }',
    '',
    '    // Subtle time-varying color shift per line',
    '    lineColor += 0.06 * sin(t * 0.25 + fi * 2.3);',
    '',
    '    // Brightness variation along the line (breathing / pulsing)',
    '    float pulse = 0.8 + 0.2 * sin(t * 0.4 + fi * 1.7 + sx * 0.5);',
    '',
    '    // Apply edge fade, pulse, and add to accumulator',
    '    col += lineColor * lineBrightness * edgeFade * pulse;',
    '  }',
    '',
    '  // ── Vignette ──',
    '  float dist = length(centeredUV * vec2(0.8, 1.0));',
    '  float vignette = 1.0 - smoothstep(0.4, 1.4, dist);',
    '  col *= 0.7 + vignette * 0.3;',
    '',
    '  // ── Clamp and output ──',
    '  col = clamp(col, 0.0, 1.0);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uDriftSpeed = gl.getUniformLocation(prog, 'u_driftSpeed');
  var uTurbulence = gl.getUniformLocation(prog, 'u_turbulence');

  var driftSpeedVal = 0.8;
  var turbulenceVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uDriftSpeed, driftSpeedVal);
    gl.uniform1f(uTurbulence, turbulenceVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRIFT_SPEED': driftSpeedVal = e.data.value; break;
        case 'TURBULENCE': turbulenceVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
