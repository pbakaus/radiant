<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lens Whisper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Lens Whisper</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Lens Whisper — Anamorphic lens flare aesthetic
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_flareSpread;',
    'uniform float u_driftSpeed;',
    '',
    '#define PI 3.14159265359',
    '#define NUM_LIGHTS 4',
    '',
    '// ── Hash functions ──',
    'float hash(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n * 127.1) * 43758.5453);',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  return mix(',
    '    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),',
    '    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),',
    '    f.y',
    '  );',
    '}',
    '',
    '// ── Light source positions with slow cinematic drift ──',
    'vec2 lightPos(int idx, float t) {',
    '  float fi = float(idx);',
    '  float seed = fi * 47.3;',
    '  // Slow Lissajous-like orbits, each light on its own path',
    '  float ax = 0.25 + hash1(seed) * 0.15;',
    '  float ay = 0.15 + hash1(seed + 1.0) * 0.12;',
    '  float fx = 0.07 + hash1(seed + 2.0) * 0.05;',
    '  float fy = 0.05 + hash1(seed + 3.0) * 0.04;',
    '  float px = hash1(seed + 4.0) * PI * 2.0;',
    '  float py = hash1(seed + 5.0) * PI * 2.0;',
    '  // Noise perturbation for organic feel',
    '  float nx = noise(vec2(t * 0.03 + fi * 10.0, 0.0)) * 0.08 - 0.04;',
    '  float ny = noise(vec2(0.0, t * 0.025 + fi * 10.0)) * 0.06 - 0.03;',
    '  return vec2(',
    '    sin(t * fx + px) * ax + nx,',
    '    sin(t * fy + py) * ay + ny',
    '  );',
    '}',
    '',
    '// ── Light brightness (pulsing subtly) ──',
    'float lightBrightness(int idx, float t) {',
    '  float fi = float(idx);',
    '  float base = 0.7 + hash1(fi * 13.7 + 100.0) * 0.3;',
    '  float pulse = sin(t * (0.15 + hash1(fi * 23.1) * 0.1) + fi * 2.0) * 0.15;',
    '  return base + pulse;',
    '}',
    '',
    '// ── Anamorphic flare for a single light source ──',
    '// Returns vec3 with chromatic separation baked in',
    'vec3 anamorphicFlare(vec2 uv, vec2 lp, float brightness, float spread) {',
    '  vec2 delta = uv - lp;',
    '',
    '  // Horizontal stretch factor for the characteristic anamorphic look',
    '  float stretch = 7.0 * spread;',
    '',
    '  // ── Soft Gaussian point light (the core) ──',
    '  float coreD = length(delta);',
    '  float core = exp(-coreD * coreD * 80.0) * brightness;',
    '  vec3 coreCol = vec3(1.0, 0.95, 0.85) * core;',
    '',
    '  // ── Anamorphic horizontal streak ──',
    '  // Stretch x distance, keep y tight',
    '  float streakDx = delta.x / stretch;',
    '  float streakDy = delta.y;',
    '',
    '  // Main streak envelope: very wide in x, tight in y',
    '  float streakD = streakDx * streakDx * 12.0 + streakDy * streakDy * 350.0;',
    '  float streak = exp(-streakD) * brightness * 0.8;',
    '',
    '  // Chromatic aberration: offset R and B channels horizontally',
    '  float chromaOffset = 0.012 * spread;',
    '  float streakR_dx = (delta.x - chromaOffset) / stretch;',
    '  float streakB_dx = (delta.x + chromaOffset) / stretch;',
    '  float streakR_d = streakR_dx * streakR_dx * 12.0 + streakDy * streakDy * 350.0;',
    '  float streakB_d = streakB_dx * streakB_dx * 12.0 + streakDy * streakDy * 350.0;',
    '  float streakR = exp(-streakR_d) * brightness * 0.8;',
    '  float streakB = exp(-streakB_d) * brightness * 0.8;',
    '',
    '  // Color the streak: warm amber core to cool blue at edges',
    '  // Use horizontal distance to blend from warm center to cool edges',
    '  float edgeness = smoothstep(0.0, 0.35 * spread, abs(delta.x));',
    '',
    '  // Warm inner color',
    '  vec3 warmInner = vec3(0.90, 0.60, 0.20);',
    '  // Cool outer color',
    '  vec3 coolOuter = vec3(0.20, 0.40, 0.90);',
    '',
    '  // Build streak color with chromatic separation',
    '  vec3 streakCol = vec3(0.0);',
    '  // Red channel: slightly shifted, warm-biased',
    '  streakCol.r = streakR * mix(warmInner.r, coolOuter.r * 0.5, edgeness);',
    '  // Green channel: centered',
    '  streakCol.g = streak * mix(warmInner.g, mix(coolOuter.g, warmInner.g, 0.3), edgeness);',
    '  // Blue channel: shifted opposite, cool-biased at edges',
    '  streakCol.b = streakB * mix(warmInner.b, coolOuter.b, edgeness);',
    '',
    '  // ── Secondary wider, dimmer streak for extra softness ──',
    '  float wideStretch = stretch * 1.6;',
    '  float wideDx = delta.x / wideStretch;',
    '  float wideD = wideDx * wideDx * 8.0 + streakDy * streakDy * 600.0;',
    '  float wideStreak = exp(-wideD) * brightness * 0.25;',
    '  vec3 wideCol = mix(vec3(0.60, 0.35, 0.15), vec3(0.15, 0.25, 0.60), edgeness) * wideStreak;',
    '',
    '  // ── Bokeh halo around the brightest point ──',
    '  float haloR = 0.06 + brightness * 0.02;',
    '  float haloDist = abs(coreD - haloR);',
    '  float halo = exp(-haloDist * haloDist * 3000.0) * brightness * 0.15;',
    '  // Softer outer ring',
    '  float haloR2 = haloR * 1.8;',
    '  float haloDist2 = abs(coreD - haloR2);',
    '  float halo2 = exp(-haloDist2 * haloDist2 * 5000.0) * brightness * 0.06;',
    '  vec3 haloCol = vec3(0.85, 0.75, 0.60) * halo + vec3(0.50, 0.60, 0.80) * halo2;',
    '',
    '  return coreCol + streakCol + wideCol + haloCol;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float aspect = u_res.x / u_res.y;',
    '  float t = u_time * u_driftSpeed;',
    '',
    '  // ── Layer 1: Pure black background ──',
    '  vec3 col = vec3(0.0);',
    '',
    '  // ── Layer 2-4: Light sources with anamorphic flares and bokeh ──',
    '  for (int i = 0; i < NUM_LIGHTS; i++) {',
    '    vec2 lp = lightPos(i, t);',
    '    float bright = lightBrightness(i, t);',
    '    col += anamorphicFlare(uv, lp, bright, u_flareSpread);',
    '  }',
    '',
    '  // ── Layer 5: Lens dust / sparkle noise ──',
    '  // High-frequency noise thresholded for rare bright pixels',
    '  vec2 dustUV = gl_FragCoord.xy * 0.8;',
    '  float dustNoise = hash(dustUV + fract(u_time * 0.7) * 200.0);',
    '  float dust = smoothstep(0.985, 1.0, dustNoise);',
    '  // Dust only visible near light sources',
    '  float dustLight = 0.0;',
    '  for (int i = 0; i < NUM_LIGHTS; i++) {',
    '    vec2 lp = lightPos(i, t);',
    '    float d = length(uv - lp);',
    '    dustLight += exp(-d * d * 8.0) * lightBrightness(i, t);',
    '  }',
    '  dustLight = min(dustLight, 1.5);',
    '  col += vec3(0.9, 0.85, 0.7) * dust * dustLight * 0.6;',
    '',
    '  // ── Subtle warm ambient haze near lights ──',
    '  float haze = 0.0;',
    '  for (int i = 0; i < NUM_LIGHTS; i++) {',
    '    vec2 lp = lightPos(i, t);',
    '    float d = length(uv - lp);',
    '    haze += exp(-d * d * 3.0) * lightBrightness(i, t) * 0.015;',
    '  }',
    '  col += vec3(0.40, 0.25, 0.12) * haze;',
    '',
    '  // ── Layer 6: Film grain ──',
    '  vec2 grainSeed = gl_FragCoord.xy + fract(u_time * 60.0) * vec2(1973.0, 9277.0);',
    '  float grain = (hash(grainSeed) - 0.5) * 0.03;',
    '  col += grain;',
    '',
    '  // ── Layer 7: Vignette ──',
    '  float vd = length(uv * vec2(1.2, 1.0));',
    '  float vignette = 1.0 - smoothstep(0.3, 0.95, vd);',
    '  vignette = vignette * vignette; // heavier falloff',
    '  col *= vignette;',
    '',
    '  // ── Tone mapping ──',
    '  col = max(col, vec3(0.0));',
    '  col = col / (col + vec3(0.6)) * 1.5;',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFlareSpread = gl.getUniformLocation(prog, 'u_flareSpread');
  var uDriftSpeed = gl.getUniformLocation(prog, 'u_driftSpeed');

  var flareSpreadVal = 1.0;
  var driftSpeedVal = 0.5;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var paused = false;

  function render(now) {
    if (!paused) {
      resize();
      gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uFlareSpread, flareSpreadVal);
      gl.uniform1f(uDriftSpeed, driftSpeedVal);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
  });

  // ── PostMessage API ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FLARE_SPREAD': flareSpreadVal = e.data.value; break;
        case 'DRIFT_SPEED': driftSpeedVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
