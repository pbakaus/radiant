<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Fog</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 20px; left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5); z-index: 10; pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div class="label">Morning Fog</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 35 · Morning Fog — Raymarched volumetric fog with god rays
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var FOG_DENSITY = 0.85;
  var LIGHT_INTENSITY = 1.6;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_fogDensity;',
    'uniform float u_lightIntensity;',
    '',
    '#define PI 3.14159265359',
    '#define MARCH_STEPS 26',
    '#define LIGHT_MARCH_STEPS 6',
    '',
    '// ── Hash / noise primitives ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    '// ── Smooth 3D value noise ──',
    'float noise3(vec3 p) {',
    '  vec3 i = floor(p);',
    '  vec3 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float n = i.x + i.y * 157.0 + i.z * 113.0;',
    '  float a = hash(vec2(n, n + 1.0));',
    '  float b = hash(vec2(n + 1.0, n + 2.0));',
    '  float c = hash(vec2(n + 157.0, n + 158.0));',
    '  float d = hash(vec2(n + 158.0, n + 159.0));',
    '  float e = hash(vec2(n + 113.0, n + 114.0));',
    '  float ff = hash(vec2(n + 114.0, n + 115.0));',
    '  float g = hash(vec2(n + 270.0, n + 271.0));',
    '  float h = hash(vec2(n + 271.0, n + 272.0));',
    '  return mix(',
    '    mix(mix(a, b, f.x), mix(c, d, f.x), f.y),',
    '    mix(mix(e, ff, f.x), mix(g, h, f.x), f.y),',
    '    f.z',
    '  );',
    '}',
    '',
    '// ── FBM in 3D with configurable octaves ──',
    'float fbm3(vec3 p, int octaves) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  for (int i = 0; i < 5; i++) {',
    '    if (i >= octaves) break;',
    '    val += amp * noise3(p * freq);',
    '    freq *= 2.03;',
    '    amp *= 0.49;',
    '    p += vec3(1.7, 9.2, 3.1);',
    '  }',
    '  return val;',
    '}',
    '',
    '// ── Full-quality domain-warped 3D fog density ──',
    'float fogDensity(vec3 p, float t) {',
    '  vec3 drift = vec3(t * 0.04, t * 0.01, t * 0.03);',
    '  vec3 pp = p * 0.8 + drift;',
    '',
    '  // Single domain warp for organic billowing (cheaper than double)',
    '  float qx = fbm3(pp + vec3(0.0, 0.0, 0.0), 4);',
    '  float qy = fbm3(pp + vec3(5.2, 1.3, 2.8), 4);',
    '',
    '  float f = fbm3(pp + vec3(qx, qy, qx * 0.7) * 2.0, 5);',
    '',
    '  // Remap to density',
    '  float density = f * 0.5 + 0.5;',
    '',
    '  // Vertical density profile: thicker near ground, thins higher up',
    '  float groundFog = exp(-max(p.y, 0.0) * 0.5) * 0.75;',
    '  float midWisps = exp(-abs(p.y - 1.8) * 0.9) * 0.45;',
    '  float highHaze = exp(-abs(p.y - 3.2) * 1.8) * 0.15;',
    '  float vertProfile = groundFog + midWisps + highHaze;',
    '',
    '  density *= vertProfile;',
    '',
    '  return max(density * u_fogDensity * 2.2, 0.0);',
    '}',
    '',
    '// ── Cheaper density for light march (fewer octaves, no warp) ──',
    'float fogDensityLow(vec3 p, float t) {',
    '  vec3 drift = vec3(t * 0.04, t * 0.01, t * 0.03);',
    '  vec3 pp = p * 0.8 + drift;',
    '  float f = fbm3(pp, 3);',
    '  float density = f * 0.5 + 0.5;',
    '  float groundFog = exp(-max(p.y, 0.0) * 0.5) * 0.75;',
    '  float midWisps = exp(-abs(p.y - 1.8) * 0.9) * 0.45;',
    '  density *= (groundFog + midWisps);',
    '  return max(density * u_fogDensity * 2.2, 0.0);',
    '}',
    '',
    '// ── Light direction: warm sun above and slightly right ──',
    '// normalize(vec3(0.3, 0.9, 0.2)) precomputed',
    'const vec3 LIGHT_DIR = vec3(0.3094, 0.9281, 0.2063);',
    '',
    '// ── Light marching — compute how much light reaches a point ──',
    'float lightMarch(vec3 p, float t) {',
    '  float stepLen = 0.4;',
    '  float totalDensity = 0.0;',
    '  for (int i = 0; i < LIGHT_MARCH_STEPS; i++) {',
    '    p += LIGHT_DIR * stepLen;',
    '    totalDensity += max(fogDensityLow(p, t), 0.0) * stepLen;',
    '  }',
    '  return exp(-totalDensity * 2.0);',
    '}',
    '',
    '// ── God ray shafts — analytic light columns ──',
    'float godRayShafts(vec3 p, float t) {',
    '  float rays = 0.0;',
    '',
    '  // Shaft 1: main central beam',
    '  float sx1 = p.x - 0.5 + sin(t * 0.05) * 0.3;',
    '  float sz1 = p.z + cos(t * 0.04) * 0.2;',
    '  rays += exp(-(sx1 * sx1 * 3.0 + sz1 * sz1 * 4.0)) * 0.85;',
    '',
    '  // Shaft 2: left beam',
    '  float sx2 = p.x + 1.2 + sin(t * 0.03 + 2.0) * 0.2;',
    '  float sz2 = p.z + 0.5 + cos(t * 0.035 + 1.0) * 0.15;',
    '  rays += exp(-(sx2 * sx2 * 4.0 + sz2 * sz2 * 5.0)) * 0.55;',
    '',
    '  // Shaft 3: right beam',
    '  float sx3 = p.x - 2.0 + sin(t * 0.04 + 4.0) * 0.25;',
    '  float sz3 = p.z - 0.8 + cos(t * 0.03 + 3.0) * 0.2;',
    '  rays += exp(-(sx3 * sx3 * 3.5 + sz3 * sz3 * 4.5)) * 0.65;',
    '',
    '  // Shaft 4: far left narrow beam',
    '  float sx4 = p.x + 2.5 + sin(t * 0.06 + 1.5) * 0.15;',
    '  float sz4 = p.z + 1.0;',
    '  rays += exp(-(sx4 * sx4 * 6.0 + sz4 * sz4 * 5.0)) * 0.35;',
    '',
    '  // Noise breakup (simulates tree canopy blocking light)',
    '  float breakup = noise3(vec3(p.x * 1.5, 10.0, p.z * 1.5) + t * 0.015);',
    '  rays *= smoothstep(0.25, 0.65, breakup);',
    '',
    '  return rays;',
    '}',
    '',
    '// ── Dust motes — tiny bright particles floating in beams ──',
    'float dustMotes(vec3 p, float t) {',
    '  float dust = 0.0;',
    '',
    '  // Layer 1: fine dust',
    '  vec3 dp1 = p * 12.0 + vec3(t * 0.08, t * 0.05, t * 0.06);',
    '  dust += smoothstep(0.72, 0.88, noise3(dp1)) * 0.6;',
    '',
    '  // Layer 2: larger particles, slower',
    '  vec3 dp2 = p * 6.0 + vec3(t * 0.04, -t * 0.03, t * 0.05) + 100.0;',
    '  dust += smoothstep(0.75, 0.9, noise3(dp2)) * 0.4;',
    '',
    '  // Layer 3: very fine sparkle',
    '  vec3 dp3 = p * 22.0 + vec3(-t * 0.06, t * 0.1, -t * 0.04) + 200.0;',
    '  dust += smoothstep(0.82, 0.95, noise3(dp3)) * 0.3;',
    '',
    '  return dust;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '',
    '  // ── Camera setup — looking into a misty forest clearing ──',
    '  vec3 camPos = vec3(0.0, 1.2, -3.5);',
    '  camPos.x += sin(t * 0.025) * 0.12;',
    '  camPos.y += cos(t * 0.018) * 0.06;',
    '',
    '  vec3 lookAt = vec3(0.0, 1.5, 2.0);',
    '',
    '  // Camera basis',
    '  vec3 fwd = normalize(lookAt - camPos);',
    '  vec3 rgt = normalize(cross(vec3(0.0, 1.0, 0.0), fwd));',
    '  vec3 up = cross(fwd, rgt);',
    '',
    '  // Ray direction',
    '  vec3 rd = normalize(fwd * 1.5 + rgt * uv.x + up * uv.y);',
    '',
    '  // ── Raymarching through the fog volume ──',
    '  float marchNear = 0.0;',
    '  float marchFar = 14.0;',
    '  float stepSize = (marchFar - marchNear) / float(MARCH_STEPS);',
    '',
    '  vec3 accumColor = vec3(0.0);',
    '  float accumAlpha = 0.0;',
    '',
    '  // Light properties',
    '  vec3 sunColor = vec3(1.0, 0.82, 0.5) * u_lightIntensity;',
    '  vec3 ambientColor = vec3(0.10, 0.08, 0.12);',
    '',
    '  // Jitter to reduce banding',
    '  float jitter = hash(gl_FragCoord.xy + fract(t) * 7.3) * stepSize * 0.7;',
    '',
    '  // Pre-compute phase function (constant along ray)',
    '  float cosTheta = dot(rd, LIGHT_DIR);',
    '  float g1 = 0.7;',
    '  float g2 = -0.25;',
    '  float denom1 = 1.0 + g1 * g1 - 2.0 * g1 * cosTheta;',
    '  float denom2 = 1.0 + g2 * g2 - 2.0 * g2 * cosTheta;',
    '  float phase1 = (1.0 - g1 * g1) / (denom1 * sqrt(denom1));',
    '  float phase2 = (1.0 - g2 * g2) / (denom2 * sqrt(denom2));',
    '  float phase = mix(phase1, phase2, 0.2) / (4.0 * PI);',
    '',
    '  for (int i = 0; i < MARCH_STEPS; i++) {',
    '    if (accumAlpha > 0.97) break;',
    '',
    '    float dist = marchNear + float(i) * stepSize + jitter;',
    '    vec3 p = camPos + rd * dist;',
    '',
    '    if (p.y < -0.3) continue;',
    '',
    '    // ── Sample fog density ──',
    '    float density = fogDensity(p, t);',
    '',
    '    if (density > 0.001) {',
    '      // ── Light march: sunlight reaching this point ──',
    '      float lightTransmit = lightMarch(p, t);',
    '',
    '      // ── God ray columns ──',
    '      float godRays = godRayShafts(p, t);',
    '',
    '      // ── Scattered light toward camera ──',
    '      vec3 directLight = sunColor * lightTransmit * phase;',
    '',
    '      // God ray boost in light columns',
    '      directLight += sunColor * godRays * lightTransmit * 0.7;',
    '',
    '      // Ambient (height-dependent)',
    '      vec3 ambient = ambientColor * (0.4 + 0.6 * clamp(p.y / 4.0, 0.0, 1.0));',
    '',
    '      // ── Dust motes in beams ──',
    '      float dust = dustMotes(p, t);',
    '      vec3 dustGlow = sunColor * dust * lightTransmit * godRays * 3.0;',
    '',
    '      vec3 luminance = directLight + ambient + dustGlow;',
    '',
    '      // ── Beer-Lambert accumulation ──',
    '      float sampleAlpha = 1.0 - exp(-density * stepSize * 1.4);',
    '',
    '      // Front-to-back compositing',
    '      accumColor += luminance * sampleAlpha * (1.0 - accumAlpha);',
    '      accumAlpha += sampleAlpha * (1.0 - accumAlpha);',
    '    }',
    '  }',
    '',
    '  // ── Background sky ──',
    '  float skyGrad = clamp(uv.y + 0.5, 0.0, 1.0);',
    '  vec3 skyColor = mix(vec3(0.035, 0.03, 0.025), vec3(0.14, 0.09, 0.055), skyGrad);',
    '',
    '  // Sun glow in sky',
    '  float sunDot = max(dot(rd, LIGHT_DIR), 0.0);',
    '  skyColor += vec3(1.0, 0.78, 0.42) * pow(sunDot, 8.0) * 0.5 * u_lightIntensity;',
    '  skyColor += vec3(1.0, 0.92, 0.72) * pow(sunDot, 64.0) * 1.2 * u_lightIntensity;',
    '',
    '  // ── Composite fog over sky ──',
    '  vec3 col = mix(skyColor, accumColor, accumAlpha);',
    '',
    '  // ── Ground plane darkening ──',
    '  col *= 0.25 + 0.75 * smoothstep(-0.12, 0.18, rd.y);',
    '',
    '  // ── Vignette ──',
    '  vec2 vigUV = gl_FragCoord.xy / u_res * 2.0 - 1.0;',
    '  float vig = 1.0 - dot(vigUV * vec2(0.5, 0.4), vigUV * vec2(0.5, 0.4));',
    '  col *= smoothstep(0.0, 0.9, vig);',
    '',
    '  // ── Warm tone shift ──',
    '  col = pow(max(col, vec3(0.0)), vec3(0.95, 1.0, 1.08));',
    '',
    '  gl_FragColor = vec4(clamp(col, vec3(0.0), vec3(1.0)), 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFogDensity = gl.getUniformLocation(prog, 'u_fogDensity');
  var uLightIntensity = gl.getUniformLocation(prog, 'u_lightIntensity');

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * _pad;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uFogDensity, FOG_DENSITY);
    gl.uniform1f(uLightIntensity, LIGHT_INTENSITY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── PostMessage listener for parameter updates ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FOG_DENSITY': FOG_DENSITY = e.data.value; break;
        case 'LIGHT_INTENSITY': LIGHT_INTENSITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
