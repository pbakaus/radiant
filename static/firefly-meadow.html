<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firefly Meadow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Firefly Meadow</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 52 · Firefly Meadow — WebGL fragment shader fireflies
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var fireflyCountVal = 45;
  var blinkSpeedVal = 1.0;

  // Max fireflies supported in shader (array size must be constant in GLSL)
  var MAX_FIREFLIES = 80;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_pad;',
    'uniform int u_count;',
    '',
    '// Firefly data: xy = position, z = phase offset, w = blink period',
    'uniform vec4 u_ffPosPhase[' + MAX_FIREFLIES + '];',
    '// Firefly data: x = brightness (0-1), y = hue shift, z = depth, w = unused',
    'uniform vec4 u_ffBright[' + MAX_FIREFLIES + '];',
    '',
    '// ── Hash / noise for scenery ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    'float fbm(vec2 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * noise(p);',
    '    p *= 2.1;',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Sky gradient ──',
    'vec3 sky(vec2 uv) {',
    '  // Deep blue-purple top to warm amber-brown horizon',
    '  vec3 top    = vec3(0.02, 0.02, 0.06);',
    '  vec3 mid    = vec3(0.04, 0.03, 0.07);',
    '  vec3 lower  = vec3(0.06, 0.04, 0.05);',
    '  vec3 horizon = vec3(0.10, 0.06, 0.03);',
    '',
    '  vec3 col = top;',
    '  col = mix(col, mid, smoothstep(0.0, 0.35, uv.y));',
    '  col = mix(col, lower, smoothstep(0.35, 0.6, uv.y));',
    '  col = mix(col, horizon, smoothstep(0.6, 0.82, uv.y));',
    '',
    '  // Subtle warm glow near horizon center',
    '  float hGlow = exp(-8.0 * pow(uv.x - 0.5, 2.0)) * smoothstep(0.6, 0.78, uv.y) * smoothstep(0.85, 0.78, uv.y);',
    '  col += vec3(0.06, 0.03, 0.01) * hGlow;',
    '',
    '  return col;',
    '}',
    '',
    '// ── Stars ──',
    'float stars(vec2 uv) {',
    '  float s = 0.0;',
    '  for (float i = 0.0; i < 3.0; i++) {',
    '    vec2 p = uv * (80.0 + i * 40.0);',
    '    vec2 id = floor(p);',
    '    vec2 f = fract(p) - 0.5;',
    '    float h = hash(id + i * 100.0);',
    '    if (h > 0.96) {',
    '      float d = length(f);',
    '      float brightness = (h - 0.96) / 0.04;',
    '      float twinkle = 0.5 + 0.5 * sin(u_time * (1.0 + h * 3.0) + h * 50.0);',
    '      s += brightness * twinkle * smoothstep(0.04, 0.0, d) * 0.5;',
    '    }',
    '  }',
    '  return s * smoothstep(0.5, 0.0, uv.y);',
    '}',
    '',
    '// ── Ground / grass silhouette ──',
    'float grassLine(vec2 uv) {',
    '  // Main ground level with noise undulation',
    '  float groundY = 0.82 + fbm(uv.xx * 3.0 + 0.5) * 0.04 - 0.02;',
    '  return groundY;',
    '}',
    '',
    'float grassBlades(vec2 uv, float groundY) {',
    '  // Individual grass blade silhouettes',
    '  float blades = 0.0;',
    '  for (float i = 0.0; i < 40.0; i++) {',
    '    float bx = hash1(i * 7.31);',
    '    float bladeH = 0.02 + hash1(i * 13.17) * 0.06;',
    '    float bladeW = 0.001 + hash1(i * 3.79) * 0.003;',
    '    float sway = sin(u_time * (0.4 + hash1(i * 5.1) * 0.4) + i * 2.0) * 0.008;',
    '    float localGround = 0.82 + fbm(vec2(bx * 3.0 + 0.5)) * 0.04 - 0.02;',
    '',
    '    // Blade shape: narrow triangle with curve',
    '    float dx = uv.x - bx + sway * (1.0 - (uv.y - localGround + bladeH) / bladeH);',
    '    float dy = uv.y - (localGround - bladeH);',
    '    float bladeRegion = step(localGround - bladeH, uv.y) * step(uv.y, localGround);',
    '    float heightFrac = clamp((uv.y - (localGround - bladeH)) / bladeH, 0.0, 1.0);',
    '    float widthAtHeight = bladeW * (1.0 - heightFrac * 0.9);',
    '    float blade = smoothstep(widthAtHeight, widthAtHeight * 0.3, abs(dx)) * bladeRegion;',
    '    blades = max(blades, blade);',
    '  }',
    '  return blades;',
    '}',
    '',
    'float ground(vec2 uv) {',
    '  float groundY = grassLine(uv);',
    '  // Solid ground below grass line',
    '  float g = smoothstep(groundY - 0.005, groundY + 0.005, uv.y);',
    '  // Add grass blades above the line',
    '  float blades = grassBlades(uv, groundY);',
    '  return max(g, blades);',
    '}',
    '',
    '// ── Foreground grass layer ──',
    'float foregroundGrass(vec2 uv) {',
    '  float fgY = 0.91 + fbm(uv.xx * 5.0 + 10.0) * 0.03 - 0.01;',
    '  float fg = smoothstep(fgY - 0.003, fgY + 0.003, uv.y);',
    '',
    '  // Foreground blades',
    '  for (float i = 0.0; i < 25.0; i++) {',
    '    float bx = hash1(i * 11.31 + 100.0);',
    '    float bladeH = 0.015 + hash1(i * 17.17 + 100.0) * 0.04;',
    '    float bladeW = 0.0015 + hash1(i * 7.79 + 100.0) * 0.004;',
    '    float sway = sin(u_time * (0.5 + hash1(i * 9.1 + 100.0) * 0.5) + i * 3.0) * 0.006;',
    '    float localGround = 0.91 + fbm(vec2(bx * 5.0 + 10.0)) * 0.03 - 0.01;',
    '',
    '    float dx = uv.x - bx + sway;',
    '    float bladeRegion = step(localGround - bladeH, uv.y) * step(uv.y, localGround);',
    '    float heightFrac = clamp((uv.y - (localGround - bladeH)) / bladeH, 0.0, 1.0);',
    '    float widthAtHeight = bladeW * (1.0 - heightFrac * 0.85);',
    '    float blade = smoothstep(widthAtHeight, widthAtHeight * 0.2, abs(dx)) * bladeRegion;',
    '    fg = max(fg, blade);',
    '  }',
    '  return fg;',
    '}',
    '',
    '// ── Single firefly glow (computed per pixel, no blending/merging) ──',
    'vec3 fireflyGlow(vec2 uv, vec2 ffPos, float brightness, float hueShift, float depth) {',
    '  if (brightness < 0.01) return vec3(0.0);',
    '',
    '  // Aspect-correct distance',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 d = (uv - ffPos) * vec2(aspect, 1.0);',
    '  float dist = length(d);',
    '',
    '  // Scale glow size with depth and pad',
    '  float glowRadius = (0.012 + depth * 0.018) * u_pad;',
    '  float coreRadius = glowRadius * 0.12;',
    '',
    '  // Soft glow falloff: inverse-square-ish for natural light',
    '  float glow = 1.0 / (1.0 + pow(dist / glowRadius, 2.5)) - 1.0 / (1.0 + pow(1.0, 2.5));',
    '  glow = max(glow, 0.0);',
    '',
    '  // Bright core (tight gaussian)',
    '  float core = exp(-dist * dist / (coreRadius * coreRadius * 2.0));',
    '',
    '  // Color: warm amber with per-firefly variation',
    '  vec3 warmAmber = vec3(0.95, 0.65, 0.15);',
    '  vec3 paleYellow = vec3(1.0, 0.90, 0.45);',
    '  vec3 greenish = vec3(0.7, 0.95, 0.25);',
    '  vec3 baseColor = mix(warmAmber, mix(paleYellow, greenish, hueShift), hueShift);',
    '',
    '  // Outer halo: warm, dim',
    '  vec3 haloColor = baseColor * 0.7;',
    '  // Core: bright, slightly white-shifted',
    '  vec3 coreColor = mix(baseColor, vec3(1.0, 0.98, 0.85), 0.5);',
    '',
    '  vec3 result = haloColor * glow * brightness * 0.8;',
    '  result += coreColor * core * brightness * 1.5;',
    '',
    '  return result;',
    '}',
    '',
    '// ── Vignette ──',
    'float vignette(vec2 uv) {',
    '  vec2 c = uv - 0.5;',
    '  return 1.0 - dot(c, c) * 1.2;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  uv.y = 1.0 - uv.y; // flip so 0=top, 1=bottom',
    '',
    '  // ── Sky ──',
    '  vec3 col = sky(uv);',
    '',
    '  // ── Stars ──',
    '  col += vec3(0.8, 0.75, 0.65) * stars(uv);',
    '',
    '  // ── Horizon ambient glow ──',
    '  float horizGlow = exp(-12.0 * pow(uv.y - 0.78, 2.0));',
    '  col += vec3(0.03, 0.015, 0.005) * horizGlow;',
    '',
    '  // ── Ground mask (behind fireflies) ──',
    '  float groundMask = ground(uv);',
    '',
    '  // ── Fireflies (computed per-pixel, each independent) ──',
    '  // Use max blending instead of additive to prevent merging',
    '  vec3 fireflyLight = vec3(0.0);',
    '  for (int i = 0; i < ' + MAX_FIREFLIES + '; i++) {',
    '    if (i >= u_count) break;',
    '    vec2 ffPos = u_ffPosPhase[i].xy;',
    '    float brightness = u_ffBright[i].x;',
    '    float hueShift = u_ffBright[i].y;',
    '    float depth = u_ffBright[i].z;',
    '    vec3 ff = fireflyGlow(uv, ffPos, brightness, hueShift, depth);',
    '    // Max blending: each firefly stays distinct, never merges',
    '    fireflyLight = max(fireflyLight, ff);',
    '  }',
    '',
    '  // Add firefly light only where not ground',
    '  col += fireflyLight * (1.0 - groundMask * 0.85);',
    '',
    '  // ── Dark ground ──',
    '  vec3 groundCol = vec3(0.015, 0.013, 0.010);',
    '  // Slight variation in ground color',
    '  groundCol += vec3(0.005) * fbm(uv * 8.0);',
    '  col = mix(col, groundCol, groundMask);',
    '',
    '  // ── Firefly reflections on ground (subtle) ──',
    '  for (int i = 0; i < ' + MAX_FIREFLIES + '; i++) {',
    '    if (i >= u_count) break;',
    '    float brightness = u_ffBright[i].x;',
    '    if (brightness < 0.3) continue;',
    '    vec2 ffPos = u_ffPosPhase[i].xy;',
    '    float hueShift = u_ffBright[i].y;',
    '    // Reflection below ground line',
    '    float groundY = grassLine(vec2(ffPos.x, 0.0));',
    '    if (uv.y > groundY) {',
    '      float reflDist = length((uv - vec2(ffPos.x, groundY + 0.02)) * vec2(u_res.x / u_res.y, 1.0));',
    '      float refl = exp(-reflDist * reflDist / 0.002) * brightness * 0.08;',
    '      vec3 warmAmber = vec3(0.95, 0.65, 0.15);',
    '      vec3 paleYellow = vec3(1.0, 0.90, 0.45);',
    '      col += mix(warmAmber, paleYellow, hueShift) * refl;',
    '    }',
    '  }',
    '',
    '  // ── Foreground grass (darkest, on top of everything) ──',
    '  float fgMask = foregroundGrass(uv);',
    '  col = mix(col, vec3(0.010, 0.009, 0.007), fgMask);',
    '',
    '  // ── Vignette ──',
    '  col *= vignette(uv);',
    '',
    '  // ── Tone mapping ──',
    '  col = pow(col, vec3(0.95));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uPad = gl.getUniformLocation(prog, 'u_pad');
  var uCount = gl.getUniformLocation(prog, 'u_count');

  // Get uniform locations for firefly arrays
  var uFFPosPhase = [];
  var uFFBright = [];
  for (var i = 0; i < MAX_FIREFLIES; i++) {
    uFFPosPhase.push(gl.getUniformLocation(prog, 'u_ffPosPhase[' + i + ']'));
    uFFBright.push(gl.getUniformLocation(prog, 'u_ffBright[' + i + ']'));
  }

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  // ── Firefly state (CPU side, for organic drift) ──
  // Each firefly has position, velocity, blink state — all computed on CPU,
  // passed to GPU as uniforms. The GPU renders each as an independent glow.

  function hashJS(x, y) {
    var s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return s - Math.floor(s);
  }

  var fireflies = [];

  function createFirefly(index) {
    var y = 0.08 + Math.random() * 0.65;
    var x = Math.random();
    var depth = 0.3 + Math.random() * 0.7;

    // Blink pattern
    var blinkPeriod = 2.5 + Math.random() * 4.0;
    var flashDuration = 0.3 + Math.random() * 0.5;
    var flashRise = 0.12 + Math.random() * 0.18;
    var flashFall = 0.4 + Math.random() * 0.6;

    return {
      x: x,
      y: y,
      depth: depth,
      vx: (Math.random() - 0.5) * 0.0003,
      vy: (Math.random() - 0.5) * 0.0003,
      // Blink
      blinkTimer: Math.random() * blinkPeriod,
      blinkPeriod: blinkPeriod,
      flashDuration: flashDuration,
      flashRise: flashRise,
      flashFall: flashFall,
      brightness: 0,
      hueShift: Math.random() * 0.35,
      // Drift noise
      noiseOffsetX: Math.random() * 1000,
      noiseOffsetY: Math.random() * 1000,
      // Drift orbit params for smooth organic motion
      orbitRadX: 0.01 + Math.random() * 0.04,
      orbitRadY: 0.005 + Math.random() * 0.02,
      orbitSpeedX: 0.05 + Math.random() * 0.15,
      orbitSpeedY: 0.04 + Math.random() * 0.12,
      orbitPhaseX: Math.random() * Math.PI * 2,
      orbitPhaseY: Math.random() * Math.PI * 2,
      baseX: x,
      baseY: y
    };
  }

  function initFireflies() {
    fireflies = [];
    var count = Math.min(fireflyCountVal, MAX_FIREFLIES);
    for (var i = 0; i < count; i++) {
      fireflies.push(createFirefly(i));
    }
  }

  function getBlinkBrightness(ff) {
    var period = ff.blinkPeriod / blinkSpeedVal;
    var phase = ff.blinkTimer % period;
    var flashTotal = ff.flashRise + ff.flashDuration + ff.flashFall;

    if (phase < ff.flashRise) {
      var t = phase / ff.flashRise;
      return t * t * (3.0 - 2.0 * t); // smoothstep
    } else if (phase < ff.flashRise + ff.flashDuration) {
      var peakPhase = (phase - ff.flashRise) / ff.flashDuration;
      return 0.85 + 0.15 * Math.sin(peakPhase * Math.PI);
    } else if (phase < flashTotal) {
      var fallPhase = (phase - ff.flashRise - ff.flashDuration) / ff.flashFall;
      var t = 1.0 - fallPhase;
      return t * t * (3.0 - 2.0 * t); // smoothstep
    }
    return 0.0;
  }

  function updateFireflies(dt, time) {
    var count = Math.min(fireflyCountVal, MAX_FIREFLIES);

    // Adjust array size
    while (fireflies.length < count) {
      fireflies.push(createFirefly(fireflies.length));
    }
    while (fireflies.length > count) {
      fireflies.pop();
    }

    for (var i = 0; i < fireflies.length; i++) {
      var ff = fireflies[i];

      // Advance blink
      ff.blinkTimer += dt;
      ff.brightness = getBlinkBrightness(ff);

      // Organic drift using smooth sinusoidal orbits with slight noise
      var t = time;
      ff.x = ff.baseX + Math.sin(t * ff.orbitSpeedX + ff.orbitPhaseX) * ff.orbitRadX
                       + Math.sin(t * ff.orbitSpeedX * 0.37 + ff.orbitPhaseX * 2.1) * ff.orbitRadX * 0.4;
      ff.y = ff.baseY + Math.sin(t * ff.orbitSpeedY + ff.orbitPhaseY) * ff.orbitRadY
                       + Math.cos(t * ff.orbitSpeedY * 0.53 + ff.orbitPhaseY * 1.7) * ff.orbitRadY * 0.3;

      // Very slow base position drift
      ff.baseX += Math.sin(t * 0.01 + ff.noiseOffsetX) * 0.00002;
      ff.baseY += Math.cos(t * 0.008 + ff.noiseOffsetY) * 0.00001;

      // Soft boundary wrap
      if (ff.baseX < 0.02) ff.baseX += 0.01 * dt;
      if (ff.baseX > 0.98) ff.baseX -= 0.01 * dt;
      if (ff.baseY < 0.05) ff.baseY += 0.005 * dt;
      if (ff.baseY > 0.72) ff.baseY -= 0.005 * dt;

      // Keep actual position in bounds
      ff.x = Math.max(0.0, Math.min(1.0, ff.x));
      ff.y = Math.max(0.02, Math.min(0.78, ff.y));
    }
  }

  // ── Init ──
  resize();
  initFireflies();

  var lastTime = 0;

  function render(now) {
    if (!lastTime) lastTime = now;
    var rawDt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    var dt = prefersReduced ? rawDt * 0.1 : rawDt;
    var time = prefersReduced ? now * 0.0001 : now * 0.001;

    resize();

    // Update firefly state on CPU
    updateFireflies(dt, time);

    // Upload uniforms
    gl.uniform1f(uTime, time);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uPad, _pad);
    gl.uniform1i(uCount, fireflies.length);

    // Upload firefly data
    for (var i = 0; i < fireflies.length; i++) {
      var ff = fireflies[i];
      gl.uniform4f(uFFPosPhase[i], ff.x, ff.y, 0.0, ff.blinkPeriod);
      gl.uniform4f(uFFBright[i], ff.brightness, ff.hueShift, ff.depth, 0.0);
    }
    // Zero out unused slots
    for (var i = fireflies.length; i < MAX_FIREFLIES; i++) {
      gl.uniform4f(uFFBright[i], 0.0, 0.0, 0.0, 0.0);
    }

    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── PostMessage listener for parameter updates ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FIREFLY_COUNT': fireflyCountVal = Math.round(e.data.value); break;
        case 'BLINK_SPEED': blinkSpeedVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
