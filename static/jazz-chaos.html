<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Chaos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Jazz Chaos</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 51 · Jazz Chaos — Syncopated particles with implied jazz rhythms
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  // Tunable parameters
  let TEMPO = 120;
  let SWING = 0.6;

  var width, height, dpr, cx, cy;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = width / 2;
    cy = height / 2;
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Timing engine ──
  // Convert BPM to beat duration in seconds
  function beatDuration() {
    return 60 / TEMPO;
  }

  // Returns a rhythmic pulse value (0-1) based on swing
  // phase: 0-1 within a beat, swingAmt: how much swing to apply
  function swingPulse(time, subdivision, swingAmt) {
    var beatLen = beatDuration();
    var subLen = beatLen / subdivision;
    var pos = (time % subLen) / subLen;

    // Apply swing: delay the offbeats
    if (swingAmt > 0) {
      var beatPos = (time % beatLen) / beatLen;
      var subIndex = Math.floor(beatPos * subdivision);
      // Swing only affects even-numbered subdivisions
      if (subIndex % 2 === 1) {
        pos = Math.max(0, (pos - swingAmt * 0.3) / (1 - swingAmt * 0.3));
      }
    }

    // Sharp attack, exponential decay
    return Math.exp(-pos * 5);
  }

  // Returns which beat we're on (0-based within a bar of 4)
  function currentBeat(time) {
    var beatLen = beatDuration();
    return Math.floor((time / beatLen) % 4);
  }

  // Returns position within current beat (0-1)
  function beatPhase(time) {
    var beatLen = beatDuration();
    return (time % beatLen) / beatLen;
  }

  // Returns position within a bar (0-1)
  function barPhase(time) {
    var barLen = beatDuration() * 4;
    return (time % barLen) / barLen;
  }

  // Returns which bar we're on
  function currentBar(time) {
    var barLen = beatDuration() * 4;
    return Math.floor(time / barLen);
  }

  // ── Solo system ──
  var soloGroup = -1; // -1 = no solo
  var soloStart = 0;
  var soloDuration = 0;
  var nextSoloCheck = 8; // bars until next solo check

  function updateSolo(time) {
    var bar = currentBar(time);

    if (soloGroup >= 0) {
      // Check if solo is over
      if (time - soloStart > soloDuration) {
        soloGroup = -1;
        nextSoloCheck = bar + 4 + Math.floor(Math.random() * 8);
      }
    } else if (bar >= nextSoloCheck) {
      // Maybe start a solo
      if (Math.random() < 0.4) {
        soloGroup = Math.floor(Math.random() * 4); // 0=bass, 1=lead, 2=piano, 3=drums
        soloStart = time;
        soloDuration = beatDuration() * (4 + Math.floor(Math.random() * 8));
        nextSoloCheck = bar + 20;
      } else {
        nextSoloCheck = bar + 2 + Math.floor(Math.random() * 4);
      }
    }
  }

  function groupIntensity(groupIndex) {
    if (soloGroup < 0) return 1.0;
    if (groupIndex === soloGroup) return 1.6;
    return 0.3;
  }

  // ── Instrument group colors (warm amber/gold palette) ──
  // Bass: deep warm amber
  // Lead: bright gold
  // Piano: medium amber
  // Drums: hot bright flash
  var groupColors = [
    { r: 160, g: 100, b: 50 },   // Bass - deep amber brown
    { r: 240, g: 200, b: 100 },  // Lead - bright gold
    { r: 200, g: 149, b: 108 },  // Piano - classic amber
    { r: 255, g: 230, b: 160 }   // Drums - bright flash
  ];

  // ── Particle system ──
  var particles = [];

  // Group 0: Bass - large, slow, pulse on downbeats
  // Group 1: Lead - small, fast, syncopated runs
  // Group 2: Piano - medium, swinging walk
  // Group 3: Drums - bright flashes on offbeats
  var GROUP_COUNTS = [30, 80, 50, 40];
  var totalParticles = 0;
  for (var g = 0; g < GROUP_COUNTS.length; g++) totalParticles += GROUP_COUNTS[g];

  function createParticles() {
    particles = [];

    for (var group = 0; group < 4; group++) {
      var count = GROUP_COUNTS[group];
      for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var dist = 50 + Math.random() * Math.min(width, height) * 0.35;
        var px = cx + Math.cos(angle) * dist;
        var py = cy + Math.sin(angle) * dist;

        var size, baseSpeed;
        if (group === 0) { // Bass
          size = (4 + Math.random() * 4) * _pad;
          baseSpeed = 0.3 + Math.random() * 0.3;
        } else if (group === 1) { // Lead
          size = (1 + Math.random() * 2) * _pad;
          baseSpeed = 1.5 + Math.random() * 2.0;
        } else if (group === 2) { // Piano
          size = (2 + Math.random() * 2.5) * _pad;
          baseSpeed = 0.6 + Math.random() * 0.8;
        } else { // Drums
          size = (1.5 + Math.random() * 2) * _pad;
          baseSpeed = 0.8 + Math.random() * 1.0;
        }

        particles.push({
          group: group,
          x: px,
          y: py,
          prevX: px,
          prevY: py,
          vx: 0,
          vy: 0,
          size: size,
          baseSize: size,
          baseSpeed: baseSpeed,
          phase: Math.random() * Math.PI * 2,
          orbitAngle: angle,
          orbitRadius: dist,
          orbitSpeed: (0.1 + Math.random() * 0.3) * (Math.random() < 0.5 ? 1 : -1),
          brightness: 0.5 + Math.random() * 0.5,
          hueShift: (Math.random() - 0.5) * 30,
          // Syncopation: each particle has its own rhythmic offset
          rhythmOffset: Math.random() * 0.5,
          // Lead run state
          runActive: false,
          runDuration: 0,
          runAngle: 0,
          runSpeed: 0,
          // Flash state (drums)
          flashBright: 0,
          // Interaction response
          responseBright: 0
        });
      }
    }
  }

  createParticles();
  window.addEventListener('resize', function() {
    resize();
    cx = width / 2;
    cy = height / 2;
  });

  // ── Pseudo-random with seed for deterministic rhythmic patterns ──
  function hashTime(t, seed) {
    var x = Math.sin(t * 12.9898 + seed * 78.233) * 43758.5453;
    return x - Math.floor(x);
  }

  // ── Update particles ──
  function updateParticles(dt, time) {
    if (prefersReduced) dt *= 0.1;

    var beatLen = beatDuration();
    var beat = currentBeat(time);
    var bPhase = beatPhase(time);
    var bBar = barPhase(time);

    updateSolo(time);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var intensity = groupIntensity(p.group);

      p.prevX = p.x;
      p.prevY = p.y;

      // Decay interaction response
      p.responseBright *= 0.95;

      if (p.group === 0) {
        // ── BASS: Large particles pulse on downbeats ──
        // Move in slow orbits
        p.orbitAngle += p.orbitSpeed * dt * 0.3 * intensity;
        var targetX = cx + Math.cos(p.orbitAngle) * p.orbitRadius;
        var targetY = cy + Math.sin(p.orbitAngle) * p.orbitRadius;

        p.vx += (targetX - p.x) * 0.01;
        p.vy += (targetY - p.y) * 0.01;
        p.vx *= 0.95;
        p.vy *= 0.95;

        // Pulse on downbeats (beats 0 and 2 in 4/4)
        var downbeatPulse = 0;
        if (beat === 0 || beat === 2) {
          downbeatPulse = swingPulse(time, 1, 0) * intensity;
        }
        p.size = p.baseSize * (1 + downbeatPulse * 0.8);

        // On pulse, burst outward slightly
        if (downbeatPulse > 0.8) {
          var burstAngle = Math.atan2(p.y - cy, p.x - cx);
          p.vx += Math.cos(burstAngle) * 2.0 * intensity;
          p.vy += Math.sin(burstAngle) * 2.0 * intensity;
        }

      } else if (p.group === 1) {
        // ── LEAD: Fast syncopated runs ──
        // Syncopation: trigger runs on unexpected beats
        var syncPhase = (time + p.rhythmOffset * beatLen) / beatLen;
        var syncTrigger = syncPhase % 1;

        // Start a run on syncopated positions
        if (!p.runActive && syncTrigger < 0.05 && hashTime(Math.floor(syncPhase), i) < 0.3 * intensity) {
          p.runActive = true;
          p.runDuration = 0;
          p.runAngle = Math.random() * Math.PI * 2;
          p.runSpeed = (3 + Math.random() * 5) * intensity;
        }

        if (p.runActive) {
          p.runDuration += dt;
          var runLen = beatLen * (0.3 + Math.random() * 0.01); // short burst
          if (p.runDuration > runLen) {
            p.runActive = false;
          } else {
            // Quick burst of movement
            var runDecay = 1 - p.runDuration / runLen;
            p.vx += Math.cos(p.runAngle) * p.runSpeed * runDecay * dt * 60;
            p.vy += Math.sin(p.runAngle) * p.runSpeed * runDecay * dt * 60;
            // Slight curve during run
            p.runAngle += (Math.random() - 0.5) * 0.3;
          }
        } else {
          // When not running, drift gently
          p.orbitAngle += p.orbitSpeed * dt * 0.5;
          var restX = cx + Math.cos(p.orbitAngle) * p.orbitRadius * 0.5;
          var restY = cy + Math.sin(p.orbitAngle) * p.orbitRadius * 0.5;
          p.vx += (restX - p.x) * 0.005;
          p.vy += (restY - p.y) * 0.005;
        }

        p.vx *= 0.92;
        p.vy *= 0.92;

      } else if (p.group === 2) {
        // ── PIANO: Walking swing rhythm (long-short-long-short) ──
        var swingBeatLen = beatLen;
        var walkPhase = ((time + p.rhythmOffset * swingBeatLen) % swingBeatLen) / swingBeatLen;

        // Swing: long note = 0 to (0.5 + swing*0.25), short note = rest
        var swingPoint = 0.5 + SWING * 0.25;
        var isLongNote = walkPhase < swingPoint;

        var walkSpeed;
        if (isLongNote) {
          // During long note: steady walk
          walkSpeed = p.baseSpeed * 1.2 * intensity;
          p.orbitAngle += p.orbitSpeed * dt * walkSpeed;
        } else {
          // During short note: quick step
          walkSpeed = p.baseSpeed * 2.5 * intensity;
          p.orbitAngle += p.orbitSpeed * dt * walkSpeed;
        }

        // Walking path with slight wobble
        var walkWobble = Math.sin(time * 3 + p.phase) * 20;
        var targetX = cx + Math.cos(p.orbitAngle) * (p.orbitRadius + walkWobble);
        var targetY = cy + Math.sin(p.orbitAngle) * (p.orbitRadius + walkWobble);

        p.vx += (targetX - p.x) * 0.03;
        p.vy += (targetY - p.y) * 0.03;
        p.vx *= 0.9;
        p.vy *= 0.9;

        // Subtle size pulse on steps
        var stepPulse = swingPulse(time + p.rhythmOffset * swingBeatLen, 2, SWING);
        p.size = p.baseSize * (1 + stepPulse * 0.3);

      } else if (p.group === 3) {
        // ── DRUMS: Bright flashes on offbeats (and-beats) ──
        // Move in tighter orbits
        p.orbitAngle += p.orbitSpeed * dt * 0.8;
        var targetX = cx + Math.cos(p.orbitAngle) * p.orbitRadius * 0.7;
        var targetY = cy + Math.sin(p.orbitAngle) * p.orbitRadius * 0.7;

        p.vx += (targetX - p.x) * 0.02;
        p.vy += (targetY - p.y) * 0.02;
        p.vx *= 0.93;
        p.vy *= 0.93;

        // Flash on offbeats (the "and" of each beat)
        var subBeatPhase = (time % (beatLen * 0.5)) / (beatLen * 0.5);
        // Apply swing to the offbeat timing
        var offbeatFlash = 0;
        if (bPhase > (0.5 + SWING * 0.15) && bPhase < (0.5 + SWING * 0.15 + 0.12)) {
          offbeatFlash = 1.0 * intensity;
        }

        // Also hi-hat on every eighth note with some randomness
        var eighthPhase = (time % (beatLen * 0.25)) / (beatLen * 0.25);
        if (eighthPhase < 0.08 && hashTime(Math.floor(time / (beatLen * 0.25)), i) < 0.4) {
          offbeatFlash = Math.max(offbeatFlash, 0.5 * intensity);
        }

        p.flashBright = Math.max(p.flashBright * 0.85, offbeatFlash);

        // On flash, jump slightly
        if (offbeatFlash > 0.7) {
          var jumpAngle = Math.random() * Math.PI * 2;
          p.vx += Math.cos(jumpAngle) * 3.0;
          p.vy += Math.sin(jumpAngle) * 3.0;
        }

        p.size = p.baseSize * (1 + p.flashBright * 1.5);
      }

      // Apply velocity
      p.x += p.vx;
      p.y += p.vy;

      // Soft boundary - keep particles in view
      var margin = 80;
      if (p.x < -margin) { p.x = -margin; p.vx *= -0.5; }
      if (p.x > width + margin) { p.x = width + margin; p.vx *= -0.5; }
      if (p.y < -margin) { p.y = -margin; p.vy *= -0.5; }
      if (p.y > height + margin) { p.y = height + margin; p.vy *= -0.5; }
    }

    // ── Inter-group interaction ──
    // When bass hits a downbeat, nearby particles from other groups respond
    if ((beat === 0 || beat === 2) && bPhase < 0.05) {
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        if (p.group === 0) continue; // skip bass themselves

        // Check proximity to any bass particle
        for (var j = 0; j < particles.length; j++) {
          var b = particles[j];
          if (b.group !== 0) continue;

          var dx = p.x - b.x;
          var dy = p.y - b.y;
          var distSq = dx * dx + dy * dy;
          var threshold = 120;

          if (distSq < threshold * threshold) {
            var dist = Math.sqrt(distSq) || 1;
            var force = (1 - dist / threshold) * 2.0;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
            p.responseBright = Math.max(p.responseBright, force * 0.5);
          }
        }
      }
    }

    // When drums flash, nearby lead particles get energized
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.group !== 3 || p.flashBright < 0.5) continue;

      for (var j = 0; j < particles.length; j++) {
        var q = particles[j];
        if (q.group !== 1) continue;

        var dx = q.x - p.x;
        var dy = q.y - p.y;
        var distSq = dx * dx + dy * dy;
        var threshold = 80;

        if (distSq < threshold * threshold) {
          var dist = Math.sqrt(distSq) || 1;
          var force = (1 - dist / threshold) * 1.5 * p.flashBright;
          q.vx += (dx / dist) * force * 0.5;
          q.vy += (dy / dist) * force * 0.5;
          q.responseBright = Math.max(q.responseBright, 0.3);
        }
      }
    }
  }

  // ── Drawing ──
  function drawSpotlight() {
    // Warm stage spotlight from above-center
    var spotX = cx;
    var spotY = cy * 0.6;
    var maxDim = Math.max(width, height);

    var spot = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, maxDim * 0.7);
    spot.addColorStop(0, 'rgba(200, 149, 108, 0.04)');
    spot.addColorStop(0.3, 'rgba(180, 120, 70, 0.02)');
    spot.addColorStop(0.7, 'rgba(100, 60, 30, 0.008)');
    spot.addColorStop(1, 'rgba(10, 10, 10, 0)');
    ctx.fillStyle = spot;
    ctx.fillRect(0, 0, width, height);
  }

  function drawParticles(time) {
    // ── Pass 1: Trails ──
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var dx = p.x - p.prevX;
      var dy = p.y - p.prevY;
      var speed = Math.sqrt(dx * dx + dy * dy);

      if (speed > 1.0) {
        var col = groupColors[p.group];
        var trailAlpha = Math.min(0.3, speed * 0.02) * (0.5 + p.brightness * 0.5);

        // Enhance trail during solo
        if (soloGroup === p.group) trailAlpha *= 1.5;

        var r = Math.min(255, col.r + p.hueShift) | 0;
        var g = Math.min(255, col.g + p.hueShift * 0.5) | 0;
        var b = Math.min(255, col.b + p.hueShift * 0.3) | 0;

        ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + trailAlpha + ')';
        ctx.lineWidth = p.size * 0.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(p.prevX, p.prevY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
    }

    // ── Pass 2: Glow (additive) ──
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var col = groupColors[p.group];
      var glowSize = p.size * 3;
      var glowAlpha = 0.06 + p.brightness * 0.04;

      // Drums flash glow
      if (p.group === 3) {
        glowAlpha += p.flashBright * 0.15;
        glowSize += p.flashBright * 8;
      }

      // Interaction response glow
      glowAlpha += p.responseBright * 0.1;

      // Solo enhancement
      if (soloGroup === p.group) glowAlpha *= 1.4;
      else if (soloGroup >= 0) glowAlpha *= 0.5;

      glowAlpha = Math.min(glowAlpha, 0.3);

      var grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
      grd.addColorStop(0, 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',' + glowAlpha + ')');
      grd.addColorStop(0.5, 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',' + (glowAlpha * 0.3) + ')');
      grd.addColorStop(1, 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    // ── Pass 3: Particle cores ──
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var col = groupColors[p.group];

      var r = Math.min(255, col.r + p.hueShift) | 0;
      var g = Math.min(255, col.g + p.hueShift * 0.5) | 0;
      var b = Math.min(255, col.b + p.hueShift * 0.3) | 0;

      var alpha = 0.6 + p.brightness * 0.3;

      // Drums: flash brightness
      if (p.group === 3) {
        alpha += p.flashBright * 0.4;
        r = Math.min(255, r + p.flashBright * 50) | 0;
        g = Math.min(255, g + p.flashBright * 40) | 0;
        b = Math.min(255, b + p.flashBright * 20) | 0;
      }

      // Interaction response
      alpha += p.responseBright * 0.2;

      // Solo dimming/brightening
      if (soloGroup >= 0 && soloGroup !== p.group) alpha *= 0.4;
      else if (soloGroup === p.group) alpha = Math.min(1, alpha * 1.3);

      alpha = Math.min(1, alpha);

      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();

      // Bright hot center for bass and during flashes
      if (p.group === 0 || (p.group === 3 && p.flashBright > 0.3)) {
        var centerAlpha = (p.group === 0 ? 0.4 : p.flashBright * 0.6) * p.brightness;
        if (soloGroup >= 0 && soloGroup !== p.group) centerAlpha *= 0.3;
        ctx.fillStyle = 'rgba(255, 248, 230,' + centerAlpha + ')';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawVignette() {
    var maxDim = Math.max(width, height);
    var vignette = ctx.createRadialGradient(cx, cy, maxDim * 0.2, cx, cy, maxDim * 0.85);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.55)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Beat indicator: subtle pulse on the stage ──
  function drawBeatPulse(time) {
    var beatLen = beatDuration();
    var pulse = swingPulse(time, 1, 0);
    if (pulse < 0.01) return;

    var alpha = pulse * 0.025;
    var spot = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(width, height) * 0.5);
    spot.addColorStop(0, 'rgba(200, 149, 108,' + alpha + ')');
    spot.addColorStop(0.5, 'rgba(180, 120, 70,' + (alpha * 0.4) + ')');
    spot.addColorStop(1, 'rgba(180, 120, 70, 0)');
    ctx.fillStyle = spot;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Main loop ──
  var lastTime = 0;

  function render(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    var time = timestamp / 1000;

    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    drawSpotlight();
    drawBeatPulse(time);

    updateParticles(dt, time);
    drawParticles(time);

    drawVignette();

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── PostMessage listener for parameter updates ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'TEMPO': TEMPO = e.data.value; break;
        case 'SWING': SWING = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
