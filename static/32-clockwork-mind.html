<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clockwork Mind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">32 — Clockwork Mind</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 32 · Clockwork Mind — Interlocking precision gears
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  // Tunable parameters
  let ROTATION_SPEED = 0.5;
  let GEAR_DETAIL = 1.0;

  var width, height, dpr, cx, cy;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = width / 2;
    cy = height / 2;
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Metallic color palette ──
  var PALETTE = [
    { r: 185, g: 148, b: 100 }, // bronze
    { r: 200, g: 170, b: 110 }, // brass
    { r: 210, g: 175, b: 90  }, // gold
    { r: 175, g: 130, b: 85  }, // copper
    { r: 165, g: 142, b: 108 }, // antique bronze
    { r: 195, g: 160, b: 105 }, // old gold
    { r: 180, g: 155, b: 115 }, // warm silver
    { r: 190, g: 145, b: 95  }, // deep bronze
    { r: 205, g: 180, b: 130 }, // pale brass
    { r: 170, g: 135, b: 90  }, // dark copper
    { r: 200, g: 165, b: 100 }, // amber brass
    { r: 188, g: 152, b: 98  }, // warm bronze
  ];

  // ── Gear definitions ──
  var gearDefs = [];
  var scale;

  // Tooth profile constants — consistent across all gears for proper meshing
  // Each tooth occupies one toothAngle = 2*PI/teeth
  // Tooth land (raised part) is 40% of the pitch, gap is 60%
  // This gives clearance for meshing teeth to fit into gaps
  var TOOTH_LAND_FRACTION = 0.40;  // fraction of tooth pitch that is the raised tooth
  var ADDENDUM_FACTOR = 1.0;       // tooth extends above pitch circle by mod * this
  var DEDENDUM_FACTOR = 1.25;      // tooth root below pitch circle by mod * this

  function buildGearSystem() {
    var minDim = Math.min(width, height) / _pad;
    scale = minDim / 700;

    // Module in px: determines tooth size. All gears share same module for correct meshing.
    // pitchRadius = (teeth * mod) / 2, so mod = 2 * pitchRadius / teeth
    var mod = 4.2 * scale;

    // Define gears: [teeth, spokeStyle, meshWith (parent index)]
    // spokeStyle: 0=solid, 1=spoked, 2=cutout, 3=crossed
    var defs = [
      { teeth: 40, spoke: 1 },                          // 0: Central large gear
      { teeth: 20, spoke: 2, meshWith: 0 },             // 1
      { teeth: 28, spoke: 0, meshWith: 0 },             // 2
      { teeth: 16, spoke: 3, meshWith: 0 },             // 3
      { teeth: 24, spoke: 1, meshWith: 0 },             // 4
      { teeth: 14, spoke: 2, meshWith: 1 },             // 5
      { teeth: 18, spoke: 0, meshWith: 2 },             // 6
      { teeth: 12, spoke: 3, meshWith: 3 },             // 7
      { teeth: 22, spoke: 1, meshWith: 4 },             // 8
      { teeth: 10, spoke: 2, meshWith: 5 },             // 9
      { teeth: 10, spoke: 0, meshWith: 7 },             // 10
      { teeth: 14, spoke: 3, meshWith: 8 },             // 11
    ];

    // Placement angles: angle from parent center to child center
    var placementAngles = [
      0,          // placeholder for central
      -2.4,       // gear 1 from gear 0
      -0.8,       // gear 2 from gear 0
      0.7,        // gear 3 from gear 0
      2.3,        // gear 4 from gear 0
      -3.2,       // gear 5 from gear 1
      -1.5,       // gear 6 from gear 2
      1.5,        // gear 7 from gear 3
      3.1,        // gear 8 from gear 4
      -3.9,       // gear 9 from gear 5
      2.2,        // gear 10 from gear 7
      3.8,        // gear 11 from gear 8
    ];

    gearDefs = [];

    // Create central gear (index 0)
    var centralPitchR = defs[0].teeth * mod / 2;
    gearDefs.push({
      teeth: defs[0].teeth,
      pitchRadius: centralPitchR,
      x: cx,
      y: cy,
      phase: 0,   // phase offset in radians at t=0
      speed: 1,
      direction: 1,
      color: PALETTE[0],
      spokeStyle: defs[0].spoke,
      mod: mod,
      depth: 0,
      parentIdx: -1
    });

    // Create all other gears with correct positioning and phase
    for (var i = 1; i < defs.length; i++) {
      var def = defs[i];
      var parentIdx = def.meshWith;
      var parent = gearDefs[parentIdx];
      var childTeeth = def.teeth;
      var childPitchR = childTeeth * mod / 2;
      var meshDist = parent.pitchRadius + childPitchR;

      // Position child gear
      var placementAngle = placementAngles[i];
      var gx = parent.x + Math.cos(placementAngle) * meshDist;
      var gy = parent.y + Math.sin(placementAngle) * meshDist;

      // Speed ratio: inversely proportional to tooth count
      var speedRatio = parent.teeth / childTeeth;
      var speed = parent.speed * speedRatio;
      // Meshing gears always rotate in opposite directions
      var direction = -parent.direction;

      // ── Correct phase calculation for tooth meshing ──
      //
      // At the contact point (on the line connecting the two gear centers),
      // a tooth on one gear must align with a gap on the other.
      //
      // For parent gear at time t:
      //   parent tooth angle = parent.direction * parent.speed * t * ROTATION_SPEED + parent.phase
      //   A tooth tip is at: rotation + k * (2*PI / parent.teeth) for integer k
      //
      // At t=0, the contact point is at angle `placementAngle` from the parent center.
      // We need: at this angle, a parent tooth center aligns with a child gap center.
      //
      // Parent's tooth positions (centers of tooth tips) at t=0:
      //   theta_parent_tooth_k = parent.phase + k * (2*PI / parent.teeth)
      //
      // The angle from parent center to contact point is `placementAngle`.
      // We need this angle to fall at a tooth center of the parent (or close to one).
      // Actually, we don't control parent.phase here (it's already set), so we figure
      // out where the nearest parent tooth is relative to the contact point, then
      // set child phase so a gap aligns there.
      //
      // Parent tooth angular pitch:
      var parentPitch = (2 * Math.PI) / parent.teeth;
      var childPitch = (2 * Math.PI) / childTeeth;
      //
      // At t=0, the parent tooth nearest the contact point:
      // Contact angle from parent frame = placementAngle
      // Parent rotation at t=0 = parent.phase
      // So in the parent's rotating frame, the contact point is at:
      //   contactInParentFrame = placementAngle - parent.phase
      // Nearest tooth index to this angle:
      //   nearestK = round(contactInParentFrame / parentPitch)
      // Actual tooth angle in world frame:
      //   nearestToothWorld = parent.phase + nearestK * parentPitch
      //
      // But actually, for the meshing to work continuously, we don't need the
      // nearest tooth — we need the phase relationship. The fundamental constraint is:
      //
      //   parent.direction * parent.speed * t + parent.phase   (parent rotation)
      //   child.direction  * child.speed  * t + child.phase    (child rotation)
      //
      // At the contact point, the angular position of each gear's teeth must
      // be complementary. Specifically:
      //
      // The contact point in the parent's frame is at angle `placementAngle`.
      // The contact point in the child's frame is at angle `placementAngle + PI`
      // (opposite direction, since child center is on the other side).
      //
      // For meshing: when a parent tooth is at the contact point, a child VALLEY
      // must be at the contact point. A valley is halfway between two teeth.
      //
      // Parent tooth at contact when:
      //   (parent.phase + placementAngle) mod parentPitch == 0  (tooth center there)
      // But parent.phase is already set, so the fractional offset is:
      var parentFrac = ((parent.phase % parentPitch) + parentPitch) % parentPitch;
      // The actual parent tooth phase at the contact line:
      // In parent's rotating frame, contact is at placementAngle.
      // Parent's teeth in world frame are at: parent.phase + k * parentPitch
      // In parent's local frame (subtract parent.phase rotation at t=0), teeth are at k * parentPitch.
      // The contact point in parent's local frame (at t=0, rotation = parent.phase):
      var contactInParentLocal = placementAngle - parent.phase;
      // The fractional tooth position at contact:
      var parentToothPhaseAtContact = ((contactInParentLocal % parentPitch) + parentPitch) % parentPitch;
      // This tells us: the contact point is `parentToothPhaseAtContact` radians past a tooth center.
      //
      // Now for the child: contact point from child center is at angle (placementAngle + PI).
      // In child's local frame at t=0 (rotation = child.phase):
      //   contactInChildLocal = (placementAngle + PI) - child.phase
      //
      // For meshing, child's tooth phase at contact must be offset by half a pitch (valley):
      //   childToothPhaseAtContact = parentToothPhaseAtContact * (childTeeth / parent.teeth) + childPitch / 2
      //
      // Wait — simpler approach. The fundamental gear meshing constraint:
      //   parent_rotation * parent.teeth + child_rotation * childTeeth = constant
      //
      // This is because for every tooth that passes the contact point on the parent,
      // exactly one tooth must pass on the child (they share the same pitch at the
      // pitch circle contact point).
      //
      // At t=0: parent_rotation = parent.phase, child_rotation = child.phase
      //   parent.phase * parent.teeth + child.phase * childTeeth = C
      //
      // At t=dt: parent_rotation = parent.direction * parent.speed * dt + parent.phase
      //          child_rotation  = child.direction  * child.speed  * dt + child.phase
      //
      //   (parent.direction * parent.speed * dt + parent.phase) * parent.teeth
      //   + (child.direction * child.speed * dt + child.phase) * childTeeth = C
      //
      // This must hold for all dt, which gives:
      //   parent.direction * parent.speed * parent.teeth + child.direction * child.speed * childTeeth = 0
      //
      // Check: parent.speed = S, child.speed = S * parent.teeth / childTeeth
      //   parent.direction * S * parent.teeth + (-parent.direction) * (S * parent.teeth / childTeeth) * childTeeth
      //   = parent.direction * S * parent.teeth - parent.direction * S * parent.teeth = 0 ✓
      //
      // Now we just need C such that teeth interlock (not collide).
      // The condition is: at the contact point, when a parent tooth center is there,
      // a child valley center must be there.
      //
      // At the contact point, the parent "tooth number" (possibly fractional) is:
      //   parent_rotation_at_contact = parent.phase (world rotation)
      //   In the direction of placementAngle from parent center.
      //   Tooth number = (placementAngle - parent.phase) / parentPitch  (in parent local frame)
      //   But more precisely, tooth number = (placementAngle) / parentPitch if phase=0
      //   With phase: the local angle of the contact point = placementAngle - parent.phase
      //   (this is because parent.phase is added to the rotation, so subtract it to get local)
      //
      // Actually let me think about it differently.
      //
      // The draw function does: ctx.rotate(direction * speed * t * ROTATION_SPEED + phase)
      // Then teeth are drawn at angles k * (2*PI/teeth) for k = 0..teeth-1
      //
      // So in world coordinates, tooth k of the parent is at angle:
      //   parentWorldAngle_k = parent.phase + k * parentPitch   (at t=0, direction*speed*0=0)
      //
      // The contact point from parent center is at angle `placementAngle`.
      // The nearest parent tooth center to this angle (continuous fractional tooth index):
      //   fracK = (placementAngle - parent.phase) / parentPitch
      //
      // For the child, its teeth in world coords at t=0:
      //   childWorldAngle_j = child.phase + j * childPitch
      //
      // The contact point from child center is at angle (placementAngle + PI).
      // The nearest child tooth center fractional index:
      //   fracJ = (placementAngle + PI - child.phase) / childPitch
      //
      // For correct meshing, the fractional parts must differ by 0.5:
      //   frac(fracK) and frac(fracJ) must satisfy:
      //     frac(fracJ) = frac(fracK) + 0.5   (mod 1)
      //
      // Wait, that's not quite right either, because the gears have different
      // numbers of teeth. The constraint is simpler:
      //
      //   parent.phase * parent.teeth + child.phase * childTeeth =
      //     placementAngle * parent.teeth + (placementAngle + PI) * childTeeth + PI  (half tooth offset)
      //
      // Hmm, let me just use the direct approach:
      //
      // The contact happens along the line from parent to child center (at placementAngle).
      // At t=0, in parent's local frame, the contact direction is at angle:
      //   localContact_parent = placementAngle - parent.phase
      //
      // The nearest tooth center to this in the parent is at:
      //   nearestParentTooth = round(localContact_parent / parentPitch) * parentPitch
      //
      // The offset of the contact from this nearest tooth:
      //   offsetP = localContact_parent - nearestParentTooth
      //
      // In the child's local frame, the contact direction is at angle:
      //   localContact_child = (placementAngle + PI) - child.phase
      //
      // For meshing, the child must have a VALLEY (gap center) where the parent has a tooth.
      // The angular offset in the child frame, scaled by the gear ratio, must be opposite.
      // Since both pitch circles move at the same linear speed at contact:
      //   offsetP * parent.pitchRadius = -offsetC * child.pitchRadius (linear distance must match)
      //   offsetP * (parent.teeth * mod / 2) = -offsetC * (childTeeth * mod / 2)
      //   offsetP * parent.teeth = -offsetC * childTeeth
      //   offsetC = -offsetP * parent.teeth / childTeeth
      //
      // And we want the child's nearest feature at the contact to be a valley, not a tooth.
      // A valley center is at (k + 0.5) * childPitch.
      //
      // So: localContact_child should be at (k + 0.5) * childPitch + offsetC
      //   (placementAngle + PI) - child.phase = round(...) * childPitch + childPitch/2 + offsetC
      //
      // Simplifying: we want child.phase such that:
      //   The tooth/valley pattern of the child, when rotated by child.phase,
      //   has a valley center at the contact angle offset by offsetC.
      //
      // Let me just solve for child.phase directly:

      // Step 1: Find the parent's tooth phase at the contact point
      var contactAngle = placementAngle;
      var localContactP = contactAngle - parent.phase;
      // Normalize to [0, parentPitch)
      var parentPhaseAtContact2 = ((localContactP % parentPitch) + parentPitch) % parentPitch;
      // This is how far past a tooth center the contact point is (in parent local frame)

      // Step 2: The linear arc-length offset at the pitch circle
      // On the parent pitch circle, the contact point is parentPhaseAtContact2 * parentPitchR past a tooth
      // On the child pitch circle, this same linear distance corresponds to:
      //   childAngularOffset = parentPhaseAtContact2 * parentPitchR / childPitchR
      //                      = parentPhaseAtContact2 * parent.teeth / childTeeth
      // But in opposite angular direction (gears roll opposite ways at contact):
      var childAngularOffset = -parentPhaseAtContact2 * parent.teeth / childTeeth;

      // Step 3: Set child phase so that a valley center (half-pitch offset from tooth)
      // aligns at the contact point
      // Contact in child local frame = (placementAngle + PI) - child.phase
      // We want this to equal: (some integer) * childPitch + childPitch/2 + childAngularOffset
      // => child.phase = (placementAngle + PI) - childAngularOffset - childPitch/2  (mod childPitch)
      var childPhase = (contactAngle + Math.PI) - childAngularOffset - childPitch / 2;
      // Normalize to [-PI, PI) for cleanliness (doesn't affect correctness)
      childPhase = childPhase % (2 * Math.PI);

      gearDefs.push({
        teeth: childTeeth,
        pitchRadius: childPitchR,
        x: gx,
        y: gy,
        phase: childPhase,
        speed: speed,
        direction: direction,
        color: PALETTE[i % PALETTE.length],
        spokeStyle: def.spoke,
        mod: mod,
        depth: parent.depth + 1,
        parentIdx: parentIdx,
        meshAngle: placementAngle
      });
    }
  }

  buildGearSystem();
  window.addEventListener('resize', function() {
    resize();
    buildGearSystem();
  });

  // ── Draw a gear with proper involute-style tooth profile ──
  function drawGear(g, time) {
    var teeth = g.teeth;
    var pr = g.pitchRadius;
    var mod = g.mod;
    var addendum = mod * ADDENDUM_FACTOR;
    var dedendum = mod * DEDENDUM_FACTOR;
    var tipR = pr + addendum;       // outer radius (tooth tip)
    var rootR = pr - dedendum;      // inner radius (tooth root)

    // Current rotation angle
    var rot = g.direction * g.speed * time * ROTATION_SPEED + g.phase;

    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(rot);

    // ── Shadow / depth ──
    if (g.depth > 0) {
      ctx.save();
      ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
      ctx.shadowBlur = 8 * scale;
      ctx.shadowOffsetX = 2 * scale;
      ctx.shadowOffsetY = 2 * scale;
    }

    // ── Gear tooth outline path ──
    // Each tooth spans toothAngle = 2*PI / teeth
    // Tooth center is at baseAngle = k * toothAngle
    // The raised portion (tooth land) spans TOOTH_LAND_FRACTION of the pitch
    // The gap spans (1 - TOOTH_LAND_FRACTION) of the pitch
    ctx.beginPath();
    var toothAngle = (2 * Math.PI) / teeth;
    var halfToothArc = toothAngle * TOOTH_LAND_FRACTION / 2;
    var flangeWidth = toothAngle * 0.06; // width of the transition flank

    for (var t = 0; t < teeth; t++) {
      var baseAngle = t * toothAngle;

      // Angles for tooth profile (symmetric about baseAngle):
      // Root arc: from previous gap end to flank start
      var rootStart = baseAngle - toothAngle / 2;
      var flankStart = baseAngle - halfToothArc - flangeWidth;
      var tipStart = baseAngle - halfToothArc;
      var tipEnd = baseAngle + halfToothArc;
      var flankEnd = baseAngle + halfToothArc + flangeWidth;
      var rootEnd = baseAngle + toothAngle / 2;

      if (t === 0) {
        ctx.moveTo(Math.cos(rootStart) * rootR, Math.sin(rootStart) * rootR);
      }

      // Root arc to start of rise flank
      ctx.arc(0, 0, rootR, rootStart, flankStart, false);

      // Rise flank: smooth curve from root to tip
      var riseCtrlR = (rootR + tipR) / 2 + (tipR - rootR) * 0.15;
      var riseCtrlAngle = (flankStart + tipStart) / 2;
      ctx.quadraticCurveTo(
        Math.cos(riseCtrlAngle) * riseCtrlR,
        Math.sin(riseCtrlAngle) * riseCtrlR,
        Math.cos(tipStart) * tipR,
        Math.sin(tipStart) * tipR
      );

      // Tooth tip arc
      ctx.arc(0, 0, tipR, tipStart, tipEnd, false);

      // Fall flank: smooth curve from tip to root
      var fallCtrlAngle = (tipEnd + flankEnd) / 2;
      ctx.quadraticCurveTo(
        Math.cos(fallCtrlAngle) * riseCtrlR,
        Math.sin(fallCtrlAngle) * riseCtrlR,
        Math.cos(flankEnd) * rootR,
        Math.sin(flankEnd) * rootR
      );

      // Root arc to next tooth
      ctx.arc(0, 0, rootR, flankEnd, rootEnd, false);
    }
    ctx.closePath();

    // ── Metallic gradient fill ──
    var col = g.color;
    var specAngle = time * 0.3 + g.depth * 1.5;
    var specX = Math.cos(specAngle) * pr * 0.3;
    var specY = Math.sin(specAngle) * pr * 0.3;

    var grad = ctx.createRadialGradient(specX, specY, pr * 0.05, 0, 0, tipR);
    var brightR = Math.min(255, col.r + 70);
    var brightG = Math.min(255, col.g + 60);
    var brightB = Math.min(255, col.b + 50);
    var darkR = Math.max(0, col.r - 60) | 0;
    var darkG = Math.max(0, col.g - 60) | 0;
    var darkB = Math.max(0, col.b - 60) | 0;

    grad.addColorStop(0, 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',0.95)');
    grad.addColorStop(0.3, 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.88)');
    grad.addColorStop(0.7, 'rgba(' + (col.r - 30) + ',' + (col.g - 30) + ',' + (col.b - 25) + ',0.85)');
    grad.addColorStop(1, 'rgba(' + darkR + ',' + darkG + ',' + darkB + ',0.9)');

    ctx.fillStyle = grad;
    ctx.fill();

    // ── Edge highlight / bevel ──
    ctx.strokeStyle = 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',0.25)';
    ctx.lineWidth = 0.8 * scale;
    ctx.stroke();

    if (g.depth > 0) {
      ctx.restore();
    }

    // ── Surface etching / detail lines (scaled by GEAR_DETAIL) ──
    if (GEAR_DETAIL > 0.3) {
      var etchAlpha = 0.08 * Math.min(GEAR_DETAIL, 1.5);

      // Concentric circles on gear face
      var numRings = Math.floor(3 * GEAR_DETAIL);
      for (var ring = 1; ring <= numRings; ring++) {
        var ringR = rootR * (0.35 + 0.15 * ring);
        if (ringR > rootR - 2) break;
        ctx.beginPath();
        ctx.arc(0, 0, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',' + etchAlpha + ')';
        ctx.lineWidth = 0.5 * scale;
        ctx.stroke();
      }

      // Radial tick marks
      if (GEAR_DETAIL >= 0.7) {
        var numTicks = teeth * 2;
        var tickInner = rootR * 0.5;
        var tickOuter = rootR * 0.55;
        for (var tk = 0; tk < numTicks; tk++) {
          var ta = (tk / numTicks) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(Math.cos(ta) * tickInner, Math.sin(ta) * tickInner);
          ctx.lineTo(Math.cos(ta) * tickOuter, Math.sin(ta) * tickOuter);
          ctx.strokeStyle = 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',' + (etchAlpha * 0.7) + ')';
          ctx.lineWidth = 0.4 * scale;
          ctx.stroke();
        }
      }

      // Cross-hatch pattern on some gears
      if (GEAR_DETAIL >= 1.2 && (g.spokeStyle === 0 || g.spokeStyle === 2)) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(0, 0, rootR * 0.4, 0, Math.PI * 2);
        ctx.clip();

        var step = 6 * scale;
        var span = rootR * 0.4;
        ctx.strokeStyle = 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',' + (etchAlpha * 0.4) + ')';
        ctx.lineWidth = 0.3 * scale;
        for (var hx = -span; hx <= span; hx += step) {
          ctx.beginPath();
          ctx.moveTo(hx, -span);
          ctx.lineTo(hx, span);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-span, hx);
          ctx.lineTo(span, hx);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // ── Spoke / cutout patterns ──
    var hubR = Math.max(pr * 0.12, 4 * scale);
    var spokeOuterR = rootR * 0.85;

    if (g.spokeStyle === 1 && pr > 20 * scale) {
      var numSpokes = pr > 50 * scale ? 6 : 5;
      var cutoutInnerR = hubR + 4 * scale;
      var cutoutOuterR = spokeOuterR - 2 * scale;

      for (var s = 0; s < numSpokes; s++) {
        var sa1 = (s / numSpokes) * Math.PI * 2 + 0.05;
        var sa2 = ((s + 1) / numSpokes) * Math.PI * 2 - 0.05;

        ctx.beginPath();
        ctx.arc(0, 0, cutoutOuterR, sa1, sa2, false);
        ctx.arc(0, 0, cutoutInnerR, sa2, sa1, true);
        ctx.closePath();
        ctx.fillStyle = 'rgba(8, 8, 8, 0.65)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(' + darkR + ',' + darkG + ',' + darkB + ',0.3)';
        ctx.lineWidth = 0.5 * scale;
        ctx.stroke();
      }
    } else if (g.spokeStyle === 2 && pr > 18 * scale) {
      var numHoles = pr > 40 * scale ? 5 : 4;
      var holeR = (spokeOuterR - hubR) * 0.3;
      var holeDist = (hubR + spokeOuterR) / 2;
      for (var h = 0; h < numHoles; h++) {
        var ha = (h / numHoles) * Math.PI * 2;
        var hx2 = Math.cos(ha) * holeDist;
        var hy2 = Math.sin(ha) * holeDist;
        ctx.beginPath();
        ctx.arc(hx2, hy2, holeR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(8, 8, 8, 0.6)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(' + darkR + ',' + darkG + ',' + darkB + ',0.35)';
        ctx.lineWidth = 0.6 * scale;
        ctx.stroke();
      }
    } else if (g.spokeStyle === 3 && pr > 18 * scale) {
      ctx.strokeStyle = 'rgba(' + darkR + ',' + darkG + ',' + darkB + ',0.25)';
      ctx.lineWidth = 1.5 * scale;
      for (var cs = 0; cs < 4; cs++) {
        var csa = (cs / 4) * Math.PI * 2 + Math.PI / 8;
        ctx.beginPath();
        ctx.moveTo(Math.cos(csa) * hubR, Math.sin(csa) * hubR);
        ctx.lineTo(Math.cos(csa) * spokeOuterR, Math.sin(csa) * spokeOuterR);
        ctx.stroke();
      }
      for (var cs2 = 0; cs2 < 4; cs2++) {
        var arcA1 = (cs2 / 4) * Math.PI * 2 + Math.PI / 8 + 0.15;
        var arcA2 = ((cs2 + 1) / 4) * Math.PI * 2 + Math.PI / 8 - 0.15;
        var cutR = (hubR + spokeOuterR) / 2;
        var cutSize = (spokeOuterR - hubR) * 0.28;
        var arcMid = (arcA1 + arcA2) / 2;
        ctx.beginPath();
        ctx.arc(Math.cos(arcMid) * cutR, Math.sin(arcMid) * cutR, cutSize, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(8, 8, 8, 0.55)';
        ctx.fill();
      }
    }

    // ── Central hub / axle ──
    var hubGrad = ctx.createRadialGradient(0, 0, hubR * 0.2, 0, 0, hubR * 1.5);
    hubGrad.addColorStop(0, 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',0.9)');
    hubGrad.addColorStop(0.5, 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.85)');
    hubGrad.addColorStop(1, 'rgba(' + darkR + ',' + darkG + ',' + darkB + ',0.8)');

    ctx.beginPath();
    ctx.arc(0, 0, hubR * 1.4, 0, Math.PI * 2);
    ctx.fillStyle = hubGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',0.3)';
    ctx.lineWidth = 0.6 * scale;
    ctx.stroke();

    // Inner axle hole
    ctx.beginPath();
    ctx.arc(0, 0, hubR * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(15, 12, 10, 0.9)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.2)';
    ctx.lineWidth = 0.5 * scale;
    ctx.stroke();

    // Decorative screws/dots on hub
    if (hubR > 5 * scale) {
      var numDots = 3;
      var dotDist = hubR * 0.95;
      var dotR2 = Math.max(1, hubR * 0.15);
      for (var d = 0; d < numDots; d++) {
        var da = (d / numDots) * Math.PI * 2 + rot * 0.2;
        var dx = Math.cos(da) * dotDist;
        var dy = Math.sin(da) * dotDist;
        ctx.beginPath();
        ctx.arc(dx, dy, dotR2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + brightR + ',' + brightG + ',' + brightB + ',0.5)';
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // ── Background texture ──
  function drawBackground() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    if (GEAR_DETAIL >= 0.5) {
      var gridSpacing = 24;
      ctx.fillStyle = 'rgba(200, 149, 108, 0.012)';
      for (var gx = 0; gx < width; gx += gridSpacing) {
        for (var gy = 0; gy < height; gy += gridSpacing) {
          ctx.fillRect(gx, gy, 1, 1);
        }
      }
    }

    var vig = ctx.createRadialGradient(cx, cy, Math.min(width, height) * 0.15, cx, cy, Math.max(width, height) * 0.65);
    vig.addColorStop(0, 'rgba(25, 20, 15, 0.0)');
    vig.addColorStop(0.5, 'rgba(10, 10, 10, 0.0)');
    vig.addColorStop(1, 'rgba(5, 3, 2, 0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Ambient glow behind gears ──
  function drawAmbientGlow(time) {
    var glowR = Math.min(width, height) * 0.35;
    var pulse = 1 + 0.05 * Math.sin(time * 0.8);
    var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR * pulse);
    glow.addColorStop(0, 'rgba(200, 149, 108, 0.04)');
    glow.addColorStop(0.4, 'rgba(185, 140, 90, 0.02)');
    glow.addColorStop(1, 'rgba(185, 140, 90, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, width, height);

    var glow2X = cx + Math.cos(time * 0.15) * 60 * scale;
    var glow2Y = cy + Math.sin(time * 0.2) * 40 * scale;
    var glow2 = ctx.createRadialGradient(glow2X, glow2Y, 0, glow2X, glow2Y, glowR * 0.5);
    glow2.addColorStop(0, 'rgba(210, 175, 90, 0.03)');
    glow2.addColorStop(1, 'rgba(210, 175, 90, 0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Floating dust/spark particles ──
  var particles = [];
  var NUM_PARTICLES = 30;

  function initParticles() {
    particles = [];
    for (var i = 0; i < NUM_PARTICLES; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15 - 0.1,
        size: 0.5 + Math.random() * 1.5,
        alpha: 0.1 + Math.random() * 0.25,
        life: Math.random() * 200,
        maxLife: 200 + Math.random() * 200
      });
    }
  }
  initParticles();

  function updateAndDrawParticles(time) {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life++;

      if (p.life > p.maxLife || p.x < -20 || p.x > width + 20 || p.y < -20 || p.y > height + 20) {
        p.x = cx + (Math.random() - 0.5) * Math.min(width, height) * 0.6;
        p.y = cy + (Math.random() - 0.5) * Math.min(height, width) * 0.6;
        p.life = 0;
        p.maxLife = 200 + Math.random() * 200;
      }

      var fadeIn = Math.min(1, p.life / 30);
      var fadeOut = Math.max(0, 1 - (p.life - p.maxLife + 30) / 30);
      var alpha = p.alpha * fadeIn * fadeOut;

      if (alpha > 0.01) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * scale, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(210, 180, 130, ' + alpha + ')';
        ctx.fill();
      }
    }
  }

  // ── Main render loop ──
  var startTime = null;
  var running = true;

  function render(timestamp) {
    if (!running) {
      requestAnimationFrame(render);
      return;
    }

    if (!startTime) startTime = timestamp;
    var time = prefersReduced ? 0 : (timestamp - startTime) / 1000;

    drawBackground();
    drawAmbientGlow(time);

    // Draw gears back-to-front (higher depth = drawn later = on top)
    var sortedIndices = [];
    for (var i = 0; i < gearDefs.length; i++) sortedIndices.push(i);
    sortedIndices.sort(function(a, b) {
      return gearDefs[b].depth - gearDefs[a].depth;
    });

    for (var si = 0; si < sortedIndices.length; si++) {
      drawGear(gearDefs[sortedIndices[si]], time);
    }

    updateAndDrawParticles(time);

    // Top vignette layer
    var topVig = ctx.createRadialGradient(cx, cy, Math.min(width, height) * 0.3, cx, cy, Math.max(width, height) * 0.7);
    topVig.addColorStop(0, 'rgba(10, 10, 10, 0)');
    topVig.addColorStop(1, 'rgba(5, 3, 2, 0.35)');
    ctx.fillStyle = topVig;
    ctx.fillRect(0, 0, width, height);

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Visibility handling ──
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      startTime = null;
    }
  });

  // ── PostMessage param listener ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'ROTATION_SPEED': ROTATION_SPEED = e.data.value; break;
        case 'GEAR_DETAIL': GEAR_DETAIL = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
