<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champagne Fizz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">10 — Champagne Fizz</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  var width, height, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // Tunable parameters
  let BUBBLE_RATE = 3;
  let RISE_SPEED = 1.5;

  // Bubble pool
  var bubbles = [];
  var sparkles = [];
  var MAX_BUBBLES = 600;
  var MAX_SPARKLES = 200;

  // Nucleation sites - fixed points along the bottom where bubbles tend to form
  var nucleationSites = [];
  var NUM_SITES = 12;

  function initNucleationSites() {
    nucleationSites = [];
    for (var i = 0; i < NUM_SITES; i++) {
      nucleationSites.push({
        x: width * 0.1 + (width * 0.8) * (i / (NUM_SITES - 1)) + (Math.random() - 0.5) * 40,
        jitter: Math.random() * 20
      });
    }
  }

  initNucleationSites();
  window.addEventListener('resize', initNucleationSites);

  function spawnBubble() {
    if (bubbles.length >= MAX_BUBBLES) return;

    // Pick a nucleation site or a random bottom position
    var x;
    if (Math.random() < 0.7) {
      var site = nucleationSites[Math.floor(Math.random() * nucleationSites.length)];
      x = site.x + (Math.random() - 0.5) * site.jitter;
    } else {
      x = Math.random() * width;
    }

    // Size distribution: mostly tiny, occasionally larger
    var sizeRoll = Math.random();
    var radius;
    if (sizeRoll < 0.55) {
      radius = 1 + Math.random() * 2; // tiny: 1-3
    } else if (sizeRoll < 0.85) {
      radius = 2.5 + Math.random() * 3; // small: 2.5-5.5
    } else if (sizeRoll < 0.96) {
      radius = 5 + Math.random() * 4; // medium: 5-9
    } else {
      radius = 8 + Math.random() * 5; // large: 8-13
    }

    radius *= _pad;

    // Slightly randomize the amber tint per bubble for variety
    var hueShift = (Math.random() - 0.5) * 20;

    bubbles.push({
      x: x,
      y: height + radius,
      radius: radius,
      baseRadius: radius,
      // wobble parameters
      wobblePhase: Math.random() * Math.PI * 2,
      wobbleFreq: 1.5 + Math.random() * 1.5,
      wobbleAmp: (0.3 + Math.random() * 0.7) * radius,
      // speed variation
      speedMult: 0.7 + Math.random() * 0.6,
      // visual properties
      hueShift: hueShift,
      opacity: 0.3 + Math.random() * 0.4,
      highlightAngle: -0.6 + Math.random() * 0.3, // top-left highlight
      age: 0,
      // slight size pulsing
      pulsePhase: Math.random() * Math.PI * 2,
      pulseRate: 2 + Math.random() * 2
    });
  }

  function spawnSparkle(x, y, bubbleRadius) {
    var count = Math.floor(3 + bubbleRadius * 0.8);
    if (count > 8) count = 8;

    for (var i = 0; i < count; i++) {
      if (sparkles.length >= MAX_SPARKLES) return;
      var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      var speed = 0.5 + Math.random() * 2 + bubbleRadius * 0.15;
      sparkles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 0.5, // slight upward bias
        life: 1.0,
        decay: 0.02 + Math.random() * 0.03,
        size: 0.5 + Math.random() * 1.5 + bubbleRadius * 0.1
      });
    }
  }

  // Surface line y position
  function getSurfaceY() {
    return height * 0.04;
  }

  function updateBubbles(dt) {
    var surfaceY = getSurfaceY();
    var i = bubbles.length;

    while (i--) {
      var b = bubbles[i];
      b.age += dt;

      // Rise speed - smaller bubbles rise slightly slower (Stokes' law feel)
      var sizeSpeedFactor = 0.6 + 0.4 * Math.min(b.baseRadius / (10 * _pad), 1);
      var riseAmount = RISE_SPEED * b.speedMult * sizeSpeedFactor * dt * 60;
      b.y -= riseAmount;

      // Sinusoidal wobble
      b.wobblePhase += b.wobbleFreq * dt;
      b.x += Math.sin(b.wobblePhase) * b.wobbleAmp * dt * 2;

      // Subtle size pulse
      b.radius = b.baseRadius * (1 + 0.05 * Math.sin(b.age * b.pulseRate));

      // As bubbles rise, they expand slightly (pressure decreases)
      var heightFraction = 1 - (b.y / height);
      b.radius *= 1 + heightFraction * 0.15;

      // Check for surface pop
      if (b.y - b.radius <= surfaceY) {
        spawnSparkle(b.x, surfaceY, b.baseRadius);
        bubbles.splice(i, 1);
        continue;
      }

      // Remove if way off screen
      if (b.x < -50 || b.x > width + 50) {
        bubbles.splice(i, 1);
      }
    }
  }

  function updateSparkles(dt) {
    var i = sparkles.length;
    while (i--) {
      var s = sparkles[i];
      s.x += s.vx * dt * 60;
      s.y += s.vy * dt * 60;
      s.vy += 0.02 * dt * 60; // tiny gravity
      s.life -= s.decay * dt * 60;
      if (s.life <= 0) {
        sparkles.splice(i, 1);
      }
    }
  }

  function drawBubble(b) {
    var r = b.radius;
    if (r < 0.5) return;

    var x = b.x;
    var y = b.y;

    // Fade in during first moments
    var fadeIn = Math.min(b.age * 3, 1);

    // Main bubble body - subtle transparent fill
    var bodyAlpha = b.opacity * 0.25 * fadeIn;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 180, 140, ' + bodyAlpha + ')';
    ctx.fill();

    // Bubble rim/edge - thin bright ring
    var rimAlpha = b.opacity * 0.4 * fadeIn;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(220, 190, 150, ' + rimAlpha + ')';
    ctx.lineWidth = Math.max(0.5, r * 0.08);
    ctx.stroke();

    // Inner refraction highlight - bright arc on upper-left
    if (r > 1.5) {
      var hlR = r * 0.65;
      var hlX = x - r * 0.25;
      var hlY = y - r * 0.25;
      var hlAlpha = b.opacity * 0.6 * fadeIn;

      // Create a crescent highlight using a clipped arc
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r * 0.92, 0, Math.PI * 2);
      ctx.clip();

      var hlGrad = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, hlR);
      hlGrad.addColorStop(0, 'rgba(255, 245, 220, ' + hlAlpha * 0.9 + ')');
      hlGrad.addColorStop(0.3, 'rgba(240, 210, 170, ' + hlAlpha * 0.5 + ')');
      hlGrad.addColorStop(0.7, 'rgba(200, 170, 130, ' + hlAlpha * 0.1 + ')');
      hlGrad.addColorStop(1, 'rgba(200, 170, 130, 0)');
      ctx.fillStyle = hlGrad;
      ctx.beginPath();
      ctx.arc(hlX, hlY, hlR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Small specular dot
      if (r > 3) {
        var specAlpha = b.opacity * 0.8 * fadeIn;
        var specX = x - r * 0.3;
        var specY = y - r * 0.35;
        var specR = Math.max(0.8, r * 0.12);
        ctx.beginPath();
        ctx.arc(specX, specY, specR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 252, 240, ' + specAlpha + ')';
        ctx.fill();
      }
    }

    // Bottom refraction - subtle secondary highlight
    if (r > 4) {
      var btmAlpha = b.opacity * 0.15 * fadeIn;
      var btmX = x + r * 0.15;
      var btmY = y + r * 0.35;
      var btmR = r * 0.3;
      var btmGrad = ctx.createRadialGradient(btmX, btmY, 0, btmX, btmY, btmR);
      btmGrad.addColorStop(0, 'rgba(230, 200, 160, ' + btmAlpha + ')');
      btmGrad.addColorStop(1, 'rgba(230, 200, 160, 0)');
      ctx.fillStyle = btmGrad;
      ctx.beginPath();
      ctx.arc(btmX, btmY, btmR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawSparkles() {
    for (var i = 0; i < sparkles.length; i++) {
      var s = sparkles[i];
      var alpha = s.life * 0.9;
      var size = s.size * s.life;

      // Starburst shape - draw a small cross/star
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.globalAlpha = alpha;

      // Warm sparkle glow
      var glowR = size * 3;
      var glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
      glow.addColorStop(0, 'rgba(255, 240, 200, 0.8)');
      glow.addColorStop(0.3, 'rgba(220, 180, 120, 0.3)');
      glow.addColorStop(1, 'rgba(200, 149, 108, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fill();

      // Bright center point
      ctx.fillStyle = 'rgba(255, 250, 235, 1)';
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(0.3, size * 0.4), 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawSurface(time) {
    var surfaceY = getSurfaceY();

    // Subtle undulating surface line
    ctx.beginPath();
    ctx.moveTo(0, surfaceY);
    for (var x = 0; x <= width; x += 4) {
      var wave = Math.sin(x * 0.01 + time * 1.2) * 1.5
               + Math.sin(x * 0.025 + time * 0.8) * 0.8
               + Math.sin(x * 0.005 + time * 0.5) * 2;
      ctx.lineTo(x, surfaceY + wave);
    }
    ctx.strokeStyle = 'rgba(200, 170, 130, 0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Subtle glow along the surface
    var surfGrad = ctx.createLinearGradient(0, surfaceY - 15, 0, surfaceY + 25);
    surfGrad.addColorStop(0, 'rgba(200, 170, 130, 0)');
    surfGrad.addColorStop(0.4, 'rgba(200, 170, 130, 0.04)');
    surfGrad.addColorStop(0.6, 'rgba(200, 170, 130, 0.03)');
    surfGrad.addColorStop(1, 'rgba(200, 170, 130, 0)');
    ctx.fillStyle = surfGrad;
    ctx.fillRect(0, surfaceY - 15, width, 40);
  }

  function drawAmbientStreams(time) {
    // Very faint vertical light streams to suggest liquid column
    ctx.save();
    for (var i = 0; i < 5; i++) {
      var sx = width * (0.15 + 0.7 * (i / 4)) + Math.sin(time * 0.3 + i * 2.1) * 30;
      var streamGrad = ctx.createLinearGradient(sx, height, sx, 0);
      streamGrad.addColorStop(0, 'rgba(200, 149, 108, 0.015)');
      streamGrad.addColorStop(0.5, 'rgba(200, 149, 108, 0.008)');
      streamGrad.addColorStop(1, 'rgba(200, 149, 108, 0)');
      ctx.fillStyle = streamGrad;
      ctx.fillRect(sx - 30, 0, 60, height);
    }
    ctx.restore();
  }

  function drawVignette() {
    var cx = width / 2;
    var cy = height / 2;
    var maxDim = Math.max(width, height);
    var vignette = ctx.createRadialGradient(cx, cy, maxDim * 0.25, cx, cy, maxDim * 0.8);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.4)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);
  }

  // Animation state
  var lastTime = 0;
  var spawnAccumulator = 0;

  function render(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap delta
    lastTime = timestamp;

    if (prefersReduced) dt = 0;

    // Clear
    ctx.clearRect(0, 0, width, height);

    // Background fill
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    var time = timestamp / 1000;

    // Spawn bubbles
    spawnAccumulator += BUBBLE_RATE * dt * 60;
    while (spawnAccumulator >= 1) {
      spawnBubble();
      spawnAccumulator -= 1;
    }

    // Update
    updateBubbles(dt);
    updateSparkles(dt);

    // Draw layers
    drawAmbientStreams(time);

    // Draw bubbles sorted by size (smaller on top for depth)
    bubbles.sort(function(a, b) { return b.radius - a.radius; });
    for (var i = 0; i < bubbles.length; i++) {
      drawBubble(bubbles[i]);
    }

    drawSparkles();
    drawSurface(time);
    drawVignette();

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'BUBBLE_RATE': BUBBLE_RATE = Math.round(e.data.value); break;
        case 'RISE_SPEED': RISE_SPEED = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
