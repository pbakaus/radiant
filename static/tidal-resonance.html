<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Resonance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Tidal Resonance</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 16 · Tidal Resonance — Ocean wave interference & deep water caustics
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_waveSpeed;',
    'uniform float u_depth;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '',
    'mat2 rot(float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    '// ── Hash & noise ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── Fractional Brownian Motion ──',
    'float fbm(vec2 p) {',
    '  float v = 0.0, a = 0.5;',
    '  mat2 r = rot(0.37);',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * noise(p);',
    '    p = r * p * 2.1 + vec2(1.7, 9.2);',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Ocean wave system ──',
    '// Multiple overlapping wave trains at different angles & frequencies',
    '// simulating real ocean wave interference (tidal resonance)',
    'float oceanWaves(vec2 p, float t) {',
    '  float h = 0.0;',
    '  float speed = t * 0.8;',
    '',
    '  // Wave system 1: primary swell from northwest',
    '  vec2 d1 = normalize(vec2(0.7, 0.5));',
    '  h += sin(dot(p, d1) * 2.5 - speed * 1.2 + sin(dot(p, d1) * 0.8) * 0.6) * 0.35;',
    '',
    '  // Wave system 2: secondary swell from east',
    '  vec2 d2 = normalize(vec2(-0.6, 0.3));',
    '  h += sin(dot(p, d2) * 3.2 - speed * 0.9 + cos(dot(p, d2) * 1.1) * 0.5) * 0.28;',
    '',
    '  // Wave system 3: cross-wave interference from south',
    '  vec2 d3 = normalize(vec2(0.2, -0.8));',
    '  h += sin(dot(p, d3) * 4.1 - speed * 1.5 + sin(dot(p, d3) * 1.5 + t * 0.3) * 0.4) * 0.2;',
    '',
    '  // Wave system 4: fine ripples, wind-driven',
    '  vec2 d4 = normalize(vec2(-0.4, -0.6));',
    '  h += sin(dot(p, d4) * 6.5 - speed * 2.0) * 0.1;',
    '',
    '  // Wave system 5: subtle long-period swell',
    '  vec2 d5 = normalize(vec2(0.9, -0.2));',
    '  h += sin(dot(p, d5) * 1.4 - speed * 0.5 + 1.5) * 0.25;',
    '',
    '  // Wave system 6: diagonal cross-chop',
    '  vec2 d6 = normalize(vec2(-0.3, 0.9));',
    '  h += sin(dot(p, d6) * 5.0 - speed * 1.8 + cos(dot(p, d6) * 2.0) * 0.3) * 0.12;',
    '',
    '  return h;',
    '}',
    '',
    '// ── Sharper wave crests using Gerstner-style shaping ──',
    'float sharpWaves(vec2 p, float t) {',
    '  float h = oceanWaves(p, t);',
    '  // Sharpen crests, flatten troughs — like real ocean waves',
    '  // Asymmetric: crests are narrow and bright, troughs are wide and dark',
    '  float sharp = sign(h) * pow(abs(h), 0.7);',
    '  return mix(h, sharp, 0.6);',
    '}',
    '',
    '// ── Caustic pattern for sea floor ──',
    '// Light refracting through the wave surface creates',
    '// bright dancing patterns on the ocean floor',
    'float caustics(vec2 p, float t) {',
    '  float c = 0.0;',
    '  // Two caustic layers at different scales, counter-rotating',
    '  vec2 p1 = p * 3.5;',
    '  p1 = rot(t * 0.15) * p1;',
    '  float t1 = t * 0.6;',
    '  vec2 w1 = vec2(',
    '    sin(p1.y * 2.3 + t1 + cos(p1.x * 1.8 + t1 * 0.7)) * 0.7,',
    '    cos(p1.x * 2.1 + t1 * 0.8 + sin(p1.y * 1.9 - t1 * 0.5)) * 0.7',
    '  );',
    '  vec2 w2 = vec2(',
    '    cos(p1.y * 3.5 - t1 * 0.6 + sin(p1.x * 2.8)) * 0.4,',
    '    sin(p1.x * 3.2 + t1 * 0.4 + cos(p1.y * 3.0)) * 0.4',
    '  );',
    '  vec2 wp = p1 + w1 + w2;',
    '  float v1 = sin(wp.x * 2.5 + wp.y * 1.3);',
    '  float v2 = sin(wp.y * 2.7 - wp.x * 1.1 + 1.5);',
    '  c = (v1 * v1 + v2 * v2) * 0.5;',
    '  c = pow(c, 2.5);',
    '',
    '  // Second caustic layer — finer detail',
    '  vec2 p2 = p * 6.0;',
    '  p2 = rot(-t * 0.12 + 0.7) * p2;',
    '  float t2 = t * 0.5;',
    '  vec2 w3 = vec2(',
    '    sin(p2.y * 1.9 + t2 * 1.1 + cos(p2.x * 2.5)) * 0.5,',
    '    cos(p2.x * 2.2 + t2 * 0.9 + sin(p2.y * 2.7)) * 0.5',
    '  );',
    '  vec2 wp2 = p2 + w3;',
    '  float v3 = sin(wp2.x * 3.0 + wp2.y * 1.8 + 0.5);',
    '  float v4 = sin(wp2.y * 2.8 - wp2.x * 2.2 + 2.0);',
    '  float c2 = (v3 * v3 + v4 * v4) * 0.5;',
    '  c2 = pow(c2, 3.0);',
    '',
    '  return c * 0.7 + c2 * 0.3;',
    '}',
    '',
    '// ── Wave surface normal approximation ──',
    '// Used for specular highlights on wave crests',
    'vec3 waveNormal(vec2 p, float t) {',
    '  float eps = 0.02;',
    '  float hc = sharpWaves(p, t);',
    '  float hx = sharpWaves(p + vec2(eps, 0.0), t);',
    '  float hy = sharpWaves(p + vec2(0.0, eps), t);',
    '  vec3 n = normalize(vec3(hc - hx, hc - hy, eps * 2.0));',
    '  return n;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time * u_waveSpeed;',
    '  float depth = u_depth;',
    '',
    '  // ── Scale for ocean-like proportions ──',
    '  vec2 oceanUV = uv * 4.0;',
    '',
    '  // Slow global drift — the "camera" moves over the ocean',
    '  oceanUV += vec2(t * 0.08, t * 0.05);',
    '',
    '  // ── Surface wave height ──',
    '  float waveHeight = sharpWaves(oceanUV, t);',
    '',
    '  // Add subtle fbm turbulence for organic feel',
    '  float turb = fbm(oceanUV * 1.5 + t * 0.1) * 0.15;',
    '  waveHeight += turb;',
    '',
    '  // ── Surface normal for lighting ──',
    '  vec3 normal = waveNormal(oceanUV, t);',
    '',
    '  // ── Specular highlights — moonlight/ambient on crests ──',
    '  vec3 lightDir = normalize(vec3(0.3, 0.4, 1.0));',
    '  float spec = pow(max(dot(normal, lightDir), 0.0), 24.0);',
    '',
    '  // Second specular from different angle for richness',
    '  vec3 lightDir2 = normalize(vec3(-0.5, 0.2, 0.8));',
    '  float spec2 = pow(max(dot(normal, lightDir2), 0.0), 16.0);',
    '',
    '  // ── Fresnel-like rim glow on wave crests ──',
    '  float fresnel = pow(1.0 - abs(normal.z), 3.0);',
    '',
    '  // ── Deep water caustics on the sea floor ──',
    '  // Offset by wave height for refraction effect',
    '  vec2 caustUV = oceanUV + normal.xy * 0.3 * depth;',
    '  float caust = caustics(caustUV * 0.5, t);',
    '',
    '  // ── Color composition ──',
    '',
    '  // Deep ocean base — dark teal/navy abyss',
    '  vec3 deepColor = vec3(0.01, 0.04, 0.08);',
    '',
    '  // Mid-depth water — dark teal',
    '  vec3 midColor = vec3(0.02, 0.08, 0.14);',
    '',
    '  // Shallow water / wave body — moody teal-blue',
    '  vec3 shallowColor = vec3(0.04, 0.12, 0.18);',
    '',
    '  // Wave crest highlight — warm amber/gold from project palette',
    '  vec3 crestColor = vec3(0.78, 0.58, 0.42);',
    '',
    '  // Bright specular — warm white-gold',
    '  vec3 specColor = vec3(1.0, 0.85, 0.6);',
    '',
    '  // Caustic light — aqua-teal glow on the floor',
    '  vec3 causticColor = vec3(0.1, 0.35, 0.4);',
    '',
    '  // Normalize wave height to 0-1 for color mixing',
    '  float hn = waveHeight * 0.5 + 0.5;',
    '  hn = clamp(hn, 0.0, 1.0);',
    '',
    '  // ── Layer the depth ──',
    '  // Bottom layer: caustics on the sea floor, fading with depth',
    '  float caustIntensity = caust * (0.3 + 0.2 * depth);',
    '  vec3 floorColor = deepColor + causticColor * caustIntensity;',
    '',
    '  // Mid layer: volume of water, tinted by depth',
    '  vec3 waterBody = mix(deepColor, midColor, hn * 0.6);',
    '  waterBody = mix(waterBody, shallowColor, pow(hn, 2.0) * 0.5);',
    '',
    '  // Blend floor caustics up through the water (attenuated)',
    '  float depthFade = 0.3 + 0.4 * (1.0 - depth);',
    '  vec3 col = mix(floorColor, waterBody, depthFade);',
    '',
    '  // Surface layer: wave crests with warm highlights',
    '  float crestMask = smoothstep(0.55, 0.85, hn);',
    '  col = mix(col, crestColor * 0.25, crestMask * 0.6);',
    '',
    '  // ── Specular highlights on crests ──',
    '  col += specColor * spec * 0.65 * crestMask;',
    '  col += specColor * spec2 * 0.3 * smoothstep(0.4, 0.7, hn);',
    '',
    '  // ── Fresnel rim on wave edges ──',
    '  col += crestColor * fresnel * 0.15;',
    '',
    '  // ── Subsurface scattering effect ──',
    '  // Waves that are thin at the crest let light through — warm glow',
    '  float sss = smoothstep(0.6, 0.9, hn) * (1.0 - smoothstep(0.9, 1.0, hn));',
    '  vec3 sssColor = vec3(0.15, 0.25, 0.22);',
    '  col += sssColor * sss * 0.4;',
    '',
    '  // ── Foam/spray on highest crests ──',
    '  float foam = smoothstep(0.82, 0.95, hn);',
    '  foam *= noise(oceanUV * 15.0 + t * 0.5) * 0.8 + 0.2;',
    '  vec3 foamColor = vec3(0.6, 0.55, 0.45);',
    '  col = mix(col, foamColor * 0.15, foam * 0.5);',
    '',
    '  // ── Wave trough darkening — deep between waves ──',
    '  float troughMask = smoothstep(0.4, 0.2, hn);',
    '  col *= 1.0 - troughMask * 0.3;',
    '',
    '  // ── Breathing intensity — slow pulsing of overall brightness ──',
    '  float breath = 0.85 + 0.15 * sin(t * 0.15);',
    '  col *= breath;',
    '',
    '  // ── Interference pattern emphasis ──',
    '  // Where wave systems cross, create brighter/darker interference bands',
    '  float w1 = sin(dot(oceanUV, normalize(vec2(0.7, 0.5))) * 2.5 - t * 0.8 * 1.2);',
    '  float w2 = sin(dot(oceanUV, normalize(vec2(-0.6, 0.3))) * 3.2 - t * 0.8 * 0.9);',
    '  float interference = w1 * w2;',
    '  float intBright = smoothstep(0.3, 0.8, interference);',
    '  col += crestColor * intBright * 0.06;',
    '',
    '  // ── Vignette — darker at edges ──',
    '  float vig = 1.0 - dot(uv, uv) * 0.8;',
    '  vig = clamp(vig, 0.0, 1.0);',
    '  vig = pow(vig, 0.6);',
    '  col *= vig;',
    '',
    '  // ── Tone mapping ──',
    '  col = col / (1.0 + col * 0.3);',
    '',
    '  // ── Final color grading — push toward deep moody ocean ──',
    '  col = pow(col, vec3(0.95, 0.98, 1.05));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uWaveSpeed = gl.getUniformLocation(prog, 'u_waveSpeed');
  var uDepth = gl.getUniformLocation(prog, 'u_depth');

  var waveSpeedVal = 1.0;
  var depthVal = 0.7;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uWaveSpeed, waveSpeedVal);
    gl.uniform1f(uDepth, depthVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'WAVE_SPEED': waveSpeedVal = e.data.value; break;
        case 'DEPTH': depthVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
