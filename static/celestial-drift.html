<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Celestial Drift</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 18 · Celestial Drift — Canvas 2D particle trails with Keplerian orbits
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var ctx = canvas.getContext('2d');
  if (!ctx) return;

  var TAU = Math.PI * 2;
  var NUM_BODIES = 7;

  // ── Params (match shaders.ts names exactly) ──
  var gravityStrength = 1.0;  // GRAVITY_STRENGTH: maps to trail persistence
  var trailLength = 200;      // TRAIL_LENGTH: maps to trail fade speed

  // ── Deterministic hash ──
  function hash(n) {
    return ((Math.sin(n) * 43758.5453123) % 1 + 1) % 1;
  }

  // ── HSV to RGB ──
  function hsvToRgb(h, s, v) {
    var i = Math.floor(h * 6);
    var f = h * 6 - i;
    var p = v * (1 - s);
    var q = v * (1 - f * s);
    var t = v * (1 - (1 - f) * s);
    switch (i % 6) {
      case 0: return [v, t, p];
      case 1: return [q, v, p];
      case 2: return [p, v, t];
      case 3: return [p, q, v];
      case 4: return [t, p, v];
      case 5: return [v, p, q];
    }
    return [v, v, v];
  }

  // ── Build body parameters ──
  var bodies = [];
  for (var i = 0; i < NUM_BODIES; i++) {
    var fi = i;
    var h1 = hash(fi * 11.3 + 10.0);
    var h2 = hash(fi * 13.7 + 20.0);
    var h3 = hash(fi * 17.1 + 30.0);
    var h4 = hash(fi * 19.3 + 40.0);
    var h5 = hash(fi * 23.7 + 50.0);
    var h6 = hash(fi * 29.1 + 60.0);
    var h7 = hash(fi * 7.31 + 1.0);
    var h8 = hash(fi * 3.17 + 2.0);
    var h9 = hash(fi * 5.91 + 3.0);

    var semiMajor = 0.08 + fi * 0.1 + h1 * 0.03;
    var ecc = 0.03 + h2 * 0.15;
    var speed = (0.07 + h3 * 0.05) / (0.6 + semiMajor);
    var phase = h4 * TAU;
    var tilt = (h5 - 0.5) * 0.5;

    // Visual size: elegant small orbs
    var glowRadius = 6 + h6 * 10; // 6-16px base glow radius

    // Color: warm amber range, hue 0.06–0.14
    var hue = 0.06 + h7 * 0.08;
    var sat = 0.5 + h8 * 0.35;
    var val = 0.75 + h9 * 0.25;
    var rgb = hsvToRgb(hue, sat, val);

    bodies.push({
      semiMajor: semiMajor,
      ecc: ecc,
      speed: speed,
      phase: phase,
      tilt: tilt,
      ct: Math.cos(tilt),
      st: Math.sin(tilt),
      sqrt1mE2: Math.sqrt(1 - ecc * ecc),
      glowRadius: glowRadius,
      r: Math.round(rgb[0] * 255),
      g: Math.round(rgb[1] * 255),
      b: Math.round(rgb[2] * 255)
    });
  }

  // ── Canvas sizing ──
  var W, H, dpr, minDim;

  function resize() {
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;
    var newW = Math.round(W * dpr);
    var newH = Math.round(H * dpr);
    if (canvas.width !== newW || canvas.height !== newH) {
      canvas.width = newW;
      canvas.height = newH;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      minDim = Math.min(W, H);
      // Reinitialize backgrounds on resize
      initStarfield();
      initNebula();
      needsFullRedraw = true;
    }
  }

  // ── Body position from Keplerian orbit ──
  function bodyPosition(body, time) {
    var M = body.speed * time + body.phase;
    // Solve Kepler's equation (2 iterations, sufficient for low ecc)
    var E = M;
    E = M + body.ecc * Math.sin(E);
    E = M + body.ecc * Math.sin(E);
    // Position on ellipse
    var cosE = Math.cos(E);
    var sinE = Math.sin(E);
    var x = body.semiMajor * (cosE - body.ecc);
    var y = body.semiMajor * body.sqrt1mE2 * sinE;
    // Apply tilt rotation
    return {
      x: x * body.ct - y * body.st,
      y: x * body.st + y * body.ct
    };
  }

  // ── Pre-rendered starfield ──
  var starCanvas = document.createElement('canvas');
  var starCtx = starCanvas.getContext('2d');
  var NUM_STARS = 180;

  function initStarfield() {
    starCanvas.width = Math.round(W * dpr);
    starCanvas.height = Math.round(H * dpr);
    starCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    starCtx.clearRect(0, 0, W, H);

    for (var i = 0; i < NUM_STARS; i++) {
      var sx = hash(i * 127.1 + 500.0) * W;
      var sy = hash(i * 311.7 + 600.0) * H;
      var brightness = 0.3 + hash(i * 57.3 + 700.0) * 0.7;
      var size = 0.5 + hash(i * 89.1 + 800.0) * 1.5;

      // Warm white star color
      var sr = Math.round(204 * brightness);
      var sg = Math.round(192 * brightness);
      var sb = Math.round(170 * brightness);

      starCtx.beginPath();
      starCtx.arc(sx, sy, size, 0, TAU);
      starCtx.fillStyle = 'rgba(' + sr + ',' + sg + ',' + sb + ',' + (brightness * 0.8) + ')';
      starCtx.fill();

      // Tiny glow around brighter stars
      if (brightness > 0.6) {
        var grd = starCtx.createRadialGradient(sx, sy, 0, sx, sy, size * 3);
        grd.addColorStop(0, 'rgba(' + sr + ',' + sg + ',' + sb + ',0.15)');
        grd.addColorStop(1, 'rgba(' + sr + ',' + sg + ',' + sb + ',0)');
        starCtx.beginPath();
        starCtx.arc(sx, sy, size * 3, 0, TAU);
        starCtx.fillStyle = grd;
        starCtx.fill();
      }
    }
  }

  // ── Pre-rendered nebula ──
  var nebulaCanvas = document.createElement('canvas');
  var nebulaCtx = nebulaCanvas.getContext('2d');

  function simpleNoise(x, y) {
    // Simple value noise for nebula
    var ix = Math.floor(x);
    var iy = Math.floor(y);
    var fx = x - ix;
    var fy = y - iy;
    // Smoothstep
    fx = fx * fx * (3 - 2 * fx);
    fy = fy * fy * (3 - 2 * fy);
    var a = hash(ix * 127.1 + iy * 311.7 + 1000);
    var b = hash((ix + 1) * 127.1 + iy * 311.7 + 1000);
    var c = hash(ix * 127.1 + (iy + 1) * 311.7 + 1000);
    var d = hash((ix + 1) * 127.1 + (iy + 1) * 311.7 + 1000);
    return a + (b - a) * fx + (c - a) * fy + (a - b - c + d) * fx * fy;
  }

  function fbmNoise(x, y) {
    var val = 0;
    var amp = 0.5;
    var freq = 1.5;
    for (var i = 0; i < 4; i++) {
      val += amp * simpleNoise(x * freq + i * 1.7, y * freq + i * 9.2);
      freq *= 2.1;
      amp *= 0.45;
    }
    return val;
  }

  function initNebula() {
    // Render at lower resolution for performance
    var scale = 4;
    var nw = Math.ceil(W / scale);
    var nh = Math.ceil(H / scale);
    nebulaCanvas.width = nw;
    nebulaCanvas.height = nh;

    var imgData = nebulaCtx.createImageData(nw, nh);
    var data = imgData.data;

    for (var py = 0; py < nh; py++) {
      for (var px = 0; px < nw; px++) {
        // Normalized coords
        var nx = (px / nw - 0.5) * 2;
        var ny = (py / nh - 0.5) * 2;
        var n = fbmNoise(nx * 2, ny * 2);
        var intensity = Math.max(0, n - 0.35) * 0.15;
        // Very subtle warm nebula tint
        var idx = (py * nw + px) * 4;
        data[idx] = Math.min(255, Math.round(60 * intensity * 255));
        data[idx + 1] = Math.min(255, Math.round(35 * intensity * 255));
        data[idx + 2] = Math.min(255, Math.round(20 * intensity * 255));
        data[idx + 3] = Math.round(intensity * 80);
      }
    }
    nebulaCtx.putImageData(imgData, 0, 0);
  }

  // ── Vignette (pre-rendered) ──
  var vignetteCanvas = document.createElement('canvas');
  var vignetteCtx = vignetteCanvas.getContext('2d');

  function initVignette() {
    vignetteCanvas.width = Math.round(W * dpr);
    vignetteCanvas.height = Math.round(H * dpr);
    vignetteCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var cx = W / 2;
    var cy = H / 2;
    var maxR = Math.sqrt(cx * cx + cy * cy);
    var grd = vignetteCtx.createRadialGradient(cx, cy, minDim * 0.3, cx, cy, maxR);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(0.5, 'rgba(0,0,0,0.1)');
    grd.addColorStop(1, 'rgba(0,0,0,0.45)');
    vignetteCtx.fillStyle = grd;
    vignetteCtx.fillRect(0, 0, W, H);
  }

  // ── Star twinkle state ──
  var starTwinklePhases = [];
  var starTwinkleSpeeds = [];
  for (var i = 0; i < NUM_STARS; i++) {
    starTwinklePhases.push(hash(i * 41.3 + 900.0) * TAU);
    starTwinkleSpeeds.push(0.3 + hash(i * 53.7 + 950.0) * 0.8);
  }

  // ── Render star twinkle overlay ──
  function drawStarTwinkle(time) {
    for (var i = 0; i < NUM_STARS; i++) {
      var brightness = hash(i * 57.3 + 700.0);
      if (brightness < 0.5) continue; // Only twinkle brighter stars
      var sx = hash(i * 127.1 + 500.0) * W;
      var sy = hash(i * 311.7 + 600.0) * H;
      var twinkle = 0.5 + 0.5 * Math.sin(time * starTwinkleSpeeds[i] + starTwinklePhases[i]);
      var size = (0.5 + brightness * 1.5) * (0.6 + twinkle * 0.4);
      var alpha = brightness * 0.8 * (0.5 + twinkle * 0.5);

      var sr = Math.round(204 * brightness);
      var sg = Math.round(192 * brightness);
      var sb = Math.round(170 * brightness);

      ctx.beginPath();
      ctx.arc(sx, sy, size, 0, TAU);
      ctx.fillStyle = 'rgba(' + sr + ',' + sg + ',' + sb + ',' + alpha + ')';
      ctx.fill();
    }
  }

  // ── Draw a glowing body ──
  function drawBody(px, py, body, time, idx) {
    var r = body.glowRadius;

    // Subtle size breathing
    var breath = 1.0 + 0.06 * Math.sin(time * 0.8 + idx * 2.7);
    r *= breath;

    // Scale radius based on canvas
    var scaledR = r * (minDim / 800);

    // Wide soft outer glow
    var outerR = scaledR * 4.0;
    var grd1 = ctx.createRadialGradient(px, py, 0, px, py, outerR);
    grd1.addColorStop(0, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0.08)');
    grd1.addColorStop(0.3, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0.03)');
    grd1.addColorStop(0.7, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0.008)');
    grd1.addColorStop(1, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0)');
    ctx.beginPath();
    ctx.arc(px, py, outerR, 0, TAU);
    ctx.fillStyle = grd1;
    ctx.fill();

    // Inner colored glow
    var innerR = scaledR * 1.8;
    var grd2 = ctx.createRadialGradient(px, py, 0, px, py, innerR);
    grd2.addColorStop(0, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0.4)');
    grd2.addColorStop(0.4, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0.12)');
    grd2.addColorStop(1, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0)');
    ctx.beginPath();
    ctx.arc(px, py, innerR, 0, TAU);
    ctx.fillStyle = grd2;
    ctx.fill();

    // White-hot core
    var coreR = scaledR * 0.45;
    var grd3 = ctx.createRadialGradient(px, py, 0, px, py, coreR);
    grd3.addColorStop(0, 'rgba(255,248,240,0.95)');
    grd3.addColorStop(0.3, 'rgba(255,245,235,0.6)');
    grd3.addColorStop(0.7, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0.2)');
    grd3.addColorStop(1, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0)');
    ctx.beginPath();
    ctx.arc(px, py, coreR, 0, TAU);
    ctx.fillStyle = grd3;
    ctx.fill();

    // Bright center dot
    var dotR = scaledR * 0.12;
    ctx.beginPath();
    ctx.arc(px, py, dotR, 0, TAU);
    ctx.fillStyle = 'rgba(255,252,245,0.9)';
    ctx.fill();
  }

  // ── Draw trail glow for a body at a position ──
  function drawTrailGlow(px, py, body, alpha) {
    var r = body.glowRadius;
    var scaledR = r * (minDim / 800) * 1.2;

    var grd = ctx.createRadialGradient(px, py, 0, px, py, scaledR);
    grd.addColorStop(0, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',' + (alpha * 0.25) + ')');
    grd.addColorStop(0.5, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',' + (alpha * 0.08) + ')');
    grd.addColorStop(1, 'rgba(' + body.r + ',' + body.g + ',' + body.b + ',0)');
    ctx.beginPath();
    ctx.arc(px, py, scaledR, 0, TAU);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // ── Normalized coords to pixel coords ──
  function toPixel(nx, ny) {
    return {
      x: W * 0.5 + nx * minDim,
      y: H * 0.5 + ny * minDim
    };
  }

  // ── State ──
  var paused = false;
  var needsFullRedraw = true;
  var frameCount = 0;
  var startTime = 0;

  // ── Compute fade alpha from params ──
  function getFadeAlpha() {
    // TRAIL_LENGTH range: 50-500, default 200
    // Lower TRAIL_LENGTH = shorter trails = higher fade alpha
    // Higher TRAIL_LENGTH = longer trails = lower fade alpha
    // Map 50->0.08, 200->0.03, 500->0.008
    var t = (trailLength - 50) / 450; // 0 to 1
    var alpha = 0.08 - t * 0.072; // 0.08 down to 0.008
    return Math.max(0.005, Math.min(0.1, alpha));
  }

  // ── Get orbit speed multiplier from GRAVITY_STRENGTH ──
  function getOrbitSpeed() {
    return gravityStrength;
  }

  // ── Main render ──
  function render(now) {
    if (paused) {
      requestAnimationFrame(render);
      return;
    }

    if (startTime === 0) startTime = now;
    var time = prefersReduced ? 0 : (now - startTime) * 0.001;

    resize();

    var fadeAlpha = getFadeAlpha();
    var orbitSpeed = getOrbitSpeed();

    if (needsFullRedraw) {
      // Full clear and redraw background
      ctx.fillStyle = '#0c0a0e';
      ctx.fillRect(0, 0, W, H);

      // Draw nebula
      ctx.globalAlpha = 1;
      ctx.drawImage(nebulaCanvas, 0, 0, W, H);

      // Draw starfield
      ctx.globalAlpha = 1;
      ctx.drawImage(starCanvas, 0, 0, W, H);

      // Draw vignette
      initVignette();
      ctx.drawImage(vignetteCanvas, 0, 0, W, H);

      needsFullRedraw = false;
      frameCount = 0;
    }

    // ── Alpha overlay for trail fade ──
    // Composite the deep space color with low alpha to create trails
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(12, 10, 14,' + fadeAlpha + ')';
    ctx.fillRect(0, 0, W, H);

    // ── Redraw starfield faintly to prevent it from fading out ──
    // Every few frames, re-stamp stars so they persist through the fade
    if (frameCount % 3 === 0) {
      ctx.globalAlpha = fadeAlpha * 4;
      ctx.drawImage(starCanvas, 0, 0, W, H);
      ctx.globalAlpha = 1;

      // Also maintain nebula
      ctx.globalAlpha = fadeAlpha * 3;
      ctx.drawImage(nebulaCanvas, 0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // Star twinkle
    if (frameCount % 4 === 0) {
      drawStarTwinkle(time);
    }

    // ── Draw bodies ──
    ctx.globalCompositeOperation = 'lighter';

    for (var i = 0; i < NUM_BODIES; i++) {
      var body = bodies[i];
      var pos = bodyPosition(body, time * orbitSpeed);
      var pixel = toPixel(pos.x, pos.y);

      // Draw trail glow at current position (accumulates over frames)
      var trailAlpha = 0.06 + gravityStrength * 0.04; // Subtle trail accumulation
      drawTrailGlow(pixel.x, pixel.y, body, trailAlpha);

      // Draw the body itself
      drawBody(pixel.x, pixel.y, body, time, i);
    }

    // ── Vignette (composite normally) ──
    ctx.globalCompositeOperation = 'source-over';
    // Subtle vignette re-application every frame to darken edges
    ctx.globalAlpha = fadeAlpha * 2;
    ctx.drawImage(vignetteCanvas, 0, 0, W, H);
    ctx.globalAlpha = 1;

    frameCount++;
    requestAnimationFrame(render);
  }

  // ── Init ──
  resize();
  requestAnimationFrame(render);

  // ── Visibility-based pause ──
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) {
      needsFullRedraw = true;
      startTime = 0;
    }
  });

  // ── Message listener for parameter updates ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'GRAVITY_STRENGTH':
          gravityStrength = e.data.value;
          break;
        case 'TRAIL_LENGTH':
          trailLength = e.data.value;
          break;
      }
    }
  });
})();
</script>
</body>
</html>
