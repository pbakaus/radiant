<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Celestial Drift</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// 18 · Celestial Drift — Graceful orbital celestial bodies with luminous trails
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_trailDensity;',
    'uniform float u_orbitSpeed;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '#define NUM_BODIES 7',
    '#define TRAIL_STEPS 160',
    '#define NUM_BG_STARS 50',
    '',
    '// ── Hash functions ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── Body color palette: warm amber/gold tones ──',
    'vec3 bodyColor(int idx) {',
    '  float fi = float(idx);',
    '  // Each body gets a unique warm hue',
    '  float h = 0.06 + hash1(fi * 7.31 + 1.0) * 0.08;  // hue in 0.06-0.14 (amber range)',
    '  float s = 0.5 + hash1(fi * 3.17 + 2.0) * 0.35;',
    '  float v = 0.75 + hash1(fi * 5.91 + 3.0) * 0.25;',
    '  // HSV to RGB',
    '  vec3 c = vec3(h * 6.0, s, v);',
    '  vec3 rgb = clamp(abs(mod(c.x + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);',
    '  return c.z * mix(vec3(1.0), rgb, c.y);',
    '}',
    '',
    '// ── Orbital parameters for each body ──',
    '// Returns: vec4(semiMajor, eccentricity, angularSpeed, phase)',
    'vec4 orbitParams(int idx) {',
    '  float fi = float(idx);',
    '  // Spread orbits across different radii — wider spacing for clearer rings',
    '  float baseRadius = 0.1 + fi * 0.085;',
    '  float semiMajor = baseRadius + hash1(fi * 11.3 + 10.0) * 0.025;',
    '  // Low eccentricity for smooth, nearly-circular orbits',
    '  float ecc = 0.03 + hash1(fi * 13.7 + 20.0) * 0.15;',
    '  // Different orbital periods (outer = slower, Kepler-ish)',
    '  float speed = (0.07 + hash1(fi * 17.1 + 30.0) * 0.05) / (0.6 + semiMajor);',
    '  float phase = hash1(fi * 19.3 + 40.0) * TAU;',
    '  return vec4(semiMajor, ecc, speed, phase);',
    '}',
    '',
    '// ── Orbit inclination/tilt per body ──',
    'float orbitTilt(int idx) {',
    '  float fi = float(idx);',
    '  // Each orbit is tilted slightly differently for visual depth',
    '  return (hash1(fi * 23.7 + 50.0) - 0.5) * 0.5;',
    '}',
    '',
    '// ── Compute body position at time t ──',
    'vec2 bodyPosition(int idx, float t) {',
    '  vec4 op = orbitParams(idx);',
    '  float a = op.x;       // semi-major axis',
    '  float e = op.y;       // eccentricity',
    '  float speed = op.z;   // angular speed',
    '  float phase = op.w;   // phase offset',
    '  float tilt = orbitTilt(idx);',
    '',
    '  // Mean anomaly',
    '  float M = speed * t * u_orbitSpeed + phase;',
    '',
    '  // Solve Kepler\'s equation iteratively: E - e*sin(E) = M',
    '  // 3 iterations is plenty for low eccentricity',
    '  float E = M;',
    '  E = M + e * sin(E);',
    '  E = M + e * sin(E);',
    '  E = M + e * sin(E);',
    '',
    '  // True anomaly position on ellipse',
    '  float cosE = cos(E);',
    '  float sinE = sin(E);',
    '  float x = a * (cosE - e);',
    '  float y = a * sqrt(1.0 - e * e) * sinE;',
    '',
    '  // Apply tilt rotation (rotate in 2D to simulate inclination)',
    '  float ct = cos(tilt);',
    '  float st = sin(tilt);',
    '  return vec2(x * ct - y * st, x * st + y * ct);',
    '}',
    '',
    '// ── Body visual radius ──',
    'float bodyRadius(int idx) {',
    '  float fi = float(idx);',
    '  return 0.012 + hash1(fi * 29.1 + 60.0) * 0.018;',
    '}',
    '',
    '// ── Render a single glowing orb ──',
    'vec3 renderBody(vec2 uv, vec2 pos, float radius, vec3 color, float time, float idx) {',
    '  float d = length(uv - pos);',
    '',
    '  // Subtle size breathing',
    '  float breath = 1.0 + 0.06 * sin(time * 0.8 + idx * 2.7);',
    '  float r = radius * breath;',
    '',
    '  // Bright inner core',
    '  float core = smoothstep(r, r * 0.2, d);',
    '  // Brighter center',
    '  float hotCenter = smoothstep(r * 0.5, 0.0, d);',
    '',
    '  // Soft inner halo',
    '  float innerHalo = exp(-d * d / (r * r * 3.0));',
    '',
    '  // Wide atmospheric glow',
    '  float outerGlow = exp(-d * d / (r * r * 18.0));',
    '',
    '  // Very wide ambient glow',
    '  float ambientGlow = exp(-d * d / (r * r * 80.0));',
    '',
    '  // Compose: white-hot core fading to colored glow',
    '  vec3 coreColor = mix(color, vec3(1.0, 0.97, 0.92), 0.7);',
    '  vec3 result = coreColor * core * 1.5;',
    '  result += vec3(1.0, 0.98, 0.94) * hotCenter * 0.6;',
    '  result += color * innerHalo * 0.8;',
    '  result += color * outerGlow * 0.3;',
    '  result += color * ambientGlow * 0.08;',
    '',
    '  return result;',
    '}',
    '',
    '// ── Background starfield ──',
    'float bgStars(vec2 uv, float t) {',
    '  float stars = 0.0;',
    '  for (int i = 0; i < NUM_BG_STARS; i++) {',
    '    float fi = float(i);',
    '    vec2 pos = vec2(',
    '      hash1(fi * 17.31 + 100.0) * 2.4 - 1.2,',
    '      hash1(fi * 11.97 + 200.0) * 2.4 - 1.2',
    '    );',
    '    float d = length(uv - pos);',
    '    float twinkle = 0.5 + 0.5 * sin(t * (0.3 + hash1(fi * 3.3 + 300.0) * 0.8) + fi * 2.7);',
    '    twinkle = max(twinkle, 0.0);',
    '    float size = 0.0012 + hash1(fi * 5.5 + 400.0) * 0.002;',
    '    stars += smoothstep(size, 0.0, d) * twinkle * 0.7;',
    '  }',
    '  return stars;',
    '}',
    '',
    '// ── Subtle nebula background ──',
    'float nebula(vec2 p, float t) {',
    '  float n = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.5;',
    '  for (int i = 0; i < 4; i++) {',
    '    n += amp * noise(p * freq + t * 0.02);',
    '    freq *= 2.1;',
    '    amp *= 0.45;',
    '    p += vec2(1.7, 9.2);',
    '  }',
    '  return n;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '  float aspect = u_res.x / u_res.y;',
    '',
    '  // ── Deep space background ──',
    '  vec3 col = vec3(0.012, 0.010, 0.014);',
    '',
    '  // ── Subtle nebula wash ──',
    '  float neb = nebula(uv * 2.0, t);',
    '  vec3 nebColor = mix(',
    '    vec3(0.04, 0.025, 0.015),',
    '    vec3(0.06, 0.035, 0.02),',
    '    neb',
    '  );',
    '  col += nebColor * smoothstep(0.3, 0.7, neb) * 0.4;',
    '',
    '  // ── Background stars ──',
    '  float starField = bgStars(uv, t);',
    '  vec3 starColor = vec3(0.82, 0.76, 0.65);',
    '  col += starColor * starField;',
    '',
    '  // ── Render luminous trails ──',
    '  // For each body, sample past positions and accumulate glow.',
    '  // Trail spans multiple orbits, creating mandala-like overlapping patterns.',
    '  float trailTimeSpan = 55.0 * u_trailDensity;',
    '',
    '  for (int b = 0; b < NUM_BODIES; b++) {',
    '    vec3 bCol = bodyColor(b);',
    '    float bRad = bodyRadius(b);',
    '',
    '    // Trail: sample past positions',
    '    for (int s = 1; s < TRAIL_STEPS; s++) {',
    '      float fs = float(s);',
    '      float frac = fs / float(TRAIL_STEPS);  // 0 = current, 1 = oldest',
    '',
    '      // Time in the past for this trail sample',
    '      float pastTime = t - frac * trailTimeSpan;',
    '',
    '      vec2 pos = bodyPosition(b, pastTime);',
    '',
    '      vec2 delta = uv - pos;',
    '      float d2 = dot(delta, delta);',
    '',
    '      // Trail width narrows toward tail',
    '      float trailWidth = bRad * (0.3 + 0.7 * (1.0 - frac));',
    '',
    '      // Alpha fades smoothly toward tail',
    '      float alpha = (1.0 - frac) * (1.0 - frac * 0.5) * 0.032;',
    '',
    '      // Soft glow using squared distance (avoids sqrt)',
    '      float sigma2 = trailWidth * trailWidth * 3.5;',
    '      float glow = exp(-d2 / sigma2);',
    '',
    '      col += bCol * glow * alpha;',
    '    }',
    '  }',
    '',
    '  // ── Render the celestial bodies themselves ──',
    '  for (int b = 0; b < NUM_BODIES; b++) {',
    '    vec2 pos = bodyPosition(b, t);',
    '    vec3 bCol = bodyColor(b);',
    '    float bRad = bodyRadius(b);',
    '    float fi = float(b);',
    '',
    '    col += renderBody(uv, pos, bRad, bCol, t, fi);',
    '  }',
    '',
    '  // ── Gravitational lensing hint: subtle brightness near bodies ──',
    '  for (int b = 0; b < NUM_BODIES; b++) {',
    '    vec2 pos = bodyPosition(b, t);',
    '    float bRad = bodyRadius(b);',
    '    vec3 bCol = bodyColor(b);',
    '    float d = length(uv - pos);',
    '    float lensGlow = exp(-d * d / (bRad * bRad * 120.0));',
    '    col += bCol * lensGlow * 0.015;',
    '  }',
    '',
    '  // ── Vignette ──',
    '  float dist = length(uv);',
    '  float vignette = 1.0 - smoothstep(0.5, 1.4, dist);',
    '  col *= 0.65 + vignette * 0.35;',
    '',
    '  // ── Ensure no negative values ──',
    '  col = max(col, vec3(0.0));',
    '',
    '  // ── Subtle tone curve for warmth ──',
    '  col = pow(col, vec3(0.95, 1.0, 1.06));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uTrailDensity = gl.getUniformLocation(prog, 'u_trailDensity');
  var uOrbitSpeed = gl.getUniformLocation(prog, 'u_orbitSpeed');

  var trailDensityVal = 1.0;
  var orbitSpeedVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var paused = false;

  function render(now) {
    if (!paused) {
      resize();
      gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTrailDensity, trailDensityVal);
      gl.uniform1f(uOrbitSpeed, orbitSpeedVal);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Visibility-based pause ──
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
  });

  // ── Message listener for parameter updates ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'TRAIL_DENSITY': trailDensityVal = e.data.value; break;
        case 'ORBIT_SPEED': orbitSpeedVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
