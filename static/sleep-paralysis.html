<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Paralysis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Sleep Paralysis</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Sleep Paralysis — Shadow figures in layered fog
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var DRIFT_SPEED = 0.3;
  var SHADOW_DENSITY = 0.7;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_driftSpeed;',
    'uniform float u_shadowDensity;',
    '',
    '#define PI 3.14159265359',
    '',
    '// ── Permutation-style hash ──',
    'float hash(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    '// ── Gradient noise (2D) ──',
    '// Smoother than value noise, better for organic shapes',
    'vec2 hashGrad(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.xx + p3.yz) * p3.zy) * 2.0 - 1.0;',
    '}',
    '',
    'float gnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '  vec2 du = 30.0 * f * f * (f * (f - 2.0) + 1.0);',
    '  vec2 ga = hashGrad(i + vec2(0.0, 0.0));',
    '  vec2 gb = hashGrad(i + vec2(1.0, 0.0));',
    '  vec2 gc = hashGrad(i + vec2(0.0, 1.0));',
    '  vec2 gd = hashGrad(i + vec2(1.0, 1.0));',
    '  float va = dot(ga, f - vec2(0.0, 0.0));',
    '  float vb = dot(gb, f - vec2(1.0, 0.0));',
    '  float vc = dot(gc, f - vec2(0.0, 1.0));',
    '  float vd = dot(gd, f - vec2(1.0, 1.0));',
    '  return va + u.x * (vb - va) + u.y * (vc - va) + u.x * u.y * (va - vb - vc + vd);',
    '}',
    '',
    '// ── Value noise for secondary textures ──',
    'float vnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '  return mix(',
    '    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),',
    '    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),',
    '    f.y',
    '  );',
    '}',
    '',
    '// ── FBM with inter-octave rotation ──',
    'float fbm(vec2 p, float t) {',
    '  float v = 0.0, a = 0.5;',
    '  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);',
    '  for (int i = 0; i < 6; i++) {',
    '    v += a * gnoise(p + t * 0.02);',
    '    p = rot * p * 2.05 + vec2(1.7, 9.2);',
    '    a *= 0.48;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── High-octave FBM for fine fog detail ──',
    'float fbmFine(vec2 p, float t) {',
    '  float v = 0.0, a = 0.5;',
    '  mat2 rot = mat2(0.866, 0.5, -0.5, 0.866);',
    '  for (int i = 0; i < 7; i++) {',
    '    v += a * gnoise(p + t * 0.015);',
    '    p = rot * p * 2.03 + vec2(3.1, 7.4);',
    '    a *= 0.47;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Double domain warp — creates the organic shadow forms ──',
    '// Each "layer" is a depth plane with its own warp and drift',
    'float shadowLayer(vec2 p, float t, float layerIdx, float speed) {',
    '  float offset = layerIdx * 4.73;',
    '  float layerSpeed = speed * (0.6 + layerIdx * 0.15);',
    '  vec2 drift = vec2(',
    '    t * layerSpeed * 0.7 + sin(t * layerSpeed * 0.3 + offset) * 0.4,',
    '    t * layerSpeed * 0.4 + cos(t * layerSpeed * 0.2 + offset * 0.7) * 0.3',
    '  );',
    '  vec2 pp = p + drift + vec2(offset, offset * 0.618);',
    '',
    '  // First domain warp — large swirling distortion',
    '  vec2 q = vec2(',
    '    fbm(pp + vec2(0.0, 0.0), t * 0.4),',
    '    fbm(pp + vec2(5.2, 1.3), t * 0.35)',
    '  );',
    '',
    '  // Second domain warp — finer turbulence creating figure-like forms',
    '  vec2 r = vec2(',
    '    fbm(pp + 3.2 * q + vec2(1.7, 9.2), t * 0.25),',
    '    fbm(pp + 3.2 * q + vec2(8.3, 2.8), t * 0.3)',
    '  );',
    '',
    '  // Final warped field',
    '  float f = fbm(pp + 2.8 * r, t * 0.2);',
    '',
    '  // Combine warp magnitudes for structure',
    '  float structure = f * 0.55 + length(q) * 0.25 + length(r) * 0.20;',
    '',
    '  return structure;',
    '}',
    '',
    '// ── Breathing pulsation — slow sinusoidal modulation ──',
    'float breathe(float t) {',
    '  float b1 = sin(t * 0.15) * 0.5 + 0.5;',
    '  float b2 = sin(t * 0.087 + 1.3) * 0.5 + 0.5;',
    '  float b3 = sin(t * 0.21 + 2.7) * 0.5 + 0.5;',
    '  return mix(0.7, 1.0, b1 * 0.5 + b2 * 0.3 + b3 * 0.2);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '  float speed = u_driftSpeed;',
    '  float density = u_shadowDensity;',
    '',
    '  // ── Breathing modulation ──',
    '  float breath = breathe(t);',
    '',
    '  // ── Background: near-black with subtle warm gradient ──',
    '  float bgGrad = length(uv) * 0.15;',
    '  vec3 col = vec3(0.025, 0.018, 0.012) - bgGrad * vec3(0.012, 0.008, 0.005);',
    '  col = max(col, vec3(0.0));',
    '',
    '  // ── Layer 0: Deepest background fog — very diffuse, slow ──',
    '  float L0 = shadowLayer(uv * 1.2, t, 0.0, speed * 0.5);',
    '  float fog0 = smoothstep(0.25, 0.70, L0) * 0.25;',
    '  fog0 *= breath;',
    '  vec3 fogColor0 = vec3(0.08, 0.055, 0.035);',
    '  col = mix(col, fogColor0, fog0);',
    '',
    '  // ── Layer 1: Deep mid-ground — where shadow forms start to appear ──',
    '  float L1 = shadowLayer(uv * 1.6, t, 1.0, speed * 0.7);',
    '  float fog1 = smoothstep(0.28, 0.72, L1) * 0.35 * density;',
    '',
    '  // Threshold into "figure" shapes — dark blobs that coalesce',
    '  float figure1 = smoothstep(0.55, 0.78, L1) * 0.4 * density;',
    '  fog1 *= breath;',
    '  figure1 *= breath;',
    '',
    '  vec3 fogColor1 = vec3(0.065, 0.042, 0.028);',
    '  vec3 figureColor1 = vec3(0.02, 0.013, 0.008);',
    '  col = mix(col, fogColor1, fog1);',
    '  col = mix(col, figureColor1, figure1);',
    '',
    '  // ── Layer 2: Primary shadow layer — the "presences" ──',
    '  float L2 = shadowLayer(uv * 2.2, t, 2.0, speed);',
    '  float fog2 = smoothstep(0.22, 0.65, L2) * 0.30 * density;',
    '',
    '  // Sharper threshold creates distinct shadow figures',
    '  float figure2 = smoothstep(0.52, 0.73, L2) * 0.55 * density;',
    '',
    '  // Extra-dark cores where the "bodies" of shadow figures are',
    '  float core2 = smoothstep(0.68, 0.82, L2) * 0.35 * density;',
    '',
    '  fog2 *= breath;',
    '  figure2 *= breath;',
    '  core2 *= breath;',
    '',
    '  vec3 fogColor2 = vec3(0.055, 0.038, 0.025);',
    '  vec3 figureColor2 = vec3(0.015, 0.010, 0.006);',
    '  vec3 coreColor2 = vec3(0.005, 0.003, 0.002);',
    '  col = mix(col, fogColor2, fog2);',
    '  col = mix(col, figureColor2, figure2);',
    '  col = mix(col, coreColor2, core2);',
    '',
    '  // ── Layer 3: Close foreground wisps — thin, fast ──',
    '  float L3 = shadowLayer(uv * 3.0, t, 3.0, speed * 1.3);',
    '  float fog3 = smoothstep(0.30, 0.75, L3) * 0.18 * density;',
    '  float wisp3 = smoothstep(0.60, 0.80, L3) * 0.25 * density;',
    '  fog3 *= breath;',
    '  wisp3 *= breath;',
    '',
    '  vec3 fogColor3 = vec3(0.04, 0.028, 0.018);',
    '  vec3 wispColor3 = vec3(0.01, 0.007, 0.004);',
    '  col = mix(col, fogColor3, fog3);',
    '  col = mix(col, wispColor3, wisp3);',
    '',
    '  // ── Layer 4: Closest — barely-there peripheral darkness ──',
    '  float L4 = shadowLayer(uv * 4.0, t, 4.0, speed * 1.6);',
    '  float edge4 = smoothstep(0.45, 0.80, L4) * 0.12 * density;',
    '  edge4 *= breath;',
    '  // Stronger at edges of screen (peripheral vision)',
    '  float peripheral = smoothstep(0.3, 0.8, length(uv));',
    '  edge4 *= 0.3 + peripheral * 0.7;',
    '  col = mix(col, vec3(0.003, 0.002, 0.001), edge4);',
    '',
    '  // ── Atmospheric haze: exponential fog that softens everything ──',
    '  float hazeNoise = fbmFine(uv * 1.5 + t * speed * 0.1, t * 0.5);',
    '  float haze = hazeNoise * 0.5 + 0.5;',
    '  haze = smoothstep(0.3, 0.8, haze) * 0.18;',
    '  haze *= breath;',
    '  vec3 hazeColor = vec3(0.10, 0.068, 0.045);',
    '  col = mix(col, hazeColor, haze);',
    '',
    '  // ── Light leaks / "eyes" — where all fog layers momentarily clear ──',
    '  // These are bright spots that appear when noise layers anti-align',
    '  float clearance = (1.0 - smoothstep(0.20, 0.55, L1))',
    '                   * (1.0 - smoothstep(0.20, 0.55, L2))',
    '                   * (1.0 - smoothstep(0.25, 0.55, L3));',
    '',
    '  // Additional pulsing for the light leaks',
    '  float leakPulse = sin(t * 0.12 + L0 * 5.0) * 0.5 + 0.5;',
    '  leakPulse = pow(leakPulse, 3.0);',
    '',
    '  float leak = clearance * clearance * leakPulse * 0.65;',
    '',
    '  // Bright amber/gold leak color',
    '  vec3 leakColor = vec3(0.78, 0.58, 0.42);',
    '  vec3 leakHot = vec3(1.0, 0.82, 0.55);',
    '  col += leakColor * leak * 0.3;',
    '  col += leakHot * pow(leak, 2.0) * 0.5;',
    '',
    '  // ── Occasional "eye" glints — very rare, very bright ──',
    '  // Two slowly wandering points that occasionally flare',
    '  float eyeTime1 = t * 0.06;',
    '  vec2 eyePos1 = vec2(',
    '    sin(eyeTime1 * 1.1 + 0.5) * 0.25 + gnoise(vec2(eyeTime1 * 0.3, 0.0)) * 0.15,',
    '    sin(eyeTime1 * 0.7 + 1.8) * 0.15 + gnoise(vec2(0.0, eyeTime1 * 0.25)) * 0.1 + 0.05',
    '  );',
    '  float eyeDist1 = length(uv - eyePos1);',
    '  // Flare when shadow density is high at eye position',
    '  float eyeShadow1 = shadowLayer(eyePos1 * 2.2, t, 2.0, speed);',
    '  float eyeFlare1 = smoothstep(0.60, 0.75, eyeShadow1);',
    '  eyeFlare1 *= pow(sin(t * 0.19 + 3.0) * 0.5 + 0.5, 8.0);',
    '  float eyeGlow1 = exp(-eyeDist1 * eyeDist1 / 0.003) * eyeFlare1;',
    '  float eyeHalo1 = exp(-eyeDist1 * eyeDist1 / 0.02) * eyeFlare1 * 0.3;',
    '',
    '  float eyeTime2 = t * 0.05;',
    '  vec2 eyePos2 = vec2(',
    '    sin(eyeTime2 * 0.9 + 3.7) * 0.3 + gnoise(vec2(eyeTime2 * 0.2 + 10.0, 5.0)) * 0.12,',
    '    sin(eyeTime2 * 0.6 + 0.3) * 0.18 + gnoise(vec2(5.0, eyeTime2 * 0.2 + 10.0)) * 0.08 - 0.05',
    '  );',
    '  float eyeDist2 = length(uv - eyePos2);',
    '  float eyeShadow2 = shadowLayer(eyePos2 * 2.2, t, 2.0, speed);',
    '  float eyeFlare2 = smoothstep(0.60, 0.75, eyeShadow2);',
    '  eyeFlare2 *= pow(sin(t * 0.14 + 1.0) * 0.5 + 0.5, 10.0);',
    '  float eyeGlow2 = exp(-eyeDist2 * eyeDist2 / 0.002) * eyeFlare2;',
    '  float eyeHalo2 = exp(-eyeDist2 * eyeDist2 / 0.015) * eyeFlare2 * 0.25;',
    '',
    '  vec3 eyeColor = vec3(0.95, 0.75, 0.42);',
    '  col += eyeColor * (eyeGlow1 + eyeGlow2) * 0.8;',
    '  col += eyeColor * (eyeHalo1 + eyeHalo2) * 0.4;',
    '',
    '  // ── Fine grain / film texture ──',
    '  float grain = (hash(gl_FragCoord.xy + fract(t * 43.0) * 1000.0) - 0.5) * 0.018;',
    '  col += grain;',
    '',
    '  // ── Deep vignette — darkness closing in ──',
    '  float vig = length(uv);',
    '  float vignette = 1.0 - smoothstep(0.25, 1.1, vig);',
    '  // Pulsating vignette — breathing darkness',
    '  float vigPulse = sin(t * 0.1) * 0.04;',
    '  vignette *= 0.65 + 0.35 * (1.0 - vigPulse);',
    '  col *= vignette;',
    '',
    '  // ── Tone: push shadows warm, keep blacks deep ──',
    '  col = max(col, vec3(0.0));',
    '  col = pow(col, vec3(0.95, 1.0, 1.06));',
    '',
    '  // Subtle warm lift in near-blacks',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  col = mix(col, col * vec3(1.08, 0.96, 0.88), smoothstep(0.04, 0.0, lum) * 0.3);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uDriftSpeed = gl.getUniformLocation(prog, 'u_driftSpeed');
  var uShadowDensity = gl.getUniformLocation(prog, 'u_shadowDensity');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var scale = 1.0 / pixelScale;
    var w = Math.round(canvas.clientWidth * dpr * scale);
    var h = Math.round(canvas.clientHeight * dpr * scale);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var running = true;

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uDriftSpeed, DRIFT_SPEED);
    gl.uniform1f(uShadowDensity, SHADOW_DENSITY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRIFT_SPEED': DRIFT_SPEED = e.data.value; break;
        case 'SHADOW_DENSITY': SHADOW_DENSITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
