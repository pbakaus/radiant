<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vortex</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Vortex</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Vortex — Logarithmic spiral arms with silk glow
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_waveSpeed;',
    'uniform float u_lineCount;',
    'uniform vec2 u_mouse;',
    '',
    '#define S smoothstep',
    '#define PI 3.14159265',
    '#define TAU 6.28318530',
    '',
    '// ── Hash for noise ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// Distance from point to nearest logarithmic spiral arm',
    '// Spiral: r = a * exp(b * theta)',
    '// Inverted: theta = ln(r/a) / b',
    '// For a given r, the spiral passes at angles theta_n = (ln(r/a)/b) + n*TAU',
    '// We find the closest arm by checking angular distance',
    'float spiralDist(vec2 uv, float a, float b, float numArms, float t) {',
    '  float r = length(uv);',
    '  if (r < 0.001) return 1e6;',
    '  float angle = atan(uv.y, uv.x);',
    '',
    '  // Where does the spiral cross this radius?',
    '  float baseTheta = log(r / a) / b;',
    '',
    '  // Add time rotation',
    '  baseTheta -= t * 0.3 + u_mouse.x;',
    '',
    '  // Find nearest arm',
    '  float armSpacing = TAU / numArms;',
    '  float nearest = mod(angle - baseTheta, armSpacing);',
    '  if (nearest > armSpacing * 0.5) nearest -= armSpacing;',
    '',
    '  // Convert angular distance to approximate Euclidean distance',
    '  // d ~ r * |delta_theta| for small angles',
    '  float d = abs(nearest) * r;',
    '',
    '  // Add sine undulation along the spiral',
    '  float undulation = sin(baseTheta * 4.0 + t * 0.5) * 0.015;',
    '  d += undulation;',
    '  d = abs(d);',
    '',
    '  return d;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;',
    '  float t = u_time * u_waveSpeed;',
    '',
    '  // Center drifts slowly',
    '  vec2 center = vec2(sin(t * 0.07) * 0.05, cos(t * 0.09) * 0.04);',
    '  vec2 p = uv - center;',
    '',
    '  float r = length(p);',
    '  int lineCount = int(u_lineCount);',
    '',
    '  vec3 col = vec3(0.0);',
    '',
    '  for (int i = 0; i < 10; i++) {',
    '    if (i >= lineCount) break;',
    '    float fi = float(i);',
    '    float frac = fi / max(u_lineCount - 1.0, 1.0);',
    '',
    '    // Each layer: different tightness and scale',
    '    float a = 0.02 + frac * 0.03;',
    '    float b = 0.15 + frac * 0.08;',
    '    float numArms = 3.0 + fi;',
    '',
    '    // Noise perturbation',
    '    float nOff = noise(vec2(fi * 3.7, t * 0.1)) * 0.008;',
    '',
    '    float dist = spiralDist(p + vec2(nOff), a, b, numArms, t + fi * 0.5);',
    '',
    '    // Silk glow: thin bright core with edge fade',
    '    float lw = 0.05 * S(0.1, 0.6, r);',
    '    float l = S(lw, 0.0, dist - 0.004);',
    '',
    '    // Brighten toward center, fade at edge',
    '    float radialFade = S(0.9, 0.15, r) * S(0.0, 0.04, r);',
    '',
    '    // Color: warm amber to gold',
    '    vec3 lineCol = vec3(',
    '      0.25 + frac * 0.65,',
    '      0.2 + frac * 0.4,',
    '      0.25 + (1.0 - frac) * 0.15',
    '    );',
    '',
    '    col += l * lineCol * radialFade;',
    '  }',
    '',
    '  // Central glow',
    '  float centerGlow = 0.015 / (r + 0.02);',
    '  col += vec3(0.9, 0.65, 0.35) * centerGlow * 0.15;',
    '',
    '  // ── Vignette ──',
    '  float vig = 1.0 - dot(uv, uv) * 0.4;',
    '  col *= max(vig, 0.0);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uWaveSpeed = gl.getUniformLocation(prog, 'u_waveSpeed');
  var uLineCount = gl.getUniformLocation(prog, 'u_lineCount');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var waveSpeedVal = 1.0;
  var lineCountVal = 6.0;
  var mouseRotOffset = 0;
  var mouseDown = false, lastMX = 0;

  // Drag to spin the vortex
  canvas.addEventListener('mousedown', function(e) { mouseDown = true; lastMX = e.clientX; });
  canvas.addEventListener('mousemove', function(e) {
    if (mouseDown) { mouseRotOffset += (e.clientX - lastMX) * 0.008; lastMX = e.clientX; }
  });
  canvas.addEventListener('mouseup', function() { mouseDown = false; });
  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); mouseDown = true; lastMX = e.touches[0].clientX; }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (mouseDown) { mouseRotOffset += (e.touches[0].clientX - lastMX) * 0.008; lastMX = e.touches[0].clientX; }
  }, { passive: false });
  canvas.addEventListener('touchend', function() { mouseDown = false; });

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;
  var needsResize = true;
  var running = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uWaveSpeed, waveSpeedVal);
    gl.uniform1f(uLineCount, lineCountVal);
    gl.uniform2f(uMouse, mouseRotOffset, 0.0);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'WAVE_SPEED': waveSpeedVal = e.data.value; break;
        case 'LINE_COUNT': lineCountVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
